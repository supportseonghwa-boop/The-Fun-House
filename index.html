<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FUN HOUSE: THE VOID</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; user-select: none; }
        canvas { display: block; filter: contrast(1.2) brightness(0.9); }

        /* UI STYLING */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,0,0,0.8); font-size: 24px; text-shadow: 0 0 8px red; }
        #hud { position: absolute; bottom: 40px; left: 40px; border-left: 5px solid darkred; padding-left: 20px; color: #aaa; text-shadow: 1px 1px 0 #000; }
        #battery-cont { width: 220px; height: 12px; background: #111; margin-top: 10px; border: 2px solid #300; }
        #battery-fill { width: 100%; height: 100%; background: darkred; box-shadow: 0 0 15px red; transition: width 0.2s; }
        
        #interact-text { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1rem; text-shadow: 2px 2px 0 #000; display: none; }

        /* MENUS & OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: darkred; text-align: center; }
        h1 { font-family: 'Creepster'; font-size: 8rem; text-shadow: 0 0 30px red; margin-bottom: 10px; letter-spacing: 5px; }
        
        .btn { background: #0a0000; border: 2px solid darkred; color: red; padding: 18px 50px; font-family: inherit; font-size: 1.2rem; cursor: pointer; margin: 15px; transition: 0.3s; box-shadow: 0 0 10px #300; pointer-events: auto; }
        .btn:hover { background: red; color: black; box-shadow: 0 0 30px red; transform: scale(1.05); }

        #subtitles { position: absolute; bottom: 15%; width: 100%; text-align: center; color: #ffdddd; font-size: 1.2rem; text-shadow: 2px 2px 5px #000; z-index: 150; pointer-events: none; line-height: 1.6; }
        #lock-screen { display: none; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>THE FUN HOUSE</h1>
        <p style="color: #666; margin-bottom: 50px; font-size: 1.2rem;">CHAPTER 1: I SEE YOU</p>
        <button class="btn" id="start-btn">ENTER THE VOID</button>
    </div>

    <div id="lock-screen" class="overlay">
        <h2 style="font-family: 'Creepster'; font-size: 4rem; margin-bottom: 30px;">THE DOOR IS OPEN</h2>
        <button class="btn" id="lock-btn">CLICK TO WAKE UP</button>
    </div>

    <div id="subtitles"></div>

    <div id="ui-layer">
        <div id="crosshair">+</div>
        <div id="interact-text">PRESS E TO INTERACT</div>
        <div id="hud">
            <div>FLASHLIGHT [F]</div>
            <div id="battery-cont"><div id="battery-fill"></div></div>
            <div id="task-text" style="margin-top: 15px; color: #ff5555;">FIND 3 SWITCHES: 0/3</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, clock, flashlight, playerHand;
        let isLocked = false, gameActive = false, cutsceneActive = false;
        let flashOn = true;
        let battery = 100, pitch = 0, yaw = 0;
        let move = { f: false, b: false, l: false, r: false };
        let audioCtx;

        // Game State
        let doorSlammed = false;
        let switchesFound = 0;
        const switches = [];
        let houseLights = [];
        let mainDoorPivot;

        // --- PROCEDURAL CREEPY TEXTURE ---
        function createNoiseTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,512,512);
            for(let i=0; i<8000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#222' : '#050505';
                const size = Math.random() * 4;
                ctx.fillRect(Math.random()*512, Math.random()*512, size, size);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(5, 5);
            return tex;
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205); // Dark sky
            scene.fog = new THREE.Fog(0x020205, 2, 40); // Adjusted fog so you can see
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Brighter Ambient Light so it's not pitch black
            scene.add(new THREE.AmbientLight(0x1a1a1a));
            const moonLight = new THREE.DirectionalLight(0x444466, 0.5);
            moonLight.position.set(50, 100, 50);
            scene.add(moonLight);

            const creepyTex = createNoiseTexture();
            const wallMat = new THREE.MeshStandardMaterial({ map: creepyTex, roughness: 0.9, color: 0x444444 });
            const floorMat = new THREE.MeshStandardMaterial({ map: creepyTex, roughness: 1, color: 0x222222 });
            const bloodMat = new THREE.MeshBasicMaterial({ color: 0x4a0000, transparent: true, opacity: 0.8 });

            // --- THE STREET ---
            const street = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({color: 0x111111}));
            street.rotation.x = -Math.PI/2;
            street.position.set(0, 0, 30);
            scene.add(street);

            // --- THE HOUSE ---
            const houseFloor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), floorMat);
            houseFloor.rotation.x = -Math.PI/2;
            houseFloor.position.set(0, 0, 0);
            scene.add(houseFloor);

            // Front Wall
            const frontWallL = new THREE.Mesh(new THREE.BoxGeometry(18, 10, 1), wallMat);
            frontWallL.position.set(-11, 5, 20); scene.add(frontWallL);
            const frontWallR = new THREE.Mesh(new THREE.BoxGeometry(18, 10, 1), wallMat);
            frontWallR.position.set(11, 5, 20); scene.add(frontWallR);
            const frontWallTop = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 1), wallMat);
            frontWallTop.position.set(0, 8.5, 20); scene.add(frontWallTop);

            // Side Walls
            const sideWallL = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 40), wallMat);
            sideWallL.position.set(-20, 5, 0); scene.add(sideWallL);
            const sideWallR = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 40), wallMat);
            sideWallR.position.set(20, 5, 0); scene.add(sideWallR);
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(40, 10, 1), wallMat);
            backWall.position.set(0, 5, -20); scene.add(backWall);

            // Front Door (Hinged)
            mainDoorPivot = new THREE.Group();
            mainDoorPivot.position.set(-2, 0, 20); // Hinge position
            const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 7, 0.5), new THREE.MeshStandardMaterial({color: 0x2b1d14}));
            doorMesh.position.set(2, 3.5, 0); // Offset from hinge
            mainDoorPivot.add(doorMesh);
            mainDoorPivot.rotation.y = -Math.PI / 2; // Start OPEN
            scene.add(mainDoorPivot);

            // --- FURNITURE & CREEPY DETAILS ---
            const couch = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 3), new THREE.MeshStandardMaterial({color: 0x331111}));
            couch.position.set(-10, 1, 5); scene.add(couch);
            
            const table = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 4), new THREE.MeshStandardMaterial({color: 0x222222}));
            table.position.set(0, 0.75, 5); scene.add(table);

            const brokenPlank = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
            brokenPlank.position.set(5, 0.1, 10); brokenPlank.rotation.y = Math.PI/4; scene.add(brokenPlank);

            // Blood stains
            const blood1 = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), bloodMat);
            blood1.rotation.x = -Math.PI/2; blood1.position.set(0, 0.01, 12); scene.add(blood1);
            const blood2 = new THREE.Mesh(new THREE.PlaneGeometry(2, 4), bloodMat);
            blood2.rotation.x = -Math.PI/2; blood2.position.set(-8, 0.01, 5); scene.add(blood2);

            // --- SWITCHES ---
            const switchGeo = new THREE.BoxGeometry(0.5, 0.8, 0.2);
            const switchMat = new THREE.MeshStandardMaterial({color: 0x880000}); // Red switches
            
            const s1 = new THREE.Mesh(switchGeo, switchMat); s1.position.set(-19.4, 3, 10); scene.add(s1);
            const s2 = new THREE.Mesh(switchGeo, switchMat); s2.position.set(19.4, 3, -5); scene.add(s2);
            const s3 = new THREE.Mesh(switchGeo, switchMat); s3.position.set(0, 3, -19.4); scene.add(s3);
            switches.push(s1, s2, s3);

            // --- HOUSE LIGHTS (Start OFF) ---
            for(let i=0; i<3; i++) {
                let l = new THREE.PointLight(0xffddaa, 0, 25);
                l.position.set((i-1)*10, 8, 0);
                scene.add(l);
                houseLights.push(l);
            }

            // --- PLAYER RIG ---
            playerHand = new THREE.Group();
            
            // Much Bigger Flashlight
            flashlight = new THREE.SpotLight(0xffeedd, 3, 60, Math.PI/2.5, 0.3, 1.5);
            flashlight.position.set(0.4, -0.3, -0.7);
            playerHand.add(flashlight);
            flashlight.target.position.set(0.4, -0.3, -10);
            playerHand.add(flashlight.target);

            camera.add(playerHand);
            scene.add(camera);

            clock = new THREE.Clock();
            renderer.render(scene, camera);
        }

        // --- AUDIO SYSTEM ---
        function playSlamSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playSwitchSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- CUTSCENE LOGIC ---
        async function triggerDoorSlam() {
            cutsceneActive = true;
            doorSlammed = true;
            move = { f: false, b: false, l: false, r: false }; // Stop moving

            const subs = document.getElementById('subtitles');
            
            // Whip camera around to look at the door (Z: 20)
            const targetRot = Math.PI; // Look backward
            let t = 0;
            const startYaw = yaw;

            while (t < 1) {
                t += 0.05;
                yaw = THREE.MathUtils.lerp(startYaw, targetRot, t);
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                await new Promise(r => setTimeout(r, 16));
            }

            // Slam Door
            mainDoorPivot.rotation.y = 0;
            playSlamSound();

            await new Promise(r => setTimeout(r, 1000));

            // Show Text
            const lines = [
                "I think am stuck here now...",
                "Uh... I guess we have to continue."
            ];

            for(let line of lines) {
                subs.innerText = line;
                const msg = new SpeechSynthesisUtterance(line);
                msg.pitch = 0.8; msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
                await new Promise(r => setTimeout(r, 3000));
            }
            
            subs.innerText = "";
            cutsceneActive = false; // Give controls back
        }

        // --- EVENT LISTENERS ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('main-menu').style.display = 'none';
            init3D();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('lock-screen').style.display = 'flex';
        });

        document.getElementById('lock-btn').addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            if (isLocked) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                
                if (!gameActive) {
                    // Spawn on the dark street outside
                    camera.position.set(0, 1.7, 40);
                    camera.rotation.set(0, 0, 0);
                    pitch = 0; yaw = 0;
                    gameActive = true;
                    animate();
                }
            } else {
                if (gameActive) document.getElementById('lock-screen').style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked || !gameActive || cutsceneActive) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        });

        document.addEventListener('keydown', e => {
            if(cutsceneActive) return;
            if(e.code === 'KeyW') move.f = true;
            if(e.code === 'KeyS') move.b = true;
            if(e.code === 'KeyA') move.l = true;
            if(e.code === 'KeyD') move.r = true;
            
            // Flashlight Toggle
            if(e.code === 'KeyF') {
                flashOn = !flashOn;
                flashlight.intensity = flashOn ? 3 : 0;
            }

            // Interact
            if(e.code === 'KeyE') {
                interact();
            }
        });
        
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') move.f = false;
            if(e.code === 'KeyS') move.b = false;
            if(e.code === 'KeyA') move.l = false;
            if(e.code === 'KeyD') move.r = false;
        });

        // --- INTERACTION LOGIC ---
        function interact() {
            const raycaster = new THREE.Raycaster();
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            raycaster.set(camera.position, dir);

            const intersects = raycaster.intersectObjects(switches);
            if (intersects.length > 0 && intersects[0].distance < 4) {
                const obj = intersects[0].object;
                obj.material.color.setHex(0x00ff00); // Turn green
                
                // Remove from interactable array so you can't click it twice
                const index = switches.indexOf(obj);
                if (index > -1) switches.splice(index, 1);
                
                switchesFound++;
                document.getElementById('task-text').innerText = `FIND 3 SWITCHES: ${switchesFound}/3`;
                playSwitchSound();

                if(switchesFound >= 3) {
                    document.getElementById('task-text').innerText = "POWER RESTORED. THE VOID AWAKENS.";
                }
            }
        }

        // --- MAIN LOOP ---
        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Cutscene Trigger Zone (Entering the house)
            if (!doorSlammed && camera.position.z < 18 && camera.position.z > 10) {
                triggerDoorSlam();
            }

            if (!cutsceneActive) {
                // WASD Movement
                const speed = 4;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

                if (move.f) camera.position.addScaledVector(dir, speed * delta);
                if (move.b) camera.position.addScaledVector(dir, -speed * delta);
                if (move.l) camera.position.addScaledVector(side, speed * delta);
                if (move.r) camera.position.addScaledVector(side, -speed * delta);

                // Hand Sway
                playerHand.position.y = Math.sin(Date.now() * 0.002) * 0.015;
                if (move.f || move.b || move.l || move.r) {
                    playerHand.position.y += Math.sin(Date.now() * 0.015) * 0.03; 
                }

                // Check for Interaction Text
                const raycaster = new THREE.Raycaster();
                const vDir = new THREE.Vector3();
                camera.getWorldDirection(vDir);
                raycaster.set(camera.position, vDir);
                const intersects = raycaster.intersectObjects(switches);
                
                if (intersects.length > 0 && intersects[0].distance < 4) {
                    document.getElementById('interact-text').style.display = 'block';
                } else {
                    document.getElementById('interact-text').style.display = 'none';
                }
            }

            // Battery logic (Only drains if flashlight is on)
            if (flashOn) {
                battery -= 0.5 * delta;
                document.getElementById('battery-fill').style.width = Math.max(0, battery) + "%";
            }

            // House Lights Flickering Logic
            if (switchesFound >= 3) {
                houseLights.forEach(l => {
                    // Random flicker intensity between 0.5 and 1.5
                    if(Math.random() > 0.8) {
                        l.intensity = 0.5 + Math.random();
                    }
                });
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
