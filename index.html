<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fun House - Chapter 1: The Jester</title>
    <style>
        :root {
            --playtime-blue: #0055ff;
            --playtime-yellow: #ffd700;
            --blood-red: #8b0000;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
            cursor: none;
        }

        #game-canvas { display: block; width: 100vw; height: 100vh; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .ui-layer.interactive { pointer-events: auto; }

        /* Main Menu */
        #main-menu {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0505 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .menu-title {
            font-size: 8rem; font-weight: 900; margin: 0; line-height: 1;
            color: var(--playtime-blue);
            text-shadow: 4px 4px 0px var(--playtime-yellow);
            font-style: italic;
            transform: skewX(-10deg);
        }
        .menu-sub {
            font-size: 2rem; color: var(--playtime-yellow); margin-bottom: 50px;
            letter-spacing: 5px; text-transform: uppercase;
        }
        .menu-btn {
            background: var(--playtime-blue); border: none; color: #fff;
            padding: 15px 60px; font-size: 1.5rem; font-family: inherit;
            font-weight: bold; cursor: pointer; margin: 10px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: all 0.2s;
        }
        .menu-btn:hover { background: var(--playtime-yellow); color: #000; transform: scale(1.05); }

        /* HUD */
        #hud { display: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 2px; height: 2px; background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #interact-prompt {
            position: absolute; bottom: 35%; left: 50%; transform: translateX(-50%);
            font-size: 1.4rem; color: var(--playtime-yellow);
            text-shadow: 2px 2px 0 #000; opacity: 0; transition: opacity 0.2s;
            background: rgba(0,0,0,0.5); padding: 5px 15px;
        }
        #inventory-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px;
        }
        .inv-slot {
            width: 60px; height: 60px; border: 3px solid #fff; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #fff;
        }
        #grabpack-hand {
            position: absolute; bottom: 0; right: 0; width: 200px; height: 200px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%230055ff" stroke="%23ffd700" stroke-width="5"/><rect x="45" y="10" width="10" height="30" fill="%23ffd700"/></svg>') no-repeat bottom right;
            background-size: contain; pointer-events: none;
        }

        /* VHS & Cutscene Overlays */
        #vhs-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.2) 0px, rgba(0, 0, 0, 0.2) 1px, transparent 1px, transparent 3px);
            pointer-events: none; opacity: 0.6; mix-blend-mode: overlay;
        }
        #vhs-track {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: rgba(255,255,255,0.3); animation: trackMove 4s linear infinite;
            pointer-events: none;
        }
        @keyframes trackMove { 0% { top: 0%; } 100% { top: 100%; } }

        #cutscene-ui {
            position: absolute; bottom: 50px; left: 50px; right: 50px; display: none;
        }
        #speaker-name {
            color: var(--playtime-yellow); font-size: 1.5rem; font-weight: bold; margin-bottom: 5px;
            text-shadow: 2px 2px 0 #000;
        }
        #dialogue-text {
            font-size: 1.8rem; line-height: 1.4; background: rgba(0,0,0,0.8);
            padding: 20px; border-left: 5px solid var(--playtime-blue);
        }
        #skip-btn {
            position: absolute; top: 20px; right: 20px; background: none;
            border: 2px solid #fff; color: #fff; padding: 10px 20px;
            font-family: inherit; font-size: 1rem; cursor: pointer;
        }

        /* Jumpscare */
        #jumpscare-screen { background: #000; display: none; align-items: center; justify-content: center; z-index: 100; }
        #jumpscare-img { font-size: 20rem; animation: jumpAnim 0.05s infinite; }
        @keyframes jumpAnim { 0% { transform: translate(-10px, -10px) scale(1.2); } 50% { transform: translate(10px, 10px) scale(1.3); } 100% { transform: translate(-10px, -10px) scale(1.2); } }

        /* Pause Menu */
        #pause-menu { background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="game-canvas"></div>
    <div id="vhs-overlay"></div>
    <div id="vhs-track"></div>

    <!-- Main Menu -->
    <div id="main-menu" class="ui-layer interactive">
        <div class="menu-title">THE FUN<br>HOUSE</div>
        <div class="menu-sub">Chapter 1: The Jester</div>
        <button class="menu-btn" id="btn-play">PLAY</button>
        <button class="menu-btn" id="btn-quit">QUIT</button>
    </div>

    <!-- HUD -->
    <div id="hud" class="ui-layer">
        <div id="crosshair"></div>
        <div id="interact-prompt">[E] Interact</div>
        <div id="inventory-bar">
            <div class="inv-slot" id="slot-1"></div>
            <div class="inv-slot" id="slot-2"></div>
        </div>
        <div id="grabpack-hand"></div>
    </div>

    <!-- Cutscene UI -->
    <div id="cutscene-ui" class="ui-layer interactive">
        <div id="speaker-name">SYSTEM</div>
        <div id="dialogue-text">Loading...</div>
        <button id="skip-btn">SKIP >></button>
    </div>

    <!-- Jumpscare -->
    <div id="jumpscare-screen" class="ui-layer interactive">
        <div id="jumpscare-img">🤡</div>
    </div>

    <!-- Pause -->
    <div id="pause-menu" class="ui-layer interactive">
        <h2>PAUSED</h2>
        <button class="menu-btn" id="btn-resume">RESUME</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- GLOBALS ---
        const clock = new THREE.Clock();
        let scene, camera, renderer, controls, cutsceneCamera;
        
        const state = {
            phase: 'MENU', // MENU, CUTSCENE, GAMEPLAY, JUMPSCARED, DEAD, WIN
            isPaused: false,
            moveForward: false, moveBackward: false, moveLeft: false, moveRight: false,
            isSprinting: false, isCrouching: false,
            velocity: new THREE.Vector3(), direction: new THREE.Vector3(),
            inventory: [], maxInventory: 2,
            currentPuzzleCode: [], playerEnteredCode: [],
            hasGrabPack: false, isFiringGrabPack: false,
            enemyActive: false, enemyState: 'idle', isHiding: false
        };

        let audioCtx, masterGain;
        let flashlight, flashlightTarget;
        let interactables = [];
        let enemyMesh, enemyPath = [], enemyPathIdx = 0;
        let grabPackWire, grabPackTarget; // Visuals for the GrabPack laser

        // DOM
        const menuEl = document.getElementById('main-menu');
        const hudEl = document.getElementById('hud');
        const promptEl = document.getElementById('interact-prompt');
        const cutsceneUi = document.getElementById('cutscene-ui');
        const speakerEl = document.getElementById('speaker-name');
        const dialogueEl = document.getElementById('dialogue-text');
        const jumpscareEl = document.getElementById('jumpscare-screen');
        const pauseEl = document.getElementById('pause-menu');

        // --- INIT ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.7, 5);

            // Cutscene Camera
            cutsceneCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            cutsceneCamera.position.set(0, 3, 15);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.6;
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);

            setupLighting();
            buildPlaytimeStyleMap();
            setupFlashlight();
            setupEnemy();
            setupGrabPackVisuals();
            setupEventListeners();
            randomizePuzzle();

            animate();
        }

        // --- AUDIO ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.5;
            masterGain.connect(audioCtx.destination);
        }

        // Robotic Voice Synthesis for Cutscenes
        function speakDialogue(text) {
            if (!audioCtx) return;
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.8; // Deep voice
            utterance.rate = 0.9;
            utterance.volume = 1;
            // Try to find a robotic or deep voice
            const voices = synth.getVoices();
            const selectedVoice = voices.find(v => v.name.includes('Male') || v.name.includes('Daniel') || v.name.includes('Google UK English Male')) || voices[0];
            if(selectedVoice) utterance.voice = selectedVoice;
            synth.speak(utterance);
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(masterGain);

            if (type === 'grabpack_shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'toy_ambience') {
                // Creepy music box
                const notes = [523.25, 659.25, 783.99, 659.25]; // C5 E5 G5 E5
                notes.forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine'; o.frequency.value = freq;
                    g.gain.setValueAtTime(0, audioCtx.currentTime + i*0.5);
                    g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i*0.5 + 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.5 + 0.5);
                    o.connect(g); g.connect(masterGain);
                    o.start(audioCtx.currentTime + i*0.5);
                    o.stop(audioCtx.currentTime + i*0.5 + 0.6);
                });
            } else if (type === 'jumpscare') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(3000, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            } else if (type === 'door') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1.5);
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        }

        // --- CUTSCENE SYSTEM ---
        let cutsceneQueue = [];
        let currentCutscene = null;
        let cutsceneTimer = 0;

        function playCutscene(script) {
            state.phase = 'CUTSCENE';
            cutsceneQueue = [...script];
            nextCutsceneLine();
            hudEl.style.display = 'none';
            cutsceneUi.style.display = 'block';
            if(controls.isLocked) controls.unlock();
        }

        function nextCutsceneLine() {
            if (cutsceneQueue.length === 0) {
                endCutscene();
                return;
            }
            currentCutscene = cutsceneQueue.shift();
            speakerEl.innerText = currentCutscene.speaker;
            dialogueEl.innerText = "";
            cutsceneTimer = 0;
            
            if(currentCutscene.voice) speakDialogue(currentCutscene.text);
        }

        function updateCutscene(delta) {
            if (!currentCutscene) return;
            cutsceneTimer += delta;

            // Typewriter effect
            if (dialogueEl.innerText.length < currentCutscene.text.length) {
                dialogueEl.innerText += currentCutscene.text.charAt(dialogueEl.innerText.length);
            }

            // Camera Animation
            if (currentCutscene.camMove) {
                cutsceneCamera.position.lerp(currentCutscene.camMove.target, delta * 0.5);
                cutsceneCamera.lookAt(currentCutscene.camMove.lookAt || new THREE.Vector3(0,1.5,0));
            }

            // Auto advance or wait for click
            if (dialogueEl.innerText.length === currentCutscene.text.length && cutsceneTimer > currentCutscene.text.length * 0.05 + 1) {
                // Wait for user click or auto-advance
            }
        }

        function advanceCutscene() {
            if (dialogueEl.innerText.length < currentCutscene.text.length) {
                dialogueEl.innerText = currentCutscene.text; // Skip typewriter
            } else {
                nextCutsceneLine();
            }
        }

        function endCutscene() {
            state.phase = 'GAMEPLAY';
            cutsceneUi.style.display = 'none';
            hudEl.style.display = 'block';
            controls.lock();
        }

        // --- LIGHTING & GRABPACK VISUALS ---
        function setupLighting() {
            scene.add(new THREE.AmbientLight(0x404040, 0.3));
            
            // Poppy Playtime style bright staging lights
            const stageLight = new THREE.SpotLight(0xffffff, 2, 30, Math.PI / 4, 0.5, 1);
            stageLight.position.set(0, 5, -5);
            stageLight.target.position.set(0, 0, -5);
            stageLight.castShadow = true;
            scene.add(stageLight, stageLight.target);
        }

        function setupFlashlight() {
            flashlight = new THREE.SpotLight(0xffffff, 3, 15, Math.PI / 5, 0.4, 1.2);
            flashlight.castShadow = true;
            flashlightTarget = new THREE.Object3D();
            flashlightTarget.position.set(0, 0, -1);
            camera.add(flashlightTarget); camera.add(flashlight);
            flashlight.target = flashlightTarget;
            scene.add(camera);
        }

        function setupGrabPackVisuals() {
            const wireMat = new THREE.LineBasicMaterial({ color: 0x0055ff, linewidth: 2 });
            const wireGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            grabPackWire = new THREE.Line(wireGeo, wireMat);
            grabPackWire.visible = false;
            scene.add(grabPackWire);
            
            grabPackTarget = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x0055ff })
            );
            grabPackTarget.visible = false;
            scene.add(grabPackTarget);
        }

        // --- ENVIRONMENT BUILDER (PLAYTIME STYLE) ---
        function buildPlaytimeStyleMap() {
            // Materials: Bright plastic, clean metal, playroom floor
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a8fd6, roughness: 0.8 }); // Blue playroom tiles
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.5 }); // Clean white walls
            const darkWallMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 }); // Destroyed section
            const metalMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
            scene.add(floor);

            // Ceiling
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), wallMat);
            ceiling.rotation.x = Math.PI / 2; ceiling.position.y = 4;
            scene.add(ceiling);

            const createWall = (w, h, d, x, y, z, mat = wallMat) => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                wall.position.set(x, y, z); wall.castShadow = true; wall.receiveShadow = true;
                scene.add(wall); return wall;
            };

            // --- SECTION 1: ENTRANCE (Bright, normal toy factory) ---
            // Left/Right walls
            createWall(40, 4, 0.2, -6, 2, -15);
            createWall(40, 4, 0.2, 6, 2, -15);

            // Skyline Cutscene Object
            const skyline = new THREE.Group();
            for(let i=0; i<5; i++) {
                const h = Math.random() * 3 + 1;
                const build = new THREE.Mesh(new THREE.BoxGeometry(1.5, h, 1.5), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
                build.position.set(-3 + i*1.6, h/2, -25);
                skyline.add(build);
            }
            scene.add(skyline);

            // GrabPack Pedestal
            const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 1, 16), metalMat);
            pedestal.position.set(0, 0.5, -2); scene.add(pedestal);
            
            const grabPackBox = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), 
                new THREE.MeshStandardMaterial({color: 0x0055ff, emissive: 0x0055ff, emissiveIntensity: 0.3}));
            grabPackBox.position.set(0, 1.4, -2);
            scene.add(grabPackBox);
            interactables.push({
                id: 'grabpack', obj: grabPackBox, type: 'pickup', name: 'GrabPack',
                icon: '🤖', action: () => {
                    addItemToInventory('grabpack', 'GrabPack', '🤖');
                    state.hasGrabPack = true;
                    triggerGrabPackCutscene();
                }
            });

            // --- SECTION 2: PUZZLE ROOM (Darker, ruined) ---
            // Dividing wall with cutout for door
            createWall(5, 4, 0.2, -3.5, 2, -10);
            createWall(5, 4, 0.2, 3.5, 2, -10);
            createWall(2, 1, 0.2, 0, 3.5, -10); // Top part

            // Change floor/wall color past here to dark
            const darkFloor = new THREE.Mesh(new THREE.PlaneGeometry(20, 30), new THREE.MeshStandardMaterial({color: 0x111111, roughness: 1}));
            darkFloor.rotation.x = -Math.PI / 2; darkFloor.position.set(0, 0.01, -20); scene.add(darkFloor);
            
            createWall(20, 4, 0.2, -6, 2, -20, darkWallMat);
            createWall(20, 4, 0.2, 6, 2, -20, darkWallMat);
            createWall(12.2, 4, 0.2, 0, 2, -30, darkWallMat);

            // Heavy Door (Requires GrabPack to pull switch)
            const puzzleDoor = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.5), 
                new THREE.MeshStandardMaterial({color: 0x444444, metalness: 0.5}));
            puzzleDoor.position.set(0, 2, -9.5);
            scene.add(puzzleDoor);
            interactables.push({
                id: 'puzzle_door', obj: puzzleDoor, type: 'door', name: 'Security Door',
                locked: true, action: () => { promptEl.innerText = "Requires Power"; setTimeout(()=>promptEl.innerText="", 2000); }
            });

            // Power Switch (Across a gap, must use GrabPack)
            const switchBase = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.5), metalMat);
            switchBase.position.set(4, 0.5, -14); scene.add(switchBase);
            const switchHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8), 
                new THREE.MeshStandardMaterial({color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5}));
            switchHandle.position.set(4, 1.5, -14); switchHandle.rotation.z = Math.PI / 4;
            scene.add(switchHandle);
            
            interactables.push({
                id: 'power_switch', obj: switchHandle, type: 'grabpack_target', name: 'Power Switch',
                action: () => {
                    switchHandle.rotation.z = -Math.PI / 4; // Flip switch
                    playSound('door');
                    // Open puzzle door
                    const anim = () => {
                        if(puzzleDoor.position.y > -2) { puzzleDoor.position.y -= 0.1; requestAnimationFrame(anim); }
                        else { state.enemyActive = true; triggerEnemyIntroCutscene(); }
                    }; anim();
                }
            });

            // Toy Train (Puzzle element to move)
            const trainCart = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 1), new THREE.MeshStandardMaterial({color: 0xffd700}));
            trainCart.position.set(0, 0.5, -18); scene.add(trainCart);

            // Color Code Keypad
            const keypad = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.1), new THREE.MeshStandardMaterial({color: 0x333333}));
            keypad.position.set(-5.8, 2, -25); keypad.rotation.y = Math.PI/2;
            scene.add(keypad);
            interactables.push({
                id: 'keypad', obj: keypad, type: 'puzzle', name: 'Color Keypad',
                action: () => {
                    const code = prompt(`Enter 4-digit code (Hint: Check the train cargo):`, "");
                    if(code && /^\d{4}$/.test(code)) {
                        state.playerEnteredCode = code.split('').map(Number);
                        if(state.playerEnteredCode.join('') === state.currentPuzzleCode.join('')) {
                            playSound('grabpack_shoot');
                            triggerWin();
                        } else { alert("ACCESS DENIED"); }
                    }
                }
            });

            // Code Clue on Train
            interactables.push({
                id: 'train', obj: trainCart, type: 'clue', name: 'Toy Train Cargo',
                action: () => alert(`The train cart has numbers painted on it: ${state.currentPuzzleCode.join('')}`)
            });

            // Exit Door
            const exitDoor = new THREE.Mesh(new THREE.BoxGeometry(3, 3.5, 0.5), new THREE.MeshStandardMaterial({color: 0x0055ff, emissive: 0x003399, emissiveIntensity: 0.2}));
            exitDoor.position.set(0, 1.75, -29.5); scene.add(exitDoor);

            // Locker
            const locker = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1), metalMat);
            locker.position.set(5.5, 1.5, -20); locker.rotation.y = -Math.PI/2;
            scene.add(locker);
            interactables.push({ id: 'locker', obj: locker, type: 'hide', name: 'Locker', action: () => toggleHide() });
        }

        // --- CUTSCENE SCRIPTS ---
        function triggerIntroCutscene() {
            playCutscene([
                { speaker: "TAPE RECORDER", text: "Date: October 14th, 1991. Playtime Co. Factory Log.", voice: true, camMove: { target: new THREE.Vector3(0, 4, 15), lookAt: new THREE.Vector3(0, 2, -5) } },
                { speaker: "TAPE RECORDER", text: "I knew something was wrong with Project: JESTER. They said it was just a theme park attraction...", voice: true, camMove: { target: new THREE.Vector3(5, 3, 5), lookAt: new THREE.Vector3(0, 1, -2) } },
                { speaker: "TAPE RECORDER", text: "But the organic components... the children's laughter used as power... it wasn't right.", voice: true, camMove: { target: new THREE.Vector3(-5, 3, 0), lookAt: new THREE.Vector3(0, 1, -2) } },
                { speaker: "TAPE RECORDER", text: "If you are watching this, the Fun House is still active. Find the GrabPack. Do not let it see you smile.", voice: true, camMove: { target: new THREE.Vector3(0, 1.7, 3), lookAt: new THREE.Vector3(0, 1.5, -2) } }
            ]);
        }

        function triggerGrabPackCutscene() {
            playCutscene([
                { speaker: "SYSTEM", text: "GrabPack Equipped. Press Right Click to fire elastic hand.", voice: false, camMove: { target: new THREE.Vector3(2, 2, -1), lookAt: camera.position } },
                { speaker: "SYSTEM", text: "Use it to interact with objects from a distance.", voice: false }
            ]);
        }

        function triggerEnemyIntroCutscene() {
            playCutscene([
                { speaker: "???", text: "..."
                , voice: false, camMove: { target: new THREE.Vector3(0, 4, -15), lookAt: enemyMesh.position } },
                { speaker: "THE JESTER", text: "A new playmate...", voice: true, camMove: { target: new THREE.Vector3(0, 2, -20), lookAt: new THREE.Vector3(0, 1.7, -10) } },
                { speaker: "THE JESTER", text: "Let's play hide and seek.", voice: true, camMove: { target: new THREE.Vector3(-2, 3, -25), lookAt: camera.position } }
            ]);
            playSound('toy_ambience');
        }

        // --- ENEMY AI ---
        function setupEnemy() {
            enemyMesh = new THREE.Group();
            // Tall, thin, creepy jester
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 3, 8), new THREE.MeshStandardMaterial({color: 0x222222}));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshStandardMaterial({color: 0xffffff}));
            // Jester hat
            const hat = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.5, 8), new THREE.MeshStandardMaterial({color: 0x8b0000}));
            hat.position.y = 1.2; hat.rotation.z = 0.2;
            const hat2 = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.5, 8), new THREE.MeshStandardMaterial({color: 0x0055ff}));
            hat2.position.set(0.4, 1.0, 0); hat2.rotation.z = -0.5;
            // Eyes
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xff0000});
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), eyeMat); eyeL.position.set(-0.15, 0.1, 0.45);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), eyeMat); eyeR.position.set(0.15, 0.1, 0.45);
            // Giant smile
            const smileGeo = new THREE.TorusGeometry(0.2, 0.03, 8, 16, Math.PI);
            const smile = new THREE.Mesh(smileGeo, eyeMat); smile.position.set(0, -0.1, 0.4); smile.rotation.x = 0.2;

            head.add(eyeL, eyeR, smile);
            body.add(head, hat, hat2);
            body.position.y = 1.5;
            enemyMesh.add(body);
            enemyMesh.position.set(0, 0, -28);
            scene.add(enemyMesh);

            enemyPath = [
                new THREE.Vector3(0, 0, -28), new THREE.Vector3(-4, 0, -20),
                new THREE.Vector3(4, 0, -15), new THREE.Vector3(-4, 0, -12),
                new THREE.Vector3(0, 0, -18)
            ];
        }

        function updateEnemy(delta) {
            if (!state.enemyActive || !enemyMesh || state.isHiding || state.phase === 'CUTSCENE') return;

            const pos = enemyMesh.position;
            let targetPos = enemyPath[enemyPathIdx];
            let dir = new THREE.Vector3().subVectors(targetPos, pos).normalize();
            let speed = 2.5;

            if (enemyState === 'chase') {
                dir.subVectors(camera.position, pos).normalize();
                speed = 5.5;
                // Creepy audio loop when chasing
                if(Math.random() < 0.01) playSound('toy_ambience');
            }

            pos.add(dir.multiplyScalar(speed * delta));
            enemyMesh.lookAt(new THREE.Vector3(pos.x + dir.x, pos.y + 1.5, pos.z + dir.z));

            // Head bobbing animation
            enemyMesh.children[0].rotation.z = Math.sin(clock.elapsedTime * 3) * 0.1;

            if (pos.distanceTo(targetPos) < 1.5 && enemyState !== 'chase') {
                enemyPathIdx = (enemyPathIdx + 1) % enemyPath.length;
            }

            // Detection (Line of sight + Proximity)
            const distToPlayer = pos.distanceTo(camera.position);
            if (distToPlayer < 10) {
                const rayDir = new THREE.Vector3().subVectors(camera.position, pos).normalize();
                const ray = new THREE.Raycaster(pos, rayDir, 0, distToPlayer);
                const intersects = ray.intersectObjects(scene.children, true);
                if (intersects.length === 0 || intersects[0].distance > distToPlayer - 1) {
                    enemyState = 'chase';
                }
            } else { enemyState = 'patrol'; }

            if (distToPlayer < 1.5 && enemyState === 'chase') triggerJumpscare();
        }

        // --- GAMEPLAY SYSTEMS ---
        function randomizePuzzle() { state.currentPuzzleCode = Array.from({length: 4}, () => Math.floor(Math.random()*9)+1); console.log("Code:", state.currentPuzzleCode.join('')); }
        
        function addItemToInventory(id, name, icon) {
            if(state.inventory.length >= state.maxInventory) return alert("Inventory Full!");
            state.inventory.push({id, name, icon});
            updateInventoryUI(); playSound('grabpack_shoot');
            interactables = interactables.filter(i => i.id !== id);
            scene.remove(interactables.find(i => i.id === id)?.obj);
        }
        function hasItem(id) { return state.inventory.some(i => i.id === id); }
        function updateInventoryUI() { for(let i=0; i<2; i++) document.getElementById(`slot-${i+1}`).innerText = state.inventory[i]?.icon || ''; }

        function toggleHide() {
            state.isHiding = !state.isHiding;
            if(state.isHiding) {
                camera.position.set(5.5, 0.5, -20);
                promptEl.innerText = "Hiding... Press E to leave";
            } else {
                camera.position.set(5.5, 1.7, -19);
                promptEl.innerText = "";
            }
        }

        function handleInteraction() {
            if(state.isHiding) return toggleHide();
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            let closest = null, minD = 3.5;
            interactables.forEach(item => {
                const hits = ray.intersectObject(item.obj, true);
                if(hits.length > 0 && hits[0].distance < minD) { minD = hits[0].distance; closest = item; }
            });
            if(closest) closest.action();
        }

        function handleGrabPackShoot() {
            if(!state.hasGrabPack) return;
            playSound('grabpack_shoot');
            state.isFiringGrabPack = true;
            grabPackWire.visible = true;
            grabPackTarget.visible = true;

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            
            let hitObj = null;
            interactables.forEach(item => {
                if(item.type === 'grabpack_target') {
                    const hits = ray.intersectObject(item.obj, true);
                    if(hits.length > 0 && hits[0].distance < 15) hitObj = item;
                }
            });

            if(hitObj) {
                // Animate wire to target
                grabPackTarget.position.copy(hitObj.obj.position);
                const animWire = () => {
                    if(!state.isFiringGrabPack) return;
                    const positions = grabPackWire.geometry.attributes.position.array;
                    const start = new THREE.Vector3().copy(camera.position);
                    const end = grabPackTarget.position.clone();
                    positions[0] = start.x; positions[1] = start.y; positions[2] = start.z;
                    positions[3] = end.x; positions[4] = end.y; positions[5] = end.z;
                    grabPackWire.geometry.attributes.position.needsUpdate = true;
                    
                    if(start.distanceTo(end) > 1) requestAnimationFrame(animWire);
                    else { hitObj.action(); setTimeout(() => { state.isFiringGrabPack = false; grabPackWire.visible = false; grabPackTarget.visible = false; }, 500); }
                };
                animWire();
            } else {
                // Miss animation
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                const endPos = camera.position.clone().add(dir.multiplyScalar(10));
                const positions = grabPackWire.geometry.attributes.position.array;
                positions[3] = endPos.x; positions[4] = endPos.y; positions[5] = endPos.z;
                grabPackWire.geometry.attributes.position.needsUpdate = true;
                setTimeout(() => { state.isFiringGrabPack = false; grabPackWire.visible = false; grabPackTarget.visible = false; }, 300);
            }
        }

        // --- CONTROLS & EVENTS ---
        function setupEventListeners() {
            document.getElementById('btn-play').addEventListener('click', () => {
                initAudio();
                menuEl.style.display = 'none';
                triggerIntroCutscene();
            });

            document.getElementById('btn-quit').addEventListener('click', () => document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:20%">QUIT</h1>');
            document.getElementById('btn-resume').addEventListener('click', () => { pauseEl.style.display='none'; state.isPaused=false; controls.lock(); });
            document.getElementById('skip-btn').addEventListener('click', advanceCutscene);

            controls.addEventListener('lock', () => { if(state.phase==='GAMEPLAY') pauseEl.style.display='none'; });
            controls.addEventListener('unlock', () => { if(state.phase==='GAMEPLAY' && state!=='DEAD') { pauseEl.style.display='flex'; state.isPaused=true; } });

            document.addEventListener('keydown', e => {
                if(state.phase !== 'GAMEPLAY' || state.isPaused) return;
                switch(e.code) {
                    case 'KeyW': state.moveForward=true; break;
                    case 'KeyS': state.moveBackward=true; break;
                    case 'KeyA': state.moveLeft=true; break;
                    case 'KeyD': state.moveRight=true; break;
                    case 'ShiftLeft': state.isSprinting=true; break;
                    case 'KeyX': 
                        state.isCrouching = !state.isCrouching; 
                        camera.position.y = state.isCrouching ? 1.0 : 1.7; 
                        break;
                    case 'KeyF': flashlight.visible = !flashlight.visible; break;
                    case 'KeyE': handleInteraction(); break;
                }
            });
            document.addEventListener('keyup', e => {
                switch(e.code) {
                    case 'KeyW': state.moveForward=false; break;
                    case 'KeyS': state.moveBackward=false; break;
                    case 'KeyA': state.moveLeft=false; break;
                    case 'KeyD': state.moveRight=false; break;
                    case 'ShiftLeft': state.isSprinting=false; break;
                }
            });

            // Right Click for GrabPack
            document.addEventListener('mousedown', e => {
                if(e.button === 2 && state.phase === 'GAMEPLAY' && !state.isPaused) handleGrabPackShoot();
            });
            document.addEventListener('contextmenu', e => e.preventDefault());

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                cutsceneCamera.aspect = window.innerWidth / window.innerHeight;
                cutsceneCamera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- GAME STATES ---
        function triggerJumpscare() {
            if(state.phase === 'DEAD') return;
            state.phase = 'DEAD';
            controls.unlock();
            playSound('jumpscare');
            jumpscareEl.style.display = 'flex';
            setTimeout(() => {
                document.body.innerHTML = `<div style="color:#8b0000;text-align:center;margin-top:20%;font-family:'Courier New';"><h1 style="font-size:6rem;margin:0;color:#000;background:#fff;display:inline-block;padding:0 20px;">GAME OVER</h1><p style="font-size:1.5rem;color:#888;margin-top:20px;">The Jester doesn't like quitters.</p><button onclick="location.reload()" class="menu-btn" style="margin-top:30px;">TRY AGAIN</button></div>`;
            }, 1500);
        }

        function triggerWin() {
            state.phase = 'WIN';
            controls.unlock();
            setTimeout(() => {
                document.body.innerHTML = `<div style="color:#0055ff;text-align:center;margin-top:20%;font-family:'Courier New';"><h1 style="font-size:5rem;margin:0;text-shadow:4px 4px 0 #ffd700;">CHAPTER 1 COMPLETE</h1><p style="font-size:1.5rem;color:#aaa;margin-top:20px;">You escaped The Fun House... for now.</p><button onclick="location.reload()" class="menu-btn" style="margin-top:30px;">MAIN MENU</button></div>`;
            }, 1000);
        }

        // --- UPDATE LOOP ---
        function updateMovement(delta) {
            if(state.isPaused || state.phase !== 'GAMEPLAY' || state.isHiding) return;
            const speed = state.isSprinting ? 8.0 : (state.isCrouching ? 2.5 : 5.0);
            state.velocity.x -= state.velocity.x * 10.0 * delta;
            state.velocity.z -= state.velocity.z * 10.0 * delta;
            state.direction.z = Number(state.moveForward) - Number(state.moveBackward);
            state.direction.x = Number(state.moveRight) - Number(state.moveLeft);
            state.direction.normalize();
            if(state.moveForward || state.moveBackward) state.velocity.z -= state.direction.z * speed * delta * 20;
            if(state.moveLeft || state.moveRight) state.velocity.x -= state.direction.x * speed * delta * 20;
            controls.moveRight(-state.velocity.x * delta);
            controls.moveForward(-state.velocity.z * delta);
            
            const p = camera.position;
            p.x = Math.max(-5.8, Math.min(5.8, p.x));
            p.z = Math.max(2.5, Math.min(29.8, p.z));

            // Head bob
            if(state.moveForward || state.moveBackward || state.moveLeft || state.moveRight) {
                const bobSpeed = state.isSprinting ? 15 : 8;
                const bobAmount = state.isCrouching ? 0.02 : 0.05;
                if(!state.isCrouching) p.y += Math.sin(clock.elapsedTime * bobSpeed) * bobAmount;
            }
        }

        function updateHUD() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            let show = false;
            interactables.forEach(item => {
                const hits = ray.intersectObject(item.obj, true);
                if(hits.length > 0 && hits[0].distance < 3.5) {
                    promptEl.innerText = item.type === 'grabpack_target' ? `[RIGHT CLICK] ${item.name}` : `[E] ${item.name}`;
                    show = true;
                }
            });
            if(!show && !state.isHiding) promptEl.innerText = '';
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if(state.phase === 'CUTSCENE') {
                updateCutscene(delta);
                renderer.render(scene, cutsceneCamera);
            } 
            else if(state.phase === 'GAMEPLAY' && !state.isPaused) {
                updateMovement(delta);
                updateEnemy(delta);
                updateHUD();
                renderer.render(scene, camera);
            } else {
                renderer.render(scene, camera); // Render paused/jumpscare frame frozen
            }
        }

        init();
    </script>
</body>
</html>
