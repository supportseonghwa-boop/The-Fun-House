<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash of Power</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Outfit',sans-serif;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#startScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 55%,#1a0800 0%,#000 75%);transition:opacity 1.5s ease}
#startScreen.hidden{opacity:0;pointer-events:none}
.start-bg{position:absolute;inset:0;overflow:hidden}
.start-bg::before{content:'';position:absolute;top:48%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,50,0,.06) 0%,transparent 65%);animation:sp 5s ease-in-out infinite}
@keyframes sp{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.4}50%{transform:translate(-50%,-50%) scale(1.4);opacity:1}}
.gt{font-family:'Cinzel',serif;font-size:clamp(2.2rem,7vw,5.5rem);font-weight:900;color:#fff;letter-spacing:.15em;text-transform:uppercase;z-index:2;text-shadow:0 0 80px rgba(255,40,0,.25),0 4px 20px rgba(0,0,0,.8)}
.gt span{display:block;font-size:.3em;font-weight:200;letter-spacing:.6em;color:rgba(255,120,60,.5);margin-top:.4em;font-family:'Outfit',sans-serif}
#startBtn{margin-top:3rem;padding:1rem 4.5rem;background:transparent;border:1.5px solid rgba(255,80,0,.4);color:#fff;font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;cursor:pointer;z-index:2;transition:all .4s ease;position:relative;overflow:hidden}
#startBtn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,60,0,.15),transparent);transform:translateX(-100%);transition:transform .6s}
#startBtn:hover::before{transform:translateX(100%)}
#startBtn:hover{border-color:rgba(255,80,0,.8);box-shadow:0 0 50px rgba(255,40,0,.15);transform:scale(1.05)}
.sh{position:absolute;bottom:2rem;color:rgba(255,255,255,.2);font-size:.75rem;letter-spacing:.25em;z-index:2}
#blackOverlay{position:fixed;inset:0;background:#000;z-index:50;opacity:1;pointer-events:none;transition:opacity 1.4s ease}
#blackOverlay.fo{opacity:0}
#flashOverlay{position:fixed;inset:0;z-index:18;pointer-events:none;background:#fff;opacity:0;transition:opacity .08s}
#flashOverlay.fl{opacity:.8}
#smo{position:fixed;inset:0;z-index:15;pointer-events:none;transition:background .4s}
#smo.on{background:rgba(0,0,0,.25)}
#speedLines{position:fixed;inset:0;z-index:14;pointer-events:none;opacity:0;transition:opacity .12s}
#speedLines.on{opacity:1}
#vig{position:fixed;inset:0;z-index:13;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}
#chargeOverlay{position:fixed;inset:0;z-index:16;pointer-events:none;opacity:0;transition:opacity .3s}
#chargeOverlay.on{opacity:1}
#dialogueBox{position:fixed;bottom:7%;left:50%;transform:translateX(-50%);z-index:20;opacity:0;transition:opacity .8s;pointer-events:none;text-align:center;max-width:90%}
#dialogueBox.vis{opacity:1}
#dialogueText{font-family:'Cinzel',serif;font-size:clamp(.95rem,2.5vw,1.5rem);color:#fff;text-shadow:0 0 40px rgba(255,60,0,.35),0 2px 12px rgba(0,0,0,.9);letter-spacing:.04em;line-height:1.7}
#dialogueSpeaker{font-family:'Outfit',sans-serif;font-size:.7rem;color:rgba(255,130,60,.55);letter-spacing:.35em;text-transform:uppercase;margin-bottom:.4rem}
#hud{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .8s}
#hud.vis{opacity:1}
.ht{display:flex;justify-content:space-between;align-items:flex-start;padding:1.2rem 1.8rem}
.pi,.ei{display:flex;flex-direction:column;gap:.3rem}
.pi{align-items:flex-start}.ei{align-items:flex-end}
.bl{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:600}
.bc{width:200px;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .5s}
.bf.php{background:linear-gradient(90deg,#ff3300,#ff7700);box-shadow:0 0 10px rgba(255,50,0,.5)}
.bf.ehp{background:linear-gradient(90deg,#0044ff,#00aaff);box-shadow:0 0 10px rgba(0,80,255,.5)}
.bf.ult{background:linear-gradient(90deg,#ffaa00,#ff4400);box-shadow:0 0 10px rgba(255,150,0,.5)}
.ed{display:flex;gap:5px;margin-top:2px}
.edot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);transition:all .3s}
.edot.f{background:rgba(255,80,0,.75);border-color:rgba(255,80,0,.8);box-shadow:0 0 6px rgba(255,80,0,.4)}
#powerBar{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:.7rem;opacity:0;transition:opacity .8s;pointer-events:none}
#powerBar.vis{opacity:1;pointer-events:auto}
.pb{width:64px;height:64px;border:1.5px solid rgba(255,255,255,.1);background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s}
.pb:hover:not(.dis){border-color:rgba(255,80,0,.5);background:rgba(255,60,0,.08);transform:translateY(-3px);box-shadow:0 6px 25px rgba(255,40,0,.15)}
.pb:active:not(.dis){transform:translateY(0) scale(.93)}
.pb.dis{opacity:.25;pointer-events:none}
.pb.ub{width:74px;height:74px;border-color:rgba(255,180,0,.2)}
.pb.ub.rdy{border-color:rgba(255,180,0,.7);box-shadow:0 0 25px rgba(255,180,0,.15);animation:up 2s ease-in-out infinite}
@keyframes up{0%,100%{box-shadow:0 0 25px rgba(255,180,0,.15)}50%{box-shadow:0 0 40px rgba(255,180,0,.3)}}
.pi-icon{font-size:1.3rem;margin-bottom:1px}
.pi-key{font-size:.55rem;color:rgba(255,255,255,.35);letter-spacing:.08em}
.pi-name{font-size:.45rem;color:rgba(255,255,255,.4);letter-spacing:.04em;margin-top:1px}
#endScreen{position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background 2.5s}
#endScreen.vis{background:rgba(0,0,0,.88);pointer-events:auto}
.et{font-family:'Cinzel',serif;font-size:clamp(2rem,6vw,5rem);font-weight:900;letter-spacing:.2em;text-transform:uppercase;opacity:0;transform:scale(.7);transition:all 2s cubic-bezier(.16,1,.3,1)}
#endScreen.vis .et{opacity:1;transform:scale(1)}
.et.vic{color:#ff7700;text-shadow:0 0 80px rgba(255,80,0,.4)}
.et.def{color:#2255cc;text-shadow:0 0 80px rgba(30,60,200,.4)}
.esub{font-size:.9rem;color:rgba(255,255,255,.35);letter-spacing:.35em;margin-top:.8rem;opacity:0;transition:opacity 2s ease .8s}
#endScreen.vis .esub{opacity:1}
#restartBtn{margin-top:2.5rem;padding:.7rem 2.5rem;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:'Outfit',sans-serif;font-size:.8rem;letter-spacing:.2em;cursor:pointer;opacity:0;transition:all .4s ease 1.2s;pointer-events:none}
#endScreen.vis #restartBtn{opacity:1;pointer-events:auto}
#restartBtn:hover{border-color:rgba(255,255,255,.4);color:#fff;background:rgba(255,255,255,.04)}
@media(max-width:640px){.bc{width:130px;height:5px}.pb{width:52px;height:52px}.pb.ub{width:60px;height:60px}.ht{padding:.8rem 1rem}}
</style>
</head>
<body>
<div id="startScreen"><div class="start-bg"></div><div class="gt">Clash of Power<span>Anime Battle</span></div><button id="startBtn">Begin</button><div class="sh">A cinematic anime fight</div></div>
<div id="blackOverlay"></div><div id="flashOverlay"></div><div id="smo"></div><div id="speedLines"></div><div id="chargeOverlay"></div><div id="vig"></div>
<div id="dialogueBox"><div id="dialogueSpeaker"></div><div id="dialogueText"></div></div>
<div id="hud"><div class="ht"><div class="pi"><div class="bl">You</div><div class="bc"><div class="bf php" id="phpBar" style="width:100%"></div></div><div class="bl" style="margin-top:3px">Energy</div><div class="ed" id="eDots"><div class="edot f"></div><div class="edot f"></div><div class="edot f"></div><div class="edot"></div><div class="edot"></div></div><div class="bl" style="margin-top:4px">Ultimate</div><div class="bc" style="width:120px"><div class="bf ult" id="ultBar" style="width:0%"></div></div></div><div class="ei"><div class="bl">Rival</div><div class="bc"><div class="bf ehp" id="ehpBar" style="width:100%"></div></div></div></div></div>
<div id="powerBar"><div class="pb" data-power="blast"><div class="pi-icon">&#9889;</div><div class="pi-key">[1]</div><div class="pi-name">BLAST</div></div><div class="pb" data-power="dash"><div class="pi-icon">&#9876;</div><div class="pi-key">[2]</div><div class="pi-name">DASH</div></div><div class="pb" data-power="slam"><div class="pi-icon">&#9760;</div><div class="pi-key">[3]</div><div class="pi-name">SLAM</div></div><div class="pb ub dis" data-power="ultimate"><div class="pi-icon">&#10038;</div><div class="pi-key">[4]</div><div class="pi-name">ULTIMATE</div></div></div>
<div id="endScreen"><div class="et" id="endTitle"></div><div class="esub" id="endSub"></div><button id="restartBtn">Fight Again</button></div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';

const E=.001;
const EPOS=new THREE.Vector3(0,0,-10);
const S={phase:'menu',php:100,ehp:100,en:3,men:5,uc:0,ur:false,si:0,sm:1,il:false};

/* ===== AUDIO ===== */
let ac=null;
function ia(){ac=new(window.AudioContext||window.webkitAudioContext)()}
function pt(f,d,t='sine',v=.12){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function pn(d,v=.08){if(!ac)return;const b=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;const s=ac.createBufferSource();s.buffer=b;const g=ac.createGain();g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);const fi=ac.createBiquadFilter();fi.type='lowpass';fi.frequency.value=900;s.connect(fi).connect(g).connect(ac.destination);s.start()}
function sCh(){pt(60,1.2,'sawtooth',.06);pt(90,.8,'sine',.05);setTimeout(()=>pt(140,.6,'sine',.06),300);setTimeout(()=>pt(200,.4,'sine',.08),600);setTimeout(()=>pt(280,.3,'sine',.1),900)}
function sHit(h=false){pn(.2,h?.4:.18);pt(45,.5,'sine',h?.3:.12);if(h){pt(22,.8,'sine',.2);pt(75,.12,'square',.04)}}
function sBoom(){pn(1,.45);pt(30,1.2,'sine',.35);pt(18,1.5,'sine',.2);setTimeout(()=>pn(.5,.25),70)}
function sWh(){pn(.3,.07)}
function sWind(){if(!ac)return;const b=ac.createBuffer(1,ac.sampleRate*5,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ac.createBufferSource();s.buffer=b;s.loop=true;const g=ac.createGain();g.gain.value=.02;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=300;s.connect(f).connect(g).connect(ac.destination);s.start()}
function sMus(){if(!ac)return;const dr=()=>{pt(45,12,'sawtooth',.025);pt(45.6,12,'sawtooth',.025);pt(67,12,'sine',.018);pt(90,6,'triangle',.012)};dr();setInterval(dr,10000)}
function sUlt(){pt(50,3,'sawtooth',.05);pt(80,2.5,'sine',.04);setTimeout(()=>pt(110,1.5,'sine',.06),700);setTimeout(()=>pt(150,1,'triangle',.08),1200);setTimeout(()=>pt(240,.7,'sine',.1),1700);setTimeout(()=>pt(400,.4,'sine',.12),2100)}

/* ===== RENDERER ===== */
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0a0815,.005);
const cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,500);
const ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth,innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=true;
ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=1.3;
document.body.prepend(ren.domElement);

/* ===== LIGHTS ===== */
const sun=new THREE.DirectionalLight(0xffccaa,2.5);
sun.position.set(20,30,10);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=100;
sun.shadow.camera.left=-40;sun.shadow.camera.right=40;
sun.shadow.camera.top=40;sun.shadow.camera.bottom=-40;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x1a1530,.8));
scene.add(new THREE.HemisphereLight(0x221122,0x0a0a05,.5));
// Colored rim lights for anime separation
const rimR=new THREE.SpotLight(0xff4400,3,30,Math.PI/6,.5);rimR.position.set(-8,4,6);rimR.target.position.set(0,2,-4);scene.add(rimR);scene.add(rimR.target);
const rimB=new THREE.SpotLight(0x0066ff,3,30,Math.PI/6,.5);rimB.position.set(8,4,-14);rimB.target.position.set(0,2,-4);scene.add(rimB);scene.add(rimB.target);

/* ===== SKY ===== */
const skyG=new THREE.SphereGeometry(Math.max(E,200),32,32);
const skyM=new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{uT:{value:new THREE.Color(0x030210)},uM:{value:new THREE.Color(0x0a0525)},uB:{value:new THREE.Color(0x1a0a05)}},vertexShader:`varying vec3 vW;void main(){vec4 w=modelMatrix*vec4(position,1.);vW=w.xyz;gl_Position=projectionMatrix*viewMatrix*w;}`,fragmentShader:`uniform vec3 uT,uM,uB;varying vec3 vW;void main(){float h=normalize(vW).y;vec3 c=h>0.?mix(uM,uT,pow(h,.4)):mix(uM,uB,pow(-h,.3));gl_FragColor=vec4(c,1.);}`});
scene.add(new THREE.Mesh(skyG,skyM));

/* ===== CLOUDS (dark stormy) ===== */
const clouds=[];
function mkCloud(x,y,z,s){const g=new THREE.Group(),m=new THREE.MeshLambertMaterial({color:0x1a1025,transparent:true,opacity:.45});for(let i=0;i<5+Math.random()*4|0;i++){const r=Math.max(E,2+Math.random()*3)*s;const sg=new THREE.SphereGeometry(r,6,5);const sh=new THREE.Mesh(sg,m);sh.position.set((Math.random()-.5)*7*s,(Math.random()-.5)*1.5*s,(Math.random()-.5)*4*s);g.add(sh)}g.position.set(x,y,z);scene.add(g);clouds.push({m:g,s:.15+Math.random()*.3})}
for(let i=0;i<18;i++)mkCloud((Math.random()-.5)*220,20+Math.random()*50,-50+Math.random()*140,.6+Math.random()*1.8);

/* ===== GROUND ===== */
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshStandardMaterial({color:0x1a1510,roughness:.95,metalness:0}));
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);
const arena=new THREE.Mesh(new THREE.CircleGeometry(Math.max(E,16),64),new THREE.MeshStandardMaterial({color:0x15100d,roughness:.9}));
arena.rotation.x=-Math.PI/2;arena.position.y=.01;arena.receiveShadow=true;scene.add(arena);
// Ground cracks (dramatic)
for(let i=0;i<15;i++){const a=Math.random()*Math.PI*2,d=2+Math.random()*10,l=3+Math.random()*8;
const pts=[];let cx=Math.cos(a)*d,cz=Math.sin(a)*d;
pts.push(new THREE.Vector3(cx,.02,cz));
for(let j=0;j<3;j++){cx+=Math.cos(a+.3*(j-1))*(l/3);cz+=Math.sin(a+.3*(j-1))*(l/3);pts.push(new THREE.Vector3(cx,.02,cz))}
const lg=new THREE.BufferGeometry().setFromPoints(pts);scene.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0x0a0805,transparent:true,opacity:.5})))}
// Debris rocks
for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,d=3+Math.random()*12;
const rs=Math.max(E,.2+Math.random()*.5);
const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(rs,0),new THREE.MeshStandardMaterial({color:0x1a1510,roughness:1}));
rock.position.set(Math.cos(a)*d,rs*.3,Math.sin(a)*d);rock.rotation.set(Math.random(),Math.random(),Math.random());rock.castShadow=true;scene.add(rock)}

/* ===== DEAD TREES ===== */
const trees=[];
function mkTree(x,z){const g=new THREE.Group();const h=4+Math.random()*5;
const tr=new THREE.Mesh(new THREE.CylinderGeometry(Math.max(E,.06),Math.max(E,.2),h,5),new THREE.MeshStandardMaterial({color:0x120e0a,roughness:1}));
tr.position.y=h/2;tr.castShadow=true;g.add(tr);
for(let i=0;i<4;i++){const bl=1+Math.random()*2;const br=new THREE.Mesh(new THREE.CylinderGeometry(Math.max(E,.02),Math.max(E,.07),bl,4),new THREE.MeshStandardMaterial({color:0x120e0a,roughness:1}));
br.position.set(0,h*.4+i*.35,0);br.rotation.z=(Math.random()-.5)*1.5;br.rotation.x=(Math.random()-.5)*.6;g.add(br)}
g.position.set(x,0,z);scene.add(g);trees.push(g)}
[[-14,-20],[-22,-10],[-18,8],[-28,0],[14,-20],[22,-12],[18,6],[28,-16],[-10,18],[14,22],[-26,16],[28,14],[-34,-6],[34,-10],[-6,-28],[10,-30],[-16,14],[20,10]].forEach(p=>mkTree(p[0],p[1]));

/* ===== RUINED PILLARS ===== */
for(let i=0;i<6;i++){const a=i/6*Math.PI*2+Math.PI/6;const d=18+Math.random()*5;
const h=3+Math.random()*6;const r=Math.max(E,.4+Math.random()*.3);
const pillar=new THREE.Mesh(new THREE.CylinderGeometry(r,r*.8,h,8),new THREE.MeshStandardMaterial({color:0x1a1510,roughness:.9}));
pillar.position.set(Math.cos(a)*d,h/2,Math.sin(a)*d);pillar.rotation.set((Math.random()-.5)*.15,0,(Math.random()-.5)*.15);pillar.castShadow=true;scene.add(pillar);
// Broken top
if(Math.random()>.4){const bh=Math.max(E,h*.2+Math.random()*h*.3);
const top=new THREE.Mesh(new THREE.CylinderGeometry(r*.6,r,bh,6),new THREE.MeshStandardMaterial({color:0x1a1510,roughness:.9}));
top.position.set(Math.cos(a)*d+(Math.random()-.5)*.5,h+.1,Math.sin(a)*d+(Math.random()-.5)*.5);top.rotation.set((Math.random()-.5)*.3,0,(Math.random()-.5)*.3);scene.add(top)}}

/* ===== DISTANT RUINS ===== */
for(let i=0;i<20;i++){const a=(i/20)*Math.PI*1.6+Math.PI*.8;const dist=70+Math.random()*50;
const h=4+Math.random()*20;const w=2+Math.random()*5;
const b=new THREE.Mesh(new THREE.BoxGeometry(Math.max(E,w),Math.max(E,h),Math.max(E,2+Math.random()*3)),new THREE.MeshStandardMaterial({color:new THREE.Color(.08,.06,.07),roughness:1}));
b.position.set(Math.cos(a)*dist,h/2,Math.sin(a)*dist);scene.add(b)}

/* ===== DUST ===== */
const dC=800;const dG=new THREE.BufferGeometry();const dP=new Float32Array(dC*3);const dV=[];
for(let i=0;i<dC;i++){dP[i*3]=(Math.random()-.5)*100;dP[i*3+1]=Math.random()*15;dP[i*3+2]=(Math.random()-.5)*100;dV.push({x:(Math.random()-.5)*.2,y:(Math.random()-.5)*.03,z:(Math.random()-.5)*.2})}
dG.setAttribute('position',new THREE.BufferAttribute(dP,3));
scene.add(new THREE.Points(dG,new THREE.PointsMaterial({color:0x886644,size:.1,transparent:true,opacity:.3,sizeAttenuation:true,depthWrite:false})));

/* ===== ANIME CHARACTER ===== */
function mkChar(cfg){
const{hairC,jacketC,jacketC2,pantsC,bootC,skinC,eyeC,glowC,spikes,spikeLen,capeC,scarC,eyePatch}=cfg;
const g=new THREE.Group();

// Legs
const legG=new THREE.CylinderGeometry(Math.max(E,.1),Math.max(E,.08),1.35,8);
const legM=new THREE.MeshPhongMaterial({color:pantsC});
const legL=new THREE.Mesh(legG,legM);legL.position.set(-.17,.78,0);legL.castShadow=true;g.add(legL);
const legR=legL.clone();legR.position.x=.17;g.add(legR);

// Boots
const bootG=new THREE.BoxGeometry(.19,.24,.34);
const bootM=new THREE.MeshPhongMaterial({color:bootC});
const bL=new THREE.Mesh(bootG,bootM);bL.position.set(-.17,.12,.05);g.add(bL);
const bR=bL.clone();bR.position.x=.17;g.add(bR);

// Torso
const torso=new THREE.Mesh(new THREE.CylinderGeometry(Math.max(E,.3),Math.max(E,.26),1.25,10),new THREE.MeshPhongMaterial({color:jacketC,shininess:20}));
torso.position.y=2.05;torso.castShadow=true;g.add(torso);

// Jacket overlay (open front look)
const jG=new THREE.CylinderGeometry(Math.max(E,.33),Math.max(E,.23),1.1,10,1,true);
const jM=new THREE.MeshPhongMaterial({color:jacketC2,side:THREE.DoubleSide,shininess:15});

for(let i=0;i<60;i++){chargeT=i/60;
// Orbs spiral inward
animOrbs(orbs,atk,chargeT*4,chargeT,3-chargeT*1.5);
// Body glow builds
d.bodyGlow.intensity=chargeT*5;
d.auraMat.opacity=chargeT*.3;d.aura.scale.setScalar(1+chargeT*1.5);
d.iAuraM.opacity=chargeT*.15;
// Charge overlay builds
setCharge(gc,chargeT*.3);
// Camera slight push in
if(ip){lC(new THREE.Vector3(0,.6+chargeT*.5,7-chargeT*2),new THREE.Vector3(0,1.8,-8),.05)}
else{lC(new THREE.Vector3(9-chargeT*2,5+chargeT,0),new THREE.Vector3(0,2,-4),.05)}
await wait(20)}

// Hide orbs, max aura
orbs.forEach(o=>{o.m.visible=false});
d.bodyGlow.intensity=6;
d.auraMat.opacity=.4;d.aura.scale.setScalar(2.5);
d.iAuraM.opacity=.2;
setCharge(gc,.35);

// Slow mo before release
setSM(true);
await wait(600);

// Release!
const hp=new THREE.Vector3();atk.getWorldPosition(hp);hp.y+=1.2;
ball.m.position.copy(hp);ball.m.visible=true;ball.mat.opacity=1;ball.l.intensity=8;ball.m.scale.setScalar(1);
ball.core.material.opacity=1;

sWh();setSM(false);setCharge(gc,0);setSL(true);

// Fire toward target
const tp=new THREE.Vector3();tgt.getWorldPosition(tp);tp.y+=2;
const sp2=ball.m.position.clone();const dist=sp2.distanceTo(tp);
for(let i=0;i<28;i++){const t=i/28;ball.m.position.lerpVectors(sp2,tp,t*t);
ball.m.scale.setScalar(1-t*.3);ball.l.intensity=8-t*4;
addTP(trail,ball.m.position);
d.bodyGlow.intensity=6-t*6;d.auraMat.opacity=.4-t*.4;
await wait(10)}
setTimeout(()=>{trail.m.visible=false},400);
ball.m.visible=false;d.bodyGlow.intensity=0;d.auraMat.opacity=0;d.iAuraM.opacity=0;
setSL(false);

// IMPACT
sHit(true);flash(250);shake(1.2);
const ip2=new THREE.Vector3();tgt.getWorldPosition(ip2);ip2.y=.1;

sw.m.position.copy(ip2);sw.m.visible=true;sw.m.scale.setScalar(.1);
burst.m.position.copy(ip2);burst.m.position.y=2;burst.m.visible=true;resetBurst(burst);
for(let i=0;i<burst.v.length;i++){const a=Math.random()*Math.PI*2;const s=5+Math.random()*10;burst.v[i].set(Math.cos(a)*s,Math.random()*10+4,Math.sin(a)*s)}

// Ground crack
pCrack.l.position.copy(ip2);pCrack.l.visible=true;pCrack.mat.opacity=.8;
const crackPts=pCrack.g.attributes.position.array;
for(let i=0;i<crackPts.length;i+=3){const a=(i/3)/64*Math.PI*2;const r=.5;crackPts[i]=Math.cos(a)*r;crackPts[i+2]=Math.sin(a)*r}
pCrack.g.attributes.position.needsUpdate=true;

lC(CM.sL.p,CM.sL.t,.1);

for(let i=0;i<40;i++){const t=i/40;animSW(sw,t);burst.mat.opacity=1-t*t;burst.life=t;
// Expand cracks
for(let j=0;j<crackPts.length;j+=3){const a=(j/3)/64*Math.PI*2;const r=.5+t*15;crackPts[j]=Math.cos(a)*r;crackPts[j+2]=Math.sin(a)*r}
pCrack.g.attributes.position.needsUpdate=true;
pCrack.mat.opacity=.8*(1-t);
await wait(20)}
sw.m.visible=false;burst.m.visible=false;pCrack.l.visible=false;

const dmg=10+Math.floor(Math.random()*8);
if(ip){S.ehp=Math.max(0,S.ehp-dmg);S.uc=Math.min(100,S.uc+18);uHP();uUB()}else{S.php=Math.max(0,S.php-dmg);uHP()}
lC(CM.fight.p,CM.fight.t,.04);S.il=false;uEN()}

async function dashStrike(ip){
if(S.il)return;S.il=true;
const atk=ip?player:enemy,tgt=ip?enemy:player;
const burst=ip?pBurst:eBurst,sw=ip?pSW:eSW,trail=ip?pTrail:eTrail;
const gc=ip?0xff6600:0x0088ff;
if(ip&&S.en<1){S.il=false;return}
if(ip){S.en--;uEN()}

sWh();
const d=atk.userData;d.bodyGlow.color.set(gc);

// Brief charge flash
d.bodyGlow.intensity=4;d.auraMat.opacity=.2;d.aura.scale.setScalar(1.5);
setCharge(gc,.15);
await wait(200);
d.bodyGlow.intensity=0;d.auraMat.opacity=0;setCharge(gc,0);

setSL(true);
const sp=atk.position.clone();const ep=tgt.position.clone().lerp(atk.position,.3);
lC(ip?CM.sR.p:CM.sL.p,ip?CM.sR.t:CM.sL.t,.07);

for(let i=0;i<16;i++){const t=i/16;atk.position.lerpVectors(sp,ep,t*t*t);
addTP(trail,new THREE.Vector3(atk.position.x,atk.position.y+1.2,atk.position.z));
if(i>5&&i<14)shake(.15);await wait(12)}
setTimeout(()=>{trail.m.visible=false},200);setSL(false);

sHit(true);flash(150);shake(1.2);
flash(80);setTimeout(()=>flash(60),100);

const ip2=new THREE.Vector3();atk.getWorldPosition(ip2);ip2.y=.1;
sw.m.position.copy(ip2);sw.m.visible=true;sw.m.scale.setScalar(.1);sw.mat.opacity=.8;
burst.m.position.copy(ip2);burst.m.position.y=2;burst.m.visible=true;resetBurst(burst);
for(let i=0;i<burst.v.length;i++){const a=Math.random()*Math.PI*2;const s=4+Math.random()*12;burst.v[i].set(Math.cos(a)*s,Math.random()*8+3,Math.sin(a)*s)}

const kbD=tgt.position.clone().sub(atk.position).normalize();const kbS=tgt.position.clone();const kbE=kbS.clone().add(kbD.multiplyScalar(5));

lC(CM.dram.p,CM.dram.t,.1);
for(let i=0;i<30;i++){animSW(sw,i/30);burst.mat.opacity=1-(i/30);burst.life=i/30;
if(i<15)tgt.position.lerpVectors(kbS,kbE,i/15);await wait(20)}
sw.m.visible=false;burst.m.visible=false;

const dmg=14+Math.floor(Math.random()*6);
if(ip){S.ehp=Math.max(0,S.ehp-dmg);S.uc=Math.min(100,S.uc+22);uHP();uUB()}else{S.php=Math.max(0,S.php-dmg);uHP()}
lC(CM.fight.p,CM.fight.t,.04);S.il=false;uEN()}

async function skySlam(ip){
if(S.il)return;S.il=true;
const atk=ip?player:enemy,tgt=ip?enemy:player;
const sw=ip?pSW:eSW,burst=ip?pBurst:eBurst,orbs=ip?pOrbs:eOrbs;
const gc=ip?0xff6600:0x0088ff;
if(ip&&S.en<1){S.il=false;return}
if(ip){S.en--;uEN()}

sCh();const d=atk.userData;d.bodyGlow.color.set(gc);

const sp=atk.position.clone();const pk=sp.clone();pk.y=25;

lC(CM.aer.p,CM.aer.t,.04);setSL(true);

// Launch with orbs
for(let i=0;i<40;i++){const t=i/40;const e=1-Math.pow(1-t,2.5);atk.position.y=sp.y+(pk.y-sp.y)*e;
animOrbs(orbs,atk,t*3,t*.5,2);
d.bodyGlow.intensity=t*3;d.auraMat.opacity=t*.2;
await wait(16)}
setSL(false);

setSM(true);
// Peak - full power display
d.auraMat.opacity=.5;d.aura.scale.setScalar(3);d.iAuraM.opacity=.25;d.bodyGlow.intensity=6;
setCharge(gc,.4);
animOrbs(orbs,atk,0,.8,1.5);
await wait(800);
orbs.forEach(o=>{o.m.visible=false});
d.auraMat.opacity=0;d.iAuraM.opacity=0;d.bodyGlow.intensity=0;setCharge(gc,0);
setSM(false);

setSL(true);sWh();
const slT=tgt.position.clone();slT.y=0;
for(let i=0;i<10;i++){const t=i/10;const e=t*t*t;atk.position.y=pk.y+(slT.y-pk.y)*e;
d.bodyGlow.intensity=(1-t)*4;
await wait(12)}
setSL(false);atk.position.y=0;d.bodyGlow.intensity=0;

sBoom();flash(400);shake(2);
const ip2=atk.position.clone();ip2.y=.1;
sw.m.position.copy(ip2);sw.m.visible=true;sw.m.scale.setScalar(.1);sw.mat.opacity=1;
burst.m.position.copy(ip2);burst.m.position.y=1;burst.m.visible=true;resetBurst(burst);
for(let i=0;i<burst.v.length;i++){const a=Math.random()*Math.PI*2;const s=6+Math.random()*14;burst.v[i].set(Math.cos(a)*s,Math.random()*12+5,Math.sin(a)*s)}

lC(CM.sL.p,CM.sL.t,.1);
const kbD=tgt.position.clone().sub(atk.position).normalize();const kbS=tgt.position.clone();const kbE=kbS.clone().add(kbD.multiplyScalar(7));

for(let i=0;i<50;i++){animSW(sw,i/50);burst.mat.opacity=1-(i/50);burst.life=i/50;
if(i<20)tgt.position.lerpVectors(kbS,kbE,i/20);await wait(20)}
sw.m.visible=false;burst.m.visible=false;

const dmg=16+Math.floor(Math.random()*8);
if(ip){S.ehp=Math.max(0,S.ehp-dmg);S.uc=Math.min(100,S.uc+28);uHP();uUB()}else{S.php=Math.max(0,S.php-dmg);uHP()}
lC(CM.fight.p,CM.fight.t,.04);S.il=false;uEN()}

async function ultimatePower(ip){
if(S.il)return;S.il=true;
const atk=ip?player:enemy,tgt=ip?enemy:player;
const gc=ip?0xff6600:0x0088ff;
if(ip&&!S.ur){S.il=false;return}
if(ip){S.ur=false;S.uc=0;uUB();uEN()}

sUlt();
const d=atk.userData;d.bodyGlow.color.set(gc);

 $smo.style.background='rgba(0,0,0,0.55)';$smo.classList.add('on');

// 360 spin with massive charge
const sc=atk.position.clone();sc.y=2;
for(let i=0;i<100;i++){const t=i/100;const a=t*Math.PI*2;const r=8-t*4;
const cy=3+Math.sin(t*Math.PI)*5;
cPos.set(sc.x+Math.cos(a)*r,cy,sc.z+Math.sin(a)*r);cTgt.copy(sc);
cam.position.copy(cPos);cam.lookAt(cTgt);

d.auraMat.opacity=t*.6;d.aura.scale.setScalar(1+t*4);
d.iAuraM.opacity=t*.3;d.iAura.scale.setScalar(1+t*2);
d.bodyGlow.intensity=t*8;
d.auraMat.color.set(t>.7?0xffcc00:gc);
d.iAuraM.color.set(t>.7?0xffffff:gc);
setCharge(t>.7?0xffcc00:gc,t*.5);
await wait(25)}

d.auraMat.opacity=.7;d.aura.scale.setScalar(5);
d.iAuraM.opacity=.4;d.iAura.scale.setScalar(3);
d.bodyGlow.intensity=10;
setCharge(0xffcc00,.5);

sBoom();flash(600);shake(2.5);
 $smo.style.background='rgba(0,0,0,0)';$smo.classList.remove('on');
setSL(true);

uBurst.m.position.copy(atk.position);uBurst.m.position.y=2;uBurst.m.visible=true;resetBurst(uBurst);
for(let i=0;i<uBurst.v.length;i++){const a=Math.random()*Math.PI*2;const s=5+Math.random()*18;uBurst.v[i].set(Math.cos(a)*s,Math.random()*15+5,Math.sin(a)*s)}

const sw=ip?pSW:eSW;sw.m.position.copy(atk.position);sw.m.position.y=.1;sw.m.visible=true;sw.m.scale.setScalar(.1);sw.mat.opacity=1;sw.mat.color.set(0xffcc00);

lC(CM.wide.p,CM.wide.t,.06);

const kbD=tgt.position.clone().sub(atk.position).normalize();const kbS=tgt.position.clone();const kbE=kbS.clone().add(kbD.multiplyScalar(12));kbE.y=0;

setSM(true);
for(let i=0;i<80;i++){animSW(sw,i/80);uBurst.mat.opacity=1-(i/80)*(i/80);uBurst.life=i/80;
if(i<28)tgt.position.lerpVectors(kbS,kbE,i/28);
d.auraMat.opacity=.7*(1-i/80);d.bodyGlow.intensity=10*(1-i/80);
setCharge(0xffcc00,.5*(1-i/80));
await wait(25)}
setSM(false);setSL(false);
sw.m.visible=false;uBurst.m.visible=false;sw.mat.color.set(ip?0xff6600:0x0088ff);
d.auraMat.opacity=0;d.aura.scale.setScalar(1);d.iAuraM.opacity=0;d.iAura.scale.setScalar(1);d.bodyGlow.intensity=0;
setCharge(0,0);

const dmg=30+Math.floor(Math.random()*15);
if(ip){S.ehp=Math.max(0,S.ehp-dmg);uHP()}else{S.php=Math.max(0,S.php-dmg);uHP()}
lC(CM.fight.p,CM.fight.t,.04);S.il=false;uEN()}

/* ===== AI ===== */
let aiT=0,aiN=3000+Math.random()*2500;
function uAI(dt){if(S.phase!=='fight'||S.il)return;aiT+=dt;if(aiT>aiN){aiT=0;aiN=2500+Math.random()*3000;
if(S.ehp<35&&Math.random()>.35)ultimatePower(false);
else{const a=[energyBlast,dashStrike,skySlam];a[Math.floor(Math.random()*a.length)](false)}}
const t=performance.now()*.001;enemy.position.x=EPOS.x+Math.sin(t*.35)*.5}

let regenT=0;
function uRegen(dt){if(S.phase!=='fight')return;regenT+=dt;if(regenT>2400){regenT=0;if(S.en<S.men){S.en++;uEN()}}}

function checkEnd(){if(S.phase!=='fight')return;
if(S.ehp<=0){S.phase='end';S.il=true;setTimeout(()=>{$hud.classList.remove('vis');$pb.classList.remove('vis');
 $et.textContent='Victory';$et.className='et vic';$esub.textContent='Power has decided everything.';$es.classList.add('vis')},2000)}
else if(S.php<=0){S.phase='end';S.il=true;setTimeout(()=>{$hud.classList.remove('vis');$pb.classList.remove('vis');
 $et.textContent='Defeat';$et.className='et def';$esub.textContent='The battle is over...';$es.classList.add('vis')},2000)}}

/* ===== INTRO ===== */
async function intro(){
S.phase='intro';$bo.classList.remove('fo');await wait(700);
 $bo.classList.add('fo');await wait(2000);
sWind();cPos.copy(CM.wide.p);cTgt.copy(CM.wide.t);cam.position.copy(cPos);cam.lookAt(cTgt);
await wait(3000);
lC(CM.pan.p,CM.pan.t,.012);await wait(4000);
await showDlg('This is where we fight...','Deep Voice',3500);await wait(700);
lC(CM.zoom.p,CM.zoom.t,.02);await wait(2800);
await showDlg('Where power decides everything.','Deep Voice',4000);await wait(1000);
lC(CM.bP.p,CM.bP.t,.05);await wait(2000);
lC(CM.bE.p,CM.bE.t,.05);await wait(2000);
lC(CM.close.p,CM.close.t,.04);await wait(1500);
sMus();
await showDlg('Show me what you\'ve got.','Rival',2800);await wait(700);
await showDlg('Don\'t blink.','You',2200);await wait(600);
 $hud.classList.add('vis');$pb.classList.add('vis');uHP();uEN();uUB();
S.phase='fight'}

/* ===== INPUT ===== */
document.addEventListener('keydown',e=>{if(S.phase!=='fight'||S.il)return;
switch(e.key){case'1':energyBlast(true);break;case'2':dashStrike(true);break;case'3':skySlam(true);break;case'4':ultimatePower(true);break}});
 $pbs.forEach(b=>b.addEventListener('click',()=>{if(S.phase!=='fight'||S.il)return;
switch(b.dataset.power){case'blast':energyBlast(true);break;case'dash':dashStrike(true);break;case'slam':skySlam(true);break;case'ultimate':ultimatePower(true);break}}));

 $('startBtn').addEventListener('click',()=>{ia();$('startScreen').classList.add('hidden');setTimeout(()=>{$('startScreen').style.display='none';intro()},1500)});
 $('restartBtn').addEventListener('click',()=>location.reload());

/* ===== RENDER LOOP ===== */
const clk=new THREE.Clock();
function animate(){
requestAnimationFrame(animate);
const rd=clk.getDelta();const el=clk.elapsedTime;

clouds.forEach(c=>{c.m.position.x+=c.s*rd;if(c.m.position.x>130)c.m.position.x=-130});
const dp=dust.geometry.attributes.position.array;
for(let i=0;i<dC;i++){dp[i*3]+=dV[i].x*rd;dp[i*3+1]+=dV[i].y*rd;dp[i*3+2]+=dV[i].z*rd;
if(Math.abs(dp[i*3])>50)dp[i*3]*=-.9;if(dp[i*3+1]>15||dp[i*3+1]<0)dV[i].y*=-1;if(Math.abs(dp[i*3+2])>50)dp[i*3+2]*=-.9}
dust.geometry.attributes.position.needsUpdate=true;

trees.forEach((t,i)=>{t.rotation.z=Math.sin(el*.6+i)*.012;t.rotation.x=Math.sin(el*.4+i*.5)*.006});

// Character idle + cape physics
[player,enemy].forEach((ch,ci)=>{
const o=ci*Math.PI;const d=ch.userData;
d.aL.rotation.x=Math.sin(el*2+o)*.1;d.aR.rotation.x=Math.sin(el*2+o+1)*.1;
d.legL.rotation.x=Math.sin(el*1.5+o)*.05;d.legR.rotation.x=Math.sin(el*1.5+o+Math.PI)*.05;
ch.position.y=Math.sin(el*2.5+o)*.03;
if(d.cape){const cp=d.capeGeo.attributes.position.array;const rows=11,cols=5;
for(let i=0;i<rows*cols;i++){const row=Math.floor(i/cols);const col=i%cols;
cp[i*3+1]=1.75-row*.18+Math.sin(el*2.5+row*.4+ci)*(.04+row*.015);
cp[i*3+2]=-.3-Math.abs(col-2)*.07-Math.sin(el*1.8+row*.3)*.03-row*.025;
cp[i*3]=(col-2)*.085}d.capeGeo.attributes.position.needsUpdate=true}});

[pBurst,eBurst,uBurst].forEach(b=>animBurst(b,rd));

if(S.phase==='fight'&&!S.il)lC(CM.fight.p,CM.fight.t,.04);

if(S.si>.003){cam.position.x+=(Math.random()-.5)*S.si*.7;cam.position.y+=(Math.random()-.5)*S.si*.5;cam.position.z+=(Math.random()-.5)*S.si*.4;S.si*=.86;if(S.si<.003)S.si=0}

updateCO();
uAI(rd*1000*S.sm);uRegen(rd*1000*S.sm);checkEnd();
ren.render(scene,cam)}

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});
cPos.copy(CM.wide.p);cTgt.copy(CM.wide.t);animate();
</script>
