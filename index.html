<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fun House – Chapter 1</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Source+Code+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blood: #8B0000;
    --blood-bright: #CC1100;
    --flesh: #D4A574;
    --rust: #6B3A2A;
    --bone: #E8DCC8;
    --shadow: #0A0505;
    --fog: #1A0A0A;
    --toxic: #39FF14;
    --cold: #4488CC;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#000; font-family:'Source Code Pro',monospace; cursor:none; }
  canvas { display:block; }

  /* 自定义光标 */
  #crosshair {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:24px; height:24px; z-index:100; pointer-events:none; display:none;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:rgba(255,255,255,0.5);
  }
  #crosshair::before { width:2px; height:24px; left:11px; top:0; }
  #crosshair::after { width:24px; height:2px; top:11px; left:0; }
  #crosshair .dot {
    position:absolute; width:4px; height:4px; border-radius:50%;
    background:rgba(200,0,0,0.8); top:10px; left:10px;
  }

  /* VHS叠层 */
  #vhs-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:90; mix-blend-mode:overlay;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 3px
    );
  }
  #vhs-overlay::after {
    content:''; position:absolute; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  }
  #scanline {
    position:fixed; left:0; width:100%; height:3px; z-index:91;
    pointer-events:none; display:none;
    background: rgba(255,255,255,0.06);
    animation: scanMove 4s linear infinite;
  }
  @keyframes scanMove { 0%{top:-3px} 100%{top:100%} }

  /* HUD */
  #hud {
    position:fixed; bottom:0; left:0; width:100%; padding:20px 30px;
    z-index:80; pointer-events:none; display:none;
  }
  #battery-bar {
    width:180px; height:8px; background:rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.15); border-radius:2px;
    overflow:hidden; position:relative;
  }
  #battery-fill {
    height:100%; width:100%; transition: width 0.3s, background 0.5s;
    background: linear-gradient(90deg, #CC1100, #FF6600, #FFCC00);
  }
  #battery-label {
    color:rgba(255,255,255,0.4); font-size:10px; letter-spacing:2px;
    margin-bottom:4px; text-transform:uppercase;
  }
  #stamina-bar {
    width:120px; height:4px; background:rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.1); border-radius:2px;
    overflow:hidden; margin-top:8px;
  }
  #stamina-fill {
    height:100%; width:100%; background:rgba(100,200,255,0.6);
    transition: width 0.2s;
  }

  /* 物品栏 */
  #inventory {
    position:fixed; bottom:20px; right:30px; display:none;
    z-index:80; pointer-events:none;
  }
  .inv-slot {
    width:52px; height:52px; border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.6); display:inline-block; margin-left:4px;
    position:relative; vertical-align:bottom;
  }
  .inv-slot.active { border-color:var(--blood-bright); }
  .inv-slot .item-icon {
    width:100%; height:100%; display:flex; align-items:center;
    justify-content:center; font-size:22px; opacity:0.9;
  }
  .inv-slot .item-count {
    position:absolute; bottom:2px; right:4px; font-size:9px;
    color:rgba(255,255,255,0.6);
  }

  /* 交互提示 */
  #interact-prompt {
    position:fixed; top:55%; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.7); font-size:13px; letter-spacing:1px;
    z-index:80; pointer-events:none; display:none;
    text-shadow:0 0 10px rgba(0,0,0,0.9);
    animation: promptPulse 2s ease-in-out infinite;
  }
  @keyframes promptPulse {
    0%,100%{opacity:0.6} 50%{opacity:1}
  }

  /* 笔记UI */
  #note-ui {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:200; display:none; pointer-events:all;
  }
  #note-content {
    background:var(--bone); color:#2A1A0A; padding:40px;
    max-width:480px; width:90vw; min-height:300px;
    font-family:'Source Code Pro',monospace; font-size:13px;
    line-height:1.8; position:relative;
    box-shadow: 8px 8px 30px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.1);
    transform: rotate(-1deg);
  }
  #note-content h3 {
    font-family:'Creepster',cursive; font-size:22px;
    color:var(--blood); margin-bottom:15px; letter-spacing:2px;
  }
  #note-close {
    position:absolute; top:10px; right:15px; cursor:pointer;
    font-size:18px; color:#666; background:none; border:none;
    font-family:'Source Code Pro',monospace;
  }
  #note-close:hover { color:var(--blood); }

  /* 标题屏幕 */
  #title-screen {
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:300; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#000;
  }
  #title-bg-canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  .title-content {
    position:relative; z-index:2; text-align:center;
  }
  .title-content h1 {
    font-family:'Creepster',cursive; font-size:clamp(40px,8vw,80px);
    color:var(--blood-bright); letter-spacing:6px;
    text-shadow: 0 0 40px rgba(200,0,0,0.5), 0 0 80px rgba(200,0,0,0.2);
    animation: titleFlicker 5s infinite;
    line-height:1.1;
  }
  @keyframes titleFlicker {
    0%,92%,94%,96%,100%{opacity:1}
    93%{opacity:0.3} 95%{opacity:0.6}
  }
  .title-content .subtitle {
    font-family:'Source Code Pro',monospace; font-size:clamp(12px,2vw,16px);
    color:rgba(255,255,255,0.3); letter-spacing:8px; margin-top:10px;
    text-transform:uppercase;
  }
  .title-content .start-btn {
    margin-top:50px; padding:14px 50px;
    background:transparent; border:1px solid var(--blood);
    color:var(--blood-bright); font-family:'Creepster',cursive;
    font-size:22px; letter-spacing:4px; cursor:pointer;
    transition: all 0.3s; position:relative; overflow:hidden;
  }
  .title-content .start-btn:hover {
    background:var(--blood); color:#fff;
    box-shadow:0 0 30px rgba(200,0,0,0.4);
  }
  .title-content .start-btn::before {
    content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
    transition: left 0.5s;
  }
  .title-content .start-btn:hover::before { left:100%; }
  .title-warning {
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.15); font-size:10px; letter-spacing:3px;
    text-transform:uppercase;
  }

  /* 密码锁UI */
  #code-lock-ui {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:200; display:none;
  }
  #code-lock-panel {
    background:rgba(10,5,5,0.95); border:1px solid rgba(255,255,255,0.1);
    padding:30px 40px; text-align:center;
  }
  #code-lock-panel h3 {
    font-family:'Creepster',cursive; color:var(--blood-bright);
    font-size:18px; margin-bottom:20px; letter-spacing:3px;
  }
  .code-digits { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
  .code-digit {
    width:48px; height:56px; background:rgba(0,0,0,0.8);
    border:1px solid rgba(255,255,255,0.15); color:var(--blood-bright);
    font-family:'Source Code Pro',monospace; font-size:28px;
    text-align:center; line-height:56px; outline:none;
  }
  .code-digit:focus { border-color:var(--blood-bright); }
  #code-submit {
    padding:8px 30px; background:var(--blood); border:none;
    color:#fff; font-family:'Source Code Pro',monospace;
    font-size:12px; cursor:pointer; letter-spacing:2px;
    transition: background 0.2s;
  }
  #code-submit:hover { background:var(--blood-bright); }
  #code-feedback {
    margin-top:10px; font-size:11px; color:var(--blood-bright);
    min-height:16px;
  }

  /* 提示信息 */
  #toast {
    position:fixed; top:80px; left:50%; transform:translateX(-50%);
    z-index:200; display:none; padding:10px 24px;
    background:rgba(10,5,5,0.9); border-left:2px solid var(--blood-bright);
    color:rgba(255,255,255,0.8); font-size:12px; letter-spacing:1px;
    pointer-events:none;
  }

  /* 恐惧效果叠层 */
  #fear-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:85; opacity:0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(139,0,0,0.3) 100%);
    transition: opacity 0.5s;
  }

  /* 加载 */
  #loading {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:#000; z-index:400; display:flex;
    align-items:center; justify-content:center;
    flex-direction:column;
  }
  #loading-text {
    color:rgba(255,255,255,0.3); font-size:12px; letter-spacing:4px;
    animation: loadPulse 1.5s infinite;
  }
  @keyframes loadPulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<!-- 加载屏幕 -->
<div id="loading"><div id="loading-text">INITIALIZING...</div></div>

<!-- 标题屏幕 -->
<div id="title-screen" style="display:none">
  <canvas id="title-bg-canvas"></canvas>
  <div class="title-content">
    <h1>THE FUN HOUSE</h1>
    <div class="subtitle">Chapter 1</div>
    <button class="start-btn" id="start-btn">ENTER</button>
  </div>
  <div class="title-warning">Best experienced with headphones in a dark room</div>
</div>

<!-- 游戏HUD -->
<div id="crosshair"><span class="dot"></span></div>
<div id="vhs-overlay"></div>
<div id="scanline"></div>
<div id="fear-overlay"></div>

<div id="hud">
  <div id="battery-label">FLASHLIGHT</div>
  <div id="battery-bar"><div id="battery-fill"></div></div>
  <div id="stamina-bar"><div id="stamina-fill"></div></div>
</div>

<div id="inventory">
  <div class="inv-slot" data-slot="0"><div class="item-icon"></div><div class="item-count"></div></div>
  <div class="inv-slot" data-slot="1"><div class="item-icon"></div><div class="item-count"></div></div>
  <div class="inv-slot" data-slot="2"><div class="item-icon"></div><div class="item-count"></div></div>
  <div class="inv-slot" data-slot="3"><div class="item-icon"></div><div class="item-count"></div></div>
</div>

<div id="interact-prompt">[E] Interact</div>

<!-- 笔记UI -->
<div id="note-ui">
  <div id="note-content">
    <button id="note-close">X</button>
    <h3 id="note-title"></h3>
    <div id="note-body"></div>
  </div>
</div>

<!-- 密码锁UI -->
<div id="code-lock-ui">
  <div id="code-lock-panel">
    <h3>ACCESS LOCK</h3>
    <div class="code-digits">
      <input class="code-digit" type="text" maxlength="1" data-idx="0">
      <input class="code-digit" type="text" maxlength="1" data-idx="1">
      <input class="code-digit" type="text" maxlength="1" data-idx="2">
      <input class="code-digit" type="text" maxlength="1" data-idx="3">
    </div>
    <button id="code-submit">SUBMIT</button>
    <div id="code-feedback"></div>
  </div>
</div>

<div id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

/* =========================================
   配置常量
   ========================================= */
const CFG = {
  moveSpeed: 4.5,
  sprintMult: 1.7,
  crouchMult: 0.45,
  playerHeight: 1.7,
  crouchHeight: 0.9,
  headBobSpeed: 10,
  headBobAmt: 0.04,
  staminaMax: 100,
  staminaDrain: 25,
  staminaRegen: 15,
  batteryMax: 100,
  batteryDrain: 2.5,
  interactDist: 3.5,
  fearDecay: 0.3,
  enemySpeed: 2.2,
  enemyDamage: 15,
  enemyChaseTime: 8,
};

/* =========================================
   全局状态
   ========================================= */
const STATE = {
  started: false,
  paused: false,
  reading: false,
  codeInput: false,
  flashOn: true,
  battery: CFG.batteryMax,
  stamina: CFG.staminaMax,
  sprinting: false,
  crouching: false,
  inventory: [],
  notes: [],
  flags: {},
  fear: 0,
  currentRoom: 'yard',
  dead: false,
  won: false,
  enemyActive: false,
  enemyChasing: false,
  enemyTimer: 0,
};

/* =========================================
   输入管理
   ========================================= */
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

/* =========================================
   程序化纹理生成
   ========================================= */
function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return { canvas: c, ctx: c.getContext('2d') };
}

// 生锈金属纹理
function texRustedMetal() {
  const {canvas: c, ctx: g} = makeCanvas(512,512);
  // 基础灰色
  g.fillStyle = '#4A4540';
  g.fillRect(0,0,512,512);
  // 噪点
  for(let i=0;i<20000;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const b=Math.random()*60-30;
    g.fillStyle=`rgba(${74+b|0},${69+b|0},${64+b|0},0.4)`;
    g.fillRect(x,y,2,2);
  }
  // 铁锈斑点
  for(let i=0;i<40;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const r=20+Math.random()*60;
    const grad=g.createRadialGradient(x,y,0,x,y,r);
    grad.addColorStop(0,'rgba(139,69,19,0.5)');
    grad.addColorStop(0.6,'rgba(100,50,20,0.2)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=grad;
    g.fillRect(x-r,y-r,r*2,r*2);
  }
  // 划痕
  for(let i=0;i<15;i++){
    g.beginPath();
    g.moveTo(Math.random()*512,Math.random()*512);
    g.lineTo(Math.random()*512,Math.random()*512);
    g.strokeStyle=`rgba(30,25,20,${0.2+Math.random()*0.3})`;
    g.lineWidth=0.5+Math.random()*2;
    g.stroke();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

// 脏墙壁纹理
function texDirtyWall(baseColor='#5A4A3A') {
  const {canvas: c, ctx: g} = makeCanvas(512,512);
  g.fillStyle=baseColor;
  g.fillRect(0,0,512,512);
  // 墙壁纹理变化
  for(let i=0;i<15000;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const b=Math.random()*40-20;
    const r=parseInt(baseColor.slice(1,3),16)+b;
    const gr=parseInt(baseColor.slice(3,5),16)+b;
    const bl=parseInt(baseColor.slice(5,7),16)+b;
    g.fillStyle=`rgba(${r|0},${gr|0},${bl|0},0.3)`;
    g.fillRect(x,y,3,3);
  }
  // 水渍/污迹
  for(let i=0;i<8;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const h=50+Math.random()*200;
    const grad=g.createLinearGradient(x,y,x,y+h);
    grad.addColorStop(0,'rgba(40,35,30,0)');
    grad.addColorStop(0.5,'rgba(40,35,30,0.3)');
    grad.addColorStop(1,'rgba(40,35,30,0)');
    g.fillStyle=grad;
    g.fillRect(x-15,y,30,h);
  }
  // 裂缝
  for(let i=0;i<3;i++){
    g.beginPath();
    let cx=Math.random()*512, cy=Math.random()*512;
    g.moveTo(cx,cy);
    for(let j=0;j<8;j++){
      cx+=Math.random()*40-20;
      cy+=Math.random()*60;
      g.lineTo(cx,cy);
    }
    g.strokeStyle='rgba(20,15,10,0.4)';
    g.lineWidth=1+Math.random();
    g.stroke();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

// 地板纹理
function texFloor(baseColor='#3A3028') {
  const {canvas: c, ctx: g} = makeCanvas(512,512);
  g.fillStyle=baseColor;
  g.fillRect(0,0,512,512);
  // 瓷砖/木板线条
  g.strokeStyle='rgba(20,15,10,0.3)';
  g.lineWidth=2;
  for(let x=0;x<512;x+=128){
    g.beginPath(); g.moveTo(x,0); g.lineTo(x,512); g.stroke();
  }
  for(let y=0;y<512;y+=64){
    const offset=(y/64)%2===0?0:64;
    for(let x=-64;x<576;x+=128){
      g.beginPath(); g.moveTo(x+offset,y); g.lineTo(x+offset,y); g.stroke();
    }
  }
  // 污垢
  for(let i=0;i<8000;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const b=Math.random()*20-10;
    const r=parseInt(baseColor.slice(1,3),16)+b;
    const gr=parseInt(baseColor.slice(3,5),16)+b;
    const bl=parseInt(baseColor.slice(5,7),16)+b;
    g.fillStyle=`rgba(${r|0},${gr|0},${bl|0},0.25)`;
    g.fillRect(x,y,4,4);
  }
  // 暗角
  for(let i=0;i<5;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const r=40+Math.random()*80;
    const grad=g.createRadialGradient(x,y,0,x,y,r);
    grad.addColorStop(0,'rgba(15,10,5,0.3)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=grad;
    g.fillRect(x-r,y-r,r*2,r*2);
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

// 白色瓷砖（实验/镜面）
function texWhiteTile() {
  const {canvas: c, ctx: g} = makeCanvas(512,512);
  g.fillStyle='#D0CCC5';
  g.fillRect(0,0,512,512);
  // 瓷砖网格
  g.strokeStyle='rgba(150,145,135,0.6)';
  g.lineWidth=2;
  for(let x=0;x<=512;x+=64) { g.beginPath();g.moveTo(x,0);g.lineTo(x,512);g.stroke(); }
  for(let y=0;y<=512;y+=64) { g.beginPath();g.moveTo(0,y);g.lineTo(512,y);g.stroke(); }
  // 污渍
  for(let i=0;i<10;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const r=10+Math.random()*40;
    const grad=g.createRadialGradient(x,y,0,x,y,r);
    grad.addColorStop(0,'rgba(80,70,60,0.25)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=grad;
    g.fillRect(x-r,y-r,r*2,r*2);
  }
  // 裂缝
  g.beginPath();
  let cx=256,cy=200;
  g.moveTo(cx,cy);
  for(let j=0;j<5;j++){ cx+=Math.random()*50-25; cy+=Math.random()*80; g.lineTo(cx,cy); }
  g.strokeStyle='rgba(60,55,50,0.5)'; g.lineWidth=1; g.stroke();
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

// 木箱纹理
function texCrate() {
  const {canvas: c, ctx: g} = makeCanvas(256,256);
  g.fillStyle='#6B5030';
  g.fillRect(0,0,256,256);
  // 木纹
  for(let y=0;y<256;y+=4){
    g.fillStyle=`rgba(${80+Math.random()*30|0},${55+Math.random()*20|0},${25+Math.random()*15|0},0.3)`;
    g.fillRect(0,y,256,2);
  }
  // 木板线
  g.strokeStyle='rgba(40,25,10,0.5)'; g.lineWidth=2;

/* =========================================
   Three.js 初始化
   ========================================= */
let scene, camera, renderer, controls, composer;
let flashlight, flashlightTarget;
let clock;
let dustParticles;
const interactables = [];
const walls = [];
let enemy = null;
let enemyMesh = null;
let enemyEyes = [];
const animCallbacks = [];

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050202);
  scene.fog = new THREE.FogExp2(0x080304, 0.06);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, CFG.playerHeight, 0);

  renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference:'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.6;
  document.body.appendChild(renderer.domElement);

  // 指针锁定控制
  controls = new PointerLockControls(camera, document.body);

  // 手电筒
  flashlight = new THREE.SpotLight(0xFFE8CC, 3, 25, Math.PI*0.22, 0.4, 1.8);
  flashlight.castShadow = true;
  flashlight.shadow.mapSize.set(512,512);
  flashlight.shadow.camera.near = 0.3;
  flashlight.shadow.camera.far = 25;
  flashlightTarget = new THREE.Object3D();
  scene.add(flashlightTarget);
  flashlight.target = flashlightTarget;
  camera.add(flashlight);
  flashlight.position.set(0.3, -0.1, 0);
  scene.add(camera);

  // 环境光（极暗）
  const ambient = new THREE.AmbientLight(0x151010, 0.15);
  scene.add(ambient);

  // 后处理
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  
  // VHS故障效果着色器
  const vhsShader = {
    uniforms: {
      tDiffuse: { value: null },
      time: { value: 0 },
      glitchIntensity: { value: 0.03 },
      fearAmount: { value: 0 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform float time;
      uniform float glitchIntensity;
      uniform float fearAmount;
      varying vec2 vUv;
      float rand(vec2 co){ return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453); }
      void main(){
        vec2 uv = vUv;
        // 色差
        float aberration = 0.002 + fearAmount * 0.008;
        float r = texture2D(tDiffuse, uv + vec2(aberration, 0.0)).r;
        float g = texture2D(tDiffuse, uv).g;
        float b = texture2D(tDiffuse, uv - vec2(aberration, 0.0)).b;
        // 故障位移
        float glitchLine = step(0.98 - glitchIntensity, rand(vec2(uv.y, time*0.5)));
        uv.x += glitchLine * 0.05 * sin(time*20.0);
        vec3 col = vec3(r,g,b);
        col = mix(col, texture2D(tDiffuse, uv).rgb, glitchLine);
        // 暗角
        float vignette = 1.0 - smoothstep(0.4, 1.4, length(vUv - 0.5)*1.8);
        col *= mix(0.9, vignette, 0.7);
        // 噪点
        float noise = rand(uv + time*0.1) * 0.06;
        col += noise;
        // 恐惧红色叠加
        col = mix(col, col * vec3(1.3, 0.6, 0.5), fearAmount * 0.5);
        gl_FragColor = vec4(col, 1.0);
      }
    `
  };
  const vhsPass = new ShaderPass(vhsShader);
  composer.addPass(vhsPass);

  // 泛光（微弱）
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.8, 0.9
  );
  composer.addPass(bloom);

  clock = new THREE.Clock();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
}

/* =========================================
   灰尘粒子系统
   ========================================= */
function createDustParticles() {
  const count = 500;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const vel = new Float32Array(count * 3);
  for(let i=0;i<count;i++){
    pos[i*3] = (Math.random()-0.5)*40;
    pos[i*3+1] = Math.random()*6;
    pos[i*3+2] = (Math.random()-0.5)*60;
    vel[i*3] = (Math.random()-0.5)*0.1;
    vel[i*3+1] = (Math.random()-0.5)*0.02;
    vel[i*3+2] = (Math.random()-0.5)*0.1;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.userData.vel = vel;

  const dustMat = new THREE.PointsMaterial({
    color: 0xAA9988,
    size: 0.03,
    transparent: true,
    opacity: 0.4,
    depthWrite: false,
  });
  dustParticles = new THREE.Points(geo, dustMat);
  scene.add(dustParticles);
}

function updateDust(dt) {
  if(!dustParticles) return;
  const pos = dustParticles.geometry.attributes.position.array;
  const vel = dustParticles.geometry.userData.vel;
  for(let i=0;i<pos.length/3;i++){
    pos[i*3] += vel[i*3] * dt;
    pos[i*3+1] += vel[i*3+1] * dt;
    pos[i*3+2] += vel[i*3+2] * dt;
    // 边界循环
    if(pos[i*3]>20) pos[i*3]=-20;
    if(pos[i*3]<-20) pos[i*3]=20;
    if(pos[i*3+1]>6) pos[i*3+1]=0;
    if(pos[i*3+1]<0) pos[i*3+1]=6;
    if(pos[i*3+2]>30) pos[i*3+2]=-30;
    if(pos[i*3+2]<-30) pos[i*3+2]=30;
  }
  dustParticles.geometry.attributes.position.needsUpdate = true;
}

function addWall(x, y, z, w, h, d, material) {
  const geo = new THREE.BoxGeometry(Math.max(0.01,w), Math.max(0.01,h), Math.max(0.01,d));
  const mesh = new THREE.Mesh(geo, material);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  walls.push(mesh);
  return mesh;
}

function addFlickerLight(x, y, z, color, intensity, range) {
  const light = new THREE.PointLight(color, intensity, range);
  light.position.set(x, y, z);
  light.castShadow = false;
  scene.add(light);
  // 灯泡视觉
  const bulbGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const bulbMat = new THREE.MeshBasicMaterial({ color: color });
  const bulb = new THREE.Mesh(bulbGeo, bulbMat);
  bulb.position.copy(light.position);
  scene.add(bulb);
  // 闪烁动画
  animCallbacks.push((t) => {
    const flicker = Math.sin(t*15)*0.3 + Math.sin(t*23)*0.2 + Math.random()*0.15;
    light.intensity = Math.max(0, intensity * (0.6 + flicker * 0.4));
  });
  return light;
}

function addInteractable(mesh, type, data) {
  mesh.userData.interactable = true;
  mesh.userData.type = type;
  mesh.userData.data = data;
  interactables.push(mesh);
  return mesh;
}

    ],

function updateEnemy(dt) {
  if(!enemy || !enemyMesh) return;

  // 在娱乐室区域激活敌人
  const playerPos = camera.position;
  if(playerPos.x > 7 && playerPos.z > -30 && playerPos.z < -17 && !enemy.active) {
    enemy.active = true;
    enemyMesh.visible = true;
    STATE.enemyActive = true;
    showToast('Something is watching you...');
    playHorrorSound('whisper');
  }

  if(!enemy.active) return;

  const dist = enemyMesh.position.distanceTo(playerPos);
  const dirToPlayer = new THREE.Vector3().subVectors(playerPos, enemyMesh.position).normalize();
  dirToPlayer.y = 0;

  // 视线检测
  const raycaster = new THREE.Raycaster(
    enemyMesh.position.clone().add(new THREE.Vector3(0,1.5,0)),
    dirToPlayer, 0.1, 15
  );
  const intersects = raycaster.intersectObjects(walls);
  const canSeePlayer = intersects.length === 0 && dist < 12;

  if(canSeePlayer && dist < 10) {
    enemy.chasing = true;
    enemy.timer = CFG.enemyChaseTime;
    STATE.fear = Math.min(1, STATE.fear + dt * 0.8);
  }

  if(enemy.chasing) {
    enemy.timer -= dt;
    if(enemy.timer <= 0 || dist > 15) {
      enemy.chasing = false;
    }
    // 追逐移动
    const moveDir = dirToPlayer.clone().multiplyScalar(enemy.speed * dt);
    enemyMesh.position.add(moveDir);
    enemyMesh.lookAt(new THREE.Vector3(playerPos.x, 0, playerPos.z));

    // 抓住玩家
    if(dist < 1.5) {
      STATE.dead = true;
      triggerDeath();
      return;
    }
  } else {
    // 巡逻
    const target = enemy.patrolPoints[enemy.currentPatrol];
    const toTarget = new THREE.Vector3().subVectors(target, enemyMesh.position);
    toTarget.y = 0;
    if(toTarget.length() < 0.5) {
      enemy.currentPatrol = (enemy.currentPatrol + 1) % enemy.patrolPoints.length;
    } else {
      toTarget.normalize().multiplyScalar(enemy.speed * 0.3 * dt);
      enemyMesh.position.add(toTarget);
      enemyMesh.lookAt(new THREE.Vector3(target.x, 0, target.z));
    }
  }

  // 眼睛闪烁
  const flicker = 0.7 + Math.sin(Date.now()*0.01)*0.3;
  enemyEyes.forEach(e => {
    e.material.color.setRGB(flicker, 0, 0);
  });
}

function triggerDeath() {
  controls.unlock();
  playHorrorSound('jumpscare');
  // 闪红屏
  document.getElementById('fear-overlay').style.opacity = '1';
  document.getElementById('fear-overlay').style.background = 'rgba(139,0,0,0.9)';
  setTimeout(() => {
    document.getElementById('fear-overlay').style.opacity = '0';
    document.getElementById('fear-overlay').style.background = '';
    // 重置位置
    camera.position.set(0, CFG.playerHeight, 0);
    STATE.dead = false;
    STATE.fear = 0;
    enemy.chasing = false;
    enemy.timer = 0;
    enemyMesh.position.set(15, 0, -25);
    controls.lock();
  }, 2000);
}

/* =========================================
   音频系统（Web Audio API程序化生成）
   ========================================= */
let audioCtx, masterGain;
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function playTone(freq, duration, type='sine', vol=0.1, detune=0) {
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playAmbientDrone() {
  if(!audioCtx) return;
  // 低频嗡鸣
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();

  osc1.type = 'sawtooth';
  osc1.frequency.value = 55;
  osc2.type = 'sine';
  osc2.frequency.value = 57;
  lfo.type = 'sine';
  lfo.frequency.value = 0.2;
  lfoGain.gain.value = 5;

  lfo.connect(lfoGain);
  lfoGain.connect(osc1.frequency);
  gain.gain.value = 0.04;
  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(masterGain);
  osc1.start(); osc2.start(); lfo.start();

  // 定期变化
  setInterval(() => {
    if(audioCtx.state === 'running') {
      osc1.frequency.setTargetAtTime(40 + Math.random()*30, audioCtx.currentTime, 2);
      osc2.frequency.setTargetAtTime(42 + Math.random()*30, audioCtx.currentTime, 2);
    }
  }, 8000);
}

function playFootstep() {
  if(!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++){
    data[i] = (Math.random()*2-1) * Math.exp(-i/(data.length*0.15)) * 0.3;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 800 + Math.random()*400;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.15;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start();
}

function playHorrorSound(type) {
  if(!audioCtx) return;
  switch(type) {
    case 'whisper':
      // 噪声模拟耳语
      for(let i=0;i<3;i++){
        setTimeout(() => {
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.5, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for(let j=0;j<d.length;j++){
            d[j] = (Math.random()*2-1) * 0.05 * Math.sin(j/d.length*Math.PI);
          }
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const filt = audioCtx.createBiquadFilter();
          filt.type = 'bandpass';
          filt.frequency.value = 2000 + i*500;
          filt.Q.value = 5;
          const g = audioCtx.createGain();
          g.gain.value = 0.2;
          src.connect(filt);
          filt.connect(g);
          g.connect(masterGain);
          src.start();
        }, i*300);
      }
      break;
    case 'jumpscare':
      // 刺耳噪音
      for(let i=0;i<5;i++){
        playTone(200+i*200, 0.5, 'sawtooth', 0.3, Math.random()*100-50);
      }
      break;
    case 'door':
      playTone(80, 0.3, 'square', 0.1);
      playTone(60, 0.5, 'sine', 0.08);
      break;
    case 'pickup':
      playTone(600, 0.1, 'sine', 0.08);
      setTimeout(() => playTone(800, 0.15, 'sine', 0.06), 100);
      break;
    case 'lock':
      playTone(300, 0.2, 'square', 0.05);
      break;
    case 'error':
      playTone(150, 0.4, 'square', 0.12);
      setTimeout(() => playTone(120, 0.3, 'square', 0.1), 200);
      break;
    case 'success':
      playTone(500, 0.15, 'sine', 0.08);
      setTimeout(() => playTone(700, 0.2, 'sine', 0.06), 150);
      setTimeout(() => playTone(900, 0.3, 'sine', 0.05), 300);
      break;
    case 'laugh':
      // 恐怖笑声
      for(let i=0;i<6;i++){
        setTimeout(() => {
          playTone(300+Math.random()*100, 0.15, 'sawtooth', 0.08, Math.random()*50);
        }, i*120);
      }
      break;
  }
}

// 扭曲的嘉年华音乐
function playCarnivalMusic() {
  if(!audioCtx) return;
  // 简单的音乐盒旋律（扭曲版）
  const notes = [523, 587, 659, 523, 659, 587, 523, 392];
  let time = audioCtx.currentTime;
  function playLoop() {
    if(!STATE.started) return;
    notes.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f * (0.98 + Math.random()*0.04); // 走调效果
      gain.gain.setValueAtTime(0.02, time + i*0.4);
      gain.gain.exponentialRampToValueAtTime(0.001, time + i*0.4 + 0.35);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(time + i*0.4);
      osc.stop(time + i*0.4 + 0.4);
    });
    time += notes.length * 0.4 + 2; // 间隔
    setTimeout(playLoop, (notes.length * 0.4 + 2) * 1000);
  }
  playLoop();
}

/* =========================================
   玩家系统
   ========================================= */
let headBobTimer = 0;
let footstepTimer = 0;

function updatePlayer(dt) {
  if(!controls.isLocked || STATE.reading || STATE.codeInput || STATE.dead) return;

  const speed = CFG.moveSpeed *
    (STATE.sprinting ? CFG.sprintMult : 1) *
    (STATE.crouching ? CFG.crouchMult : 1);

  // 冲刺体力
  STATE.sprinting = keys['ShiftLeft'] && STATE.stamina > 0 && (keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']);
  STATE.crouching = !!keys['KeyC'];

  if(STATE.sprinting) {
    STATE.stamina = Math.max(0, STATE.stamina - CFG.staminaDrain * dt);
  } else {
    STATE.stamina = Math.min(CFG.staminaMax, STATE.stamina + CFG.staminaRegen * dt);
  }

  // 移动
  const prevPos = camera.position.clone();
  if(keys['KeyW']) controls.moveForward(speed * dt);
  if(keys['KeyS']) controls.moveForward(-speed * dt);
  if(keys['KeyA']) controls.moveRight(-speed * dt);
  if(keys['KeyD']) controls.moveRight(speed * dt);

  // 碰撞检测
  const playerBox = new THREE.Box3().setFromCenterAndSize(
    camera.position, new THREE.Vector3(0.6, 1.6, 0.6)
  );
  for(const wall of walls) {
    const wallBox = new THREE.Box3().setFromObject(wall);
    if(playerBox.intersectsBox(wallBox)) {
      camera.position.copy(prevPos);
      break;
    }
  }

  // 头部晃动
  const isMoving = keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD'];
  if(isMoving) {
    headBobTimer += dt * CFG.headBobSpeed * (STATE.sprinting ? 1.3 : 1);
    const bobY = Math.sin(headBobTimer) * CFG.headBobAmt * (STATE.sprinting ? 1.5 : 1);
    const bobX = Math.cos(headBobTimer * 0.5) * CFG.headBobAmt * 0.5;
    camera.position.y += bobY;

    // 脚步声
    footstepTimer += dt * (STATE.sprinting ? 1.5 : 1);
    if(footstepTimer > 0.45) {
      footstepTimer = 0;
      playFootstep();
    }
  } else {
    headBobTimer = 0;
    footstepTimer = 0.3;
  }

  // 蹲下高度
  const targetH = STATE.crouching ? CFG.crouchHeight : CFG.playerHeight;
  // 平滑过渡（简化：直接设置，因为position.y在碰撞后可能被覆盖）
  // 我们通过一个偏移来实现
  const heightOffset = targetH - CFG.playerHeight;
  camera.position.y = (camera.position.y - (prevHeightOffset||0)) + heightOffset;
  prevHeightOffset = heightOffset;

  // 手电筒开关
  if(keys['KeyF'] && !prevFKey) {
    STATE.flashOn = !STATE.flashOn;
    flashlight.visible = STATE.flashOn;
  }
  prevFKey = keys['KeyF'];

  // 手电筒朝向
  const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  flashlightTarget.position.copy(camera.position).add(fwd.multiplyScalar(10));

  // 手电筒电池
  if(STATE.flashOn) {
    STATE.battery = Math.max(0, STATE.battery - CFG.batteryDrain * dt);
    if(STATE.battery <= 0) {
      STATE.flashOn = false;
      flashlight.visible = false;
    }
    // 低电量闪烁
    if(STATE.battery < 20) {
      flashlight.intensity = Math.random() > 0.1 ? 3 : 0;
    } else {
      flashlight.intensity = 3;
    }
  }
}
let prevHeightOffset = 0;
let prevFKey = false;

/* =========================================
   交互系统
   ========================================= */
let currentInteractable = null;
const raycaster = new THREE.Raycaster();

function updateInteraction() {
  if(STATE.reading || STATE.codeInput) return;

  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const hits = raycaster.intersectObjects(interactables, true);

  let found = null;
  for(const hit of hits) {
    let obj = hit.object;
    while(obj && !obj.userData.interactable) obj = obj.parent;
    if(obj && obj.userData.interactable) { found = obj; break; }
  }

  const prompt = document.getElementById('interact-prompt');

  if(found) {
    const dist = camera.position.distanceTo(found.position);
    if(dist < CFG.interactDist) {
      currentInteractable = found;
      const type = found.userData.type;
      let text = '[E] ';
      switch(type) {
        case 'note': text += 'Read Note'; break;
        case 'battery': text += 'Pick Up Battery'; break;
        case 'keycard': text += `Pick Up ${found.userData.data.id.toUpperCase()} Keycard`; break;
        case 'key_door': text += 'Use Keycard'; break;
        case 'code_door': text += 'Enter Code'; break;
      }
      prompt.textContent = text;
      prompt.style.display = 'block';
      return;
    }
  }

  currentInteractable = null;
  prompt.style.display = 'none';
}

function handleInteract() {
  if(!currentInteractable || STATE.reading || STATE.codeInput) return;

  const type = currentInteractable.type;
  const data = currentInteractable.data;

  switch(type) {
    case 'note':
      STATE.reading = true;
      document.getElementById('note-title').textContent = data.title;
      document.getElementById('note-body').textContent = data.body;
      document.getElementById('note-ui').style.display = 'block';
      controls.unlock();
      if(!STATE.notes.includes(data.title)) STATE.notes.push(data.title);
      break;

    case 'battery':
      STATE.battery = Math.min(CFG.batteryMax, STATE.battery + 30);
      scene.remove(currentInteractable);
      const idx = interactables.indexOf(currentInteractable);
      if(idx>-1) interactables.splice(idx,1);
      showToast('Battery +30%');
      playHorrorSound('pickup');
      break;

    case 'keycard':
      STATE.inventory.push(data.id);
      scene.remove(currentInteractable);
      const ki = interactables.indexOf(currentInteractable);
      if(ki>-1) interactables.splice(ki,1);
      showToast(`${data.id.toUpperCase()} Keycard acquired`);
      playHorrorSound('pickup');
      updateInventoryUI();
      break;

    case 'key_door':
      const doorId = data.id;
      if(doorId === 'factory_entrance') {
        // 工厂入口不需要钥匙
        openDoor(data);
      } else if(STATE.inventory.includes(doorId)) {
        STATE.inventory = STATE.inventory.filter(k => k !== doorId);
        openDoor(data);
        updateInventoryUI();
      } else {
        showToast(`Requires ${doorId.toUpperCase()} Keycard`);
        playHorrorSound('error');
      }
      break;

    case 'code_door':
      STATE.codeInput = true;
      STATE.currentCodeDoor = data;
      document.getElementById('code-lock-ui').style.display = 'block';
      document.getElementById('code-feedback').textContent = '';
      document.querySelectorAll('.code-digit').forEach(d => d.value = '');
      document.querySelectorAll('.code-digit')[0].focus();
      controls.unlock();
      playHorrorSound('lock');
      break;
  }
}

function openDoor(data) {
  const mesh = data.mesh;
  // 简单开门动画：移除门体
  scene.remove(mesh);
  const idx = interactables.indexOf(mesh);
  if(idx>-1) interactables.splice(idx,1);
  // 同时移除门框（简化处理，直接让它可通过）
  playHorrorSound('door');
  showToast('Door opened');
  STATE.flags[data.id] = true;

  // 特殊门效果
  if(data.id === 'funhouse_door') {
    showToast('The carnival music grows louder...');
    playHorrorSound('laugh');
    setTimeout(() => playCarnivalMusic(), 1000);
  }
  if(data.id === 'lab_door') {
    showToast('The air grows cold...');
    STATE.fear = 0.5;
  }
  if(data.id === 'exit_door') {
    triggerWin();
  }
}

function submitCode() {
  const digits = document.querySelectorAll('.code-digit');
  let code = '';
  digits.forEach(d => code += d.value);
  const correctCode = STATE.currentCodeDoor.code;

  if(code === correctCode) {
    playHorrorSound('success');
    document.getElementById('code-lock-ui').style.display = 'none';
    STATE.codeInput = false;
    openDoor(STATE.currentCodeDoor);
    controls.lock();
  } else {
    playHorrorSound('error');
    document.getElementById('code-feedback').textContent = 'ACCESS DENIED';
    document.getElementById('code-feedback').style.color = 'var(--blood-bright)';
    digits.forEach(d => { d.value=''; d.style.borderColor='var(--blood-bright)'; });
    setTimeout(() => {
      digits.forEach(d => d.style.borderColor='');
      document.getElementById('code-feedback').textContent = '';
    }, 1500);
  }
}

function triggerWin() {
  STATE.won = true;
  controls.unlock();
  // 显示结局画面
  const fear = document.getElementById('fear-overlay');
  fear.style.opacity = '1';
  fear.style.background = 'rgba(0,0,0,0.95)';
  fear.style.transition = 'opacity 2s';
  fear.innerHTML = `
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      text-align:center;color:rgba(255,255,255,0.8);font-family:'Source Code Pro',monospace;">
      <div style="font-family:Creepster,cursive;font-size:48px;color:var(--blood-bright);
        margin-bottom:20px;letter-spacing:4px;">CHAPTER 1 COMPLETE</div>
      <div style="font-size:14px;max-width:400px;line-height:1.8;margin-bottom:30px;color:rgba(255,255,255,0.5);">
        You escaped the Fun House.<br><br>
        But the truth you found changes everything.<br>
        The factory wasn't abandoned.<br>
        It was cultivating.<br><br>
        <span style="color:var(--blood-bright)">They're not machines anymore.</span>
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:3px;">
        CHAPTER 2 — THE REAWAKENING — COMING SOON
      </div>
    </div>
  `;
  fear.style.pointerEvents = 'all';
}

/* =========================================
   UI更新
   ========================================= */
function updateHUD() {
  // 电池
  const batteryFill = document.getElementById('battery-fill');
  batteryFill.style.width = (STATE.battery / CFG.batteryMax * 100) + '%';
  if(STATE.battery < 20) {
    batteryFill.style.background = '#CC1100';
  } else if(STATE.battery < 50) {
    batteryFill.style.background = 'linear-gradient(90deg, #CC1100, #FF6600)';
  } else {
    batteryFill.style.background = 'linear-gradient(90deg, #CC1100, #FF6600, #FFCC00)';
  }

  // 体力
  document.getElementById('stamina-fill').style.width = (STATE.stamina / CFG.staminaMax * 100) + '%';

  // 恐惧效果
  document.getElementById('fear-overlay').style.opacity = STATE.fear * 0.7;
}

function updateInventoryUI() {
  const slots = document.querySelectorAll('.inv-slot');
  const icons = { 'factory': '🔑', 'funhouse': '🔑', 'lab': '🔑' };
  slots.forEach((slot, i) => {
    const icon = slot.querySelector('.item-icon');
    if(STATE.inventory[i]) {
      icon.textContent = icons[STATE.inventory[i]] || '?';
      slot.classList.add('active');
    } else {
      icon.textContent = '';
      slot.classList.remove('active');
    }
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

/* =========================================
   房间检测
   ========================================= */
function detectRoom() {
  const p = camera.position;
  if(p.z > -15) STATE.currentRoom = 'yard';
  else if(p.z > -30 && p.x < 8) STATE.currentRoom = 'factory';
  else if(p.z < -47) STATE.currentRoom = 'experiment';
  else if(p.x >= 8 && p.z > -30) STATE.currentRoom = 'funhouse';
  else if(p.x >= 22) STATE.currentRoom = 'underground';
}

/* =========================================
   后处理uniforms更新
   ========================================= */
function updatePostProcessing() {
  const passes = composer.passes;
  for(const pass of passes) {
    if(pass.uniforms && pass.uniforms.time) {
      pass.uniforms.time.value = clock.elapsedTime;
    }
    if(pass.uniforms && pass.uniforms.fearAmount) {
      pass.uniforms.fearAmount.value = STATE.fear;
    }
    if(pass.uniforms && pass.uniforms.glitchIntensity) {
      pass.uniforms.glitchIntensity.value = 0.03 + STATE.fear * 0.1;
    }
  }
}

/* =========================================
   标题屏幕背景动画
   ========================================= */
function initTitleScreen() {
  const canvas = document.getElementById('title-bg-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  for(let i=0;i<80;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      vx: (Math.random()-0.5)*0.5,
      vy: -Math.random()*0.8-0.2,
      size: Math.random()*2+0.5,
      alpha: Math.random()*0.3+0.1,
    });
  }

  function animateTitle() {
    if(STATE.started) return;
    ctx.fillStyle = 'rgba(5,2,2,0.15)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if(p.y < 0) { p.y = canvas.height; p.x = Math.random()*canvas.width; }
      if(p.x < 0) p.x = canvas.width;
      if(p.x > canvas.width) p.x = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(139,0,0,${p.alpha})`;
      ctx.fill();
    });

    // 偶尔的故障线
    if(Math.random() > 0.95) {
      const y = Math.random()*canvas.height;
      const imgData = ctx.getImageData(0, y, canvas.width, 2);
      ctx.putImageData(imgData, Math.random()*20-10, y);
    }

    requestAnimationFrame(animateTitle);
  }
  animateTitle();
}

/* =========================================
   初始化和游戏循环
   ========================================= */
function init() {
  initThree();
  initTextures();

  // 构建世界
  buildYard();
  buildFactory();
  buildExperimentRoom();
  buildFunHouse();
  buildUndergroundLab();

  // 装饰和系统
  createDustParticles();
  createEnemy();

  // 标题屏幕
  document.getElementById('loading').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  initTitleScreen();

  // 事件绑定
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('note-close').addEventListener('click', closeNote);
  document.getElementById('code-submit').addEventListener('click', submitCode);
  document.addEventListener('keydown', onKeyDown);

  // 密码输入自动跳转
  document.querySelectorAll('.code-digit').forEach((d, i) => {
    d.addEventListener('input', () => {
      if(d.value && i < 3) document.querySelectorAll('.code-digit')[i+1].focus();
      if(d.value.length > 1) d.value = d.value[0];
    });
    d.addEventListener('keydown', (e) => {
      if(e.key === 'Enter') submitCode();
      if(e.key === 'Backspace' && !d.value && i > 0) {
        document.querySelectorAll('.code-digit')[i-1].focus();
      }
    });
  });

  // 指针锁定事件
  controls.addEventListener('lock', () => {
    if(STATE.started && !STATE.reading && !STATE.codeInput) {
      document.getElementById('crosshair').style.display = 'block';
      document.getElementById('scanline').style.display = 'block';
    }
  });
  controls.addEventListener('unlock', () => {
    document.getElementById('crosshair').style.display = 'none';
    if(!STATE.reading && !STATE.codeInput && STATE.started && !STATE.dead && !STATE.won) {
      // 显示暂停提示（通过重新点击画面恢复）
    }
  });

  // 点击画布重新锁定
  renderer.domElement.addEventListener('click', () => {
    if(STATE.started && !STATE.reading && !STATE.codeInput && !STATE.dead && !STATE.won) {
      controls.lock();
    }
  });
}

function startGame() {
  STATE.started = true;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('inventory').style.display = 'block';

  initAudio();
  playAmbientDrone();

  controls.lock();

  // 开场延迟效果
  setTimeout(() => showToast('Use WASD to move, F for flashlight'), 1500);
  setTimeout(() => showToast('Find a way into the factory'), 5000);

  animate();
}

function closeNote() {
  STATE.reading = false;
  document.getElementById('note-ui').style.display = 'none';
  controls.lock();
}

function onKeyDown(e) {
  if(e.code === 'KeyE') handleInteract();
  if(e.code === 'Escape' && STATE.reading) closeNote();
  if(e.code === 'Escape' && STATE.codeInput) {
    STATE.codeInput = false;
    document.getElementById('code-lock-ui').style.display = 'none';
    controls.lock();
  }
}

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);

  if(STATE.started && !STATE.won) {
    updatePlayer(dt);
    updateInteraction();
    updateEnemy(dt);
    updateDust(dt);
    detectRoom();

    // 恐惧衰减
    if(!STATE.enemyChasing) {
      STATE.fear = Math.max(0, STATE.fear - CFG.fearDecay * dt);
    }

    // 动画回调
    const t = clock.elapsedTime;
    animCallbacks.forEach(cb => cb(t));

    // 随机恐怖事件
    if(Math.random() < 0.0003 && STATE.currentRoom !== 'yard') {
      playHorrorSound('whisper');
      STATE.fear = Math.min(1, STATE.fear + 0.15);
    }
    if(Math.random() < 0.0001 && STATE.currentRoom === 'funhouse') {
      playHorrorSound('laugh');
    }

    updateHUD();
    updatePostProcessing();
    composer.render();
  }
}

// 启动
init();
</script>
