<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FUN HOUSE: THE VOID</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; }

        /* UI STYLING */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 20px; }
        #hud { position: absolute; bottom: 40px; left: 40px; border-left: 5px solid red; padding-left: 20px; color: #fff; }
        #battery-cont { width: 200px; height: 10px; background: #200; margin-top: 10px; border: 1px solid #500; }
        #battery-fill { width: 100%; height: 100%; background: red; box-shadow: 0 0 10px red; }

        /* MENU & CUTSCENE */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: red; }
        #main-menu h1 { font-family: 'Creepster'; font-size: 8rem; text-shadow: 0 0 20px red; margin-bottom: 20px; }
        .btn { background: transparent; border: 2px solid red; color: red; padding: 15px 40px; font-family: inherit; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn:hover { background: red; color: black; box-shadow: 0 0 20px red; }

        #subtitles { position: absolute; bottom: 15%; width: 100%; text-align: center; color: white; font-size: 1.2rem; text-shadow: 2px 2px #000; z-index: 150; pointer-events: none; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>THE FUN HOUSE</h1>
        <p style="color: #444; margin-bottom: 40px;">CHAPTER 1: I SEE YOU</p>
        <button class="btn" onclick="initCinematic()">START NEW GAME</button>
        <button class="btn" onclick="loadSave()">LOAD PREVIOUS</button>
    </div>

    <div id="subtitles"></div>

    <div id="ui-layer">
        <div id="crosshair">+</div>
        <div id="hud">
            <div>FLASHLIGHT</div>
            <div id="battery-cont"><div id="battery-fill"></div></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, clock, flashlight, playerHand;
        let isLocked = false, inCinematic = false, gameActive = false;
        let battery = 100, pitch = 0, yaw = 0;
        let audioCtx, trailerSound;

        const storyLines = [
            "It has been one year since I escaped the walls...",
            "But the Prototype... he never truly left my mind.",
            "The house calls to me in the static of the television.",
            "I am returning to the void. Back to where it all began.",
            "The Fun House is hungry... and I am the only guest."
        ];

        function initCinematic() {
            document.getElementById('main-menu').style.display = 'none';
            inCinematic = true;
            
            // Start Audio Context for the trailer sounds
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setupWorld();
            playCinematic();
        }

        function setupWorld() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 1, 20);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Spawning in the custom coordinates from "I See You" build
            camera.position.set(193, 1.7, 193);

            // Lighting
            scene.add(new THREE.AmbientLight(0x0a0a0a));

            // Hand & Flashlight
            playerHand = new THREE.Group();
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.7), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
            arm.position.set(0.5, -0.4, -0.6);
            playerHand.add(arm);

            flashlight = new THREE.SpotLight(0xffffff, 10, 25, Math.PI/6, 0.4);
            flashlight.position.set(0.5, -0.3, -0.8);
            flashlight.castShadow = true;
            playerHand.add(flashlight);
            flashlight.target.position.set(0.5, -0.3, -10);
            playerHand.add(flashlight.target);

            camera.add(playerHand);
            scene.add(camera);

            // Fun House Environment (Restored Layout)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2;
            floor.position.set(200, 0, 200);
            scene.add(floor);

            const wallMat = new THREE.MeshStandardMaterial({color: 0x220000});
            const northWall = new THREE.Mesh(new THREE.BoxGeometry(40, 10, 1), wallMat);
            northWall.position.set(200, 5, 180);
            scene.add(northWall);
        }

        async function playCinematic() {
            const subs = document.getElementById('subtitles');
            clock = new THREE.Clock();

            for (let i = 0; i < storyLines.length; i++) {
                // Dramatic Trailer "BOOM"
                playTrailerBoom();
                
                // Voice Over (Using Synthesis)
                const msg = new SpeechSynthesisUtterance(storyLines[i]);
                msg.pitch = 0.1; // Deep creepy voice
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);

                subs.innerText = storyLines[i];
                
                // Cinematic Camera Pan
                const startPos = camera.position.clone();
                const endPos = new THREE.Vector3(193, 1.7, 193 - (i * 2));
                
                let t = 0;
                while (t < 1) {
                    t += 0.005;
                    camera.position.lerpVectors(startPos, endPos, t);
                    camera.rotation.y += 0.001;
                    renderer.render(scene, camera);
                    await new Promise(r => requestAnimationFrame(r));
                }
                
                await new Promise(r => setTimeout(r, 2000));
            }

            subs.innerText = "";
            inCinematic = false;
            startGame();
        }

        function playTrailerBoom() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2);
        }

        function startGame() {
            gameActive = true;
            document.getElementById('ui-layer').style.display = 'block';
            renderer.domElement.requestPointerLock();
            
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                    camera.rotation.set(pitch, yaw, 0, 'YXZ');
                }
            });

            animate();
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Hand Sway Logic
            playerHand.position.y = Math.sin(Date.now() * 0.004) * 0.02;
            playerHand.position.x = Math.cos(Date.now() * 0.002) * 0.01;

            // Flashlight battery logic
            battery -= 0.1 * delta;
            document.getElementById('battery-fill').style.width = battery + "%";

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function loadSave() {
            alert("No saved data found in session. Starting fresh...");
            initCinematic();
        }
    </script>
</body>
</html>
