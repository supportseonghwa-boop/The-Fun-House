<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fun House</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Press Start 2P', system-ui; }
        canvas { display: block; }

        /* UI */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); color: #ff2222; font-size: 28px; text-shadow: 0 0 12px #ff0000; pointer-events: none; }
        
        #hud {
            position: absolute; bottom: 25px; left: 25px; background: rgba(0,0,0,0.85); padding: 12px 20px; border: 4px solid #ff2222; color: #ffdd66; display: flex; align-items: center; gap: 20px; pointer-events: none;
        }
        #battery { width: 220px; height: 22px; border: 4px solid #ffdd66; background: #111; position: relative; }
        #battery-fill { height: 100%; background: linear-gradient(90deg, #ffdd66, #ff8800); transition: width 0.4s; box-shadow: 0 0 20px #ffdd66; }
        #battery-text { font-size: 15px; }

        #menu, #pause-menu, #new-game-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #220000 0%, #000000 85%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ff2222; z-index: 200; transition: opacity 0.8s;
        }
        #title { font-family: 'Creepster', cursive; font-size: 7rem; text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000; margin-bottom: 20px; animation: titleFlicker 1.2s infinite alternate; }
        @keyframes titleFlicker { 0% { opacity: 1; } 100% { opacity: 0.7; } }
        .menu-button { background: #111; color: #ffdd66; border: 5px solid #ff2222; padding: 20px 70px; margin: 15px; font-size: 2rem; cursor: pointer; transition: all 0.3s; }
        .menu-button:hover { background: #ff2222; color: #000; transform: scale(1.12); }

        #cutscene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300; color: #ffdd66; overflow: hidden; }
        #cutscene-text { font-size: 1.4rem; max-width: 820px; text-align: center; line-height: 1.7; margin: 30px; text-shadow: 0 0 15px #ff00ff; }
        #cutscene-image { width: 420px; height: 240px; background: #220000; border: 8px solid #ff00ff; margin: 20px; box-shadow: 0 0 40px #ff00ff; display: flex; align-items: center; justify-content: center; font-size: 5rem; }

        #game-over, #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; color: #ff2222; z-index: 200; }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="menu">
        <div id="title">THE FUN HOUSE</div>
        <div style="margin-bottom:50px; color:#ffdd66; font-size:1.3rem; letter-spacing:6px;">CHAPTER 1 • RETURN OF THE PROTOTYPE</div>
        <button class="menu-button" onclick="showNewGameModal()">NEW GAME</button>
        <button class="menu-button" onclick="loadSavedGame()">LOAD GAME</button>
        <button class="menu-button" onclick="quitGame()">QUIT</button>
    </div>

    <!-- NEW GAME CONFIRM -->
    <div id="new-game-modal" style="display:none;">
        <div style="font-size:3rem;margin-bottom:40px;">CREATE NEW GAME?</div>
        <button onclick="startNewGame()" class="menu-button" style="font-size:2rem;padding:18px 60px;">YES — START FRESH</button>
        <button onclick="hideNewGameModal()" class="menu-button" style="font-size:2rem;padding:18px 60px;">NO — BACK</button>
    </div>

    <!-- PAUSE MENU (ESC) -->
    <div id="pause-menu" style="display:none;">
        <div style="font-size:4rem;margin-bottom:30px;">PAUSED</div>
        <button onclick="saveGame()" class="menu-button">SAVE GAME</button>
        <button onclick="resumeGame()" class="menu-button">RESUME</button>
        <button onclick="quitToMenu()" class="menu-button">QUIT TO MENU</button>
    </div>

    <!-- CUTSCENE (55 seconds intro) -->
    <div id="cutscene">
        <div id="cutscene-image">📼</div>
        <div id="cutscene-text"></div>
        <div style="position:absolute;bottom:40px;font-size:1rem;color:#666;">PRESS ANY KEY TO SKIP</div>
    </div>

    <!-- GAME UI -->
    <div id="ui" style="display:none;">
        <div id="crosshair">+</div>
        
        <div id="hud">
            <div>
                FLASHLIGHT
                <div id="battery"><div id="battery-fill" style="width:100%"></div></div>
            </div>
            <div id="battery-text">100%</div>
            <div id="inventory-display" style="display:flex;gap:12px;font-size:32px;"></div>
            <div id="status-text" style="margin-left:30px;font-size:15px;min-width:260px;color:#ffdd66;"></div>
        </div>
    </div>

    <!-- GAME OVER / WIN -->
    <div id="game-over">
        <div style="font-size:5rem;margin-bottom:30px;">CAUGHT BY THE PROTOTYPE</div>
        <button onclick="restartGame()" class="menu-button" style="font-size:2rem;">TRY AGAIN</button>
    </div>
    <div id="win-screen">
        <div style="font-size:5rem;margin-bottom:30px;">YOU TRAPPED HIM</div>
        <div style="font-size:1.6rem;color:#ffdd66;max-width:700px;text-align:center;margin-bottom:40px;">The Prototype is sealed in the walls... for now.<br>Chapter 2 coming soon.</div>
        <button onclick="restartGame()" class="menu-button" style="font-size:2rem;">PLAY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============================================
        // THE FUN HOUSE — FULL UPDATED PROTOTYPE
        // All your requests implemented
        // =============================================

        let scene, camera, renderer, playerHand, flashlight;
        let move = { forward: false, backward: false, left: false, right: false, sprint: false, crouch: false };
        let isLocked = false, gameRunning = false;
        let yaw = 0, pitch = 0;
        let battery = 100, flashlightOn = true;
        let hasKey = false, hasVHS = false, doorOpen = false;
        let enemy, enemyTrapped = false;
        let collectedItems = [];
        let interactables = [];
        let doorMesh, keyMesh, vhsMesh, leverMesh;
        let audioContext, footstepSound, bgMusic, chaseMusic;
        let raycaster = new THREE.Raycaster();
        let saveData = { progress: 0 };

        // Cutscene story frames (55 seconds total)
        const cutsceneStory = [
            { time: 0, text: "You thought it was over...", image: "🕳️" },
            { time: 6, text: "After escaping the Fun House last year...", image: "🏚️" },
            { time: 13, text: "A mysterious letter arrived in your mailbox.", image: "📬" },
            { time: 20, text: "It was signed by the original owner...", image: "🧔" },
            { time: 27, text: "“Come back. The Prototype never left.”", image: "👁️" },
            { time: 34, text: "You drive through the fog at midnight...", image: "🚗" },
            { time: 41, text: "The gates creak open by themselves.", image: "🚪" },
            { time: 48, text: "You’re back inside... and he’s waiting.", image: "🤡" },
            { time: 55, text: "The Fun House is calling you home.", image: "🏠" }
        ];

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x110000, 6, 42);
            scene.background = new THREE.Color(0x0a0000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.7, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // LIGHTS
            scene.add(new THREE.AmbientLight(0x220011, 0.25));
            window.ceilingLights = [];
            for (let i = 0; i < 7; i++) {
                const l = new THREE.PointLight(0xffeebb, 2.2, 35);
                l.position.set(-13 + i*4.5, 5.8, -10 + (i%3)*6);
                scene.add(l);
                window.ceilingLights.push(l);
            }

            // FLOOR + WALLS (same as before but darker)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({color:0x220f00, roughness:1}));
            floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
            scene.add(floor);

            const wallMat = new THREE.MeshStandardMaterial({color:0x331100, roughness:0.95});
            const leftW = new THREE.Mesh(new THREE.BoxGeometry(1,6,32), wallMat); leftW.position.set(-15,3,-6); scene.add(leftW);
            const rightW = leftW.clone(); rightW.position.x = 15; scene.add(rightW);
            const backW = new THREE.Mesh(new THREE.BoxGeometry(32,6,1), wallMat); backW.position.set(0,3,-20); scene.add(backW);

            // FIRST-PERSON HAND + FLASHLIGHT
            playerHand = new THREE.Group();
            // Arm
            const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 1.4, 8), new THREE.MeshStandardMaterial({color:0xffddbb}));
            arm.rotation.z = Math.PI / 3;
            arm.position.set(0.6, -0.6, -0.8);
            playerHand.add(arm);
            // Hand
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.8), new THREE.MeshStandardMaterial({color:0xffddbb}));
            hand.position.set(1.1, -1.1, -1.2);
            playerHand.add(hand);
            // Flashlight in hand
            flashlight = new THREE.SpotLight(0xffeecc, 18, 38, Math.PI/2.8, 0.7, 1.8);
            flashlight.position.set(1.3, -1.05, -1.4);
            flashlight.castShadow = true;
            playerHand.add(flashlight);
            const lightTarget = new THREE.Object3D();
            lightTarget.position.set(1.3, -1.05, -20);
            playerHand.add(lightTarget);
            flashlight.target = lightTarget;
            camera.add(playerHand);
            scene.add(camera);

            // DOOR, KEY, VHS, LEVER (same as before)
            const doorGroup = new THREE.Group();
            const frame = new THREE.Mesh(new THREE.BoxGeometry(4.2,6,0.4), new THREE.MeshStandardMaterial({color:0x331100}));
            frame.position.set(0,3,9.8); doorGroup.add(frame);
            doorMesh = new THREE.Mesh(new THREE.BoxGeometry(3.6,5.8,0.2), new THREE.MeshStandardMaterial({color:0x552211}));
            doorMesh.position.set(-1.8,3,9.6);
            doorGroup.add(doorMesh);
            scene.add(doorGroup);
            doorMesh.userData = {type:'door', open:false};
            interactables.push(doorMesh);

            keyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,1.2), new THREE.MeshStandardMaterial({color:0xffee00, emissive:0xffff88, metalness:1}));
            keyMesh.position.set(-9,1.2,-13); keyMesh.rotation.z = Math.PI/3;
            scene.add(keyMesh); keyMesh.userData = {type:'key'}; interactables.push(keyMesh);

            vhsMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.2,1.2), new THREE.MeshStandardMaterial({color:0x111111, emissive:0x00ffff}));
            vhsMesh.position.set(11,1.4,-4); scene.add(vhsMesh); vhsMesh.userData = {type:'vhs'}; interactables.push(vhsMesh);

            leverMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4,1.8,0.4), new THREE.MeshStandardMaterial({color:0x880000}));
            leverMesh.position.set(-12,2,1); scene.add(leverMesh);
            leverMesh.userData = {type:'lever', flipped:false}; interactables.push(leverMesh);

            // CREEPY PROTOTYPE ENEMY
            enemy = createPrototypeEnemy();
            enemy.position.set(6,0,-16);
            scene.add(enemy);

            // AUDIO
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            startBackgroundMusic();
            createFootstepAudio();
            createChaseMusic();

            window.addEventListener('resize', ()=>{ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function createPrototypeEnemy() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.4,4.2,6), new THREE.MeshStandardMaterial({color:0x330000, emissive:0x110000}));
            body.position.y = 2.1; g.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(1.15,16,16), new THREE.MeshStandardMaterial({color:0xeeddaa}));
            head.position.y = 5; g.add(head);
            // Prototype mask
            const mask = new THREE.Mesh(new THREE.BoxGeometry(1.4,1.2,0.3), new THREE.MeshStandardMaterial({color:0x222222, emissive:0xff0000}));
            mask.position.set(0,5,1.1); g.add(mask);
            // Glowing eyes
            const eyeMat = new THREE.MeshBasicMaterial({color:0xff0022});
            const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8), eyeMat);
            e1.position.set(-0.4,5.2,1.3); g.add(e1);
            const e2 = e1.clone(); e2.position.x = 0.4; g.add(e2);
            g.userData = {speed:7.5, chaseRange:25, trapped:false};
            return g;
        }

        function startBackgroundMusic() {
            bgMusic = audioContext.createOscillator();
            bgMusic.frequency.setValueAtTime(110, audioContext.currentTime);
            const gain = audioContext.createGain(); gain.gain.value = 0.22;
            const filter = audioContext.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 600;
            bgMusic.connect(filter).connect(gain).connect(audioContext.destination);
            bgMusic.start();
        }

        function createFootstepAudio() {
            footstepSound = () => {
                if (!gameRunning) return;
                const osc = audioContext.createOscillator();
                osc.frequency.setValueAtTime(220 + Math.random()*40, audioContext.currentTime);
                const g = audioContext.createGain();
                g.gain.value = 0.4; g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.35);
                osc.connect(g).connect(audioContext.destination);
                osc.start(); osc.stop(audioContext.currentTime + 0.4);
            };
        }

        function createChaseMusic() {
            chaseMusic = () => {
                const high = audioContext.createOscillator();
                high.frequency.setValueAtTime(680, audioContext.currentTime);
                const g = audioContext.createGain(); g.gain.value = 0.8;
                high.connect(g).connect(audioContext.destination);
                high.start();
                setTimeout(()=>{ high.stop(); }, 900);
            };
        }

        function playCutscene() {
            const cs = document.getElementById('cutscene');
            cs.style.display = 'flex';
            let elapsed = 0;
            const interval = setInterval(() => {
                elapsed += 1;
                const frame = cutsceneStory.find(f => f.time <= elapsed) || cutsceneStory[cutsceneStory.length-1];
                document.getElementById('cutscene-text').innerHTML = `<span style="color:#ff00ff">${frame.text}</span>`;
                document.getElementById('cutscene-image').innerHTML = `<span style="font-size:9rem;">${frame.image}</span>`;
                
                if (elapsed >= 55) {
                    clearInterval(interval);
                    cs.style.display = 'none';
                    startGameCore();
                }
            }, 1000);

            document.addEventListener('keydown', function skip(e) {
                if (cs.style.display === 'flex') {
                    clearInterval(interval);
                    cs.style.display = 'none';
                    document.removeEventListener('keydown', skip);
                    startGameCore();
                }
            });
        }

        function startNewGame() {
            hideNewGameModal();
            document.getElementById('menu').style.display = 'none';
            playCutscene(); // 55-second story intro
        }

        function startGameCore() {
            if (!scene) initThree();
            gameRunning = true;
            document.getElementById('ui').style.display = 'block';
            renderer.domElement.requestPointerLock();
            battery = 100;
            updateBatteryUI();

            // Battery drain
            setInterval(() => {
                if (!gameRunning || !flashlightOn) return;
                battery = Math.max(0, battery - 0.65);
                updateBatteryUI();
                if (battery <= 0) flashlightOn = false;
            }, 650);

            animate();
        }

        function loadSavedGame() {
            const saved = localStorage.getItem('theFunHouseSave');
            if (saved) {
                saveData = JSON.parse(saved);
                alert("💾 GAME LOADED — Progress restored!");
                document.getElementById('menu').style.display = 'none';
                startGameCore();
            } else {
                alert("No saved game found. Starting fresh...");
                startNewGame();
            }
        }

        function saveGame() {
            saveData.progress = doorOpen ? 100 : 30;
            localStorage.setItem('theFunHouseSave', JSON.stringify(saveData));
            alert("💾 GAME SAVED!");
            resumeGame();
        }

        function updateBatteryUI() {
            document.getElementById('battery-fill').style.width = battery + '%';
            document.getElementById('battery-text').innerHTML = Math.floor(battery) + '%';
        }

        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);

            const delta = 0.016;

            if (isLocked) {
                // MOVEMENT + FOOTSTEPS
                const speed = move.sprint ? 19 : (move.crouch ? 4 : 11);
                const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
                let moving = false;

                if (move.forward) { camera.position.addScaledVector(forward, speed * delta); moving = true; }
                if (move.backward) { camera.position.addScaledVector(forward, -speed * delta); moving = true; }
                if (move.right) { camera.position.addScaledVector(right, speed * delta); moving = true; }
                if (move.left) { camera.position.addScaledVector(right, -speed * delta); moving = true; }

                if (moving && Math.random() < 0.3) footstepSound();

                // Bounds
                camera.position.x = Math.max(-14, Math.min(14, camera.position.x));
                camera.position.z = Math.max(-19, Math.min(9, camera.position.z));

                // FLASHLIGHT FOLLOW
                if (flashlightOn) {
                    flashlight.intensity = 18;
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    flashlight.target.position.copy(camera.position).addScaledVector(dir, 30);
                } else flashlight.intensity = 0;

                // FLICKER
                window.ceilingLights.forEach((l,i) => l.intensity = 1.8 + Math.sin(Date.now()*0.008 + i)*1.1);

                // PROTOTYPE AI + CHASE
                updatePrototypeAI(delta);

                // WIN CONDITION — trap him
                if (enemyTrapped && camera.position.z > 8.5) {
                    triggerWin();
                }
            }
            renderer.render(scene, camera);
        }

        function updatePrototypeAI(delta) {
            const dist = camera.position.distanceTo(enemy.position);
            if (dist < enemy.userData.chaseRange && !enemy.userData.trapped) {
                const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                enemy.position.addScaledVector(dir, enemy.userData.speed * delta);
                enemy.lookAt(camera.position.x, enemy.position.y + 2, camera.position.z);
                if (dist < 2.8) triggerJumpscare();

                // Play chase music
                if (Math.random() < 0.1) chaseMusic();
            } else {
                // Patrol
                if (Math.random() < 0.015) {
                    enemy.position.x += (Math.random()-0.5)*4;
                    enemy.position.z += (Math.random()-0.5)*4;
                }
            }
        }

        function triggerJumpscare() {
            gameRunning = false;
            document.getElementById('game-over').style.display = 'flex';
            const scream = audioContext.createOscillator();
            scream.frequency.setValueAtTime(90, audioContext.currentTime);
            const g = audioContext.createGain(); g.gain.value = 2; g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.6);
            scream.connect(g).connect(audioContext.destination); scream.start(); scream.stop(audioContext.currentTime + 1.8);
        }

        function triggerWin() {
            gameRunning = false;
            enemy.userData.trapped = true;
            document.getElementById('win-screen').style.display = 'flex';
        }

        function attemptInteraction() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactables, true);
            if (hits.length === 0) return;

            const obj = hits[0].object;

            if (obj.userData.type === 'key' && !hasKey) {
                hasKey = true; scene.remove(keyMesh); addToInventory('🔑'); showStatus('KEY ACQUIRED');
            }
            if (obj.userData.type === 'vhs' && !hasVHS) {
                hasVHS = true; scene.remove(vhsMesh); addToInventory('📼'); showStatus('VHS FOUND — LORE UNLOCKED');
            }
            if (obj.userData.type === 'door' && hasKey && !doorOpen) {
                doorOpen = true;
                const startY = obj.rotation.y;
                let t = 0;
                const anim = () => {
                    t += 0.09;
                    obj.rotation.y = startY + (Math.PI/2 - startY) * (1 - Math.pow(1-t,3));
                    if (t < 1) requestAnimationFrame(anim);
                };
                anim();
                showStatus('DOOR OPENED');
            }
            if (obj.userData.type === 'lever' && !obj.userData.flipped) {
                obj.userData.flipped = true;
                obj.rotation.z = Math.PI/2;
                showStatus('LEVER FLIPPED — WALLS SEALED');
                // Trap the prototype!
                if (enemy.position.distanceTo(new THREE.Vector3(12,0,-8)) < 8) {
                    enemy.userData.trapped = true;
                    enemyTrapped = true;
                    showStatus('PROTOTYPE TRAPPED IN THE WALLS!');
                }
            }
        }

        function addToInventory(icon) {
            const inv = document.getElementById('inventory-display');
            const el = document.createElement('div');
            el.innerHTML = icon;
            inv.appendChild(el);
        }

        function showStatus(text) {
            const el = document.getElementById('status-text');
            el.textContent = text;
            el.style.animation = 'none';
            setTimeout(() => el.style.animation = 'glitchAnim 0.6s', 10);
            setTimeout(() => el.textContent = '', 2400);
        }

        // INPUT
        function handlePointerLock() {
            document.addEventListener('pointerlockchange', () => isLocked = document.pointerLockElement === renderer.domElement);

            document.addEventListener('mousemove', e => {
                if (!isLocked) return;
                yaw -= e.movementX * 0.0022;
                pitch = Math.max(-1.3, Math.min(1.3, pitch - e.movementY * 0.0022));
                camera.rotation.set(pitch, yaw, 0);
            });

            window.addEventListener('keydown', e => {
                if (!gameRunning) return;
                switch(e.code) {
                    case 'KeyW': move.forward = true; break;
                    case 'KeyS': move.backward = true; break;
                    case 'KeyA': move.left = true; break;
                    case 'KeyD': move.right = true; break;
                    case 'ShiftLeft': move.sprint = true; break;
                    case 'ControlLeft': move.crouch = true; break;
                    case 'KeyF': flashlightOn = !flashlightOn; break;
                    case 'KeyE': attemptInteraction(); break;
                    case 'Escape': if (isLocked) pauseGame(); break;
                }
            });

            window.addEventListener('keyup', e => {
                switch(e.code) {
                    case 'KeyW': move.forward = false; break;
                    case 'KeyS': move.backward = false; break;
                    case 'KeyA': move.left = false; break;
                    case 'KeyD': move.right = false; break;
                    case 'ShiftLeft': move.sprint = false; break;
                    case 'ControlLeft': move.crouch = false; break;
                }
            });
        }

        function pauseGame() {
            gameRunning = false;
            document.getElementById('pause-menu').style.display = 'flex';
        }
        function resumeGame() {
            document.getElementById('pause-menu').style.display = 'none';
            gameRunning = true;
            animate();
        }
        function quitToMenu() { location.reload(); }

        function hideNewGameModal() { document.getElementById('new-game-modal').style.display = 'none'; }
        function showNewGameModal() { document.getElementById('new-game-modal').style.display = 'flex'; }
        function restartGame() { location.reload(); }
