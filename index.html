<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash of Power</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Outfit',sans-serif;cursor:default;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

#startScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 60%,#1a0800 0%,#000 70%);transition:opacity 1.5s ease}
#startScreen.hidden{opacity:0;pointer-events:none}
.start-bg{position:absolute;inset:0;overflow:hidden}
.start-bg::before{content:'';position:absolute;top:50%;left:50%;width:600px;height:600px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,80,0,0.08) 0%,transparent 70%);animation:startPulse 4s ease-in-out infinite}
.start-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,100,0,0.3),transparent);animation:scanLine 3s linear infinite}
@keyframes startPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}
@keyframes scanLine{0%{transform:translateY(-100vh)}100%{transform:translateY(100vh)}}
.game-title{font-family:'Cinzel',serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:900;color:#fff;letter-spacing:0.15em;text-transform:uppercase;position:relative;z-index:2;text-shadow:0 0 60px rgba(255,60,0,0.3),0 0 120px rgba(255,30,0,0.15)}
.game-title span{display:block;font-size:0.35em;font-weight:400;letter-spacing:0.5em;color:rgba(255,150,80,0.6);margin-top:0.3em;font-family:'Outfit',sans-serif}
#startBtn{margin-top:3rem;padding:1rem 4rem;background:transparent;border:2px solid rgba(255,100,0,0.5);color:#fff;font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;position:relative;z-index:2;transition:all 0.4s ease;overflow:hidden}
#startBtn:hover{border-color:rgba(255,100,0,0.9);background:rgba(255,80,0,0.1);box-shadow:0 0 40px rgba(255,60,0,0.2),inset 0 0 40px rgba(255,60,0,0.05);transform:scale(1.05)}
#startBtn:active{transform:scale(0.98)}
.start-hint{position:absolute;bottom:2rem;color:rgba(255,255,255,0.25);font-size:0.8rem;letter-spacing:0.2em;z-index:2}

#blackOverlay{position:fixed;inset:0;background:#000;z-index:50;opacity:1;pointer-events:none;transition:opacity 1.2s ease}
#blackOverlay.fade-out{opacity:0}

#dialogueBox{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);z-index:20;opacity:0;transition:opacity 0.8s ease;pointer-events:none;text-align:center;max-width:90%}
#dialogueBox.visible{opacity:1}
#dialogueText{font-family:'Cinzel',serif;font-size:clamp(1rem,2.5vw,1.6rem);color:#fff;text-shadow:0 0 30px rgba(255,80,0,0.4),0 2px 10px rgba(0,0,0,0.8);letter-spacing:0.05em;line-height:1.6}
#dialogueSpeaker{font-family:'Outfit',sans-serif;font-size:0.75rem;color:rgba(255,150,80,0.6);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:0.5rem}

#hud{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity 0.8s ease}
#hud.visible{opacity:1}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:1.5rem 2rem}
.player-info,.enemy-info{display:flex;flex-direction:column;gap:0.4rem}
.player-info{align-items:flex-start}
.enemy-info{align-items:flex-end}
.bar-label{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.bar-container{width:220px;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;position:relative}
.bar-fill.player-hp{background:linear-gradient(90deg,#ff4400,#ff8800);box-shadow:0 0 12px rgba(255,68,0,0.5)}
.bar-fill.enemy-hp{background:linear-gradient(90deg,#0066ff,#00ccff);box-shadow:0 0 12px rgba(0,102,255,0.5)}
.bar-fill.ult{background:linear-gradient(90deg,#ffcc00,#ff6600);box-shadow:0 0 12px rgba(255,204,0,0.5)}
.energy-dots{display:flex;gap:6px;margin-top:2px}
.energy-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);transition:all 0.3s ease}
.energy-dot.filled{background:rgba(255,100,0,0.8);border-color:rgba(255,100,0,0.9);box-shadow:0 0 8px rgba(255,100,0,0.4)}

#powerBar{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:0.8rem;opacity:0;transition:opacity 0.8s ease;pointer-events:none}
#powerBar.visible{opacity:1;pointer-events:auto}
.power-btn{width:70px;height:70px;border:2px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden}
.power-btn:hover{border-color:rgba(255,100,0,0.6);background:rgba(255,80,0,0.1);transform:translateY(-4px);box-shadow:0 8px 30px rgba(255,60,0,0.2)}
.power-btn:active{transform:translateY(0) scale(0.95)}
.power-btn.disabled{opacity:0.3;pointer-events:none}
.power-btn.ult-btn{width:80px;height:80px;border-color:rgba(255,200,0,0.3)}
.power-btn.ult-btn.ready{border-color:rgba(255,200,0,0.8);box-shadow:0 0 30px rgba(255,200,0,0.2);animation:ultPulse 2s ease-in-out infinite}
@keyframes ultPulse{0%,100%{box-shadow:0 0 30px rgba(255,200,0,0.2)}50%{box-shadow:0 0 50px rgba(255,200,0,0.4)}}
.power-icon{font-size:1.4rem;margin-bottom:2px}
.power-key{font-size:0.6rem;color:rgba(255,255,255,0.4);letter-spacing:0.1em}
.power-name{font-size:0.5rem;color:rgba(255,255,255,0.5);letter-spacing:0.05em}

#slowMoOverlay{position:fixed;inset:0;z-index:15;pointer-events:none;background:rgba(0,0,0,0);transition:background 0.3s ease}
#slowMoOverlay.active{background:rgba(0,0,0,0.15)}

#endScreen{position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background 2s ease}
#endScreen.visible{background:rgba(0,0,0,0.85);pointer-events:auto}
.end-title{font-family:'Cinzel',serif;font-size:clamp(2rem,6vw,4.5rem);font-weight:900;letter-spacing:0.15em;text-transform:uppercase;opacity:0;transform:scale(0.8);transition:all 1.5s cubic-bezier(0.16,1,0.3,1)}
#endScreen.visible .end-title{opacity:1;transform:scale(1)}
.end-title.victory{color:#ff8800;text-shadow:0 0 60px rgba(255,100,0,0.5)}
.end-title.defeat{color:#3366ff;text-shadow:0 0 60px rgba(50,100,255,0.5)}
.end-sub{font-size:1rem;color:rgba(255,255,255,0.4);letter-spacing:0.3em;margin-top:1rem;opacity:0;transition:opacity 1.5s ease 0.5s}
#endScreen.visible .end-sub{opacity:1}
#restartBtn{margin-top:2.5rem;padding:0.8rem 3rem;background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);font-family:'Outfit',sans-serif;font-size:0.85rem;letter-spacing:0.2em;cursor:pointer;opacity:0;transition:all 0.4s ease 1s;pointer-events:none}
#endScreen.visible #restartBtn{opacity:1;pointer-events:auto}
#restartBtn:hover{border-color:rgba(255,255,255,0.5);color:#fff;background:rgba(255,255,255,0.05)}

#flashOverlay{position:fixed;inset:0;z-index:18;pointer-events:none;background:#fff;opacity:0;transition:opacity 0.1s ease}
#flashOverlay.flash{opacity:0.6}

@media(max-width:640px){
  .bar-container{width:140px;height:6px}
  .power-btn{width:55px;height:55px}
  .power-btn.ult-btn{width:65px;height:65px}
  .power-icon{font-size:1.1rem}
  .hud-top{padding:1rem}
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="start-bg"></div>
  <div class="game-title">Clash of Power<span>Cinematic Fighting Experience</span></div>
  <button id="startBtn">Start</button>
  <div class="start-hint">A short cinematic battle awaits</div>
</div>

<div id="blackOverlay"></div>
<div id="flashOverlay"></div>
<div id="slowMoOverlay"></div>

<div id="dialogueBox">
  <div id="dialogueSpeaker"></div>
  <div id="dialogueText"></div>
</div>

<div id="hud">
  <div class="hud-top">
    <div class="player-info">
      <div class="bar-label">You</div>
      <div class="bar-container"><div class="bar-fill player-hp" id="playerHpBar" style="width:100%"></div></div>
      <div class="bar-label" style="margin-top:4px">Energy</div>
      <div class="energy-dots" id="energyDots">
        <div class="energy-dot filled"></div>
        <div class="energy-dot filled"></div>
        <div class="energy-dot filled"></div>
        <div class="energy-dot"></div>
        <div class="energy-dot"></div>
      </div>
      <div class="bar-label" style="margin-top:6px">Ultimate</div>
      <div class="bar-container" style="width:140px"><div class="bar-fill ult" id="ultBar" style="width:0%"></div></div>
    </div>
    <div class="enemy-info">
      <div class="bar-label">Enemy</div>
      <div class="bar-container"><div class="bar-fill enemy-hp" id="enemyHpBar" style="width:100%"></div></div>
    </div>
  </div>
</div>

<div id="powerBar">
  <div class="power-btn" data-power="energyBlast" title="Energy Blast">
    <div class="power-icon">&#9889;</div>
    <div class="power-key">[1]</div>
    <div class="power-name">BLAST</div>
  </div>
  <div class="power-btn" data-power="dashStrike" title="Dash Strike">
    <div class="power-icon">&#9876;</div>
    <div class="power-key">[2]</div>
    <div class="power-name">DASH</div>
  </div>
  <div class="power-btn" data-power="skySlam" title="Sky Slam">
    <div class="power-icon">&#9760;</div>
    <div class="power-key">[3]</div>
    <div class="power-name">SLAM</div>
  </div>
  <div class="power-btn ult-btn disabled" data-power="ultimate" title="Ultimate Power">
    <div class="power-icon">&#10038;</div>
    <div class="power-key">[4]</div>
    <div class="power-name">ULTIMATE</div>
  </div>
</div>

<div id="endScreen">
  <div class="end-title" id="endTitle"></div>
  <div class="end-sub" id="endSub"></div>
  <button id="restartBtn">Fight Again</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ========== CONSTANTS ========== */
const EPS = 0.001;
const ENEMY_START = new THREE.Vector3(0, 0, -8);
const ARENA_CENTER = new THREE.Vector3(0, 0, -3);

/* ========== GAME STATE ========== */
const state = {
  phase: 'menu', // menu, intro, fight, cinematic, end
  playerHP: 100,
  enemyHP: 100,
  maxHP: 100,
  energy: 3,
  maxEnergy: 5,
  ultCharge: 0,
  ultReady: false,
  shakeIntensity: 0,
  slowMo: 1,
  timeScale: 1,
  inputLocked: false,
  powerCooldown: false
};

/* ========== AUDIO SYSTEM ========== */
let audioCtx = null;
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type = 'sine', vol = 0.15, detune = 0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol = 0.1) {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 800;
  src.connect(filter).connect(gain).connect(audioCtx.destination);
  src.start();
}

function sfxCharge() {
  playTone(80, 0.8, 'sawtooth', 0.08);
  playTone(120, 0.6, 'sine', 0.06);
  setTimeout(() => playTone(160, 0.4, 'sine', 0.08), 200);
  setTimeout(() => playTone(200, 0.3, 'sine', 0.1), 400);
}

function sfxImpact(heavy = false) {
  playNoise(0.15, heavy ? 0.3 : 0.15);
  playTone(60, 0.3, 'sine', heavy ? 0.2 : 0.1);
  if (heavy) {
    playTone(30, 0.5, 'sine', 0.15);
    playTone(90, 0.2, 'square', 0.05);
  }
}

function sfxExplosion() {
  playNoise(0.6, 0.35);
  playTone(40, 0.8, 'sine', 0.25);
  playTone(25, 1.0, 'sine', 0.15);
  setTimeout(() => playNoise(0.3, 0.15), 100);
}

function sfxWhoosh() {
  playNoise(0.3, 0.08);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2000;
  filter.Q.value = 5;
}

function sfxWind() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.03;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  src.connect(filter).connect(gain).connect(audioCtx.destination);
  src.start();
}

function sfxMusic() {
  if (!audioCtx) return;
  // Create a simple intense drone
  const drone = () => {
    playTone(55, 8, 'sawtooth', 0.04);
    playTone(55.5, 8, 'sawtooth', 0.04); // slight detune for richness
    playTone(82.5, 8, 'sine', 0.03);
    playTone(110, 4, 'triangle', 0.02);
  };
  drone();
  setInterval(drone, 7000);
}

function sfxUltimateBuild() {
  playTone(60, 2, 'sawtooth', 0.06);
  playTone(90, 1.5, 'sine', 0.05);
  setTimeout(() => playTone(120, 1, 'sine', 0.07), 500);
  setTimeout(() => playTone(150, 0.8, 'sine', 0.08), 800);
  setTimeout(() => playTone(200, 0.6, 'triangle', 0.1), 1100);
  setTimeout(() => playTone(300, 0.4, 'sine', 0.12), 1400);
}

/* ========== THREE.JS SETUP ========== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

// Fog
scene.fog = new THREE.FogExp2(0xc4a882, 0.008);

// Lights
const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 120;
sunLight.shadow.camera.left = -50;
sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 50;
sunLight.shadow.camera.bottom = -50;
scene.add(sunLight);

const ambLight = new THREE.AmbientLight(0x4466aa, 0.4);
scene.add(ambLight);

const hemiLight = new THREE.HemisphereLight(0xffeedd, 0x445533, 0.6);
scene.add(hemiLight);

/* ========== SKY ========== */
function createSky() {
  const skyGeo = new THREE.SphereGeometry(Math.max(EPS, 200), 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      uTop: { value: new THREE.Color(0x1a3a6e) },
      uMid: { value: new THREE.Color(0x7aaccf) },
      uBot: { value: new THREE.Color(0xe8c090) }
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main(){
        vec4 wp = modelMatrix * vec4(position,1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      uniform vec3 uTop, uMid, uBot;
      varying vec3 vWorldPos;
      void main(){
        float h = normalize(vWorldPos).y;
        vec3 col = h > 0.0 ? mix(uMid, uTop, pow(h, 0.6)) : mix(uMid, uBot, pow(-h, 0.4));
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
}
createSky();

/* ========== CLOUDS ========== */
const clouds = [];
function createCloud(x, y, z, scale) {
  const group = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
  const count = 5 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const r = Math.max(EPS, 1.5 + Math.random() * 2.5) * scale;
    const geo = new THREE.SphereGeometry(r, 8, 6);
    const m = new THREE.Mesh(geo, mat);
    m.position.set((Math.random() - 0.5) * 6 * scale, (Math.random() - 0.5) * 1.5 * scale, (Math.random() - 0.5) * 3 * scale);
    group.add(m);
  }
  group.position.set(x, y, z);
  scene.add(group);
  clouds.push({ mesh: group, speed: 0.3 + Math.random() * 0.5 });
}
for (let i = 0; i < 12; i++) {
  createCloud(
    (Math.random() - 0.5) * 200,
    30 + Math.random() * 40,
    -50 + Math.random() * 100,
    0.8 + Math.random() * 1.5
  );
}

/* ========== GROUND ========== */
const groundGeo = new THREE.PlaneGeometry(300, 300, 1, 1);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x8B7355 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Arena ground marking
const arenaGeo = new THREE.CircleGeometry(Math.max(EPS, 12), 64);
const arenaMat = new THREE.MeshLambertMaterial({ color: 0x7a6545 });
const arenaMark = new THREE.Mesh(arenaGeo, arenaMat);
arenaMark.rotation.x = -Math.PI / 2;
arenaMark.position.y = 0.01;
arenaMark.receiveShadow = true;
scene.add(arenaMark);

// Arena edge ring
const ringGeo = new THREE.RingGeometry(Math.max(EPS, 11.5), Math.max(EPS, 12.5), 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xaa8866, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.02;
scene.add(ring);

/* ========== TREES ========== */
const treePositions = [
  [-15, 0, -15], [-20, 0, -5], [-18, 0, 5], [-25, 0, -10],
  [15, 0, -15], [20, 0, -8], [18, 0, 3], [25, 0, -12],
  [-12, 0, 15], [10, 0, 18], [-22, 0, 12], [22, 0, 10],
  [-30, 0, 0], [30, 0, -3], [-8, 0, -20], [8, 0, -22]
];

const treeMeshes = [];
function createTree(x, y, z) {
  const group = new THREE.Group();
  const trunkH = 2 + Math.random() * 2;
  const trunkR = Math.max(EPS, 0.15 + Math.random() * 0.15);
  const trunkGeo = new THREE.CylinderGeometry(trunkR * 0.7, trunkR, trunkH, 6);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5c3a1e });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = trunkH / 2;
  trunk.castShadow = true;
  group.add(trunk);

  const foliageColors = [0x2d5a1e, 0x3a6b2a, 0x1e4a12, 0x4a7a35];
  const fc = foliageColors[Math.floor(Math.random() * foliageColors.length)];
  const layers = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < layers; i++) {
    const r = Math.max(EPS, (2.5 - i * 0.6) * (0.8 + Math.random() * 0.4));
    const h = Math.max(EPS, 2.5 - i * 0.5);
    const geo = new THREE.ConeGeometry(r, h, 7);
    const mat = new THREE.MeshLambertMaterial({ color: fc });
    const m = new THREE.Mesh(geo, mat);
    m.position.y = trunkH + i * 1.2 + 0.5;
    m.castShadow = true;
    group.add(m);
  }
  group.position.set(x, y, z);
  scene.add(group);
  treeMeshes.push(group);
}
treePositions.forEach(p => createTree(p[0], p[1], p[2]));

/* ========== HOUSES ========== */

/* ========== CITY SKYLINE ========== */
function createCitySkyline() {
  const group = new THREE.Group();
  const buildingCount = 30;
  for (let i = 0; i < buildingCount; i++) {
    const w = 2 + Math.random() * 4;
    const h = 5 + Math.random() * 25;
    const d = 2 + Math.random() * 4;
    const geo = new THREE.BoxGeometry(Math.max(EPS, w), Math.max(EPS, h), Math.max(EPS, d));
    const shade = 0.3 + Math.random() * 0.3;
    const mat = new THREE.MeshLambertMaterial({
      color: new THREE.Color(shade, shade * 0.95, shade * 0.9),
      emissive: new THREE.Color(shade * 0.05, shade * 0.04, shade * 0.02),
      emissiveIntensity: 1
    });
    const b = new THREE.Mesh(geo, mat);
    const angle = (i / buildingCount) * Math.PI * 1.2 + Math.PI * 0.9;
    const dist = 80 + Math.random() * 40;
    b.position.set(Math.cos(angle) * dist, h / 2, Math.sin(angle) * dist);
    b.rotation.y = Math.random() * Math.PI;
    group.add(b);

    // Window lights on some buildings
    if (Math.random() > 0.4) {
      const winGeo = new THREE.BoxGeometry(Math.max(EPS, w * 0.8), Math.max(EPS, h * 0.9), Math.max(EPS, 0.1));
      const winMat = new THREE.MeshBasicMaterial({
        color: 0xffeebb,
        transparent: true,
        opacity: 0.03 + Math.random() * 0.04
      });
      const win = new THREE.Mesh(winGeo, winMat);
      win.position.copy(b.position);
      win.position.z += d / 2 + 0.1;
      win.rotation.y = b.rotation.y;
      group.add(win);
    }
  }
  scene.add(group);
}

function createCharacter(mainColor, accentColor, glowColor) {

  const bodyMat = new THREE.MeshPhongMaterial({ color: mainColor, shininess: 60 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 2.1;
  body.castShadow = true;
  group.add(body);

  // Chest armor
  const chestGeo = new THREE.BoxGeometry(0.9, 0.6, 0.5);
  const chestMat = new THREE.MeshPhongMaterial({ color: accentColor, shininess: 80 });
  const chest = new THREE.Mesh(chestGeo, chestMat);
  chest.position.y = 2.4;
  chest.castShadow = true;
  group.add(chest);

  // Head
  const headGeo = new THREE.SphereGeometry(Math.max(EPS, 0.28), 10, 8);
  const headMat = new THREE.MeshPhongMaterial({ color: 0xddb89a, shininess: 40 });
  const head = new THREE.Mesh(headGeo, headMat);

  head.castShadow = true;

  const hairMat = new THREE.MeshPhongMaterial({ color: 0x1a1a2e });
  const hair = new THREE.Mesh(hairGeo, hairMat);
  hair.position.y = 3.2;
  group.add(hair);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(Math.max(EPS, 0.04), 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: glowColor });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.1, 3.12, 0.24);
  group.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.x = 0.1;
  group.add(eyeR);

  // Arms
  const armGeo = new THREE.CylinderGeometry(Math.max(EPS, 0.1), Math.max(EPS, 0.09), 1.1, 6);
  const armMat = new THREE.MeshPhongMaterial({ color: mainColor, shininess: 60 });
  const armL = new THREE.Mesh(armGeo, armMat);
  armL.position.set(-0.6, 2.0, 0);
  armL.rotation.z = 0.15;

  group.add(armL);
  const armR = armL.clone();
  armR.position.x = 0.6;
  armR.rotation.z = -0.15;
  group.add(armR);

  // Hands
  const handGeo = new THREE.SphereGeometry(Math.max(EPS, 0.1), 6, 6);
  const handMat = new THREE.MeshPhongMaterial({ color: 0xddb89a });
  const handL = new THREE.Mesh(handGeo, handMat);
  handL.position.set(-0.7, 1.4, 0);
  group.add(handL);
  const handR = handL.clone();
  handR.position.x = 0.7;
  group.add(handR);

  // Legs
  const legGeo = new THREE.CylinderGeometry(Math.max(EPS, 0.13), Math.max(EPS, 0.11), 1.2, 6);
  const legMat = new THREE.MeshPhongMaterial({ color: mainColor, shininess: 40 });
  const legL = new THREE.Mesh(legGeo, legMat);
  legL.position.set(-0.2, 0.7, 0);
  legL.castShadow = true;
  group.add(legL);
  const legR = legL.clone();
  legR.position.x = 0.2;
  group.add(legR);

  // Boots
  const bootGeo = new THREE.BoxGeometry(0.2, 0.25, 0.35);
  const bootMat = new THREE.MeshPhongMaterial({ color: accentColor });
  const bootL = new THREE.Mesh(bootGeo, bootMat);

  const bootR = bootL.clone();

  const auraGeo = new THREE.SphereGeometry(Math.max(EPS, 1.8), 16, 16);

// Shared particle texture
function makeParticleTex(color) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0, color);
  g.addColorStop(0.3, color);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}

// Burst particles
function createBurstParticles(count, tex) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const vel = [];
  for (let i = 0; i < count; i++) {
    pos[i * 3] = 0;
    pos[i * 3 + 1] = 0;
    pos[i * 3 + 2] = 0;
    vel.push(new THREE.Vector3(
      (Math.random() - 0.5) * 8,
      Math.random() * 6,
      (Math.random() - 0.5) * 8
    ));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    map: tex,
    size: 0.6,
    transparent: true,
    opacity: 1,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
  });
  const points = new THREE.Points(geo, mat);
  points.visible = false;
  scene.add(points);
  return { mesh: points, mat, velocities: vel, life: 0 };
}

function updateHP() {
  $playerHpBar.style.width = Math.max(0, state.playerHP) + '%';
  $enemyHpBar.style.width = Math.max(0, state.enemyHP) + '%';
}

function updateEnergy() {
  $energyDots.forEach((dot, i) => {
    dot.classList.toggle('filled', i < state.energy);
  });
  // Enable/disable power buttons
  $powerBtns.forEach(btn => {
    const power = btn.dataset.power;
    if (power === 'ultimate') {
      btn.classList.toggle('ready', state.ultReady);
      btn.classList.toggle('disabled', !state.ultReady);
    } else {
      btn.classList.toggle('disabled', state.energy < 1 || state.inputLocked);
    }
  });
}

function updateUltBar() {
  $ultBar.style.width = Math.min(100, state.ultCharge) + '%';
  if (state.ultCharge >= 100 && !state.ultReady) {
    state.ultReady = true;
    updateEnergy();
  }
}

  return new Promise(resolve => {
    $dialogueSpeaker.textContent = speaker;
    $dialogueText.textContent = text;
    $dialogueBox.classList.add('visible');
    setTimeout(() => {
      $dialogueBox.classList.remove('visible');
      setTimeout(resolve, 600);
    }, duration);
  });
}

/* ========== POWER ABILITIES ========== */
function wait(ms) {
  return new Promise(r => setTimeout(r, ms / state.slowMo));
}

async function energyBlast(isPlayer) {
  if (state.inputLocked) return;
  state.inputLocked = true;
  const attacker = isPlayer ? player : enemy;
  const target = isPlayer ? enemy : player;
  const blast = isPlayer ? playerBlast : enemyBlast;
  const burst = isPlayer ? playerBurst : enemyBurst;
  const shock = isPlayer ? playerShockwave : enemyShockwave;
  const color = isPlayer ? 0xff8800 : 0x0088ff;

  if (isPlayer && state.energy < 1) { state.inputLocked = false; return; }
  if (isPlayer) { state.energy--; updateEnergy(); }

  sfxCharge();

  // Camera: close-up on attacker's hand area
  const handPos = new THREE.Vector3();
  attacker.getWorldPosition(handPos);
  handPos.y += 1.5;
  if (isPlayer) {
    lerpCam(
      new THREE.Vector3(handPos.x - 2, handPos.y + 0.5, handPos.z + 2),
      handPos, 0.06
    );
  } else {
    lerpCam(
      new THREE.Vector3(handPos.x + 2, handPos.y + 0.5, handPos.z - 2),
      handPos, 0.06
    );
  }

  // Charge phase
  blast.mesh.position.copy(handPos);
  blast.mesh.visible = true;
  blast.mat.opacity = 0;
  blast.light.intensity = 0;
  blast.mesh.scale.set(0.1, 0.1, 0.1);

  for (let i = 0; i < 40; i++) {
    const t = i / 40;
    blast.mat.opacity = t * 0.9;
    blast.light.intensity = t * 5;
    blast.mesh.scale.setScalar(0.1 + t * 0.8);
    await wait(20);
  }

  setSlowMo(true);
  await wait(400);

  // Fire!
  const targetPos = new THREE.Vector3();
  target.getWorldPosition(targetPos);
  targetPos.y += 2;
  const dir = targetPos.clone().sub(blast.mesh.position).normalize();

  sfxWhoosh();
  setSlowMo(false);

  // Move blast toward target
  const startPos = blast.mesh.position.clone();
  const dist = startPos.distanceTo(targetPos);
  const speed = dist / 20;

  for (let i = 0; i < 20; i++) {
    const t = i / 20;
    blast.mesh.position.lerpVectors(startPos, targetPos, t);
    blast.mesh.scale.setScalar(0.9 - t * 0.3);
    await wait(16);
  }

  // Impact
  sfxImpact(true);
  flashScreen(200);
  shakeCamera(0.6);

  blast.mesh.visible = false;

  // Shockwave
  shock.mesh.position.copy(targetPos);
  shock.mesh.position.y = 0.1;
  shock.mesh.visible = true;
  shock.mesh.scale.set(0.1, 0.1, 0.1);
  shock.mat.opacity = 0.8;

  // Burst particles
  burst.mesh.position.copy(targetPos);
  burst.mesh.visible = true;
  burst.life = 0;
  const positions = burst.mesh.geometry.attributes.position.array;
  for (let i = 0; i < burst.velocities.length; i++) {
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = 0;
  }
  burst.mesh.geometry.attributes.position.needsUpdate = true;

  // Camera: side view of impact
  lerpCam(CAM.sideLeft.pos, CAM.sideLeft.target, 0.08);

  for (let i = 0; i < 30; i++) {
    const t = i / 30;
    shock.mesh.scale.setScalar(1 + t * 15);
    shock.mat.opacity = 0.8 * (1 - t);
    burst.mat.opacity = 1 - t;
    burst.life = t;
    await wait(25);
  }

  shock.mesh.visible = false;
  burst.mesh.visible = false;

  // Damage
  const dmg = 12 + Math.floor(Math.random() * 6);
  if (isPlayer) {
    state.enemyHP = Math.max(0, state.enemyHP - dmg);
    state.ultCharge = Math.min(100, state.ultCharge + 15);
    updateHP(); updateUltBar();
  } else {
    state.playerHP = Math.max(0, state.playerHP - dmg);
    updateHP();
  }

  // Return camera
  lerpCam(CAM.fight.pos, CAM.fight.target, 0.04);
  state.inputLocked = false;
  updateEnergy();
}

async function dashStrike(isPlayer) {
  if (state.inputLocked) return;
  state.inputLocked = true;
  const attacker = isPlayer ? player : enemy;
  const target = isPlayer ? enemy : player;
  const burst = isPlayer ? playerBurst : enemyBurst;
  const shock = isPlayer ? playerShockwave : enemyShockwave;

  if (isPlayer && state.energy < 1) { state.inputLocked = false; return; }
  if (isPlayer) { state.energy--; updateEnergy(); }

  sfxWhoosh();

  const startPos = attacker.position.clone();
  const targetPos = target.position.clone();
  // Stop short
  const endPos = startPos.clone().lerp(targetPos, 0.65);
  const dir = endPos.clone().sub(startPos).normalize();

  // Camera: side tracking
  if (isPlayer) {
    lerpCam(CAM.sideRight.pos, CAM.sideRight.target, 0.06);
  } else {
    lerpCam(CAM.sideLeft.pos, CAM.sideLeft.target, 0.06);
  }

  // Dash
  for (let i = 0; i < 12; i++) {
    const t = i / 12;
    attacker.position.lerpVectors(startPos, endPos, t * t);
    // Motion trail effect - shake
    if (i > 3 && i < 10) shakeCamera(0.15);
    await wait(16);
  }

  // Impact
  sfxImpact(true);
  flashScreen(120);
  shakeCamera(0.8);

  // Shockwave
  const impactPos = new THREE.Vector3();
  attacker.getWorldPosition(impactPos);
  impactPos.y = 0.1;
  shock.mesh.position.copy(impactPos);
  shock.mesh.visible = true;
  shock.mesh.scale.set(0.1, 0.1, 0.1);
  shock.mat.opacity = 0.7;

  // Burst
  burst.mesh.position.copy(impactPos);
  burst.mesh.position.y = 2;
  burst.mesh.visible = true;
  burst.life = 0;
  const positions = burst.mesh.geometry.attributes.position.array;
  for (let i = 0; i < burst.velocities.length; i++) {
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = 0;
  }
  burst.mesh.geometry.attributes.position.needsUpdate = true;

  // Knockback target
  const kbDir = target.position.clone().sub(attacker.position).normalize();
  const kbStart = target.position.clone();
  const kbEnd = kbStart.clone().add(kbDir.multiplyScalar(3));

  for (let i = 0; i < 20; i++) {
    const t = i / 20;
    shock.mesh.scale.setScalar(1 + t * 10);
    shock.mat.opacity = 0.7 * (1 - t);
    burst.mat.opacity = 1 - t;
    burst.life = t;
    target.position.lerpVectors(kbStart, kbEnd, t);
    await wait(25);
  }

  shock.mesh.visible = false;
  burst.mesh.visible = false;

  const dmg = 15 + Math.floor(Math.random() * 5);
  if (isPlayer) {
    state.enemyHP = Math.max(0, state.enemyHP - dmg);
    state.ultCharge = Math.min(100, state.ultCharge + 20);
    updateHP(); updateUltBar();
  } else {
    state.playerHP = Math.max(0, state.playerHP - dmg);
    updateHP();
  }

  lerpCam(CAM.fight.pos, CAM.fight.target, 0.04);
  state.inputLocked = false;
  updateEnergy();
}

async function skySlam(isPlayer) {
  if (state.inputLocked) return;
  state.inputLocked = true;
  const attacker = isPlayer ? player : enemy;
  const target = isPlayer ? enemy : player;
  const shock = isPlayer ? playerShockwave : enemyShockwave;
  const burst = isPlayer ? playerBurst : enemyBurst;

  if (isPlayer && state.energy < 1) { state.inputLocked = false; return; }
  if (isPlayer) { state.energy--; updateEnergy(); }

  sfxCharge();

  // Jump up
  const startPos = attacker.position.clone();
  const peakPos = startPos.clone();
  peakPos.y = 20;

  // Camera: aerial view
  lerpCam(CAM.aerial.pos, CAM.aerial.target, 0.05);

  for (let i = 0; i < 30; i++) {
    const t = i / 30;
    const eased = 1 - Math.pow(1 - t, 2);
    attacker.position.y = startPos.y + (peakPos.y - startPos.y) * eased;
    if (t > 0.8) shakeCamera(0.05);
    await wait(20);
  }

  setSlowMo(true);
  await wait(500);

  // Aura flash at peak
  attacker.userData.auraMat.opacity = 0.3;
  attacker.userData.aura.scale.setScalar(2);
  await wait(200);
  attacker.userData.auraMat.opacity = 0;
  attacker.userData.aura.scale.setScalar(1);

  setSlowMo(false);

  // Slam down
  const slamTarget = target.position.clone();
  slamTarget.y = 0;

  sfxWhoosh();

  for (let i = 0; i < 15; i++) {
    const t = i / 15;
    const eased = t * t;
    attacker.position.y = peakPos.y + (slamTarget.y - peakPos.y) * eased;
    await wait(16);
  }

  // Big impact
  sfxExplosion();
  flashScreen(300);
  shakeCamera(1.2);

  attacker.position.y = 0;

  // Camera: side view
  lerpCam(CAM.sideLeft.pos, CAM.sideLeft.target, 0.08);

  // Massive shockwave
  const impactPos = attacker.position.clone();
  impactPos.y = 0.1;
  shock.mesh.position.copy(impactPos);
  shock.mesh.visible = true;
  shock.mesh.scale.set(0.1, 0.1, 0.1);
  shock.mat.opacity = 1;

  // Burst
  burst.mesh.position.copy(impactPos);
  burst.mesh.position.y = 1;
  burst.mesh.visible = true;
  burst.life = 0;
  const positions = burst.mesh.geometry.attributes.position.array;
  for (let i = 0; i < burst.velocities.length; i++) {
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = 0;
    burst.velocities[i].set(
      (Math.random() - 0.5) * 12,
      Math.random() * 10 + 2,
      (Math.random() - 0.5) * 12
    );
  }
  burst.mesh.geometry.attributes.position.needsUpdate = true;

  // Knockback
  const kbDir = target.position.clone().sub(attacker.position).normalize();
  const kbStart = target.position.clone();
  const kbEnd = kbStart.clone().add(kbDir.multiplyScalar(5));

  for (let i = 0; i < 40; i++) {
    const t = i / 40;
    shock.mesh.scale.setScalar(1 + t * 20);
    shock.mat.opacity = 1 * (1 - t);
    burst.mat.opacity = 1 - t;
    burst.life = t;
    if (t < 0.5) target.position.lerpVectors(kbStart, kbEnd, t * 2);
    await wait(25);
  }

  shock.mesh.visible = false;
  burst.mesh.visible = false;

  const dmg = 18 + Math.floor(Math.random() * 7);
  if (isPlayer) {
    state.enemyHP = Math.max(0, state.enemyHP - dmg);
    state.ultCharge = Math.min(100, state.ultCharge + 25);
    updateHP(); updateUltBar();
  } else {
    state.playerHP = Math.max(0, state.playerHP - dmg);
    updateHP();
  }

  lerpCam(CAM.fight.pos, CAM.fight.target, 0.04);
  state.inputLocked = false;
  updateEnergy();
}

async function ultimatePower(isPlayer) {
  if (state.inputLocked) return;
  state.inputLocked = true;
  const attacker = isPlayer ? player : enemy;
  const target = isPlayer ? enemy : player;

  if (isPlayer && !state.ultReady) { state.inputLocked = false; return; }
  if (isPlayer) {
    state.ultReady = false;
    state.ultCharge = 0;
    updateUltBar(); updateEnergy();
  }

  sfxUltimateBuild();

  // Darken screen
  $slowMoOverlay.style.background = 'rgba(0,0,0,0.4)';
  $slowMoOverlay.classList.add('active');

  // Camera: 360 spin around player
  const spinCenter = attacker.position.clone();
  spinCenter.y = 2;

  // Build aura
  attacker.userData.auraMat.opacity = 0;
  attacker.userData.aura.scale.setScalar(1);

  for (let i = 0; i < 60; i++) {
    const t = i / 60;
    const angle = t * Math.PI * 2;
    const radius = 6 - t * 2;
    const camY = 2 + Math.sin(t * Math.PI) * 3;

    camPos.set(
      spinCenter.x + Math.cos(angle) * radius,
      camY,
      spinCenter.z + Math.sin(angle) * radius
    );
    camTarget.copy(spinCenter);
    camera.position.copy(camPos);
    camera.lookAt(camTarget);

    attacker.userData.auraMat.opacity = t * 0.4;
    attacker.userData.aura.scale.setScalar(1 + t * 2);
    attacker.userData.auraMat.color.set(t > 0.5 ? 0xffcc00 : (isPlayer ? 0xff6600 : 0x0088ff));

    await wait(30);
  }

  // Full aura
  attacker.userData.auraMat.opacity = 0.5;
  attacker.userData.aura.scale.setScalar(3);

  sfxExplosion();

  // Release
  flashScreen(400);
  shakeCamera(1.5);
  $slowMoOverlay.style.background = 'rgba(0,0,0,0)';
  $slowMoOverlay.classList.remove('active');

  // Massive burst
  ultimateBurst.mesh.position.copy(attacker.position);
  ultimateBurst.mesh.position.y = 2;
  ultimateBurst.mesh.visible = true;
  ultimateBurst.life = 0;
  const positions = ultimateBurst.mesh.geometry.attributes.position.array;
  for (let i = 0; i < ultimateBurst.velocities.length; i++) {
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = 0;
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 10;
    ultimateBurst.velocities[i].set(
      Math.cos(angle) * speed,
      Math.random() * 8 + 2,
      Math.sin(angle) * speed
    );
  }
  ultimateBurst.mesh.geometry.attributes.position.needsUpdate = true;

  // Shockwave
  const shock = isPlayer ? playerShockwave : enemyShockwave;
  shock.mesh.position.copy(attacker.position);
  shock.mesh.position.y = 0.1;
  shock.mesh.visible = true;
  shock.mesh.scale.set(0.1, 0.1, 0.1);
  shock.mat.opacity = 1;
  shock.mat.color.set(0xffcc00);

  // Camera: dramatic far shot
  lerpCam(CAM.introWide.pos, CAM.introWide.target, 0.06);

  // Knockback target hard
  const kbDir = target.position.clone().sub(attacker.position).normalize();
  const kbStart = target.position.clone();
  const kbEnd = kbStart.clone().add(kbDir.multiplyScalar(8));
  kbEnd.y = 0;

  setSlowMo(true);

  for (let i = 0; i < 60; i++) {
    const t = i / 60;
    shock.mesh.scale.setScalar(1 + t * 30);
    shock.mat.opacity = 1 * (1 - t);
    ultimateBurst.mat.opacity = 1 - t * t;
    ultimateBurst.life = t;
    if (t < 0.4) target.position.lerpVectors(kbStart, kbEnd, t / 0.4);
    await wait(30);
  }

  setSlowMo(false);
  shock.mesh.visible = false;
  ultimateBurst.mesh.visible = false;
  shock.mat.color.set(isPlayer ? 0xff6600 : 0x0088ff);

  attacker.userData.auraMat.opacity = 0;
  attacker.userData.aura.scale.setScalar(1);

  const dmg = 35 + Math.floor(Math.random() * 10);
  if (isPlayer) {
    state.enemyHP = Math.max(0, state.enemyHP - dmg);
    updateHP();
  } else {
    state.playerHP = Math.max(0, state.playerHP - dmg);
    updateHP();
  }

  lerpCam(CAM.fight.pos, CAM.fight.target, 0.04);
  state.inputLocked = false;
  updateEnergy();
}

/* ========== AI SYSTEM ========== */
let aiTimer = 0;
let aiNextAttack = 2500 + Math.random() * 2000;

function updateAI(dt) {
  if (state.phase !== 'fight' || state.inputLocked) return;
  aiTimer += dt;
  if (aiTimer > aiNextAttack) {
    aiTimer = 0;
    aiNextAttack = 2000 + Math.random() * 3000;
    // Pick random attack
    const attacks = [energyBlast, dashStrike, skySlam];
    // Sometimes use ultimate if HP low
    if (state.enemyHP < 30 && Math.random() > 0.5) {
      ultimatePower(false);
    } else {
      const pick = attacks[Math.floor(Math.random() * attacks.length)];
      pick(false);
    }
  }

  // Subtle idle movement
  const time = performance.now() * 0.001;
  enemy.position.x = ENEMY_START.x + Math.sin(time * 0.5) * 0.3;
}

/* ========== ENERGY REGEN ========== */
let regenTimer = 0;
function updateRegen(dt) {
  if (state.phase !== 'fight') return;
  regenTimer += dt;
  if (regenTimer > 2000) {
    regenTimer = 0;
    if (state.energy < state.maxEnergy) {
      state.energy++;
      updateEnergy();
    }
  }
}

/* ========== CHECK WIN/LOSE ========== */
function checkEnd() {
  if (state.phase !== 'fight') return;
  if (state.enemyHP <= 0) {
    endGame(true);
  } else if (state.playerHP <= 0) {
    endGame(false);
  }
}

function endGame(victory) {
  state.phase = 'end';
  state.inputLocked = true;

  setTimeout(() => {
    $hud.classList.remove('visible');
    $powerBar.classList.remove('visible');
    $endTitle.textContent = victory ? 'Victory' : 'Defeat';
    $endTitle.className = 'end-title ' + (victory ? 'victory' : 'defeat');
    $endSub.textContent = victory ? 'Power has decided everything.' : 'The battle is over...';
    $endScreen.classList.add('visible');
  }, 1500);
}

/* ========== INTRO SEQUENCE ========== */
async function playIntro() {
  state.phase = 'intro';
  $blackOverlay.classList.remove('fade-out');

  await wait(500);

  // Fade in
  $blackOverlay.classList.add('fade-out');
  await wait(1500);

  sfxWind();

  // Wide establishing shot
  camPos.copy(CAM.introWide.pos);
  camTarget.copy(CAM.introWide.target);
  camera.position.copy(camPos);
  camera.lookAt(camTarget);

  await wait(2000);

  // Pan across
  lerpCam(CAM.introPan.pos, CAM.introPan.target, 0.02);
  await wait(3000);

  // Dialogue 1
  await showDialogue('This is where we fight...', 'Deep Voice', 3000);
  await wait(500);

  // Zoom toward fighters
  lerpCam(CAM.introZoom.pos, CAM.introZoom.target, 0.03);
  await wait(2000);

  await showDialogue('Where power decides everything.', 'Deep Voice', 3500);
  await wait(800);

  // Close-up alternating
  lerpCam(CAM.behindPlayer.pos, CAM.behindPlayer.target, 0.05);
  await wait(1500);
  lerpCam(CAM.behindEnemy.pos, CAM.behindEnemy.target, 0.05);
  await wait(1500);

  // Dramatic pull back
  lerpCam(CAM.fight.pos, CAM.fight.target, 0.03);
  await wait(1000);

  sfxMusic();

  await showDialogue('Show me what you\'ve got.', 'Enemy', 2500);
  await wait(500);

  // Transition to fight
  $hud.classList.add('visible');
  $powerBar.classList.add('visible');
  updateHP();
  updateEnergy();
  updateUltBar();

  state.phase = 'fight';
}

/* ========== INPUT ========== */
document.addEventListener('keydown', (e) => {
  if (state.phase !== 'fight' || state.inputLocked) return;
  switch (e.key) {
    case '1': energyBlast(true); break;
    case '2': dashStrike(true); break;
    case '3': skySlam(true); break;
    case '4': ultimatePower(true); break;
  }
});

 $powerBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.phase !== 'fight' || state.inputLocked) return;
    const power = btn.dataset.power;
    switch (power) {
      case 'energyBlast': energyBlast(true); break;
      case 'dashStrike': dashStrike(true); break;
      case 'skySlam': skySlam(true); break;
      case 'ultimate': ultimatePower(true); break;
    }
  });
});

/* ========== START GAME ========== */
document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  $startScreen.classList.add('hidden');
  setTimeout(() => {
    $startScreen.style.display = 'none';
    playIntro();
  }, 1500);
});

document.getElementById('restartBtn').addEventListener('click', () => {
  location.reload();
});

/* ========== ANIMATION LOOP ========== */
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const rawDelta = clock.getDelta();
  const dt = rawDelta * 1000 * state.slowMo; // Scaled by slow-mo
  const elapsed = clock.elapsedTime;

  // Update clouds
  clouds.forEach(c => {
    c.mesh.position.x += c.speed * rawDelta;
    if (c.mesh.position.x > 120) c.mesh.position.x = -120;
  });

  // Update dust particles
  const dPos = dustParticles.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    dPos[i * 3] += dustVelocities[i].x * rawDelta;
    dPos[i * 3 + 1] += dustVelocities[i].y * rawDelta;
    dPos[i * 3 + 2] += dustVelocities[i].z * rawDelta;
    // Wrap around
    if (Math.abs(dPos[i * 3]) > 40) dPos[i * 3] *= -0.9;
    if (dPos[i * 3 + 1] > 15 || dPos[i * 3 + 1] < 0) dustVelocities[i].y *= -1;
    if (Math.abs(dPos[i * 3 + 2]) > 40) dPos[i * 3 + 2] *= -0.9;
  }
  dustParticles.geometry.attributes.position.needsUpdate = true;

  // Tree sway
  treeMeshes.forEach((tree, i) => {
    tree.rotation.z = Math.sin(elapsed * 0.8 + i) * 0.02;
    tree.rotation.x = Math.sin(elapsed * 0.6 + i * 0.5) * 0.01;
  });

  // Character idle animation
  if (state.phase === 'fight' || state.phase === 'intro') {
    [player, enemy].forEach((char, ci) => {
      const offset = ci * Math.PI;
      char.userData.armL.rotation.x = Math.sin(elapsed * 1.5 + offset) * 0.1;
      char.userData.armR.rotation.x = Math.sin(elapsed * 1.5 + offset + 1) * 0.1;
      char.userData.legL.rotation.x = Math.sin(elapsed * 1.2 + offset) * 0.05;
      char.userData.legR.rotation.x = Math.sin(elapsed * 1.2 + offset + Math.PI) * 0.05;
      char.position.y = Math.sin(elapsed * 2 + offset) * 0.05;
    });
  }

  // Update burst particles
  [playerBurst, enemyBurst, ultimateBurst].forEach(burst => {
    if (burst.mesh.visible && burst.life < 1) {
      const pos = burst.mesh.geometry.attributes.position.array;
      for (let i = 0; i < burst.velocities.length; i++) {
        pos[i * 3] += burst.velocities[i].x * rawDelta * 2;
        pos[i * 3 + 1] += burst.velocities[i].y * rawDelta * 2;
        pos[i * 3 + 2] += burst.velocities[i].z * rawDelta * 2;
        burst.velocities[i].y -= 9.8 * rawDelta; // gravity
      }
      burst.mesh.geometry.attributes.position.needsUpdate = true;
    }
  });

  // Camera smooth follow (only when not in cinematic)
  if (state.phase === 'fight' && !state.inputLocked) {
    lerpCam(CAM.fight.pos, CAM.fight.target, 0.04);
  }

  // Camera shake
  if (state.shakeIntensity > 0) {
    camera.position.x += (Math.random() - 0.5) * state.shakeIntensity * 0.5;
    camera.position.y += (Math.random() - 0.5) * state.shakeIntensity * 0.3;
    camera.position.z += (Math.random() - 0.5) * state.shakeIntensity * 0.2;
    state.shakeIntensity *= 0.9;
    if (state.shakeIntensity < 0.01) state.shakeIntensity = 0;
  }

  // AI
  updateAI(dt);
  // Regen
  updateRegen(dt);
  // Check end
  checkEnd();

  renderer.render(scene, camera);
}

/* ========== RESIZE ========== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ========== INIT ========== */
camPos.copy(CAM.introWide.pos);
camTarget.copy(CAM.introWide.target);
animate();
</script>
