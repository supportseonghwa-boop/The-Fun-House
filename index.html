<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fun House – Chapter 1</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blood:#8B0000;--blood-bright:#FF2222;--dark:#0a0606;--dim:#1a1010;
  --text:#c8b0a0;--green:#00ff66;--yellow:#ffcc00;
}
body{background:var(--dark);overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--text);cursor:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

/* Title Screen */
#title-screen{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dark)}
#title-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(139,0,0,0.15),transparent 70%)}
#title-screen h1{font-family:'Creepster',cursive;font-size:clamp(3rem,8vw,6rem);color:var(--blood-bright);text-shadow:0 0 40px rgba(255,0,0,0.4),0 0 80px rgba(139,0,0,0.3);letter-spacing:0.05em;position:relative;z-index:1;animation:titlePulse 4s ease-in-out infinite}
#title-screen .subtitle{font-size:clamp(0.8rem,2vw,1.1rem);color:#664444;margin-top:0.5rem;letter-spacing:0.3em;text-transform:uppercase;position:relative;z-index:1}
#title-screen .play-btn{margin-top:3rem;padding:1rem 3rem;background:transparent;border:2px solid var(--blood);color:var(--blood-bright);font-family:'Share Tech Mono',monospace;font-size:1.1rem;cursor:pointer;letter-spacing:0.2em;text-transform:uppercase;transition:all 0.3s;position:relative;z-index:1}
#title-screen .play-btn:hover{background:var(--blood);box-shadow:0 0 30px rgba(139,0,0,0.5);transform:scale(1.05)}
#title-screen .controls-hint{position:absolute;bottom:2rem;font-size:0.7rem;color:#443333;text-align:center;line-height:1.8}
@keyframes titlePulse{0%,100%{opacity:1;filter:brightness(1)}50%{opacity:0.85;filter:brightness(0.8)}}

/* VHS Overlay */
#vhs-overlay{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;transition:opacity 0.3s}
#vhs-overlay.active{opacity:1}
.vhs-line{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,0.03);animation:scanline 8s linear infinite}
.vhs-noise{position:absolute;inset:0;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:overlay}
.vhs-bar{position:absolute;left:0;right:0;height:60px;background:rgba(255,255,255,0.02);animation:vhsBar 4s ease-in-out infinite}
@keyframes scanline{0%{top:-2px}100%{top:100%}}
@keyframes vhsBar{0%,100%{top:-60px;opacity:0}10%{opacity:1}90%{opacity:1}95%{top:calc(100% + 60px);opacity:0}}

/* HUD */
#hud{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;transition:opacity 0.5s}
#hud.active{opacity:1}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border:1px solid rgba(200,176,160,0.5);border-radius:50%}
#battery-bar{position:absolute;bottom:30px;left:30px;display:flex;align-items:center;gap:8px}
#battery-bar i{color:var(--yellow);font-size:0.9rem}
#battery-track{width:100px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
#battery-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s,background 0.3s}
#stamina-bar{position:absolute;bottom:52px;left:30px;display:flex;align-items:center;gap:8px}
#stamina-bar i{color:#4488ff;font-size:0.8rem}
#stamina-track{width:80px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
#stamina-fill{height:100%;background:#4488ff;border-radius:2px;transition:width 0.2s}
#sanity-bar{position:absolute;top:30px;right:30px;display:flex;align-items:center;gap:8px}
#sanity-bar i{color:var(--blood-bright);font-size:0.8rem}
#sanity-track{width:80px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
#sanity-fill{height:100%;background:var(--blood-bright);border-radius:2px;transition:width 0.5s}
#interact-prompt{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);font-size:0.85rem;color:var(--text);background:rgba(0,0,0,0.6);padding:6px 16px;border-radius:4px;border:1px solid rgba(200,176,160,0.15);opacity:0;transition:opacity 0.2s;white-space:nowrap}
#interact-prompt.visible{opacity:1}
#area-name{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-family:'Creepster',cursive;font-size:1.5rem;color:var(--blood-bright);text-shadow:0 0 20px rgba(139,0,0,0.5);opacity:0;transition:opacity 1s;letter-spacing:0.1em}
#area-name.visible{opacity:1}

/* Inventory */
#inventory-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.inv-slot{width:56px;height:56px;background:rgba(10,6,6,0.8);border:1px solid rgba(139,0,0,0.3);border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative;pointer-events:auto;cursor:pointer;transition:all 0.2s}
.inv-slot:hover{border-color:var(--blood-bright);background:rgba(139,0,0,0.15)}
.inv-slot.has-item{border-color:rgba(139,0,0,0.6)}
.inv-slot .item-icon{font-size:1.4rem}
.inv-slot .slot-num{position:absolute;top:2px;left:4px;font-size:0.55rem;color:#444}
.inv-slot.selected{border-color:var(--blood-bright);box-shadow:0 0 10px rgba(139,0,0,0.4)}

/* Note Modal */
#note-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.85)}
#note-modal.active{display:flex}
#note-content{max-width:500px;padding:2.5rem;background:linear-gradient(135deg,#1a1410,#0f0a08);border:1px solid rgba(139,0,0,0.3);border-radius:8px;position:relative}
#note-content h3{font-family:'Creepster',cursive;color:var(--blood-bright);font-size:1.3rem;margin-bottom:1rem}
#note-content p{font-size:0.85rem;line-height:1.8;color:#998877}
#note-content .close-note{position:absolute;top:10px;right:14px;color:#554444;font-size:0.7rem;cursor:pointer;pointer-events:auto}
#note-content .close-note:hover{color:var(--text)}

/* Keypad Modal */
#keypad-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.85)}
#keypad-modal.active{display:flex}
#keypad-box{background:linear-gradient(135deg,#1a1410,#0f0a08);border:1px solid rgba(139,0,0,0.4);border-radius:8px;padding:1.5rem;width:280px;text-align:center}
#keypad-box h3{font-family:'Creepster',cursive;color:var(--blood-bright);margin-bottom:1rem;font-size:1.1rem}
#keypad-display{background:#050505;border:1px solid #333;border-radius:4px;height:40px;line-height:40px;font-size:1.4rem;letter-spacing:0.4em;color:var(--green);margin-bottom:1rem}
#keypad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.keypad-btn{padding:12px;background:#111;border:1px solid #333;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:1.1rem;cursor:pointer;border-radius:4px;transition:all 0.15s;pointer-events:auto}
.keypad-btn:hover{background:#1a1010;border-color:var(--blood)}
.keypad-btn:active{transform:scale(0.95)}
.keypad-btn.clear{color:var(--blood-bright)}
.keypad-btn.enter{background:rgba(139,0,0,0.2);border-color:var(--blood);color:var(--blood-bright)}
#keypad-feedback{font-size:0.75rem;min-height:1.2em;color:var(--blood-bright)}

/* Glitch effect */
.glitch-text{animation:glitch 0.3s ease-in-out}
@keyframes glitch{0%{transform:translate(0);filter:hue-rotate(0)}20%{transform:translate(-3px,1px);filter:hue-rotate(90deg)}40%{transform:translate(3px,-1px);filter:hue-rotate(-90deg)}60%{transform:translate(-1px,3px)}80%{transform:translate(1px,-3px);filter:hue-rotate(45deg)}100%{transform:translate(0);filter:hue-rotate(0)}}

/* Danger vignette */
#danger-vignette{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:0;transition:opacity 0.5s;background:radial-gradient(ellipse at center,transparent 40%,rgba(139,0,0,0.4) 100%)}
#danger-vignette.active{opacity:1}

/* Jumpscare */
#jumpscare{position:fixed;inset:0;z-index:600;display:none;align-items:center;justify-content:center;background:#000}
#jumpscare.active{display:flex;animation:jumpFlash 0.5s ease-out}
#jumpscare canvas{width:100%;height:100%}
@keyframes jumpFlash{0%{opacity:0;filter:brightness(5)}15%{opacity:1;filter:brightness(3)}100%{opacity:1;filter:brightness(1)}}

/* Loading */
#loading{position:fixed;inset:0;z-index:2000;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s}
#loading.hidden{opacity:0;pointer-events:none}
#loading .spinner{width:40px;height:40px;border:2px solid #222;border-top-color:var(--blood);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1.5rem}
#loading p{color:#444;font-size:0.8rem;letter-spacing:0.2em}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pause overlay */
#pause-overlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);cursor:pointer}
#pause-overlay.active{display:flex}
#pause-overlay p{color:#666;font-size:1rem;letter-spacing:0.2em}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:0s!important;transition-duration:0s!important}
}
</style>
</head>

<!-- Loading -->
<div id="loading"><div class="spinner"></div><p>ENTERING THE FUN HOUSE</p></div>

<!-- Title Screen -->
<div id="title-screen">
  <h1>THE FUN HOUSE</h1>
  <div class="subtitle">Chapter 1 &mdash; Awakening</div>
  <button class="play-btn" id="play-btn">ENTER</button>
  <div class="controls-hint">
    WASD &mdash; Move &nbsp;|&nbsp; MOUSE &mdash; Look &nbsp;|&nbsp; SHIFT &mdash; Sprint &nbsp;|&nbsp; CTRL &mdash; Crouch<br>

<!-- Note Modal -->
<div id="note-modal"><div id="note-content"><span class="close-note">ESC to close</span><h3 id="note-title"></h3><p id="note-body"></p></div></div>

<!-- Keypad Modal -->
<div id="keypad-modal">

    <div id="keypad-display">_ _ _ _</div>

      <button class="keypad-btn" data-val="6">6</button>
      <button class="keypad-btn" data-val="7">7</button>
      <button class="keypad-btn" data-val="8">8</button>
      <button class="keypad-btn" data-val="9">9</button>
      <button class="keypad-btn clear" data-val="C">CLR</button>
      <button class="keypad-btn" data-val="0">0</button>
      <button class="keypad-btn enter" data-val="E">ENT</button>
    </div>
    <div id="keypad-feedback"></div>
  </div>
</div>

<!-- Jumpscare -->
<div id="jumpscare"><canvas id="scare-canvas"></canvas></div>

<!-- Pause -->
<div id="pause-overlay"><p>CLICK TO RESUME</p></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================
// 常量与配置
// ============================================
const PLAYER_HEIGHT = 1.7;
const CROUCH_HEIGHT = 0.9;
const EYE_OFFSET = 0.15;
const MOVE_SPEED = 3.2;
const SPRINT_SPEED = 5.5;
const CROUCH_SPEED = 1.8;
const MOUSE_SENS = 0.002;
const BOB_SPEED = 10;
const BOB_AMOUNT = 0.04;
const BATTERY_DRAIN = 1.8; // 每秒消耗百分比
const INTERACT_DIST = 2.5;
const GRAVITY = 20;
const CELL = 4;

// ============================================
// 纹理生成器 — 全程程序化 PBR 纹理
// ============================================
class TextureGen {
  static canvas(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    return { canvas: c, ctx: c.getContext('2d') };
  }

  // 墙壁纹理：剥落油漆 + 水渍 + 划痕
  static wall(opts = {}) {
    const S = 512, { canvas, ctx } = this.canvas(S);
    const base = opts.color || '#3a2820';
    // 基底色
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, S, S);
    // 噪声层
    for (let i = 0; i < 8000; i++) {
      const x = Math.random() * S, y = Math.random() * S;
      const b = Math.random() * 30 - 15;
      ctx.fillStyle = `rgba(${128 + b},${100 + b},${80 + b},0.15)`;
      ctx.fillRect(x, y, Math.random() * 3 + 1, Math.random() * 3 + 1);
    }
    // 水渍（从顶部流下）
    for (let s = 0; s < 3; s++) {
      const sx = Math.random() * S;
      const grad = ctx.createLinearGradient(sx, 0, sx + (Math.random() - 0.5) * 40, S * (0.5 + Math.random() * 0.4));
      grad.addColorStop(0, 'rgba(20,15,10,0.3)');
      grad.addColorStop(0.5, 'rgba(30,25,18,0.2)');
      grad.addColorStop(1, 'rgba(20,15,10,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(sx, S * 0.3, 15 + Math.random() * 20, S * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // 剥落油漆斑块
    for (let p = 0; p < 6; p++) {
      const px = Math.random() * S, py = Math.random() * S, pr = 20 + Math.random() * 40;
      ctx.save();
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 2; a += 0.3) {
        const r = pr + Math.random() * pr * 0.4;
        ctx.lineTo(px + Math.cos(a) * r, py + Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.clip();
      ctx.fillStyle = opts.underColor || '#2a1a14';
      ctx.fillRect(px - pr - 10, py - pr - 10, pr * 2 + 20, pr * 2 + 20);
      ctx.restore();
    }
    // 划痕
    ctx.strokeStyle = 'rgba(60,45,35,0.4)';
    for (let s = 0; s < 8; s++) {
      ctx.lineWidth = Math.random() * 1.5 + 0.5;
      ctx.beginPath();
      ctx.moveTo(Math.random() * S, Math.random() * S);
      ctx.lineTo(Math.random() * S, Math.random() * S);
      ctx.stroke();
    }
    // 暗角（AO 模拟）
    const vg = ctx.createRadialGradient(S / 2, S / 2, S * 0.2, S / 2, S / 2, S * 0.7);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.25)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, S, S);

    const colorMap = new THREE.CanvasTexture(canvas);
    colorMap.wrapS = colorMap.wrapT = THREE.RepeatWrapping;

    // 法线贴图
    const { canvas: nc, ctx: nctx } = this.canvas(S);
    nctx.fillStyle = '#8080ff';
    nctx.fillRect(0, 0, S, S);
    for (let i = 0; i < 3000; i++) {
      const x = Math.random() * S, y = Math.random() * S;
      const dx = (Math.random() - 0.5) * 30, dy = (Math.random() - 0.5) * 30;
      const r = 128 + dx | 0, g = 128 + dy | 0;
      nctx.fillStyle = `rgb(${r},${g},128)`;
      nctx.fillRect(x, y, Math.random() * 4 + 1, Math.random() * 4 + 1);
    }
    // 剥落区域的法线偏移
    for (let p = 0; p < 6; p++) {
      const px = Math.random() * S, py = Math.random() * S, pr = 20 + Math.random() * 30;
      nctx.fillStyle = 'rgba(90,100,160,0.3)';
      nctx.beginPath();
      nctx.arc(px, py, pr, 0, Math.PI * 2);
      nctx.fill();
    }
    const normalMap = new THREE.CanvasTexture(nc);
    normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;

    // 粗糙度贴图
    const { canvas: rc, ctx: rctx } = this.canvas(S);
    rctx.fillStyle = '#888888';
    rctx.fillRect(0, 0, S, S);
    for (let i = 0; i < 4000; i++) {
      const v = 100 + Math.random() * 80;
      rctx.fillStyle = `rgb(${v | 0},${v | 0},${v | 0})`;
      rctx.fillRect(Math.random() * S, Math.random() * S, Math.random() * 3 + 1, Math.random() * 3 + 1);
    }
    // 水渍区域更光滑
    for (let s = 0; s < 2; s++) {
      rctx.fillStyle = 'rgba(160,160,160,0.3)';
      rctx.beginPath();
      rctx.ellipse(Math.random() * S, S * 0.3, 30, S * 0.3, 0, 0, Math.PI * 2);
      rctx.fill();
    }
    const roughnessMap = new THREE.CanvasTexture(rc);
    roughnessMap.wrapS = roughnessMap.wrapT = THREE.RepeatWrapping;

    return { colorMap, normalMap, roughnessMap };
  }

  // 地板纹理：旧木板
  static floor() {
    const S = 512, { canvas, ctx } = this.canvas(S);
    const plankW = S / 6;
    for (let p = 0; p < 6; p++) {
      const x = p * plankW;
      const base = 35 + Math.random() * 15;
      ctx.fillStyle = `rgb(${base + 20},${base + 10},${base})`;
      ctx.fillRect(x, 0, plankW - 1, S);
      // 木纹
      for (let l = 0; l < 20; l++) {
        const ly = Math.random() * S;
        ctx.strokeStyle = `rgba(${base + 10},${base},${base - 5},0.3)`;
        ctx.lineWidth = Math.random() * 1.5 + 0.3;
        ctx.beginPath();
        ctx.moveTo(x, ly);
        let cx = x;
        while (cx < x + plankW) {
          cx += 10;
          ctx.lineTo(cx, ly + (Math.random() - 0.5) * 4);
        }
        ctx.stroke();
      }
      // 缝隙
      ctx.fillStyle = 'rgba(10,8,5,0.8)';
      ctx.fillRect(x + plankW - 1, 0, 2, S);
      // 污垢
      for (let d = 0; d < 200; d++) {
        const v = Math.random() * 20;
        ctx.fillStyle = `rgba(${v},${v},${v},0.15)`;
        ctx.fillRect(x + Math.random() * plankW, Math.random() * S, Math.random() * 4 + 1, Math.random() * 4 + 1);
      }
    }
    // 暗角
    const vg = ctx.createRadialGradient(S / 2, S / 2, S * 0.15, S / 2, S / 2, S * 0.7);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, S, S);

    const colorMap = new THREE.CanvasTexture(canvas);
    colorMap.wrapS = colorMap.wrapT = THREE.RepeatWrapping;

    // 法线
    const { canvas: nc, ctx: nctx } = this.canvas(S);
    nctx.fillStyle = '#8080ff';
    nctx.fillRect(0, 0, S, S);
    for (let p = 0; p < 6; p++) {
      for (let l = 0; l < 15; l++) {
        const ly = Math.random() * S;
        nctx.strokeStyle = `rgb(${115 + Math.random() * 30 | 0},${128},${125 + Math.random() * 20 | 0})`;
        nctx.lineWidth = 0.8;
        nctx.beginPath();
        nctx.moveTo(p * plankW, ly);
        for (let cx = p * plankW; cx < (p + 1) * plankW; cx += 8) {
          nctx.lineTo(cx, ly + (Math.random() - 0.5) * 2);
        }
        nctx.stroke();
      }
      // 板间缝隙法线
      nctx.fillStyle = 'rgba(60,80,180,0.5)';
      nctx.fillRect(p * plankW + plankW - 1, 0, 2, S);
    }
    const normalMap = new THREE.CanvasTexture(nc);
    normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;

    // 粗糙度
    const { canvas: rc, ctx: rctx } = this.canvas(S);
    rctx.fillStyle = '#777777';
    rctx.fillRect(0, 0, S, S);
    for (let i = 0; i < 5000; i++) {
      const v = 90 + Math.random() * 60;
      rctx.fillStyle = `rgb(${v | 0},${v | 0},${v | 0})`;
      rctx.fillRect(Math.random() * S, Math.random() * S, 2, 2);
    }
    const roughnessMap = new THREE.CanvasTexture(rc);
    roughnessMap.wrapS = roughnessMap.wrapT = THREE.RepeatWrapping;

    return { colorMap, normalMap, roughnessMap };
  }

  // 天花板纹理
  static ceiling() {
    const S = 512, { canvas, ctx } = this.canvas(S);
    ctx.fillStyle = '#1a1512';
    ctx.fillRect(0, 0, S, S);
    // 水渍斑点
    for (let i = 0; i < 12; i++) {
      const x = Math.random() * S, y = Math.random() * S, r = 15 + Math.random() * 35;
      ctx.fillStyle = `rgba(25,20,16,${0.3 + Math.random() * 0.3})`;
      ctx.beginPath();
      ctx.ellipse(x, y, r, r * (0.6 + Math.random() * 0.4), Math.random() * Math.PI, 0, Math.PI * 2);
      ctx.fill();
    }
    // 裂纹
    ctx.strokeStyle = 'rgba(10,8,5,0.5)';
    ctx.lineWidth = 1;
    for (let c = 0; c < 4; c++) {
      ctx.beginPath();
      let cx = Math.random() * S, cy = Math.random() * S;
      ctx.moveTo(cx, cy);
      for (let s = 0; s < 8; s++) {
        cx += (Math.random() - 0.5) * 60;
        cy += (Math.random() - 0.5) * 60;
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    }
    const colorMap = new THREE.CanvasTexture(canvas);
    colorMap.wrapS = colorMap.wrapT = THREE.RepeatWrapping;
    const nm = this._flatNormal();
    const rm = this._flatRoughness(0.95);
    return { colorMap, normalMap: nm, roughnessMap: rm };
  }

  // 金属纹理
  static metal() {
    const S = 256, { canvas, ctx } = this.canvas(S);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, S, S);
    // 锈迹
    for (let i = 0; i < 15; i++) {
      const x = Math.random() * S, y = Math.random() * S, r = 5 + Math.random() * 20;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, 'rgba(120,50,20,0.5)');
      grad.addColorStop(1, 'rgba(60,30,10,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x - r, y - r, r * 2, r * 2);
    }
    // 刮痕
    ctx.strokeStyle = 'rgba(80,80,80,0.3)';
    for (let i = 0; i < 10; i++) {
      ctx.lineWidth = Math.random() + 0.3;
      ctx.beginPath();
      ctx.moveTo(Math.random() * S, Math.random() * S);
      ctx.lineTo(Math.random() * S, Math.random() * S);
      ctx.stroke();
    }
    const colorMap = new THREE.CanvasTexture(canvas);
    const nm = this._flatNormal(0.5);
    const rm = this._flatRoughness(0.5);
    return { colorMap, normalMap: nm, roughnessMap: rm };
  }

  static _flatNormal(intensity = 0.1) {
    const S = 128, { canvas, ctx } = this.canvas(S);
    const v = 128 + (Math.random() - 0.5) * intensity * 255;
    ctx.fillStyle = `rgb(${v | 0},${v | 0},128)`;
    ctx.fillRect(0, 0, S, S);
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
  }

  static _flatRoughness(val = 0.8) {
    const S = 64, { canvas, ctx } = this.canvas(S);
    const v = val * 255 | 0;
    ctx.fillStyle = `rgb(${v},${v},${v})`;
    ctx.fillRect(0, 0, S, S);
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
  }

  // 发光纹理（霓虹灯）
  static emissive(color = '#ff2200') {
    const S = 64, { canvas, ctx } = this.canvas(S);
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, S, S);
    const vg = ctx.createRadialGradient(S / 2, S / 2, 0, S / 2, S / 2, S / 2);
    vg.addColorStop(0, 'rgba(255,255,255,0.3)');
    vg.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, S, S);
    return new THREE.CanvasTexture(canvas);
  }
}

// ============================================
// 音频系统 — Web Audio API 程序化音效
// ============================================
class AudioSystem {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.ambients = [];
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.7;
    this.masterGain.connect(this.ctx.destination);
    this.initialized = true;
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  // 低频隆隆声
  startDrone() {
    if (!this.initialized) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    osc.type = 'sawtooth';
    osc.frequency.value = 40 + Math.random() * 10;
    filter.type = 'lowpass';
    filter.frequency.value = 100;
    gain.gain.value = 0.08;
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    this.ambients.push({ osc, gain, filter });

    // 第二层低音
    const osc2 = this.ctx.createOscillator();
    const gain2 = this.ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = 25;
    gain2.gain.value = 0.06;
    osc2.connect(gain2);
    gain2.connect(this.masterGain);
    osc2.start();
    this.ambients.push({ osc: osc2, gain: gain2 });

    // 风声（白噪声过滤）
    this._startWind();
  }

  _startWind() {
    const bufferSize = this.ctx.sampleRate * 2;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    src.loop = true;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 300;
    filter.Q.value = 0.5;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.04;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    src.start();
    this.ambients.push({ src, gain, filter, isNoise: true });
    // 风声起伏
    this._modulateWind(filter, gain);
  }

  _modulateWind(filter, gain) {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    filter.frequency.linearRampToValueAtTime(200 + Math.random() * 400, t + 3);
    gain.gain.linearRampToValueAtTime(0.02 + Math.random() * 0.04, t + 3);
    setTimeout(() => this._modulateWind(filter, gain), 3000 + Math.random() * 2000);
  }

  // 突发音效
  playBang() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 60;
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(t);
    osc.stop(t + 0.3);
  }

  playWhisper() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const bufSize = this.ctx.sampleRate * 1.5;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const env = Math.sin(Math.PI * i / bufSize);
      d[i] = (Math.random() * 2 - 1) * env * 0.3;
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const bp = this.ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 800 + Math.random() * 600;
    bp.Q.value = 2;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.15;
    src.connect(bp);
    bp.connect(gain);
    gain.connect(this.masterGain);
    src.start(t);
  }

  playCreak() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.4);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(t);
    osc.stop(t + 0.5);
  }

  playFootstep() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const bufSize = this.ctx.sampleRate * 0.08;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const env = 1 - i / bufSize;
      d[i] = (Math.random() * 2 - 1) * env * env * 0.5;
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const lp = this.ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 600;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.1;
    src.connect(lp);
    lp.connect(gain);
    gain.connect(this.masterGain);
    src.start(t);
  }

  playPickup() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.1);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(t);
    osc.stop(t + 0.2);
  }

  playWrongCode() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 100;
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(t);
    osc.stop(t + 0.5);
  }

  playCorrectCode() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    [400, 500, 700].forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.1, t + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.15);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(t + i * 0.12);
      osc.stop(t + i * 0.12 + 0.2);
    });
  }

  playScream() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const bufSize = this.ctx.sampleRate * 1;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const env = Math.sin(Math.PI * i / bufSize);
      d[i] = Math.sin(i * 0.02 * (1 + i / bufSize)) * env * 0.8;
      d[i] += (Math.random() * 2 - 1) * env * 0.3;
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const hp = this.ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 400;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.5;
    src.connect(hp);
    hp.connect(gain);
    gain.connect(this.masterGain);
    src.start(t);
  }

  // 危险时加强低音
  setDangerLevel(level) {
    if (!this.initialized || !this.ambients[0]) return;
    this.ambients[0].gain.gain.linearRampToValueAtTime(0.08 + level * 0.15, this.ctx.currentTime + 0.5);
  }
}

// ============================================
// 物品栏系统
// ============================================
class Inventory {
  constructor() {
    this.slots = new Array(5).fill(null);
    this.selected = 0;
  }

  addItem(itemId) {
    // 先找空位
    let idx = this.slots.indexOf(null);
    if (idx === -1) return false;
    this.slots[idx] = itemId;
    this.updateUI();
    return true;
  }

  removeItem(itemId) {
    const idx = this.slots.indexOf(itemId);
    if (idx === -1) return false;
    this.slots[idx] = null;
    this.updateUI();
    return true;
  }

  hasItem(itemId) {
    return this.slots.includes(itemId);
  }

  selectSlot(idx) {
    this.selected = idx;
    this.updateUI();
  }

  getSelected() {
    return this.slots[this.selected];
  }

  updateUI() {
    const slotEls = document.querySelectorAll('.inv-slot');
    slotEls.forEach((el, i) => {
      const item = this.slots[i];
      el.classList.toggle('has-item', !!item);
      el.classList.toggle('selected', i === this.selected);
      // 清除旧图标
      const oldIcon = el.querySelector('.item-icon');
      if (oldIcon) oldIcon.remove();
      if (item && ITEMS[item]) {
        const icon = document.createElement('i');
        icon.className = `fas ${ITEMS[item].icon} item-icon`;
        icon.style.color = ITEMS[item].color;
        el.appendChild(icon);
      }
    });
  }
}

    this.materials.door = new THREE.MeshStandardMaterial({
      map: this.textures.metal.colorMap,
      normalMap: this.textures.metal.normalMap,
      roughnessMap: this.textures.metal.roughnessMap,
      roughness: 0.6,
      metalness: 0.5,
    });
    this.materials.neonRed = new THREE.MeshStandardMaterial({
      emissive: new THREE.Color(0xff2200),
      emissiveMap: this.textures.neonRed,
      emissiveIntensity: 2,
    });
    this.materials.neonGreen = new THREE.MeshStandardMaterial({
      emissive: new THREE.Color(0x00ff44),
      emissiveMap: this.textures.neonGreen,
      emissiveIntensity: 2,
    });
    this.materials.neonBlue = new THREE.MeshStandardMaterial({
      emissive: new THREE.Color(0x0044ff),
      emissiveMap: this.textures.neonBlue,
      emissiveIntensity: 2,
    });
    this.materials.clown = new THREE.MeshStandardMaterial({
      color: 0xccccaa,
      roughness: 0.7,
      metalness: 0.1,
    });
  }

  // ============================================
  // 世界构建
  // ============================================
  _buildWorld() {
    // 地板（大平面）
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floor = new THREE.Mesh(floorGeo, this.materials.floor);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    this.scene.add(floor);

    // 天花板
    const ceilGeo = new THREE.PlaneGeometry(100, 100);
    const ceil = new THREE.Mesh(ceilGeo, this.materials.ceiling);
    ceil.rotation.x = Math.PI / 2;
    ceil.position.y = 3.5;
    this.scene.add(ceil);

    this._buildEntrance();
    this._buildMainHall();
    this._buildMirrorMaze();
    this._buildMaintenanceTunnels();
    this._buildSecretRoom();
  }

  _addWall(x, y, z, w, h, d, mat, collision = true) {
    const geo = new THREE.BoxGeometry(Math.max(0.01, w), Math.max(0.01, h), Math.max(0.01, d));
    const mesh = new THREE.Mesh(geo, mat || this.materials.wall);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    this.scene.add(mesh);
    if (collision) {
      this.interactables.push({
        mesh, type: 'wall',
        bounds: new THREE.Box3().setFromObject(mesh)
      });
    }
    return mesh;
  }

  _buildEntrance() {
    // 入口走廊 (x: 0~4, z: 0~8)
    const C = CELL, H = 3.5;
    // 左墙
    this._addWall(0, H / 2, 4, 0.2, H, 8, this.materials.wall);
    // 右墙
    this._addWall(C, H / 2, 4, 0.2, H, 8, this.materials.wall);
    // 后墙（有洞通向主厅）
    this._addWall(2, H / 2, 8, C, H, 0.2, this.materials.wall);
    // 前墙（入口封死感）
    this._addWall(2, H / 2, 0, C, H, 0.2, this.materials.wallDark);

    // 手电筒放在地上
    this._createPickup(2, 0.3, 3, 'flashlight', 'fa-flashlight', '#ffcc00');

    // 第一张纸条
    this._createPickup(3.2, 0.5, 2, 'note_entrance', 'fa-file-alt', '#aa9977');

    // 入口微弱灯光
    const light = new THREE.PointLight(0xff6633, 0.3, 6);
    light.position.set(2, 3, 1);
    this.scene.add(light);
  }

  _buildMainHall() {
    const C = CELL, H = 3.5;
    // 主厅: x: 0~12, z: 8~20
    // 后墙
    this._addWall(6, H / 2, 20, 12, H, 0.2, this.materials.wallDark);
    // 左墙
    this._addWall(0, H / 2, 14, 0.2, H, 12, this.materials.wall);
    // 右墙
    this._addWall(12, H / 2, 14, 0.2, H, 12, this.materials.wall);
    // 从走廊到主厅的洞（已有）
    // 红色门（右侧，通往镜面迷宫入口 x:12, z:12）
    this._createDoor(12, H / 2, 12, 'red', 'z', 1, 'mirror_maze');
    // 绿色门（后墙中间，通往维护通道 x:6, z:20）
    this._createDoor(6, H / 2, 20, 'green', 'x', -1, 'maint_start');

    // 键盘锁门（后墙偏左 x:3, z:20）
    this._createKeypadDoor(3, H / 2, 20, 'x', -1);

    // 小丑雕像
    this._createClownStatue(8, 0, 14);
    // 绿色钥匙卡藏在小丑后面
    this._createPickup(8.5, 0.4, 15.5, 'green_keycard', 'fa-id-card', '#33ff66');

    // 桌子
    this._createTable(4, 0, 16);
    // 电池在桌上
    this._createPickup(4, 0.8, 16, 'battery', 'fa-battery-half', '#ffcc00');

    // 霓虹灯 "FUN"
    this._createNeonSign(6, 3, 10, 'FUN', 'red');

    // 主厅灯光
    const hl1 = new THREE.PointLight(0xff4422, 0.5, 10);
    hl1.position.set(6, 3, 14);
    hl1.castShadow = true;
    hl1.shadow.mapSize.set(512, 512);
    this.scene.add(hl1);
    this._flickerLight(hl1);

    const hl2 = new THREE.PointLight(0xff6633, 0.3, 8);
    hl2.position.set(2, 3, 18);
    this.scene.add(hl2);
    this._flickerLight(hl2, 3, 0.5);
  }

  _buildMirrorMaze() {
    const C = CELL, H = 3.5;
    // 镜面迷宫: x: 12~24, z: 8~20
    // 外墙
    this._addWall(18, H / 2, 8, 12, H, 0.2, this.materials.wallDark);
    this._addWall(24, H / 2, 14, 0.2, H, 12, this.materials.wallDark);
    this._addWall(18, H / 2, 20, 12, H, 0.2, this.materials.wallRed);

    // 内部镜子墙（迷宫布局）
    // 纵向墙1
    this._addWall(16, H / 2, 13, 0.1, H, 5, this.materials.mirror);
    // 纵向墙2
    this._addWall(20, H / 2, 17, 0.1, H, 5, this.materials.mirror);
    // 横向墙1
    this._addWall(14.5, H / 2, 16, 5, H, 0.1, this.materials.mirror);
    // 横向墙2
    this._addWall(21.5, H / 2, 11, 5, H, 0.1, this.materials.mirror);
    // 小丑画（假画，增加恐怖感）
    this._addWall(22, H / 2, 15, 0.05, 2, 1.5, this.materials.wallRed, false);
    // 纸条
    this._createPickup(22.3, 1.5, 15, 'note_mirror', 'fa-file-alt', '#aa9977');

    // 绿色环境光
    const ml = new THREE.PointLight(0x00ff44, 0.2, 15);
    ml.position.set(18, 3, 14);
    this.scene.add(ml);
    this._flickerLight(ml, 5, 0.3);

    const ml2 = new THREE.PointLight(0x002244, 0.15, 10);
    ml2.position.set(14, 3, 18);
    this.scene.add(ml2);
  }

  _buildMaintenanceTunnels() {
    const C = CELL, H = 3.5;
    // 维护通道入口: x: 4~8, z: 20~24
    // 然后隧道: x: 4~8, z: 24~36
    // 左墙
    this._addWall(4, H / 2, 30, 0.2, H, 16, this.materials.wallDark);
    // 右墙
    this._addWall(8, H / 2, 30, 0.2, H, 16, this.materials.wallDark);
    // 顶
    this._addWall(6, H / 2, 24, 4, H, 0.2, this.materials.wallDark);
    // 通道末端墙（有暗门）
    this._addWall(6, H / 2, 36, 4, H, 0.2, this.materials.wallDark);
    // 暗门标记（用不同材质）
    this._createHiddenDoor(6, H / 2, 36, 'z', -1, 'secret_room');

    // 管道装饰
    for (let z = 22; z < 36; z += 3) {
      const pipe = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, C, 8),
        this.materials.metal
      );
      pipe.rotation.z = Math.PI / 2;
      pipe.position.set(4.15, 3, z);
      this.scene.add(pipe);
      const pipe2 = pipe.clone();
      pipe2.position.set(7.85, 2.8, z + 1.5);
      this.scene.add(pipe2);
    }

    // 扳手
    this._createPickup(5, 0.3, 28, 'wrench', 'fa-wrench', '#888888');

    // 蓝色灯光
    const tl1 = new THREE.PointLight(0x0044ff, 0.3, 8);
    tl1.position.set(6, 3, 24);
    this.scene.add(tl1);
    this._flickerLight(tl1, 2, 0.4);

    const tl2 = new THREE.PointLight(0x002244, 0.15, 6);
    tl2.position.set(6, 3, 32);
    this.scene.add(tl2);

    // 霓虹 "PLAY"
    this._createNeonSign(6, 3, 25, 'PLAY', 'blue');

    // AI 巡逻点
    this.entityPatrolPoints = [
      new THREE.Vector3(6, 1.5, 30),
      new THREE.Vector3(5, 1.5, 26),
      new THREE.Vector3(7, 1.5, 34),
      new THREE.Vector3(6, 1.5, 28),
    ];
  }

  _buildSecretRoom() {
    const C = CELL, H = 3.5;
    // 秘密房间: x: 4~8, z: 36~42
    // 左墙
    this._addWall(4, H / 2, 39, 0.2, H, 6, this.materials.wallRed);
    // 右墙
    this._addWall(8, H / 2, 39, 0.2, H, 6, this.materials.wallRed);
    // 后墙
    this._addWall(6, H / 2, 42, 4, H, 0.2, this.materials.wallRed);
    // 桌子
    this._createTable(6, 0, 39);
    // 最终纸条
    this._createPickup(6, 0.8, 39, 'note_secret', 'fa-file-alt', '#aa9977');

    // 红色灯光
    const sl = new THREE.PointLight(0xff0000, 0.4, 10);
    sl.position.set(6, 3, 39);
    sl.castShadow = true;
    sl.shadow.mapSize.set(512, 512);
    this.scene.add(sl);
    this._flickerLight(sl, 1.5, 0.6);

    // "SMILE" 霓虹
    this._createNeonSign(6, 3, 41, 'SMILE', 'red');
  }

  // ============================================
  // 物体工厂
  // ============================================
  _createPickup(x, y, z, itemId, iconClass, color) {
    const group = new THREE.Group();
    // 物品视觉表示
    let geo, mat;
    if (itemId === 'flashlight') {
      geo = new THREE.CylinderGeometry(0.04, 0.04, 0.3, 8);
      mat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.4 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.z = Math.PI / 2;
      group.add(mesh);
      // 灯头
      const head = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.04, 0.08, 8),
        new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.7, roughness: 0.3 })
      );
      head.rotation.z = Math.PI / 2;
      head.position.x = 0.19;
      group.add(head);
    } else if (itemId.startsWith('note_')) {
      geo = new THREE.PlaneGeometry(0.25, 0.35);
      mat = new THREE.MeshStandardMaterial({ color: 0xd4c4a0, roughness: 0.9, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -0.1;
      group.add(mesh);
    } else if (itemId === 'battery') {
      geo = new THREE.CylinderGeometry(0.03, 0.03, 0.1, 8);
      mat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.3, roughness: 0.5 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.z = Math.PI / 2;
      group.add(mesh);
    } else if (itemId === 'wrench') {
      geo = new THREE.BoxGeometry(0.04, 0.04, 0.3);
      mat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7, roughness: 0.4 });
      group.add(new THREE.Mesh(geo, mat));
    } else {
      // 钥匙卡
      geo = new THREE.BoxGeometry(0.2, 0.03, 0.12);
      mat = new THREE.MeshStandardMaterial({
        color: color === '#ff3333' ? 0xff3333 : color === '#33ff66' ? 0x33ff66 : 0xffffff,
        metalness: 0.4, roughness: 0.3, emissive: new THREE.Color(color),
        emissiveIntensity: 0.3
      });
      group.add(new THREE.Mesh(geo, mat));
    }

    group.position.set(x, y, z);
    group.userData = { type: 'pickup', itemId, collected: false };
    this.scene.add(group);
    this.interactables.push({
      mesh: group, type: 'pickup', itemId,
      bounds: new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(x, y, z), new THREE.Vector3(0.6, 0.6, 0.6)
      )
    });
  }

  _createDoor(x, y, z, color, axis, dir, targetArea) {
    const geo = new THREE.BoxGeometry(axis === 'z' ? 0.15 : 1.2, 2.6, axis === 'z' ? 1.2 : 0.15);
    const mat = this.materials.door.clone();
    const door = new THREE.Mesh(geo, mat);
    door.position.set(x, y, z);
    door.castShadow = true;
    door.receiveShadow = true;
    // 指示灯
    const indicatorGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const indicatorMat = new THREE.MeshStandardMaterial({
      emissive: new THREE.Color(color === 'red' ? 0xff2200 : 0x00ff44),
      emissiveIntensity: 1,
    });
    const indicator = new THREE.Mesh(indicatorGeo, indicatorMat);
    indicator.position.set(
      axis === 'z' ? (dir > 0 ? 0.1 : -0.1) : 0,
      1.2,
      axis === 'z' ? 0 : (dir > 0 ? 0.1 : -0.1)
    );
    door.add(indicator);

    door.userData = { type: 'door', color, locked: true, axis, dir, targetArea, openAmount: 0 };
    this.scene.add(door);
    this.doors.push(door);
    this.interactables.push({
      mesh: door, type: 'door', door,
      bounds: new THREE.Box3().setFromObject(door)
    });
  }

  _createKeypadDoor(x, y, z, axis, dir) {
    const geo = new THREE.BoxGeometry(axis === 'z' ? 0.15 : 1.2, 2.6, axis === 'z' ? 1.2 : 0.15);
    const door = new THREE.Mesh(geo, this.materials.door.clone());
    door.position.set(x, y, z);
    door.castShadow = true;
    // 键盘面板
    const padGeo = new THREE.BoxGeometry(0.3, 0.4, 0.05);
    const padMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.3 });
    const pad = new THREE.Mesh(padGeo, padMat);
    pad.position.set(
      axis === 'z' ? (dir > 0 ? 0.1 : -0.1) : 0,
      1.4,
      axis === 'z' ? 0 : (dir > 0 ? 0.1 : -0.1)
    );
    door.add(pad);

    door.userData = { type: 'keypad_door', locked: true, axis, dir, openAmount: 0 };
    this.scene.add(door);
    this.doors.push(door);
    this.interactables.push({
      mesh: door, type: 'keypad_door', door,
      bounds: new THREE.Box3().setFromObject(door)
    });
  }

  _createHiddenDoor(x, y, z, axis, dir, targetArea) {
    // 外观和墙一样，但可互动
    const geo = new THREE.BoxGeometry(1.5, 2.8, 0.2);
    const door = new THREE.Mesh(geo, this.materials.wallDark.clone());
    door.position.set(x, y, z);
    door.userData = { type: 'hidden_door', locked: true, axis, dir, targetArea, openAmount: 0, revealed: false };
    this.scene.add(door);
    this.doors.push(door);
    this.interactables.push({
      mesh: door, type: 'hidden_door', door,
      bounds: new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(x, y, z), new THREE.Vector3(1.5, 2.8, 0.4)
      )
    });
  }

  _createClownStatue(x, y, z) {
    const group = new THREE.Group();
    // 身体（圆柱）
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.25, 0.3, 1.2, 12),
      this.materials.clown
    );
    body.position.y = 0.6;
    group.add(body);
    // 头（球）
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 12, 12),
      this.materials.clown
    );
    head.position.y = 1.4;
    group.add(head);
    // 鼻子（红色小球）
    const nose = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 })
    );
    nose.position.set(0, 1.4, 0.2);
    group.add(nose);
    // 帽子
    const hat = new THREE.Mesh(
      new THREE.ConeGeometry(0.2, 0.4, 8),
      new THREE.MeshStandardMaterial({ color: 0x880000 })
    );
    hat.position.y = 1.75;
    group.add(hat);

    group.position.set(x, y, z);
    group.userData = { type: 'clown_statue', origX: x, origZ: z };
    this.scene.add(group);
    this.interactables.push({
      mesh: group, type: 'clown_statue',
      bounds: new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(x, y + 0.9, z), new THREE.Vector3(0.6, 2, 0.6)
      )
    });
  }

  _createTable(x, y, z) {
    const group = new THREE.Group();
    const top = new THREE.Mesh(
      new THREE.BoxGeometry(1, 0.06, 0.6),
      new THREE.MeshStandardMaterial({ color: 0x3a2820, roughness: 0.8 })
    );
    top.position.y = 0.7;
    group.add(top);
    // 腿
    for (let lx of [-0.4, 0.4]) {
      for (let lz of [-0.22, 0.22]) {
        const leg = new THREE.Mesh(
          new THREE.CylinderGeometry(0.03, 0.03, 0.7, 6),
          this.materials.metal
        );
        leg.position.set(lx, 0.35, lz);
        group.add(leg);
      }
    }
    group.position.set(x, y, z);
    this.scene.add(group);
    this.interactables.push({
      mesh: group, type: 'prop',
      bounds: new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(x, y + 0.4, z), new THREE.Vector3(1, 0.8, 0.6)
      )
    });
  }

  _createNeonSign(x, y, z, text, color) {
    const group = new THREE.Group();
    const mat = color === 'red' ? this.materials.neonRed :
                color === 'green' ? this.materials.neonGreen :
                this.materials.neonBlue;
    // 简易文字用方块阵列表示
    const chars = {
      'F': [[0,0],[0,1],[0,2],[0,3],[1,0],[1,2],[2,0],[2,2],[2,3]],
      'U': [[0,0],[0,1],[0,2],[0,3],[1,3],[2,0],[2,1],[2,2],[2,3]],
      'N': [[0,0],[0,1],[0,2],[0,3],[1,1],[2,0],[2,1],[2,2],[2,3]],
      'P': [[0,0],[0,1],[0,2],[0,3],[1,0],[1,2],[2,0],[2,1]],
      'L': [[0,0],[0,1],[0,2],[0,3],[1,3],[2,3]],
      'A': [[0,1],[0,2],[0,3],[1,0],[1,1],[1,2],[1,3],[2,0],[2,3]],
      'Y': [[0,0],[0,1],[0,2],[1,2],[2,0],[2,1],[2,2]],
      'S': [[0,1],[0,2],[0,3],[1,0],[1,2],[2,0],[2,1],[2,3]],
      'M': [[0,0],[0,3],[1,1],[1,2],[2,0],[2,3]],
      'I': [[0,0],[0,1],[0,2],[0,3],[1,0],[1,1],[1,2],[1,3],[2,0],[2,1],[2,2],[2,3]],
      'E': [[0,0],[0,1],[0,2],[0,3],[1,0],[1,2],[2,0],[2,1],[2,2],[2,3]],
    };
    let offsetX = 0;
    for (const ch of text) {
      const pixels = chars[ch] || [];
      for (const [px, py] of pixels) {
        const block = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.12, 0.03),
          mat
        );
        block.position.set(offsetX + px * 0.1, -py * 0.15 + 0.3, 0);
        group.add(block);
      }
      offsetX += 0.5;
    }
    group.position.set(x, y, z);
    this.scene.add(group);
    // 霓虹灯光
    const lightColor = color === 'red' ? 0xff2200 : color === 'green' ? 0x00ff44 : 0x0044ff;
    const light = new THREE.PointLight(lightColor, 0.5, 6);
    light.position.set(x, y, z + 0.5);
    this.scene.add(light);
    this._flickerLight(light, 2 + Math.random() * 3, 0.3 + Math.random() * 0.3);
  }

  // ============================================
  // 灯光系统
  // ============================================
  _initLighting() {
    // 极低环境光
    const ambient = new THREE.AmbientLight(0x110808, 0.3);
    this.scene.add(ambient);
  }

  _initFlashlight() {
    this.flashlight = new THREE.SpotLight(0xffeedd, 2, 20, Math.PI / 6, 0.4, 1.5);
    this.flashlight.castShadow = true;
    this.flashlight.shadow.mapSize.set(1024, 1024);
    this.flashlight.shadow.camera.near = 0.3;
    this.flashlight.shadow.camera.far = 20;
    this.flashlight.visible = false;

    // 手电筒锥形视觉
    const coneGeo = new THREE.ConeGeometry(1.5, 4, 16, 1, true);
    const coneMat = new THREE.MeshBasicMaterial({
      color: 0xffeedd,
      transparent: true,
      opacity: 0.02,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    this.flashlightCone = new THREE.Mesh(coneGeo, coneMat);
    this.flashlightCone.rotation.x = Math.PI / 2;
    this.flashlightCone.position.z = -2;
    this.flashlightCone.visible = false;

    this.flashlightTarget = new THREE.Object3D();
    this.flashlightTarget.position.z = -1;
    this.camera.add(this.flashlightTarget);
    this.camera.add(this.flashlight);
    this.flashlight.target = this.flashlightTarget;
    this.camera.add(this.flashlightCone);

    this.scene.add(this.camera);
  }

  _flickerLight(light, interval = 2, intensity = 0.3) {
    const flicker = () => {
      if (!this.running) return;
      const baseIntensity = light.userData.baseIntensity || light.intensity;
      if (!light.userData.baseIntensity) light.userData.baseIntensity = light.intensity;
      const rand = Math.random();
      if (rand < 0.1) {
        light.intensity = 0;
        setTimeout(() => { light.intensity = baseIntensity; }, 50 + Math.random() * 100);
      } else if (rand < 0.3) {
        light.intensity = baseIntensity * (0.3 + Math.random() * 0.7);
      }
      setTimeout(flicker, (interval * 0.5 + Math.random() * interval) * 1000);
    };
    setTimeout(flicker, Math.random() * interval * 1000);
  }

  // ============================================
  // 粒子系统（灰尘）
  // ============================================
  _initParticles() {
    const count = 500;
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 30;
      positions[i * 3 + 1] = Math.random() * 3.5;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: 0x998877,
      size: 0.02,
      transparent: true,
      opacity: 0.4,
      depthWrite: false,
    });
    this.dustParticles = new THREE.Points(geo, mat);
    this.scene.add(this.dustParticles);
  }

  // ============================================
  // AI 实体
  // ============================================
  _initEntity() {
    const group = new THREE.Group();
    // 人形暗影
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x050505,
      roughness: 0.95,
      metalness: 0.1,
    });
    // 身体
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 1.4, 8), bodyMat);
    body.position.y = 0.7;
    group.add(body);
    // 头
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), bodyMat);
    head.position.y = 1.6;
    group.add(head);
    // 发光眼睛
    const eyeMat = new THREE.MeshStandardMaterial({
      emissive: new THREE.Color(0xff0000),
      emissiveIntensity: 3,
    });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), eyeMat);
    eyeL.position.set(-0.07, 1.62, 0.15);
    group.add(eyeL);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), eyeMat);
    eyeR.position.set(0.07, 1.62, 0.15);
    group.add(eyeR);

    // 眼睛光
    const eyeLight = new THREE.PointLight(0xff0000, 0.3, 3);
    eyeLight.position.set(0, 1.62, 0.2);
    group.add(eyeLight);

    group.position.copy(this.entityPos);
    group.visible = false;
    this.entity = group;
    this.scene.add(group);
  }

  // ============================================
  // 事件系统
  // ============================================
  _setupEvents() {
    // 键盘
    document.addEventListener('keydown', (e) => {
      this.keys[e.code] = true;
      if (e.code === 'KeyF' && !this.uiOpen) this._toggleFlashlight();
      if (e.code === 'KeyE' && !this.uiOpen) this._interact();
      if (e.code === 'Escape') this._handleEscape();
      // 数字键选择物品栏
      if (e.code >= 'Digit1' && e.code <= 'Digit5') {
        this.inventory.selectSlot(parseInt(e.code.charAt(5)) - 1);
      }
    });
    document.addEventListener('keyup', (e) => { this.keys[e.code] = false; });

    // 鼠标
    document.addEventListener('mousemove', (e) => {
      if (!this.mouseLocked || this.paused || this.uiOpen) return;
      this.yaw -= e.movementX * MOUSE_SENS;
      this.pitch -= e.movementY * MOUSE_SENS;
      this.pitch = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, this.pitch));
    });

    // 指针锁
    this.renderer.domElement.addEventListener('click', () => {
      if (this.running && !this.paused && !this.uiOpen) {
        this.renderer.domElement.requestPointerLock();
      }
    });
    document.addEventListener('pointerlockchange', () => {
      this.mouseLocked = document.pointerLockElement === this.renderer.domElement;
      if (!this.mouseLocked && this.running && !this.paused && !this.uiOpen) {
        document.getElementById('pause-overlay').classList.add('active');
        this.paused = true;
      }
    });

    // 恢复
    document.getElementById('pause-overlay').addEventListener('click', () => {
      this.paused = false;
      document.getElementById('pause-overlay').classList.remove('active');
      this.renderer.domElement.requestPointerLock();
    });

    // 窗口大小
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 开始按钮
    document.getElementById('play-btn').addEventListener('click', () => {
      this._startGame();
    });
  }

  _setupKeypad() {
    const display = document.getElementById('keypad-display');
    const feedback = document.getElementById('keypad-feedback');
    document.querySelectorAll('.keypad-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.val;
        if (val === 'C') {
          this.keypadCode = '';
          display.textContent = '_ _ _ _';
          feedback.textContent = '';
        } else if (val === 'E') {
          this._checkKeypadCode();
        } else {
          if (this.keypadCode.length < 4) {
            this.keypadCode += val;
            let displayText = '';
            for (let i = 0; i < 4; i++) displayText += (i < this.keypadCode.length ? this.keypadCode[i] : '_') + ' ';
            display.textContent = displayText.trim();
          }
        }
      });
    });
  }

  _checkKeypadCode() {
    const display = document.getElementById('keypad-display');
    const feedback = document.getElementById('keypad-feedback');
    if (this.keypadCode === this.keypadCorrectCode) {
      this.audio.playCorrectCode();
      feedback.textContent = 'ACCESS GRANTED';
      feedback.style.color = '#00ff66';
      // 解锁键盘门
      const kpDoor = this.doors.find(d => d.userData.type === 'keypad_door');
      if (kpDoor) kpDoor.userData.locked = false;
      setTimeout(() => {
        this._closeKeypad();
        // 自动开门
        if (kpDoor) kpDoor.userData.openAmount = 1;
      }, 800);
    } else {
      this.audio.playWrongCode();
      feedback.textContent = 'ACCESS DENIED';
      feedback.style.color = '#ff2222';
      display.classList.add('glitch-text');
      setTimeout(() => {
        display.classList.remove('glitch-text');
        this.keypadCode = '';
        display.textContent = '_ _ _ _';
        feedback.textContent = '';
      }, 600);
    }
  }

  _openKeypad() {
    this.uiOpen = true;
    this.keypadCode = '';
    document.getElementById('keypad-display').textContent = '_ _ _ _';
    document.getElementById('keypad-feedback').textContent = '';
    document.getElementById('keypad-modal').classList.add('active');
    document.exitPointerLock();
  }

  _closeKeypad() {
    this.uiOpen = false;
    document.getElementById('keypad-modal').classList.remove('active');
    this.renderer.domElement.requestPointerLock();
  }

  _handleEscape() {
    if (document.getElementById('note-modal').classList.contains('active')) {
      document.getElementById('note-modal').classList.remove('active');
      this.uiOpen = false;
      this.renderer.domElement.requestPointerLock();
      return;
    }
    if (document.getElementById('keypad-modal').classList.contains('active')) {
      this._closeKeypad();
      return;
    }
    if (this.mouseLocked) {
      document.exitPointerLock();
      this.paused = true;
      document.getElementById('pause-overlay').classList.add('active');
    } else if (this.paused) {
      this.paused = false;
      document.getElementById('pause-overlay').classList.remove('active');
      this.renderer.domElement.requestPointerLock();
    }
  }

  _toggleFlashlight() {
    if (!this.inventory.hasItem('flashlight')) return;
    this.flashlightOn = !this.flashlightOn;
    this.flashlight.visible = this.flashlightOn;
    this.flashlightCone.visible = this.flashlightOn;
  }

  _interact() {
    if (!this.currentInteractable) return;
    const obj = this.currentInteractable;

    if (obj.type === 'pickup') {
      const itemId = obj.mesh.userData.itemId;
      if (obj.mesh.userData.collected) return;
      obj.mesh.userData.collected = true;
      this.scene.remove(obj.mesh);
      this.inventory.addItem(itemId);
      this.audio.playPickup();
      // 移除碰撞
      const idx = this.interactables.indexOf(obj);
      if (idx > -1) this.interactables.splice(idx, 1);
      // 特殊物品提示
      if (itemId === 'flashlight') {
        this._showAreaName('Flashlight acquired — Press F');
      }
    } else if (obj.type === 'door') {
      const door = obj.door;
      if (door.userData.locked) {
        const requiredCard = door.userData.color + '_keycard';
        if (this.inventory.hasItem(requiredCard)) {
          this.audio.playCreak();
          door.userData.locked = false;
          door.userData.openAmount = 1;
          this.inventory.removeItem(requiredCard);
          this.audio.playPickup();
        } else {
          // 门锁住的反馈
          this.audio.playBang();
        }
      }
    } else if (obj.type === 'keypad_door') {
      if (obj.door.userData.locked) {
        this._openKeypad();
      }
    } else if (obj.type === 'hidden_door') {
      const door = obj.door;
      if (door.userData.locked) {
        if (this.inventory.hasItem('wrench')) {
          door.userData.locked = false;
          door.userData.openAmount = 1;
          door.material = this.materials.door.clone();
          this.inventory.removeItem('wrench');
          this.audio.playCreak();
          this.audio.playPickup();
        } else {
          this.audio.playBang();
        }
      }
    }
  }

  // ============================================
  // 游戏开始
  // ============================================
  _startGame() {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('hud').classList.add('active');
    document.getElementById('vhs-overlay').classList.add('active');
    this.running = true;
    this.audio.init();
    this.audio.resume();
    this.audio.startDrone();
    this.renderer.domElement.requestPointerLock();

    // 初始区域提示
    setTimeout(() => this._showAreaName(this.areaNames.entrance), 1500);

    // 开始恐怖事件计时器
    this._scheduleHorrorEvents();

    // 游戏循环
    this._gameLoop();
  }

  _showAreaName(text) {
    const el = document.getElementById('area-name');
    el.textContent = text;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 4000);
  }

  // ============================================
  // 恐怖事件调度
  // ============================================
  _scheduleHorrorEvents() {
    // 耳语
    this.horrorTimers.whisper = 8 + Math.random() * 12;
    // 突发巨响
    this.horrorTimers.bang = 15 + Math.random() * 20;
    // 门的吱呀声
    this.horrorTimers.creak = 10 + Math.random() * 15;
    // 物体移动
    this.horrorTimers.moveObj = 20 + Math.random() * 30;
  }

  _updateHorrorEvents(dt) {
    this.horrorTimers.whisper -= dt;
    if (this.horrorTimers.whisper <= 0) {
      this.audio.playWhisper();
      this.horrorTimers.whisper = 12 + Math.random() * 20;
      this.sanity = Math.max(0, this.sanity - 2);
    }

    this.horrorTimers.bang -= dt;
    if (this.horrorTimers.bang <= 0) {
      this.audio.playBang();
      this.horrorTimers.bang = 20 + Math.random() * 30;
      // VHS 闪屏
      this.vhsIntensity = 0.15;
      this.sanity = Math.max(0, this.sanity - 5);
    }

    this.horrorTimers.creak -= dt;
    if (this.horrorTimers.creak <= 0) {
      this.audio.playCreak();
      this.horrorTimers.creak = 15 + Math.random() * 20;
    }

    this.horrorTimers.moveObj -= dt;
    if (this.horrorTimers.moveObj <= 0) {
      this._moveObjectWhenNotLooking();
      this.horrorTimers.moveObj = 25 + Math.random() * 35;
      this.sanity = Math.max(0, this.sanity - 3);
    }

    // VHS 恢复
    this.vhsIntensity = Math.max(0.02, this.vhsIntensity - dt * 0.05);
    const vhsOverlay = document.getElementById('vhs-overlay');
    vhsOverlay.style.opacity = this.vhsIntensity;

    // 危险等级（基于与实体距离）
    const distToEntity = this.playerPos.distanceTo(this.entity.position);
    this.dangerLevel = this.entityActive ? Math.max(0, 1 - distToEntity / 15) : 0;
    document.getElementById('danger-vignette').classList.toggle('active', this.dangerLevel > 0.3);
    this.audio.setDangerLevel(this.dangerLevel);

    // 理智值恢复（远离实体时）
    if (this.dangerLevel < 0.2) {
      this.sanity = Math.min(100, this.sanity + dt * 0.5);
    }
  }

  _moveObjectWhenNotLooking() {
    // 找小丑雕像并微微移动
    const clown = this.interactables.find(i => i.type === 'clown_statue');
    if (!clown) return;
    const clownPos = clown.mesh.position;
    const toPlayer = new THREE.Vector3().subVectors(this.playerPos, clownPos);
    const playerFwd = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
    // 如果玩家没看小丑方向
    if (toPlayer.dot(playerFwd) < 0) {
      const dx = (Math.random() - 0.5) * 0.5;
      const dz = (Math.random() - 0.5) * 0.5;
      clown.mesh.position.x += dx;
      clown.mesh.position.z += dz;
      // 旋转面向玩家
      clown.mesh.lookAt(this.playerPos.x, clown.mesh.position.y, this.playerPos.z);
    }
  }

  // ============================================
  // AI 更新
  // ============================================
  _updateEntity(dt) {
    // 在玩家进入维护区域后激活
    const inMaintZone = this.playerPos.z > 22 && this.playerPos.z < 40 &&
                        this.playerPos.x > 2 && this.playerPos.x < 10;
    if (!this.entityActive && inMaintZone) {
      this.entityActive = true;
      this.entity.visible = true;
      this._showAreaName('Something is watching...');
    }
    if (!this.entityActive) return;

    // 检查玩家是否在看实体
    const toEntity = new THREE.Vector3().subVectors(this.entity.position, this.playerPos).normalize();
    const playerFwd = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
    const playerLooking = toEntity.dot(playerFwd) > 0.7;

    if (playerLooking) {
      this.lastEntitySeen = this.clock.elapsedTime;
      // 实体不动
      this.entity.lookAt(this.playerPos.x, this.entity.position.y, this.playerPos.z);
    } else {
      // 移向玩家（延迟）
      const timeSinceSeen = this.clock.elapsedTime - this.lastEntitySeen;
      if (timeSinceSeen > 1.5) {
        const dir = new THREE.Vector3().subVectors(this.playerPos, this.entity.position);
        dir.y = 0;
        const dist = dir.length();
        if (dist > 2) {
          dir.normalize();
          const speed = this.entitySpeed * Math.min(timeSinceSeen / 3, 1);
          this.entity.position.add(dir.multiplyScalar(speed * dt));
          this.entity.lookAt(this.playerPos.x, this.entity.position.y, this.playerPos.z);
        }
      }
    }

    // 跳吓触发
    const distToPlayer = this.entity.position.distanceTo(this.playerPos);
    if (distToPlayer < 1.5 && !playerLooking) {
      this._triggerJumpscare();
    }
  }

  _triggerJumpscare() {
    if (this._jumpscareActive) return;
    this._jumpscareActive = true;
    this.audio.playScream();
    this.vhsIntensity = 0.4;

    const scareEl = document.getElementById('jumpscare');
    const scareCanvas = document.getElementById('scare-canvas');
    scareCanvas.width = window.innerWidth;
    scareCanvas.height = window.innerHeight;
    const sctx = scareCanvas.getContext('2d');

    // 画恐怖脸
    sctx.fillStyle = '#000';
    sctx.fillRect(0, 0, scareCanvas.width, scareCanvas.height);
    const cx = scareCanvas.width / 2, cy = scareCanvas.height / 2;
    // 脸
    sctx.fillStyle = '#1a0a0a';
    sctx.beginPath();
    sctx.ellipse(cx, cy, 150, 200, 0, 0, Math.PI * 2);
    sctx.fill();
    // 眼睛
    sctx.fillStyle = '#ff0000';
    sctx.shadowColor = '#ff0000';
    sctx.shadowBlur = 30;
    sctx.beginPath();
    sctx.ellipse(cx - 50, cy - 30, 20, 35, 0, 0, Math.PI * 2);
    sctx.fill();
    sctx.beginPath();
    sctx.ellipse(cx + 50, cy - 30, 20, 35, 0, 0, Math.PI * 2);
    sctx.fill();
    // 瞳孔
    sctx.fillStyle = '#000';
    sctx.shadowBlur = 0;
    sctx.beginPath();
    sctx.arc(cx - 50, cy - 25, 8, 0, Math.PI * 2);
    sctx.fill();
    sctx.beginPath();
    sctx.arc(cx + 50, cy - 25, 8, 0, Math.PI * 2);
    sctx.fill();
    // 嘴
    sctx.strokeStyle = '#ff0000';
    sctx.lineWidth = 4;
    sctx.beginPath();
    sctx.ellipse(cx, cy + 60, 60, 80, 0, 0, Math.PI);
    sctx.stroke();
    // 牙齿
    for (let i = -40; i <= 40; i += 15) {
      sctx.fillStyle = '#ddddaa';
      sctx.fillRect(cx + i - 5, cy + 60, 10, 20);
    }

    scareEl.classList.add('active');

    // 传送到远处
    setTimeout(() => {
      this.entity.position.set(6, 1.5, 30);
      this.lastEntitySeen = this.clock.elapsedTime;
      scareEl.classList.remove('active');
      this.sanity = Math.max(0, this.sanity - 30);
      this._jumpscareActive = false;
    }, 1200);
  }

  // ============================================
  // 玩家更新
  // ============================================
  _updatePlayer(dt) {
    // 移动方向
    const forward = new THREE.Vector3(0, 0, -1);
    forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), this.yaw);
    const right = new THREE.Vector3(1, 0, 0);
    right.applyAxisAngle(new THREE.Vector3(0, 1, 0), this.yaw);

    const moveDir = new THREE.Vector3();
    if (this.keys['KeyW']) moveDir.add(forward);
    if (this.keys['KeyS']) moveDir.sub(forward);
    if (this.keys['KeyD']) moveDir.add(right);
    if (this.keys['KeyA']) moveDir.sub(right);

    this.isMoving = moveDir.length() > 0.01;
    this.isSprinting = this.keys['ShiftLeft'] && this.isMoving && this.stamina > 0;
    this.isCrouching = this.keys['ControlLeft'] || this.keys['ControlRight'];

    if (this.isMoving) moveDir.normalize();

    let speed = MOVE_SPEED;
    if (this.isSprinting) speed = SPRINT_SPEED;
    if (this.isCrouching) speed = CROUCH_SPEED;

    // 蹲伏
    const targetHeight = this.isCrouching ? CROUCH_HEIGHT : PLAYER_HEIGHT;
    this.currentHeight += (targetHeight - this.currentHeight) * dt * 8;

    // 体力
    if (this.isSprinting) {
      this.stamina = Math.max(0, this.stamina - 20 * dt);
    } else {
      this.stamina = Math.min(100, this.stamina + 10 * dt);
    }

    // 头部晃动
    if (this.isMoving) {
      const bobSpeed = this.isSprinting ? BOB_SPEED * 1.3 : BOB_SPEED;
      this.bobPhase += dt * bobSpeed;
    } else {
      this.bobPhase *= 0.9;
    }
    const bobY = Math.sin(this.bobPhase) * BOB_AMOUNT * (this.isSprinting ? 1.5 : 1);
    const bobX = Math.cos(this.bobPhase * 0.5) * BOB_AMOUNT * 0.5;

    // 低体力时呼吸动画
    let breathOffset = 0;
    if (this.stamina < 20 && this.isSprinting) {
      breathOffset = Math.sin(this.clock.elapsedTime * 4) * 0.03;
    }

    // 应用移动
    const newPos = this.playerPos.clone().add(moveDir.multiplyScalar(speed * dt));

    // 简单碰撞检测
    const playerRadius = 0.3;
    let blocked = false;
    for (const obj of this.interactables) {
      if (obj.type === 'pickup' || !obj.bounds) continue;
      const expanded = obj.bounds.clone().expandByScalar(playerRadius);
      if (expanded.containsPoint(new THREE.Vector3(newPos.x, this.currentHeight / 2, newPos.z))) {
        // 检查是否门已开
        if ((obj.type === 'door' || obj.type === 'keypad_door' || obj.type === 'hidden_door') && obj.door.userData.openAmount > 0) {
          continue;
        }
        blocked = true;
        break;
      }
    }

    if (!blocked) {
      this.playerPos.copy(newPos);
    }

    // 更新相机
    this.camera.position.set(
      this.playerPos.x + bobX,
      this.currentHeight - EYE_OFFSET + bobY + breathOffset,
      this.playerPos.z
    );
    this.camera.rotation.order = 'YXZ';
    this.camera.rotation.y = this.yaw;
    this.camera.rotation.x = this.pitch;

    // 脚步声
    if (this.isMoving) {
      this.footstepTimer -= dt;
      if (this.footstepTimer <= 0) {
        this.audio.playFootstep();
        this.footstepTimer = this.isSprinting ? 0.3 : 0.45;
      }
    } else {
      this.footstepTimer = 0;
    }

    // 手电筒电池
    if (this.flashlightOn) {
      this.battery = Math.max(0, this.battery - BATTERY_DRAIN * dt);
      if (this.battery <= 0) {
        this.flashlightOn = false;
        this.flashlight.visible = false;
        this.flashlightCone.visible = false;
      }
      // 低电量闪烁
      if (this.battery < 20) {
        const flicker = Math.random() < (1 - this.battery / 20) * 0.3;
        this.flashlight.intensity = flicker ? 0.1 : 2 * (this.battery / 100 + 0.5);
        this.flashlightCone.material.opacity = flicker ? 0 : 0.02;
      } else {
        this.flashlight.intensity = 2;
        this.flashlightCone.material.opacity = 0.02;
      }
    }

    // 区域检测
    this._detectArea();

    // 更新互动提示
    this._updateInteraction();

    // 更新 HUD
    this._updateHUD();
  }

  _detectArea() {
    let area = '';
    const p = this.playerPos;
    if (p.z >= 0 && p.z < 8 && p.x >= 0 && p.x < 4) area = 'entrance';
    else if (p.z >= 8 && p.z < 20 && p.x >= 0 && p.x < 12) area = 'main_hall';
    else if (p.z >= 8 && p.z < 20 && p.x >= 12 && p.x < 24) area = 'mirror_maze';
    else if (p.z >= 20 && p.z < 24 && p.x >= 4 && p.x < 8) area = 'maint_start';
    else if (p.z >= 24 && p.z < 36 && p.x >= 4 && p.x < 8) area = 'maint_tunnel';
    else if (p.z >= 36 && p.z < 42 && p.x >= 4 && p.x < 8) area = 'secret_room';

    if (area !== this.currentArea) {
      this.currentArea = area;
      if (this.areaNames[area]) {
        this._showAreaName(this.areaNames[area]);
      }
    }
  }

  _updateInteraction() {
    const prompt = document.getElementById('interact-prompt');
    this.currentInteractable = null;

    for (const obj of this.interactables) {
      if (obj.type === 'wall' || obj.type === 'prop') continue;
      if (obj.type === 'pickup' && obj.mesh.userData.collected) continue;

      const dist = this.playerPos.distanceTo(
        obj.type === 'pickup' ? obj.mesh.position : obj.mesh.position
      );

      if (dist < INTERACT_DIST) {
        this.currentInteractable = obj;
        let text = 'Press E';
        if (obj.type === 'pickup') {
          const item = ITEMS[obj.itemId];
          text = `Press E — ${item ? item.name : 'Pick up'}`;
        } else if (obj.type === 'door') {
          text = obj.door.userData.locked ?
            `Locked — ${obj.door.userData.color.toUpperCase()} Keycard needed` :
            'Open';
        } else if (obj.type === 'keypad_door') {
          text = obj.door.userData.locked ? 'Press E — Use Keypad' : 'Open';
        } else if (obj.type === 'hidden_door') {
          text = obj.door.userData.locked ? 'Sealed — Need tool' : 'Open';
        }
        prompt.textContent = text;
        prompt.classList.add('visible');

        // 纸条特殊处理
        if (obj.type === 'pickup' && obj.itemId.startsWith('note_') && NOTES[obj.itemId]) {
          prompt.textContent = `Press E — Read ${ITEMS[obj.itemId].name}`;
        }
        return;
      }
    }
    prompt.classList.remove('visible');
  }

  _updateHUD() {
    // 电池
    const battFill = document.getElementById('battery-fill');
    battFill.style.width = this.battery + '%';
    battFill.style.background = this.battery < 20 ? '#ff2222' : this.battery < 50 ? '#ffcc00' : '#00ff66';
    const battIcon = document.querySelector('#battery-bar i');
    battIcon.className = 'fas ' + (this.battery < 20 ? 'fa-battery-empty' : this.battery < 50 ? 'fa-battery-quarter' : 'fa-battery-full');

    // 体力
    document.getElementById('stamina-fill').style.width = this.stamina + '%';

    // 理智
    document.getElementById('sanity-fill').style.width = this.sanity + '%';
  }

  // ============================================
  // 门动画更新
  // ============================================
  _updateDoors(dt) {
    for (const door of this.doors) {
      const ud = door.userData;
      if (ud.openAmount > 0 && ud.openAmount < 1) {
        ud.openAmount = Math.min(1, ud.openAmount + dt * 0.8);
      }
      if (ud.openAmount > 0) {
        const offset = ud.openAmount * (ud.axis === 'z' ? ud.dir * 1.2 : ud.dir * 1.2);
        if (ud.axis === 'z') {
          door.position.x = door.position.x; // 保持原位但需要偏移
          // 滑门效果
          const origX = ud.type === 'keypad_door' ? 3 : ud.type === 'hidden_door' ? 6 :
                        ud.color === 'red' ? 12 : 6;
          const targetX = origX + offset;
          door.position.x += (targetX - door.position.x) * dt * 5;
        } else {
          const origZ = ud.type === 'hidden_door' ? 36 : 20;
          const targetZ = origZ + offset;
          door.position.z += (targetZ - door.position.z) * dt * 5;
        }
      }
    }
  }

  // ============================================
  // 粒子更新
  // ============================================
  _updateParticles(dt) {
    if (!this.dustParticles) return;
    const positions = this.dustParticles.geometry.attributes.position.array;
    const time = this.clock.elapsedTime;
    for (let i = 0; i < positions.length; i += 3) {
      positions[i] += Math.sin(time * 0.3 + i) * 0.001;
      positions[i + 1] += Math.cos(time * 0.2 + i * 0.5) * 0.0005;
      positions[i + 2] += Math.sin(time * 0.25 + i * 0.3) * 0.001;
      // 边界循环
      if (positions[i + 1] > 3.5) positions[i + 1] = 0;
      if (positions[i + 1] < 0) positions[i + 1] = 3.5;
    }
    this.dustParticles.geometry.attributes.position.needsUpdate = true;
  }

  // ============================================
  // 纸条查看处理
  // ============================================
  _handleNoteReading(itemId) {
    const note = NOTES[itemId];
    if (!note) return;
    this.uiOpen = true;
    document.exitPointerLock();
    document.getElementById('note-title').textContent = note.title;
    document.getElementById('note-body').textContent = note.body;
    document.getElementById('note-modal').classList.add('active');
  }

  // 重写互动以处理纸条
  _interact_original = null;

  // ============================================
  // 主游戏循环
  // ============================================
  _gameLoop() {
    if (!this.running) return;
    requestAnimationFrame(() => this._gameLoop());

    const dt = Math.min(this.clock.getDelta(), 0.1);

    if (this.paused || this.uiOpen) {
      // 检查纸条读取
      if (this.uiOpen && this.currentInteractable && this.currentInteractable.type === 'pickup' &&
          this.currentInteractable.itemId.startsWith('note_') && NOTES[this.currentInteractable.itemId]) {
        this._handleNoteReading(this.currentInteractable.itemId);
        // 收集纸条
        const itemId = this.currentInteractable.itemId;
        this.currentInteractable.mesh.userData.collected = true;
        this.scene.remove(this.currentInteractable.mesh);
        const idx = this.interactables.indexOf(this.currentInteractable);
        if (idx > -1) this.interactables.splice(idx, 1);
        this.currentInteractable = null;
      }
      this.renderer.render(this.scene, this.camera);
      return;
    }

    this._updatePlayer(dt);
    this._updateDoors(dt);
    this._updateEntity(dt);
    this._updateParticles(dt);
    this._updateHorrorEvents(dt);

    this.renderer.render(this.scene, this.camera);
  }
}

// ============================================
// 初始化
// ============================================
const game = new Game();
game.init();
</script>
