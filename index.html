<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash of Power</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Outfit',sans-serif;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

#startScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 60%,#1a0500 0%,#000 70%);transition:opacity 1.5s ease}
#startScreen.hidden{opacity:0;pointer-events:none}
.start-bg{position:absolute;inset:0;overflow:hidden}
.start-bg::before{content:'';position:absolute;top:50%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,50,0,0.06) 0%,transparent 65%);animation:sp 5s ease-in-out infinite}
@keyframes sp{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.4}50%{transform:translate(-50%,-50%) scale(1.4);opacity:1}}
.game-title{font-family:'Cinzel',serif;font-size:clamp(2.2rem,7vw,5.5rem);font-weight:900;color:#fff;letter-spacing:.15em;text-transform:uppercase;position:relative;z-index:2;text-shadow:0 0 80px rgba(255,40,0,.25),0 4px 20px rgba(0,0,0,.8)}
.game-title span{display:block;font-size:.3em;font-weight:200;letter-spacing:.6em;color:rgba(255,120,60,.5);margin-top:.4em;font-family:'Outfit',sans-serif}
#startBtn{margin-top:3rem;padding:1rem 4.5rem;background:transparent;border:1.5px solid rgba(255,80,0,.4);color:#fff;font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;cursor:pointer;z-index:2;transition:all .4s ease;position:relative;overflow:hidden}
#startBtn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,60,0,.15),transparent);transform:translateX(-100%);transition:transform .6s ease}
#startBtn:hover::before{transform:translateX(100%)}
#startBtn:hover{border-color:rgba(255,80,0,.8);box-shadow:0 0 50px rgba(255,40,0,.15),inset 0 0 30px rgba(255,40,0,.05);transform:scale(1.05)}
.start-hint{position:absolute;bottom:2rem;color:rgba(255,255,255,.2);font-size:.75rem;letter-spacing:.25em;z-index:2}

#blackOverlay{position:fixed;inset:0;background:#000;z-index:50;opacity:1;pointer-events:none;transition:opacity 1.4s ease}
#blackOverlay.fade-out{opacity:0}
#flashOverlay{position:fixed;inset:0;z-index:18;pointer-events:none;background:#fff;opacity:0;transition:opacity .08s ease}
#flashOverlay.flash{opacity:.7}
#slowMoOverlay{position:fixed;inset:0;z-index:15;pointer-events:none;background:rgba(0,0,0,0);transition:background .4s ease}
#slowMoOverlay.active{background:rgba(0,0,0,.2)}

#dialogueBox{position:fixed;bottom:7%;left:50%;transform:translateX(-50%);z-index:20;opacity:0;transition:opacity .8s ease;pointer-events:none;text-align:center;max-width:90%}
#dialogueBox.visible{opacity:1}
#dialogueText{font-family:'Cinzel',serif;font-size:clamp(.95rem,2.5vw,1.5rem);color:#fff;text-shadow:0 0 40px rgba(255,60,0,.35),0 2px 12px rgba(0,0,0,.9);letter-spacing:.04em;line-height:1.7}
#dialogueSpeaker{font-family:'Outfit',sans-serif;font-size:.7rem;color:rgba(255,130,60,.55);letter-spacing:.35em;text-transform:uppercase;margin-bottom:.4rem}

#hud{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .8s ease}
#hud.visible{opacity:1}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:1.2rem 1.8rem}
.player-info,.enemy-info{display:flex;flex-direction:column;gap:.3rem}
.player-info{align-items:flex-start}
.enemy-info{align-items:flex-end}
.bar-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:600}
.bar-container{width:200px;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bar-fill.php{background:linear-gradient(90deg,#ff3300,#ff7700);box-shadow:0 0 10px rgba(255,50,0,.5)}
.bar-fill.ehp{background:linear-gradient(90deg,#0044ff,#00aaff);box-shadow:0 0 10px rgba(0,80,255,.5)}
.bar-fill.ult{background:linear-gradient(90deg,#ffaa00,#ff4400);box-shadow:0 0 10px rgba(255,150,0,.5)}
.energy-dots{display:flex;gap:5px;margin-top:2px}
.energy-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);transition:all .3s ease}
.energy-dot.filled{background:rgba(255,80,0,.75);border-color:rgba(255,80,0,.8);box-shadow:0 0 6px rgba(255,80,0,.4)}

#powerBar{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:.7rem;opacity:0;transition:opacity .8s ease;pointer-events:none}
#powerBar.visible{opacity:1;pointer-events:auto}
.power-btn{width:64px;height:64px;border:1.5px solid rgba(255,255,255,.1);background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s ease;position:relative}
.power-btn:hover:not(.disabled){border-color:rgba(255,80,0,.5);background:rgba(255,60,0,.08);transform:translateY(-3px);box-shadow:0 6px 25px rgba(255,40,0,.15)}
.power-btn:active:not(.disabled){transform:translateY(0) scale(.93)}
.power-btn.disabled{opacity:.25;pointer-events:none}
.power-btn.ult-btn{width:74px;height:74px;border-color:rgba(255,180,0,.2)}
.power-btn.ult-btn.ready{border-color:rgba(255,180,0,.7);box-shadow:0 0 25px rgba(255,180,0,.15);animation:up 2s ease-in-out infinite}
@keyframes up{0%,100%{box-shadow:0 0 25px rgba(255,180,0,.15)}50%{box-shadow:0 0 40px rgba(255,180,0,.3)}}
.power-icon{font-size:1.3rem;margin-bottom:1px}
.power-key{font-size:.55rem;color:rgba(255,255,255,.35);letter-spacing:.08em}
.power-name{font-size:.45rem;color:rgba(255,255,255,.4);letter-spacing:.04em;margin-top:1px}

#endScreen{position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background 2.5s ease}
#endScreen.visible{background:rgba(0,0,0,.88);pointer-events:auto}
.end-title{font-family:'Cinzel',serif;font-size:clamp(2rem,6vw,5rem);font-weight:900;letter-spacing:.2em;text-transform:uppercase;opacity:0;transform:scale(.7);transition:all 2s cubic-bezier(.16,1,.3,1)}
#endScreen.visible .end-title{opacity:1;transform:scale(1)}
.end-title.victory{color:#ff7700;text-shadow:0 0 80px rgba(255,80,0,.4)}
.end-title.defeat{color:#2255cc;text-shadow:0 0 80px rgba(30,60,200,.4)}
.end-sub{font-size:.9rem;color:rgba(255,255,255,.35);letter-spacing:.35em;margin-top:.8rem;opacity:0;transition:opacity 2s ease .8s}
#endScreen.visible .end-sub{opacity:1}
#restartBtn{margin-top:2.5rem;padding:.7rem 2.5rem;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:'Outfit',sans-serif;font-size:.8rem;letter-spacing:.2em;cursor:pointer;opacity:0;transition:all .4s ease 1.2s;pointer-events:none}
#endScreen.visible #restartBtn{opacity:1;pointer-events:auto}
#restartBtn:hover{border-color:rgba(255,255,255,.4);color:#fff;background:rgba(255,255,255,.04)}

#speedLines{position:fixed;inset:0;z-index:14;pointer-events:none;opacity:0;transition:opacity .15s ease;background:repeating-conic-gradient(from 0deg,rgba(255,255,255,0) 0deg,rgba(255,255,255,.03) 2deg,rgba(255,255,255,0) 4deg);mix-blend-mode:overlay}
#speedLines.active{opacity:1}
@media(max-width:640px){.bar-container{width:130px;height:5px}.power-btn{width:52px;height:52px}.power-btn.ult-btn{width:60px;height:60px}.hud-top{padding:.8rem 1rem}}
</style>
</head>
<body>
<div id="startScreen"><div class="start-bg"></div><div class="game-title">Clash of Power<span>Anime Battle</span></div><button id="startBtn">Begin</button><div class="start-hint">A cinematic anime fight</div></div>
<div id="blackOverlay"></div><div id="flashOverlay"></div><div id="slowMoOverlay"></div><div id="speedLines"></div>
<div id="dialogueBox"><div id="dialogueSpeaker"></div><div id="dialogueText"></div></div>
<div id="hud"><div class="hud-top"><div class="player-info"><div class="bar-label">You</div><div class="bar-container"><div class="bar-fill php" id="phpBar" style="width:100%"></div></div><div class="bar-label" style="margin-top:3px">Energy</div><div class="energy-dots" id="eDots"><div class="energy-dot filled"></div><div class="energy-dot filled"></div><div class="energy-dot filled"></div><div class="energy-dot"></div><div class="energy-dot"></div></div><div class="bar-label" style="margin-top:4px">Ultimate</div><div class="bar-container" style="width:120px"><div class="bar-fill ult" id="ultBar" style="width:0%"></div></div></div><div class="enemy-info"><div class="bar-label">Rival</div><div class="bar-container"><div class="bar-fill ehp" id="ehpBar" style="width:100%"></div></div></div></div></div>
<div id="powerBar"><div class="power-btn" data-power="blast"><div class="power-icon">&#9889;</div><div class="power-key">[1]</div><div class="power-name">BLAST</div></div><div class="power-btn" data-power="dash"><div class="power-icon">&#9876;</div><div class="power-key">[2]</div><div class="power-name">DASH</div></div><div class="power-btn" data-power="slam"><div class="power-icon">&#9760;</div><div class="power-key">[3]</div><div class="power-name">SLAM</div></div><div class="power-btn ult-btn disabled" data-power="ultimate"><div class="power-icon">&#10038;</div><div class="power-key">[4]</div><div class="power-name">ULTIMATE</div></div></div>
<div id="endScreen"><div class="end-title" id="endTitle"></div><div class="end-sub" id="endSub"></div><button id="restartBtn">Fight Again</button></div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';

const E=.001;
const EPOS=new THREE.Vector3(0,0,-10);
const ST={phase:'menu',php:100,ehp:100,mhp:100,en:3,men:5,uc:0,ur:false,si:0,sm:1,il:false,pc:false};

/* ===== AUDIO ===== */
let ac=null;
function ia(){ac=new(window.AudioContext||window.webkitAudioContext)()}
function pt(f,d,t='sine',v=.12,det=0){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;o.detune.value=det;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function pn(d,v=.08){if(!ac)return;const b=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;const s=ac.createBufferSource();s.buffer=b;const g=ac.createGain();g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);const fi=ac.createBiquadFilter();fi.type='lowpass';fi.frequency.value=900;s.connect(fi).connect(g).connect(ac.destination);s.start()}
function sCharge(){pt(70,1,'sawtooth',.06);pt(110,.7,'sine',.05);setTimeout(()=>pt(170,.5,'sine',.07),250);setTimeout(()=>pt(220,.3,'sine',.09),500)}
function sHit(h=false){pn(.2,h?.35:.15);pt(50,.4,'sine',h?.25:.12);if(h){pt(25,.7,'sine',.18);pt(80,.15,'square',.04)}}
function sBoom(){pn(.8,.4);pt(35,1,'sine',.3);pt(20,1.2,'sine',.18);setTimeout(()=>pn(.4,.2),80)}
function sWhoosh(){pn(.25,.06);pt(800,.15,'sine',.03)}
function sWind(){if(!ac)return;const b=ac.createBuffer(1,ac.sampleRate*5,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ac.createBufferSource();s.buffer=b;s.loop=true;const g=ac.createGain();g.gain.value=.025;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=350;s.connect(f).connect(g).connect(ac.destination);s.start()}
function sMusic(){if(!ac)return;const dr=()=>{pt(50,10,'sawtooth',.03);pt(50.8,10,'sawtooth',.03);pt(75,10,'sine',.02);pt(100,5,'triangle',.015);pt(150,3,'sine',.008)};dr();setInterval(dr,9000)}
function sUltBuild(){pt(55,2.5,'sawtooth',.05);pt(85,2,'sine',.04);setTimeout(()=>pt(120,1.2,'sine',.06),600);setTimeout(()=>pt(160,.8,'triangle',.08),1000);setTimeout(()=>pt(250,.5,'sine',.1),1500);setTimeout(()=>pt(400,.3,'sine',.12),1800)}

/* ===== RENDERER ===== */
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x1a1520,.006);
const cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,500);
const ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth,innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=true;
ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=1.2;
document.body.prepend(ren.domElement);

/* ===== LIGHTS ===== */
const sun=new THREE.DirectionalLight(0xffddbb,3);
sun.position.set(25,35,15);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=100;
sun.shadow.camera.left=-40;sun.shadow.camera.right=40;
sun.shadow.camera.top=40;sun.shadow.camera.bottom=-40;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x334466,.5));
scene.add(new THREE.HemisphereLight(0xffeedd,0x223322,.6));

// Rim lights for anime look
const rimL=new THREE.DirectionalLight(0xff4400,.8);rimL.position.set(-5,3,8);scene.add(rimL);
const rimR=new THREE.DirectionalLight(0x0066ff,.8);rimR.position.set(5,3,-12);scene.add(rimR);

/* ===== SKY ===== */
const skyG=new THREE.SphereGeometry(Math.max(E,200),32,32);
const skyM=new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{uT:{value:new THREE.Color(0x0a0520)},uM:{value:new THREE.Color(0x3a1535)},uB:{value:new THREE.Color(0xdd6633)}},vertexShader:`varying vec3 vW;void main(){vec4 w=modelMatrix*vec4(position,1.);vW=w.xyz;gl_Position=projectionMatrix*viewMatrix*w;}`,fragmentShader:`uniform vec3 uT,uM,uB;varying vec3 vW;void main(){float h=normalize(vW).y;vec3 c=h>0.?mix(uM,uT,pow(h,.5)):mix(uM,uB,pow(-h,.35));gl_FragColor=vec4(c,1.);}`});
scene.add(new THREE.Mesh(skyG,skyM));

/* ===== CLOUDS ===== */
const clouds=[];
function mkCloud(x,y,z,s){const g=new THREE.Group(),m=new THREE.MeshLambertMaterial({color:0x443344,transparent:true,opacity:.5});for(let i=0;i<5+Math.random()*4|0;i++){const r=Math.max(E,1.5+Math.random()*2.5)*s;const sg=new THREE.SphereGeometry(r,7,5);const sh=new THREE.Mesh(sg,m);sh.position.set((Math.random()-.5)*6*s,(Math.random()-.5)*1.2*s,(Math.random()-.5)*3*s);g.add(sh)}g.position.set(x,y,z);scene.add(g);clouds.push({m:g,s:.2+Math.random()*.4})}
for(let i=0;i<15;i++)mkCloud((Math.random()-.5)*200,25+Math.random()*40,-40+Math.random()*120,.7+Math.random()*1.5);

/* ===== GROUND ===== */
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshLambertMaterial({color:0x3a2a25}));
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);
const arena=new THREE.Mesh(new THREE.CircleGeometry(Math.max(E,14),64),new THREE.MeshLambertMaterial({color:0x2d2020}));
arena.rotation.x=-Math.PI/2;arena.position.y=.01;arena.receiveShadow=true;scene.add(arena);
// Cracks
for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,d=3+Math.random()*8,l=2+Math.random()*6;
const pts=[new THREE.Vector3(Math.cos(a)*d,.02,Math.sin(a)*d),new THREE.Vector3(Math.cos(a+.1)*(d+l),.02,Math.sin(a+.1)*(d+l))];
const lg=new THREE.BufferGeometry().setFromPoints(pts);const lm=new THREE.LineBasicMaterial({color:0x1a1010,transparent:true,opacity:.4});scene.add(new THREE.Line(lg,lm))}

/* ===== TREES (dark dead trees for atmosphere) ===== */
const trees=[];
function mkTree(x,z){const g=new THREE.Group();const h=3+Math.random()*4;const tr=new THREE.Mesh(new THREE.CylinderGeometry(Math.max(E,.08),Math.max(E,.2),h,5),new THREE.MeshLambertMaterial({color:0x1a1210}));tr.position.y=h/2;tr.castShadow=true;g.add(tr);
for(let i=0;i<3;i++){const br=new THREE.Mesh(new THREE.CylinderGeometry(Math.max(E,.03),Math.max(E,.08),1.5+Math.random(),4),new THREE.MeshLambertMaterial({color:0x1a1210}));br.position.set(0,h*.5+i*.4,0);br.rotation.z=(Math.random()-.5)*1.2;br.rotation.x=(Math.random()-.5)*.5;g.add(br)}
g.position.set(x,0,z);scene.add(g);trees.push(g)}
[[-14,0,-18],[-20,0,-8],[-18,0,6],[-26,0,0],[14,0,-18],[20,0,-10],[17,0,4],[26,0,-14],[-10,0,16],[12,0,20],[-24,0,14],[24,0,12],[-32,0,-5],[32,0,-8],[-6,0,-24],[8,0,-26]].forEach(p=>mkTree(p[0],p[1]||0,p[2]||0));

/* ===== RUINED BUILDINGS ===== */
function mkRuin(x,z,rot=0){const g=new THREE.Group();const h=4+Math.random()*6;const w=3+Math.random()*3;
const wall=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.5),new THREE.MeshLambertMaterial({color:0x2a2225}));wall.position.y=h/2;wall.castShadow=true;g.add(wall);
// Broken top
const bh=Math.max(E,h*.3+Math.random()*h*.3);const bw=Math.max(E,w*.6+Math.random()*w*.3);
const broken=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,0.5),new THREE.MeshLambertMaterial({color:0x2a2225}));broken.position.set((Math.random()-.5)*w*.3,h-bh/2,0);g.add(broken);
g.position.set(x,0,z);g.rotation.y=rot;scene.add(g)}
mkRuin(-35,-22,.4);mkRuin(-40,-16,-.3);mkRuin(36,-28,-.6);mkRuin(40,-20,.2);mkRuin(-30,18,.8);mkRuin(32,15,-.4);

/* ===== DISTANT CITY ===== */
const cityG=new THREE.Group();
for(let i=0;i<35;i++){const w=2+Math.random()*5,h=6+Math.random()*30,d=2+Math.random()*4;
const bg=new THREE.BoxGeometry(Math.max(E,w),Math.max(E,h),Math.max(E,d));
const sh=.15+Math.random()*.2;const bm=new THREE.MeshLambertMaterial({color:new THREE.Color(sh,sh*.95,sh*1.1),emissive:new THREE.Color(sh*.06,sh*.03,sh*.08),emissiveIntensity:1});
const b=new THREE.Mesh(bg,bm);const a=(i/35)*Math.PI*1.4+Math.PI*.85;const dist=85+Math.random()*50;
b.position.set(Math.cos(a)*dist,h/2,Math.sin(a)*dist);cityG.add(b)}
scene.add(cityG);

/* ===== DUST ===== */
const dC=600;const dG=new THREE.BufferGeometry();const dP=new Float32Array(dC*3);const dV=[];
for(let i=0;i<dC;i++){dP[i*3]=(Math.random()-.5)*80;dP[i*3+1]=Math.random()*12;dP[i*3+2]=(Math.random()-.5)*80;dV.push({x:(Math.random()-.5)*.25,y:(Math.random()-.5)*.04,z:(Math.random()-.5)*.25})}
dG.setAttribute('position',new THREE.BufferAttribute(dP,3));
const dust=new THREE.Points(dG,new THREE.PointsMaterial({color:0xaa8866,size:.12,transparent:true,opacity:.35,sizeAttenuation:true,depthWrite:false}));
scene.add(dust);

/* ===== ANIME CHARACTER ===== */
function mkChar(cfg){
const{hairC,outfitC,outfitC2,pantsC,bootC,skinC,eyeC,capeC}=cfg;
const g=new THREE.Group();

// Legs
const legG=new THREE.CylinderGeometry(Math.max(E,.11),Math.max(E,.09),1.3,8);
const legM=new THREE.MeshPhongMaterial({color:pantsC});
const legL=new THREE.Mesh(legG,legM);legL.position.set(-.18,.75,0);legL.castShadow=true;g.add(legL);
const legR=legL.clone();legR.position.x=.18;g.add(legR);

// Boots
const bootG=new THREE.BoxGeometry(.18,.22,.32);
const bootM=new THREE.MeshPhongMaterial({color:bootC});
const bL=new THREE.Mesh(bootG,bootM);bL.position.set(-.18,.11,.04);g.add(bL);
const bR=bL.clone();bR.position.x=.18;g.add(bR);

// Torso
const torsoG=new THREE.CylinderGeometry(Math.max(E,.32),Math.max(E,.28),1.3,10);
const torsoM=new THREE.MeshPhongMaterial({color:outfitC});
const torso=new THREE.Mesh(torsoG,torsoM);torso.position.y=2;torso.castShadow=true;g.add(torso);

// Jacket/overlay
const jG=new THREE.CylinderGeometry(Math.max(E,.35),Math.max(E,.25),1.1,10);
const jM=new THREE.MeshPhongMaterial({color:outfitC2,transparent:true,opacity:.85});
const jacket=new THREE.Mesh(jG,jM);jacket.position.y=2.1;g.add(jacket);

// Belt
const beltG=new THREE.CylinderGeometry(Math.max(E,.3),Math.max(E,.3),.12,10);
const beltM=new THREE.MeshPhongMaterial({color:0x222222});
const belt=new THREE.Mesh(beltG,beltM);belt.position.y=1.42;g.add(belt);

function mkTex(c){const cv=document.createElement('canvas');cv.width=64;cv.height=64;const cx=cv.getContext('2d');const gr=cx.createRadialGradient(32,32,0,32,32,32);gr.addColorStop(0,c);gr.addColorStop(.35,c);gr.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=gr;cx.fillRect(0,0,64,64);return new THREE.CanvasTexture(cv)}
const oTex=mkTex('rgba(255,120,0,1)');const bTex=mkTex('rgba(0,130,255,1)');const wTex=mkTex('rgba(255,255,255,1)');const yTex=mkTex('rgba(255,200,0,1)');

function mkBurst(n,t){const g=new THREE.BufferGeometry();const p=new Float32Array(n*3);const v=[];for(let i=0;i<n;i++){p[i*3]=0;p[i*3+1]=0;p[i*3+2]=0;v.push(new THREE.Vector3((Math.random()-.5)*8,Math.random()*6,(Math.random()-.5)*8))}g.setAttribute('position',new THREE.BufferAttribute(p,3));const m=new THREE.PointsMaterial({map:t,size:.7,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});const pts=new THREE.Points(g,m);pts.visible=false;scene.add(pts);return{m:pts,mat:m,v,life:0}}

const pTrail=mkTrail(0xff6600,oTex);const eTrail=mkTrail(0x0088ff,bTex);

function addTrailPt(trail,pos){const p=trail.m.geometry.attributes.position.array;const i=trail.idx%trail.n;p[i*3]=pos.x;p[i*3+1]=pos.y;p[i*3+2]=pos.z;trail.idx++;trail.m.geometry.attributes.position.needsUpdate=true;trail.m.visible=true}

async function energyBlast(ip){
if(ST.il)return;ST.il=true;
const atk=ip?player:enemy,tgt=ip?enemy:player;
const ball=ip?pBall:eBall,burst=ip?pBurst:eBurst,sw=ip?pSW:eSW,trail=ip?pTrail:eTrail;
if(ip&&ST.en<1){ST.il=false;return}
if(ip){ST.en--;uEN()}

sCharge();
// Dramatic camera - low angle
lC(ip?CM.low:CM.dram,ip?CM.low.t:CM.dram.t,.06);
await wait(400);

// Charge - fist glows
const d=atk.userData;
d.fistGlowL.intensity=3;d.fistGlowR.intensity=3;
const hp=new THREE.Vector3();atk.getWorldPosition(hp);hp.y+=1;
ball.m.position.copy(hp);ball.m.visible=true;ball.mat.opacity=0;ball.l.intensity=0;ball.m.scale.setScalar(.05);

for(let i=0;i<45;i++){const t=i/45;ball.mat.opacity=t*.9;ball.l.intensity=t*6;ball.m.scale.setScalar(.05+t*.9);await wait(18)}

setSM(true);setSL(true);
await wait(500);

// Fire!
const tp=new THREE.Vector3();tgt.getWorldPosition(tp);tp.y+=2;
sWhoosh();setSM(false);setSL(false);

const sp=ball.m.position.clone();const dist=sp.distanceTo(tp);
for(let i=0;i<25;i++){const t=i/25;ball.m.position.lerpVectors(sp,tp,t*t);ball.m.scale.setScalar(.95-t*.4);
addTrailPt(trail,ball.m.position);await wait(12)}

// Trail fade
setTimeout(()=>{trail.m.visible=false},300);

// Impact
sHit(true);flash(200);shake(.8);
ball.m.visible=false;d.fistGlowL.intensity=0;d.fistGlowR.intensity=0;

// Shockwave + burst
const ip2=new THREE.Vector3();tgt.getWorldPosition(ip2);ip2.y=.1;
sw.m.position.copy(ip2);sw.m.visible=true;sw.m.scale.setScalar(.1);
burst.m.position.copy(ip2);burst.m.position.y=2;burst.m.visible=true;resetBurst(burst);
// Make burst velocities more dramatic
for(let i=0;i<burst.v.length;i++){const a=Math.random()*Math.PI*2;const sp2=4+Math.random()*8;burst.v[i].set(Math.cos(a)*sp2,Math.random()*8+3,Math.sin(a)*sp2)}

lC(CM.sL.p,CM.sL.t,.08);

for(let i=0;i<35;i++){animSW(sw,i/35);burst.mat.opacity=1-(i/35);burst.life=i/35;await wait(22)}
sw.m.visible=false;burst.m.visible=false;

const dmg=10+Math.floor(Math.random()*8);
if(ip){ST.ehp=Math.max(0,ST.ehp-dmg);ST.uc=Math.min(100,ST.uc+18);uHP();uUB()}else{ST.php=Math.max(0,ST.php-dmg);uHP()}
lC(CM.fight.p,CM.fight.t,.04);ST.il=false;uEN()}

async function dashStrike(ip){
if(ST.il)return;ST.il=true;
const atk=ip?player:enemy,tgt=ip?enemy:player;
const burst=ip?pBurst:eBurst,sw=ip?pSW:eSW,trail=ip?pTrail:eTrail;
if(ip&&ST.en<1){ST.il=false;return}
if(ip){ST.en--;uEN()}

sWhoosh();setSL(true);

const sp=atk.position.clone();
const tp=tgt.position.clone();
const ep=sp.clone().lerp(tp,.7);

lC(ip?CM.sR.p:CM.sL.p,ip?CM.sR.t:CM.sL.t,.06);

// Dash with trail
for(let i=0;i<14;i++){const t=i/14;atk.position.lerpVectors(sp,ep,t*t*t);
addTrailPt(trail,new THREE.Vector3(atk.position.x,atk.position.y+1,atk.position.z));
if(i>4&&i<12)shake(.12);await wait(14)}
setTimeout(()=>{trail.m.visible=false},200);
setSL(false);

// Impact
sHit(true);flash(130);shake(1);

const ip2=new THREE.Vector3();atk.getWorldPosition(ip2);ip2.y=.1;
sw.m.position.copy(ip2);sw.m.visible=true;sw.m.scale.setScalar(.1);sw.mat.opacity=.7;
burst.m.position.copy(ip2);burst.m.position.y=2;burst.m.visible=true;resetBurst(burst);
for(let i=0;i<burst.v.length;i++){const a=Math.random()*Math.PI*2;const s=3+Math.random()*10;burst.v[i].set(Math.cos(a)*s,Math.random()*6+2,Math.sin(a)*s)}

const kbD=tgt.position.clone().sub(atk.position).normalize();
const kbS=tgt.position.clone();const kbE=kbS.clone().add(kbD.multiplyScalar(4));

for(let i=0;i<25;i++){animSW(sw,i/25);burst.mat.opacity=1-(i/25);burst.life=i/25;
if(i<.5*25)tgt.position.lerpVectors(kbS,kbE,i/(.5*25));await wait(22)}
sw.m.visible=false;burst.m.visible=false;

const dmg=14+Math.floor(Math.random()*6);
if(ip){ST.ehp=Math.max(0,ST.ehp-dmg);ST.uc=Math.min(100,ST.uc+22);uHP();uUB()}else{ST.php=Math.max(0,ST.php-dmg);uHP()}
lC(CM.fight.p,CM.fight.t,.04);ST.il=false;uEN()}

if(ip){ST.ehp=Math.max(0,ST.ehp-dmg);ST.uc=Math.min(100,ST.uc+28);uHP();uUB()}else{ST.php=Math.max(0,ST.php-dmg);uHP()}

if(ip){ST.ur=false;ST.uc=0;uUB();uEN()}

sUltBuild();
 $smo.style.background='rgba(0,0,0,0.5)';$smo.classList.add('active');

const sc=atk.position.clone();sc.y=2;

// 360 camera spin with aura build
for(let i=0;i<80;i++){const t=i/80;const a=t*Math.PI*2;const r=7-t*3;
const cy=2.5+Math.sin(t*Math.PI)*4;
cPos.set(sc.x+Math.cos(a)*r,cy,sc.z+Math.sin(a)*r);cTgt.copy(sc);
cam.position.copy(cPos);cam.lookAt(cTgt);

atk.userData.auraMat.opacity=t*.5;atk.userData.aura.scale.setScalar(1+t*3);
atk.userData.auraMat.color.set(t>.6?0xffcc00:(ip?0xff6600:0x0088ff));
await wait(28)}

atk.userData.auraMat.opacity=.6;atk.userData.aura.scale.setScalar(4);

sBoom();flash(500);shake(2);
 $smo.style.background='rgba(0,0,0,0)';$smo.classList.remove('active');
setSL(true);

uBurst.m.position.copy(atk.position);uBurst.m.position.y=2;uBurst.m.visible=true;resetBurst(uBurst);
for(let i=0;i<uBurst.v.length;i++){const a=Math.random()*Math.PI*2;const s=4+Math.random()*14;uBurst.v[i].set(Math.cos(a)*s,Math.random()*12+4,Math.sin(a)*s)}

const sw=ip?pSW:eSW;sw.m.position.copy(atk.position);sw.m.position.y=.1;sw.m.visible=true;sw.m.scale.setScalar(.1);sw.mat.opacity=1;sw.mat.color.set(0xffcc00);

lC(CM.wide.p,CM.wide.t,.06);

const kbD=tgt.position.clone().sub(atk.position).normalize();
const kbS=tgt.position.clone();const kbE=kbS.clone().add(kbD.multiplyScalar(10));kbE.y=0;

setSM(true);
for(let i=0;i<70;i++){animSW(sw,i/70);uBurst.mat.opacity=1-(i/70)*(i/70);uBurst.life=i/70;
if(i<.35*70)tgt.position.lerpVectors(kbS,kbE,i/(.35*70));await wait(28)}
setSM(false);setSL(false);
sw.m.visible=false;uBurst.m.visible=false;sw.mat.color.set(ip?0xff6600:0x0088ff);
atk.userData.auraMat.opacity=0;atk.userData.aura.scale.setScalar(1);

const dmg=30+Math.floor(Math.random()*15);
if(ip){ST.ehp=Math.max(0,ST.ehp-dmg);uHP()}else{ST.php=Math.max(0,ST.php-dmg);uHP()}
lC(CM.fight.p,CM.fight.t,.04);ST.il=false;uEN()}

/* ===== AI ===== */
let aiT=0,aiN=2800+Math.random()*2500;
function uAI(dt){if(ST.phase!=='fight'||ST.il)return;aiT+=dt;if(aiT>aiN){aiT=0;aiN=2200+Math.random()*3000;
if(ST.ehp<35&&Math.random()>.4)ultimatePower(false);
else{const a=[energyBlast,dashStrike,skySlam];a[Math.floor(Math.random()*a.length)](false)}}
const t=performance.now()*.001;enemy.position.x=EPOS.x+Math.sin(t*.4)*.4}

let regenT=0;
function uRegen(dt){if(ST.phase!=='fight')return;regenT+=dt;if(regenT>2200){regenT=0;if(ST.en<ST.men){ST.en++;uEN()}}}

function checkEnd(){if(ST.phase!=='fight')return;
if(ST.ehp<=0){ST.phase='end';ST.il=true;setTimeout(()=>{$hud.classList.remove('visible');$pb.classList.remove('visible');
 $et.textContent='Victory';$et.className='end-title victory';$esub.textContent='Power has decided everything.';$es.classList.add('visible')},1800)}
else if(ST.php<=0){ST.phase='end';ST.il=true;setTimeout(()=>{$hud.classList.remove('visible');$pb.classList.remove('visible');
 $et.textContent='Defeat';$et.className='end-title defeat';$esub.textContent='The battle is over...';$es.classList.add('visible')},1800)}}

/* ===== INTRO ===== */
async function intro(){
ST.phase='intro';$bo.classList.remove('fade-out');await wait(600);
 $bo.classList.add('fade-out');await wait(1800);
sWind();cPos.copy(CM.wide.p);cTgt.copy(CM.wide.t);cam.position.copy(cPos);cam.lookAt(cTgt);
await wait(2500);
lC(CM.pan.p,CM.pan.t,.015);await wait(3500);
await showDlg('This is where we fight...','Deep Voice',3200);await wait(600);
lC(CM.zoom.p,CM.zoom.t,.025);await wait(2500);
await showDlg('Where power decides everything.','Deep Voice',3800);await wait(900);
lC(CM.bP.p,CM.bP.t,.05);await wait(1800);
lC(CM.bE.p,CM.bE.t,.05);await wait(1800);
lC(CM.dram.p,CM.dram.t,.04);await wait(1200);
sMusic();
await showDlg('Show me what you\'ve got.','Rival',2600);await wait(600);
await showDlg('Don\'t blink.','You',2000);await wait(500);
 $hud.classList.add('visible');$pb.classList.add('visible');uHP();uEN();uUB();
ST.phase='fight'}

/* ===== INPUT ===== */
document.addEventListener('keydown',e=>{if(ST.phase!=='fight'||ST.il)return;
switch(e.key){case'1':energyBlast(true);break;case'2':dashStrike(true);break;case'3':skySlam(true);break;case'4':ultimatePower(true);break}});
 $pbs.forEach(b=>b.addEventListener('click',()=>{if(ST.phase!=='fight'||ST.il)return;
switch(b.dataset.power){case'blast':energyBlast(true);break;case'dash':dashStrike(true);break;case'slam':skySlam(true);break;case'ultimate':ultimatePower(true);break}}));

 $('startBtn').addEventListener('click',()=>{ia();$ss.classList.add('hidden');setTimeout(()=>{$ss.style.display='none';intro()},1500)});
 $('restartBtn').addEventListener('click',()=>location.reload());

/* ===== RENDER LOOP ===== */
const clk=new THREE.Clock();
function animate(){
requestAnimationFrame(animate);
const rd=clk.getDelta();const dt=rd*1000*ST.sm;const el=clk.elapsedTime;

// Clouds
clouds.forEach(c=>{c.m.position.x+=c.s*rd;if(c.m.position.x>130)c.m.position.x=-130});

// Dust
const dp=dust.geometry.attributes.position.array;
for(let i=0;i<dC;i++){dp[i*3]+=dV[i].x*rd;dp[i*3+1]+=dV[i].y*rd;dp[i*3+2]+=dV[i].z*rd;
if(Math.abs(dp[i*3])>40)dp[i*3]*=-.9;if(dp[i*3+1]>12||dp[i*3+1]<0)dV[i].y*=-1;if(Math.abs(dp[i*3+2])>40)dp[i*3+2]*=-.9}
dust.geometry.attributes.position.needsUpdate=true;

// Trees
trees.forEach((t,i)=>{t.rotation.z=Math.sin(el*.7+i)*.015;t.rotation.x=Math.sin(el*.5+i*.5)*.008});

// Characters idle + cape physics
[player,enemy].forEach((ch,ci)=>{
const o=ci*Math.PI;const d=ch.userData;
d.aL.rotation.x=Math.sin(el*1.8+o)*.12;d.aR.rotation.x=Math.sin(el*1.8+o+1)*.12;
d.legL.rotation.x=Math.sin(el*1.4+o)*.06;d.legR.rotation.x=Math.sin(el*1.4+o+Math.PI)*.06;
ch.position.y=Math.sin(el*2.2+o)*.04;
// Cape physics
if(d.cape){
const cp=d.capeGeo.attributes.position.array;
for(let i=0;i<cp.length;i+=3){
const row=Math.floor((i/3)/5);const col=(i/3)%5;
const baseY=1.8-row*.2;const baseZ=-.28;
cp[i+1]=baseY+Math.sin(el*2+row*.5+ci)*(.05+row*.02);
cp[i+2]=baseZ-Math.abs(col-2)*.08-Math.sin(el*1.5+row*.3)*.04-row*.03}
d.capeGeo.attributes.position.needsUpdate=true}});

// Burst particles
[pBurst,eBurst,uBurst].forEach(b=>animBurst(b,rd));

// Camera
if(ST.phase==='fight'&&!ST.il)lC(CM.fight.p,CM.fight.t,.04);

// Shake
if(ST.si>.005){cam.position.x+=(Math.random()-.5)*ST.si*.6;cam.position.y+=(Math.random()-.5)*ST.si*.4;cam.position.z+=(Math.random()-.5)*ST.si*.3;ST.si*=.88;if(ST.si<.005)ST.si=0}

uAI(dt);uRegen(dt);checkEnd();
ren.render(scene,cam)}

/* ===== RESIZE ===== */
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});

cPos.copy(CM.wide.p);cTgt.copy(CM.wide.t);animate();
</script>
</body>
</html>
