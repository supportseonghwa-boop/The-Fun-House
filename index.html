<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fun House – Chapter 1</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0a0a0a;--fg:#d4c5b0;--accent:#8b0000;--accent-glow:#ff1a1a;--card:rgba(10,10,10,0.92);--border:#2a1a1a;--muted:#4a3a2a;--green:#00ff41;--blue:#4a9eff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'Share Tech Mono',monospace;overflow:hidden;cursor:none;width:100vw;height:100vh;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#vhs-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;mix-blend-mode:overlay;opacity:.07;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.03) 2px,rgba(255,255,255,.03) 4px)}
#vhs-overlay::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.6) 100%)}
#scanline{position:fixed;top:0;left:0;width:100%;height:4px;background:rgba(255,255,255,.04);z-index:51;pointer-events:none;animation:scanMove 4s linear infinite}
@keyframes scanMove{0%{top:-4px}100%{top:100%}}
#static-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:52;pointer-events:none;opacity:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="4" height="4" fill="rgba(255,255,255,0.1)"/><rect x="0" y="0" width="1" height="1" fill="rgba(0,0,0,0.3)"/><rect x="2" y="2" width="1" height="1" fill="rgba(0,0,0,0.2)"/></svg>');transition:opacity .05s}
#danger-vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:49;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(139,0,0,.7) 100%);transition:opacity .5s}
#hud{position:fixed;bottom:0;left:0;width:100%;z-index:40;pointer-events:none;display:none}
#battery-bar{position:fixed;bottom:24px;left:24px;z-index:40;display:none;align-items:center;gap:8px}
#battery-bar i{color:var(--accent-glow);font-size:14px}
#battery-track{width:100px;height:6px;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:3px;overflow:hidden}
#battery-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent),var(--accent-glow));transition:width .3s;border-radius:2px}
#stamina-bar{position:fixed;bottom:48px;left:24px;z-index:40;display:none;align-items:center;gap:8px}
#stamina-track{width:80px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
#stamina-fill{height:100%;width:100%;background:var(--blue);transition:width .2s;border-radius:2px}
#inventory-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:40;display:none;gap:4px}
.inv-slot{width:52px;height:52px;background:var(--card);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:10px;color:var(--muted);position:relative;pointer-events:auto;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.inv-slot:hover{border-color:var(--accent);box-shadow:0 0 8px rgba(139,0,0,.4)}
.inv-slot.has-item{border-color:var(--muted);color:var(--fg)}
.inv-slot.active-slot{border-color:var(--accent-glow);box-shadow:0 0 12px rgba(255,26,26,.5)}
.inv-slot i{font-size:18px;margin-bottom:2px}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:40;display:none;pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5);border-radius:1px}
#crosshair::before{width:2px;height:12px;top:-6px;left:-1px}
#crosshair::after{width:12px;height:2px;top:-1px;left:-6px}
#interact-prompt{position:fixed;top:55%;left:50%;transform:translateX(-50%);z-index:40;display:none;text-align:center;pointer-events:none}
#interact-prompt .key{display:inline-block;padding:2px 8px;border:1px solid var(--accent);border-radius:4px;color:var(--accent-glow);font-size:14px;margin-right:6px}
#interact-prompt .label{color:var(--fg);font-size:13px;opacity:.8}
#note-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;display:none;width:500px;max-width:90vw;max-height:70vh;padding:40px;background:var(--card);border:1px solid var(--border);border-radius:4px;pointer-events:auto;overflow-y:auto}
#note-display h3{font-family:'Creepster',cursive;color:var(--accent-glow);font-size:22px;margin-bottom:16px;letter-spacing:2px}
#note-display p{font-size:13px;line-height:1.8;color:var(--fg);opacity:.85}
#note-display .close-note{position:absolute;top:12px;right:16px;color:var(--muted);font-size:18px;cursor:pointer}
#note-display .close-note:hover{color:var(--accent-glow)}
#code-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;display:none;width:280px;padding:28px;background:var(--card);border:1px solid var(--accent);border-radius:6px;text-align:center;pointer-events:auto}
#code-panel h3{font-family:'Creepster',cursive;color:var(--accent-glow);font-size:20px;margin-bottom:16px}
#code-input{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.code-digit{width:42px;height:50px;background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:4px;color:var(--green);font-size:22px;text-align:center;font-family:'Share Tech Mono',monospace;outline:none}
.code-digit:focus{border-color:var(--accent-glow);box-shadow:0 0 6px rgba(255,26,26,.3)}
#code-submit{padding:8px 24px;background:transparent;border:1px solid var(--accent);color:var(--accent-glow);font-family:'Share Tech Mono',monospace;font-size:13px;cursor:pointer;border-radius:4px;transition:all .2s}
#code-submit:hover{background:var(--accent);color:#fff}
#code-feedback{margin-top:10px;font-size:12px;min-height:16px;color:var(--accent-glow)}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
#start-screen .title{font-family:'Creepster',cursive;font-size:clamp(36px,8vw,72px);color:var(--accent-glow);text-shadow:0 0 40px rgba(139,0,0,.6),0 0 80px rgba(139,0,0,.3);letter-spacing:6px;animation:titlePulse 3s ease-in-out infinite;position:relative}
#start-screen .title::before{content:'THE FUN HOUSE';position:absolute;top:2px;left:2px;color:rgba(0,255,255,.15);clip-path:inset(0 0 60% 0);animation:glitch1 2s infinite}
#start-screen .title::after{content:'THE FUN HOUSE';position:absolute;top:-2px;left:-2px;color:rgba(255,0,0,.2);clip-path:inset(60% 0 0 0);animation:glitch2 3s infinite}
@keyframes titlePulse{0%,100%{text-shadow:0 0 40px rgba(139,0,0,.6),0 0 80px rgba(139,0,0,.3)}50%{text-shadow:0 0 60px rgba(139,0,0,.8),0 0 120px rgba(139,0,0,.5),0 0 200px rgba(139,0,0,.2)}}
@keyframes glitch1{0%,90%,100%{transform:translate(0)}92%{transform:translate(-3px,1px)}94%{transform:translate(3px,-1px)}96%{transform:translate(-2px,0)}}
@keyframes glitch2{0%,85%,100%{transform:translate(0)}87%{transform:translate(3px,2px)}89%{transform:translate(-3px,-1px)}91%{transform:translate(2px,1px)}}
#start-screen .chapter{font-size:14px;color:var(--muted);letter-spacing:8px;margin-top:8px;text-transform:uppercase}
#start-screen .play-btn{margin-top:50px;padding:14px 48px;background:transparent;border:2px solid var(--accent);color:var(--accent-glow);font-family:'Creepster',cursive;font-size:22px;letter-spacing:4px;cursor:pointer;border-radius:4px;transition:all .3s;position:relative;overflow:hidden}
#start-screen .play-btn:hover{background:var(--accent);color:#fff;box-shadow:0 0 30px rgba(139,0,0,.5);transform:scale(1.05)}
#start-screen .play-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transition:left .5s}
#start-screen .play-btn:hover::before{left:100%}
#start-screen .controls-info{margin-top:40px;font-size:11px;color:var(--muted);text-align:center;line-height:2;opacity:.6}
#jumpscare{position:fixed;top:0;left:0;width:100%;height:100%;z-index:80;display:none;align-items:center;justify-content:center;background:#000}
#jumpscare .face{font-size:200px;color:var(--accent-glow);animation:jumpAnim .4s ease-out;filter:drop-shadow(0 0 40px rgba(139,0,0,.8))}
@keyframes jumpAnim{0%{transform:scale(3) rotate(-10deg);opacity:0}30%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
#msg-toast{position:fixed;top:20%;left:50%;transform:translateX(-50%);z-index:55;display:none;padding:10px 24px;background:var(--card);border:1px solid var(--border);border-radius:4px;font-size:13px;color:var(--fg);opacity:0;transition:opacity .3s;pointer-events:none}
#area-label{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:42;display:none;font-family:'Creepster',cursive;font-size:28px;color:var(--accent-glow);letter-spacing:4px;opacity:0;transition:opacity 1s;text-shadow:0 0 20px rgba(139,0,0,.5)}
#pause-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:70;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);flex-direction:column}
#pause-overlay h2{font-family:'Creepster',cursive;font-size:36px;color:var(--accent-glow);letter-spacing:4px;margin-bottom:20px}
#pause-overlay p{color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div id="vhs-overlay"></div>
<div id="scanline"></div>
<div id="static-flash"></div>
<div id="danger-vignette"></div>

<div id="start-screen">
  <div class="title">THE FUN HOUSE</div>
  <div class="chapter">Chapter 1</div>
  <button class="play-btn" id="play-btn">ENTER</button>
  <div class="controls-info">
    WASD - Move &nbsp;|&nbsp; Mouse - Look &nbsp;|&nbsp; SHIFT - Sprint<br>
    CTRL - Crouch &nbsp;|&nbsp; F - Flashlight &nbsp;|&nbsp; E - Interact<br>
    TAB - Inventory &nbsp;|&nbsp; ESC - Pause
  </div>
</div>

<div id="crosshair"></div>
<div id="interact-prompt"><span class="key">E</span><span class="label"></span></div>

<div id="battery-bar"><i class="fas fa-battery-full"></i><div id="battery-track"><div id="battery-fill"></div></div></div>
<div id="stamina-bar"><div id="stamina-track"><div id="stamina-fill"></div></div></div>
<div id="inventory-bar"></div>

<div id="note-display"><span class="close-note" id="close-note"><i class="fas fa-times"></i></span><h3></h3><p></p></div>
<div id="code-panel"><h3>ENTER CODE</h3><div id="code-input"></div><button id="code-submit">CONFIRM</button><div id="code-feedback"></div></div>
<div id="jumpscare"><div class="face"><i class="fas fa-skull"></i></div></div>
<div id="msg-toast"></div>
<div id="area-label"></div>
<div id="pause-overlay"><h2>PAUSED</h2><p>Click to resume</p></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

/* ═══════════════════════════════════════════
   PROCEDURAL TEXTURE GENERATOR
   Creates all textures with color, normal, 
   roughness, and AO maps
   ═══════════════════════════════════════════ */
class TextureGen {
  static wallPeeling(size = 512) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const x = c.getContext('2d');
    // 基础颜色 - 褪色的暖黄
    x.fillStyle = '#7a6b55'; x.fillRect(0, 0, size, size);
    // 污渍和水渍
    for (let i = 0; i < 20; i++) {
      const gx = Math.random() * size, gy = Math.random() * size;
      const gr = 20 + Math.random() * 80;
      const grd = x.createRadialGradient(gx, gy, 0, gx, gy, gr);
      grd.addColorStop(0, `rgba(40,30,20,${0.1 + Math.random() * 0.2})`);
      grd.addColorStop(1, 'rgba(40,30,20,0)');
      x.fillStyle = grd; x.fillRect(0, 0, size, size);
    }
    // 剥落的油漆层
    for (let i = 0; i < 8; i++) {
      x.fillStyle = `rgba(${150 + Math.random()*60},${80 + Math.random()*40},${50 + Math.random()*30},${0.3 + Math.random()*0.4})`;
      const px = Math.random() * size, py = Math.random() * size;
      x.beginPath();
      for (let j = 0; j < 6; j++) {
        const a = (j / 6) * Math.PI * 2;
        const r = 15 + Math.random() * 40;
        j === 0 ? x.moveTo(px + Math.cos(a)*r, py + Math.sin(a)*r) : x.lineTo(px + Math.cos(a)*r, py + Math.sin(a)*r);
      }
      x.closePath(); x.fill();
    }
    // 裂缝
    x.strokeStyle = 'rgba(30,20,10,0.4)'; x.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      let lx = Math.random() * size, ly = Math.random() * size;
      x.beginPath(); x.moveTo(lx, ly);
      for (let j = 0; j < 8; j++) { lx += (Math.random()-0.5)*30; ly += Math.random()*20; x.lineTo(lx, ly); }
      x.stroke();
    }
    // 角落霉斑
    const corners = [[0,0],[size,0],[0,size],[size,size]];
    corners.forEach(([cx,cy]) => {
      const grd = x.createRadialGradient(cx,cy,0,cx,cy,100);
      grd.addColorStop(0,'rgba(20,40,15,0.5)'); grd.addColorStop(1,'rgba(20,40,15,0)');
      x.fillStyle = grd; x.fillRect(0,0,size,size);
    });
    // 淡化的卡通小丑图案
    x.globalAlpha = 0.08;
    x.fillStyle = '#ff4444';
    x.beginPath(); x.arc(size*0.3, size*0.4, 30, 0, Math.PI*2); x.fill();
    x.fillStyle = '#ffffff';
    x.beginPath(); x.arc(size*0.27, size*0.36, 6, 0, Math.PI*2); x.fill();
    x.beginPath(); x.arc(size*0.33, size*0.36, 6, 0, Math.PI*2); x.fill();
    x.fillStyle = '#ff0000';
    x.beginPath(); x.arc(size*0.3, size*0.43, 12, 0, Math.PI); x.fill();
    x.globalAlpha = 1;
    // 噪点
    const id = x.getImageData(0,0,size,size);
    for (let i = 0; i < id.data.length; i += 4) {
      const n = (Math.random()-0.5)*15;
      id.data[i] += n; id.data[i+1] += n; id.data[i+2] += n;
    }
    x.putImageData(id, 0, 0);
    return { color: c, normal: this._genNormal(c, 2), roughness: this._genRoughness(0.85), ao: this._genAO(c) };
  }

  static floorWood(size = 512) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const x = c.getContext('2d');
    const plankW = size / 6;
    // 每块木板的颜色略有不同
    for (let i = 0; i < 6; i++) {
      const shade = 60 + Math.random() * 40;
      x.fillStyle = `rgb(${shade+30},${shade+10},${shade-10})`;
      x.fillRect(i * plankW, 0, plankW - 2, size);
      // 木纹
      x.strokeStyle = `rgba(${shade-10},${shade-20},${shade-30},0.3)`;
      x.lineWidth = 0.5;
      for (let j = 0; j < 15; j++) {
        const y = Math.random() * size;
        x.beginPath(); x.moveTo(i * plankW, y);
        x.bezierCurveTo(i*plankW + plankW*0.3, y + (Math.random()-0.5)*8, i*plankW + plankW*0.7, y + (Math.random()-0.5)*8, i*plankW + plankW, y + (Math.random()-0.5)*4);
        x.stroke();
      }
      // 板缝
      x.fillStyle = 'rgba(10,5,0,0.8)';
      x.fillRect(i * plankW + plankW - 2, 0, 2, size);
    }
    // 板缝间的灰尘
    for (let i = 0; i < 6; i++) {
      x.fillStyle = 'rgba(30,20,10,0.3)';
      x.fillRect(i * plankW + plankW - 4, 0, 4, size);
    }
    // 脏污斑点
    for (let i = 0; i < 12; i++) {
      const grd = x.createRadialGradient(Math.random()*size, Math.random()*size, 0, Math.random()*size, Math.random()*size, 20+Math.random()*40);
      grd.addColorStop(0, `rgba(20,15,10,${0.1+Math.random()*0.15})`);
      grd.addColorStop(1, 'rgba(20,15,10,0)');
      x.fillStyle = grd; x.fillRect(0,0,size,size);
    }
    // 脚印（微弱）
    x.globalAlpha = 0.06; x.fillStyle = '#1a1008';
    for (let i = 0; i < 3; i++) {
      const fx = 100 + Math.random() * (size-200), fy = 100 + Math.random() * (size-200);
      x.beginPath(); x.ellipse(fx, fy, 8, 14, Math.random()*0.5, 0, Math.PI*2); x.fill();
    }
    x.globalAlpha = 1;
    // 噪点
    const id = x.getImageData(0,0,size,size);
    for (let p = 0; p < id.data.length; p += 4) { const n = (Math.random()-0.5)*10; id.data[p]+=n; id.data[p+1]+=n; id.data[p+2]+=n; }
    x.putImageData(id, 0, 0);
    return { color: c, normal: this._genNormal(c, 1.5, true), roughness: this._genRoughness(0.75), ao: this._genAO(c) };
  }

  static metalRust(size = 256) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const x = c.getContext('2d');
    x.fillStyle = '#4a4a4a'; x.fillRect(0, 0, size, size);
    // 锈迹
    for (let i = 0; i < 40; i++) {
      const rx = Math.random()*size, ry = Math.random()*size, rr = 5+Math.random()*30;
      const grd = x.createRadialGradient(rx,ry,0,rx,ry,rr);
      const r = 120+Math.random()*60, g = 50+Math.random()*30, b = 20+Math.random()*20;
      grd.addColorStop(0, `rgba(${r},${g},${b},${0.3+Math.random()*0.4})`);
      grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
      x.fillStyle = grd; x.fillRect(0,0,size,size);
    }
    // 油渍
    for (let i = 0; i < 5; i++) {
      const grd = x.createRadialGradient(Math.random()*size,Math.random()*size,0,Math.random()*size,Math.random()*size,20+Math.random()*30);
      grd.addColorStop(0,'rgba(10,8,5,0.4)'); grd.addColorStop(1,'rgba(10,8,5,0)');
      x.fillStyle = grd; x.fillRect(0,0,size,size);
    }
    // 划痕
    x.strokeStyle = 'rgba(80,80,80,0.5)'; x.lineWidth = 0.5;
    for (let i = 0; i < 10; i++) {
      x.beginPath(); x.moveTo(Math.random()*size, Math.random()*size);
      x.lineTo(Math.random()*size, Math.random()*size); x.stroke();
    }
    return { color: c, normal: this._genNormal(c, 3), roughness: this._genRoughness(0.9) };
  }

  static ceilingDirty(size = 512) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const x = c.getContext('2d');
    x.fillStyle = '#3a3530'; x.fillRect(0, 0, size, size);
    // 水渍
    for (let i = 0; i < 8; i++) {
      const gx = Math.random()*size, gy = Math.random()*size;
      const grd = x.createRadialGradient(gx,gy,0,gx,gy,40+Math.random()*60);
      grd.addColorStop(0,'rgba(50,45,35,0.5)'); grd.addColorStop(0.7,'rgba(40,35,25,0.2)');
      grd.addColorStop(1,'rgba(40,35,25,0)');
      x.fillStyle = grd; x.fillRect(0,0,size,size);
    }
    // 蛛网图案
    x.strokeStyle = 'rgba(60,55,45,0.3)'; x.lineWidth = 0.5;
    const cx = Math.random()*size, cy = Math.random()*size;
    for (let a = 0; a < Math.PI*2; a += Math.PI/6) {
      x.beginPath(); x.moveTo(cx,cy);
      x.lineTo(cx+Math.cos(a)*100, cy+Math.sin(a)*100); x.stroke();
    }
    const id = x.getImageData(0,0,size,size);
    for (let p = 0; p < id.data.length; p+=4) { const n=(Math.random()-0.5)*8; id.data[p]+=n; id.data[p+1]+=n; id.data[p+2]+=n; }
    x.putImageData(id,0,0);
    return { color: c, normal: this._genNormal(c, 1), roughness: this._genRoughness(0.95) };
  }

  static mirror(size = 256) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const x = c.getContext('2d');
    const grd = x.createLinearGradient(0,0,size,size);
    grd.addColorStop(0,'#1a1a2a'); grd.addColorStop(0.3,'#252535');
    grd.addColorStop(0.5,'#2a2a3a'); grd.addColorStop(0.7,'#202030');
    grd.addColorStop(1,'#1a1a2a');
    x.fillStyle = grd; x.fillRect(0,0,size,size);
    // 银色反光
    x.globalAlpha = 0.1;
    const grd2 = x.createLinearGradient(0,0,size*0.3,size);
    grd2.addColorStop(0,'#ffffff'); grd2.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle = grd2; x.fillRect(0,0,size,size);
    x.globalAlpha = 1;
    // 污渍
    for (let i = 0; i < 5; i++) {
      x.fillStyle = `rgba(30,25,20,${0.1+Math.random()*0.15})`;
      x.beginPath(); x.arc(Math.random()*size, Math.random()*size, 10+Math.random()*20, 0, Math.PI*2); x.fill();
    }
    return { color: c, normal: this._genNormal(c, 0.2), roughness: this._genRoughness(0.1) };
  }

  // 法线贴图生成
  static _genNormal(srcCanvas, strength = 2, horizontal = false) {
    const s = srcCanvas.width;
    const c = document.createElement('canvas'); c.width = c.height = s;
    const x = c.getContext('2d');
    const src = srcCanvas.getContext('2d').getImageData(0,0,s,s);
    const out = x.createImageData(s,s);
    for (let y = 1; y < s-1; y++) {
      for (let px = 1; px < s-1; px++) {
        const idx = (y*s+px)*4;
        const l = src.data[((y)*s+(px-1))*4];
        const r = src.data[((y)*s+(px+1))*4];
        const u = src.data[((y-1)*s+px)*4];
        const d = src.data[((y+1)*s+px)*4];
        const dx = (l-r)/255*strength;
        const dy = (u-d)/255*strength;
        out.data[idx] = Math.floor((dx*0.5+0.5)*255);
        out.data[idx+1] = Math.floor((dy*0.5+0.5)*255);
        out.data[idx+2] = Math.floor((0.5 + Math.sqrt(Math.max(0, 1 - dx*dx - dy*dy))*0.5)*255);
        out.data[idx+3] = 255;
      }
    }
    x.putImageData(out, 0, 0);
    return c;
  }

  // 粗糙度贴图
  static _genRoughness(baseValue = 0.8) {
    const s = 256;
    const c = document.createElement('canvas'); c.width = c.height = s;
    const x = c.getContext('2d');
    const v = Math.floor(baseValue * 255);
    x.fillStyle = `rgb(${v},${v},${v})`; x.fillRect(0,0,s,s);
    const id = x.getImageData(0,0,s,s);
    for (let i = 0; i < id.data.length; i+=4) {
      const n = (Math.random()-0.5)*30;
      id.data[i] = Math.max(0, Math.min(255, id.data[i]+n));
      id.data[i+1] = id.data[i]; id.data[i+2] = id.data[i];
    }
    x.putImageData(id,0,0);
    return c;
  }

  // 环境遮蔽贴图
  static _genAO(srcCanvas) {
    const s = 256;
    const c = document.createElement('canvas'); c.width = c.height = s;
    const x = c.getContext('2d');
    x.fillStyle = '#ffffff'; x.fillRect(0,0,s,s);
    // 角落变暗
    const corners = [[0,0],[s,0],[0,s],[s,s]];
    corners.forEach(([cx,cy]) => {
      const grd = x.createRadialGradient(cx,cy,0,cx,cy,s*0.5);
      grd.addColorStop(0,'rgba(0,0,0,0.4)'); grd.addColorStop(1,'rgba(0,0,0,0)');
      x.fillStyle = grd; x.fillRect(0,0,s,s);
    });
    // 基于源图像亮度的暗化
    const src = srcCanvas.getContext('2d').getImageData(0,0,srcCanvas.width,srcCanvas.height);
    const out = x.getImageData(0,0,s,s);
    for (let i = 0; i < out.data.length; i+=4) {
      const srcIdx = Math.floor(i * srcCanvas.width * srcCanvas.width / (s*s)) * 4;
      const brightness = (src.data[srcIdx] + src.data[srcIdx+1] + src.data[srcIdx+2]) / 765;
      const ao = 1 - brightness * 0.3;
      out.data[i] = Math.floor(out.data[i]*ao);
      out.data[i+1] = out.data[i]; out.data[i+2] = out.data[i];
    }
    x.putImageData(out,0,0);
    return c;
  }
}

/* ═══════════════════════════════════════════
   AUDIO MANAGER - Web Audio API
   3D空间音效 + 环境声 + 恐怖触发
   ═══════════════════════════════════════════ */
class AudioManager {
  constructor() {
    this.ctx = null;
    this.listener = null;
    this.masterGain = null;
    this.ambienceGain = null;
    this.initialized = false;
    this.oscillators = [];
    this.noiseNode = null;
  }

  init(listener) {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.listener = listener;
    this.listener.setMasterVolume(1);
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.5;
    this.masterGain.connect(this.ctx.destination);
    this.ambienceGain = this.ctx.createGain();
    this.ambienceGain.gain.value = 0.15;
    this.ambienceGain.connect(this.masterGain);
    this.initialized = true;
  }

  // 创建噪声缓冲（风声/静电的基础）
  _createNoiseBuffer(duration = 2) {
    const sr = this.ctx.sampleRate;
    const len = sr * duration;
    const buf = this.ctx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    return buf;
  }

  // 低频隆隆声 - 环境氛围
  startAmbience() {
    if (!this.initialized) return;
    // 低频无人机嗡鸣
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth'; osc.frequency.value = 35;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 80; filter.Q.value = 5;
    const gain = this.ctx.createGain(); gain.gain.value = 0.08;
    osc.connect(filter); filter.connect(gain); gain.connect(this.ambienceGain);
    osc.start(); this.oscillators.push({ osc, gain });

    // 次低频脉冲
    const osc2 = this.ctx.createOscillator();
    osc2.type = 'sine'; osc2.frequency.value = 18;
    const lfo = this.ctx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 0.1;
    const lfoGain = this.ctx.createGain(); lfoGain.gain.value = 0.06;
    lfo.connect(lfoGain); lfoGain.connect(osc2.frequency);
    const gain2 = this.ctx.createGain(); gain2.gain.value = 0.1;
    osc2.connect(gain2); gain2.connect(this.ambienceGain);
    osc2.start(); lfo.start();
    this.oscillators.push({ osc: osc2, gain: gain2 }, { osc: lfo, gain: null });

    // 风声 - 滤波噪声
    this.noiseNode = this.ctx.createBufferSource();
    this.noiseNode.buffer = this._createNoiseBuffer(4);
    this.noiseNode.loop = true;
    const windFilter = this.ctx.createBiquadFilter();
    windFilter.type = 'bandpass'; windFilter.frequency.value = 300; windFilter.Q.value = 0.5;
    const windGain = this.ctx.createGain(); windGain.gain.value = 0.12;
    // 风声变化
    const windLfo = this.ctx.createOscillator();
    windLfo.type = 'sine'; windLfo.frequency.value = 0.15;
    const windLfoGain = this.ctx.createGain(); windLfoGain.gain.value = 150;
    windLfo.connect(windLfoGain); windLfoGain.connect(windFilter.frequency);
    this.noiseNode.connect(windFilter); windFilter.connect(windGain); windGain.connect(this.ambienceGain);
    this.noiseNode.start(); windLfo.start();
    this.oscillators.push({ osc: windLfo, gain: null });
  }

  // 突然的撞击声
  playBang() {
    if (!this.initialized) return;
    const osc = this.ctx.createOscillator();
    osc.type = 'square'; osc.frequency.value = 60;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.6, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(); osc.stop(this.ctx.currentTime + 0.3);
    // 噪声冲击
    const ns = this.ctx.createBufferSource();
    ns.buffer = this._createNoiseBuffer(0.2);
    const ng = this.ctx.createGain();
    ng.gain.setValueAtTime(0.4, this.ctx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
    ns.connect(ng); ng.connect(this.masterGain);
    ns.start(); ns.stop(this.ctx.currentTime + 0.2);
  }

  // 金属摩擦声
  playCreak() {
    if (!this.initialized) return;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.5);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 600; filter.Q.value = 10;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
    osc.connect(filter); filter.connect(gain); gain.connect(this.masterGain);
    osc.start(); osc.stop(this.ctx.currentTime + 0.5);
  }

  // 低沉笑声
  playLaugh() {
    if (!this.initialized) return;
    const baseFreq = 120;
    const now = this.ctx.currentTime;
    for (let i = 0; i < 6; i++) {
      const t = now + i * 0.15;
      const osc = this.ctx.createOscillator();
      osc.type = 'triangle'; osc.frequency.value = baseFreq + (i % 2 === 0 ? 30 : -20);
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.connect(gain); gain.connect(this.masterGain);
      osc.start(t); osc.stop(t + 0.15);
    }
  }

  // 耳语声（白噪声 + 滤波模拟）
  playWhisper() {
    if (!this.initialized) return;
    const ns = this.ctx.createBufferSource();
    ns.buffer = this._createNoiseBuffer(1.5);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 2000; filter.Q.value = 3;
    const filter2 = this.ctx.createBiquadFilter();
    filter2.type = 'bandpass'; filter2.frequency.value = 3500; filter2.Q.value = 2;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.08, this.ctx.currentTime + 0.3);
    gain.gain.linearRampToValueAtTime(0.04, this.ctx.currentTime + 0.8);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 1.4);
    ns.connect(filter); filter.connect(filter2); filter2.connect(gain); gain.connect(this.masterGain);
    ns.start(); ns.stop(this.ctx.currentTime + 1.5);
  }

  // Jumpscare 尖叫
  playScream() {
    if (!this.initialized) return;
    const now = this.ctx.currentTime;
    // 高频尖叫
    const osc1 = this.ctx.createOscillator();
    osc1.type = 'sawtooth'; osc1.frequency.value = 800;
    osc1.frequency.linearRampToValueAtTime(1200, now + 0.1);
    const g1 = this.ctx.createGain();
    g1.gain.setValueAtTime(0.5, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc1.connect(g1); g1.connect(this.masterGain);
    osc1.start(); osc1.stop(now + 0.8);
    // 噪声层
    const ns = this.ctx.createBufferSource();
    ns.buffer = this._createNoiseBuffer(0.8);
    const ng = this.ctx.createGain();
    ng.gain.setValueAtTime(0.5, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    ns.connect(ng); ng.connect(this.masterGain);
    ns.start(); ns.stop(now + 0.8);
    // 低频冲击
    const osc2 = this.ctx.createOscillator();
    osc2.type = 'sine'; osc2.frequency.value = 50;
    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(0.6, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc2.connect(g2); g2.connect(this.masterGain);
    osc2.start(); osc2.stop(now + 0.5);
  }

  // 门的吱呀声
  playDoorOpen() {
    if (!this.initialized) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.linearRampToValueAtTime(150, now + 1.5);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.Q.value = 15;
    filter.frequency.setValueAtTime(500, now);
    filter.frequency.linearRampToValueAtTime(200, now + 1.5);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.linearRampToValueAtTime(0.15, now + 0.5);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
    osc.connect(filter); filter.connect(gain); gain.connect(this.masterGain);
    osc.start(); osc.stop(now + 1.5);
  }

  // 拾取物品声
  playPickup() {
    if (!this.initialized) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = 600;
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g); g.connect(this.masterGain);
    osc.start(); osc.stop(now + 0.2);
  }

  // 增加紧张度
  setTension(level) {
    if (!this.ambienceGain) return;
    this.ambienceGain.gain.linearRampToValueAtTime(0.1 + level * 0.15, this.ctx.currentTime + 1);
  }
}

/* ═══════════════════════════════════════════
   INVENTORY SYSTEM
   物品管理 + UI
   ═══════════════════════════════════════════ */
class Inventory {
  constructor() {
    this.items = [];
    this.maxSlots = 8;
    this.activeSlot = 0;
    this.onUpdate = null;
  }

  add(item) {
    if (this.items.length >= this.maxSlots) return false;
    if (this.items.find(i => i.id === item.id && item.id !== 'battery')) return false;
    this.items.push(item);
    if (this.onUpdate) this.onUpdate();
    return true;
  }

  remove(id) {
    const idx = this.items.findIndex(i => i.id === id);
    if (idx === -1) return false;
    this.items.splice(idx, 1);
    if (this.onUpdate) this.onUpdate();
    return true;
  }

  has(id) { return this.items.some(i => i.id === id); }
  get(id) { return this.items.find(i => i.id === id); }
  getActive() { return this.items[this.activeSlot] || null; }
  selectSlot(idx) { this.activeSlot = Math.max(0, Math.min(idx, this.items.length - 1)); if (this.onUpdate) this.onUpdate(); }
  nextSlot() { this.selectSlot((this.activeSlot + 1) % Math.max(1, this.items.length)); }
  prevSlot() { this.selectSlot((this.activeSlot - 1 + Math.max(1, this.items.length)) % Math.max(1, this.items.length)); }
}

/* ═══════════════════════════════════════════
   PUZZLE MANAGER
   密码锁 + 钥匙门 + 拉杆逻辑
   ═══════════════════════════════════════════ */
class PuzzleManager {
  constructor() {
    // 生成随机4位密码
    this.code = String(Math.floor(1000 + Math.random() * 9000));
    this.codeSolved = false;
    this.blueDoorOpen = false;
    this.levers = [false, false, false];
    this.leverOrder = [1, 0, 2]; // 正确顺序
    this.leversSolved = false;
  }

  checkCode(input) { return input === this.code; }
  checkLevers() { return this.levers[0] === this.leverOrder[0] && this.levers[1] === this.leverOrder[1] && this.levers[2] === this.leverOrder[2]; }
  toggleLever(idx) { this.levers[idx] = !this.levers[idx]; this.leversSolved = this.checkLevers(); return this.leversSolved; }
}

/* ═══════════════════════════════════════════
   ENEMY AI - 暗影追踪者
   只在玩家不看的时候移动，基于声音追踪
   ═══════════════════════════════════════════ */
class EnemyAI {
  constructor(scene) {
    this.active = false;
    this.mesh = null;
    this.position = new THREE.Vector3(0, 0, 0);
    this.targetPos = new THREE.Vector3(0, 0, 0);
    this.speed = 3.5;
    this.isMoving = false;
    this.visible = false;
    this.canBeSeen = false;
    this.stalkTimer = 0;
    this.moveTimer = 0;
    this.alertLevel = 0; // 0-1
    this._createMesh(scene);
  }

  _createMesh(scene) {
    // 暗影实体 - 高大黑暗人形
    const group = new THREE.Group();
    // 身体
    const bodyGeo = new THREE.CylinderGeometry(0.25, 0.35, 2.2, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1, metalness: 0 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.1;
    group.add(body);
    // 头部
    const headGeo = new THREE.SphereGeometry(0.22, 8, 6);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.9 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.4;
    group.add(head);
    // 红色眼睛
    const eyeGeo = new THREE.SphereGeometry(0.035, 6, 4);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 3 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
    eyeL.position.set(-0.08, 2.42, -0.18);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat.clone());
    eyeR.position.set(0.08, 2.42, -0.18);
    group.add(eyeL, eyeR);
    // 手臂
    const armGeo = new THREE.CylinderGeometry(0.08, 0.06, 1.5, 6);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
    const armL = new THREE.Mesh(armGeo, armMat);
    armL.position.set(-0.4, 1.3, 0);
    armL.rotation.z = 0.15;
    group.add(armL);
    const armR = new THREE.Mesh(armGeo, armMat);
    armR.position.set(0.4, 1.3, 0);
    armR.rotation.z = -0.15;
    group.add(armR);

    group.visible = false;
    scene.add(group);
    this.mesh = group;
  }

  activate(pos) {
    this.active = true;
    this.position.copy(pos);
    this.mesh.position.copy(pos);
    this.mesh.visible = true;
    this.alertLevel = 0.3;
  }

  update(dt, playerPos, playerDir, isPlayerSprinting) {
    if (!this.active) return;
    this.stalkTimer += dt;
    this.moveTimer += dt;

    // 判断是否在玩家视野内
    const toEnemy = new THREE.Vector3().subVectors(this.position, playerPos);
    const dist = toEnemy.length();
    toEnemy.normalize();
    const dot = playerDir.dot(toEnemy);
    this.canBeSeen = dot > 0.4 && dist < 20;

    // 玩家跑步增加警觉
    if (isPlayerSprinting && dist < 15) {
      this.alertLevel = Math.min(1, this.alertLevel + dt * 0.15);
    } else {
      this.alertLevel = Math.max(0, this.alertLevel - dt * 0.05);
    }

    // 只在不被看到时移动
    if (!this.canBeSeen && this.moveTimer > 0.8) {
      this.moveTimer = 0;
      // 向玩家方向移动（保持一定距离）
      const moveDir = new THREE.Vector3().subVectors(playerPos, this.position).normalize();
      const desiredDist = 8 + (1 - this.alertLevel) * 7;
      if (dist > desiredDist + 2) {
        this.targetPos.copy(this.position).add(moveDir.multiplyScalar(3 + this.alertLevel * 2));
        this.isMoving = true;
      } else if (dist < desiredDist - 3) {
        this.targetPos.copy(this.position).sub(moveDir.multiplyScalar(2));
        this.isMoving = true;
      }
    }

    if (this.canBeSeen) {
      this.isMoving = false;
      this.mesh.visible = true;
    }

    // 平滑移动
    if (this.isMoving) {
      this.position.lerp(this.targetPos, dt * 2);
      this.mesh.position.copy(this.position);
      // 面向移动方向
      const lookDir = new THREE.Vector3().subVectors(this.targetPos, this.position).normalize();
      this.mesh.lookAt(this.mesh.position.x + lookDir.x, this.mesh.position.y, this.mesh.position.z + lookDir.z);
    }

    // 距离太近触发jumpscare
    if (dist < 2 && this.canBeSeen) {
      this.triggerJumpscare();
    }

    // 眼睛发光强度随警觉度变化
    this.mesh.children.forEach(child => {
      if (child.material && child.material.emissiveIntensity !== undefined && child.material.color.r > 0.5) {
        child.material.emissiveIntensity = 2 + this.alertLevel * 5;
      }
    });
  }

  triggerJumpscare() {
    // 由主游戏循环处理
    if (this._jumpscareCallback) this._jumpscareCallback();
  }

  onJumpscare(cb) { this._jumpscareCallback = cb; }
}

/* ═══════════════════════════════════════════
   MAIN GAME CLASS
   整合所有系统，构建关卡，运行游戏循环
   ═══════════════════════════════════════════ */
class Game {
  constructor() {
    // 状态
    this.state = 'menu'; // menu, playing, paused, jumpscare, note, code
    this.clock = new THREE.Clock();
    this.deltaTime = 0;

    // 输入
    this.keys = {};
    this.mouse = { x: 0, y: 0 };
    this.isLocked = false;

    // 玩家参数
    this.playerHeight = 1.7;
    this.crouchHeight = 1.0;
    this.currentHeight = this.playerHeight;
    this.moveSpeed = 3.5;
    this.sprintSpeed = 6;
    this.stamina = 100;
    this.maxStamina = 100;
    this.isSprinting = false;
    this.isCrouching = false;
    this.bobPhase = 0;
    this.bobAmount = 0;
    this.breathPhase = 0;

    // 手电筒
    this.flashlightOn = true;
    this.battery = 100;
    this.flashlight = null;
    this.flashlightTarget = null;

  /* ─── 初始化 Three.js 场景 ─── */
  initScene() {
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x020202);
    this.scene.fog = new THREE.FogExp2(0x020202, 0.12);

    this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 50);
    this.camera.position.set(0, this.playerHeight, 8);

    this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 0.6;
    document.body.prepend(this.renderer.domElement);

    // 音频监听器绑定到相机
    this.audio.init(this.camera.listener);

    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  /* ─── 生成纹理贴图 ─── */
  _createMaterials() {
    const tx = TextureGen;
    const makeTex = (canvas) => {
      const t = new THREE.CanvasTexture(canvas);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      return t;
    };

    const wallTx = tx.wallPeeling();
    const floorTx = tx.floorWood();
    const metalTx = tx.metalRust();
    const ceilTx = tx.ceilingDirty();
    const mirrorTx = tx.mirror();

    this.materials = {
      wall: new THREE.MeshStandardMaterial({
        map: makeTex(wallTx.color), normalMap: makeTex(wallTx.normal),
        normalScale: new THREE.Vector2(1.5, 1.5),
        roughnessMap: makeTex(wallTx.roughness), roughness: 0.85,
        aoMap: makeTex(wallTx.ao)
      }),
      floor: new THREE.MeshStandardMaterial({
        map: makeTex(floorTx.color), normalMap: makeTex(floorTx.normal),
        normalScale: new THREE.Vector2(1, 1),
        roughnessMap: makeTex(floorTx.roughness), roughness: 0.75,
        aoMap: makeTex(floorTx.ao)
      }),
      metal: new THREE.MeshStandardMaterial({
        map: makeTex(metalTx.color), normalMap: makeTex(metalTx.normal),
        normalScale: new THREE.Vector2(2, 2),
        roughnessMap: makeTex(metalTx.roughness), roughness: 0.9, metalness: 0.6
      }),
      ceiling: new THREE.MeshStandardMaterial({
        map: makeTex(ceilTx.color), normalMap: makeTex(ceilTx.normal),
        normalScale: new THREE.Vector2(0.5, 0.5),
        roughnessMap: makeTex(ceilTx.roughness), roughness: 0.95
      }),
      mirror: new THREE.MeshStandardMaterial({
        map: makeTex(mirrorTx.color), normalMap: makeTex(mirrorTx.normal),
        roughnessMap: makeTex(mirrorTx.roughness), roughness: 0.05, metalness: 0.95,
        envMapIntensity: 0.5
      }),
      door: new THREE.MeshStandardMaterial({ color: 0x3a2515, roughness: 0.8, metalness: 0.1 }),
      doorLocked: new THREE.MeshStandardMaterial({ color: 0x5a1515, roughness: 0.7, metalness: 0.2 }),
      redDoor: new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.6, metalness: 0.3, emissive: 0x330000, emissiveIntensity: 0.2 }),
      clown: new THREE.MeshStandardMaterial({ color: 0xd4c5a0, roughness: 0.7 }),
      lever: new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.5, metalness: 0.6 }),
      leverBase: new THREE.MeshStandardMaterial({ map: makeTex(metalTx.color), roughness: 0.8, metalness: 0.5 }),
      crate: new THREE.MeshStandardMaterial({ color: 0x5a4a30, roughness: 0.9 }),
      wire: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6, metalness: 0.8 }),
      neonRed: new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 2, roughness: 0.2 }),
      neonBlue: new THREE.MeshStandardMaterial({ color: 0x4a9eff, emissive: 0x4a9eff, emissiveIntensity: 2, roughness: 0.2 }),
      neonGreen: new THREE.MeshStandardMaterial({ color: 0x00ff41, emissive: 0x00ff41, emissiveIntensity: 2, roughness: 0.2 })
    };
  }

  /* ─── 构建关卡几何体 ─── */
  _buildLevel() {
    // 辅助函数：创建房间
    const addBox = (w, h, d, x, y, z, mat, castShadow = true) => {
      const geo = new THREE.BoxGeometry(Math.max(0.01, w), Math.max(0.01, h), Math.max(0.01, d));
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.castShadow = castShadow;
      mesh.receiveShadow = true;
      this.scene.add(mesh);
      return mesh;
    };

    // 辅助函数：创建房间（地板+天花板+四面墙）
    const createRoom = (w, h, d, x, y, z, wallMat) => {
      const hw = w/2, hd = d/2;
      // 地板
      const floor = addBox(w, 0.15, d, x, y, z, this.materials.floor);
      // 天花板
      addBox(w, 0.15, d, x, y + h, z, this.materials.ceiling);
      // 四面墙
      addBox(w, h, 0.2, x, y + h/2, z - hd, wallMat, false);
      addBox(w, h, 0.2, x, y + h/2, z + hd, wallMat, false);
      addBox(0.2, h, d, x - hw, y + h/2, z, wallMat, false);
      addBox(0.2, h, d, x + hw, y + h/2, z, wallMat, false);
      return floor;
    };

    // ═══ AREA 1: 入口大厅 ═══
    createRoom(6, 3.5, 10, 0, 0, 5, this.materials.wall);
    // 入口门（背后的墙开口由碰撞体处理）
    // 前方墙壁（连接走廊的墙）- 留开口
    // 覆盖前方墙壁，留出走廊开口
    addBox(1.5, 3.5, 0.2, -2.25, 1.75, 0, this.materials.wall, false);
    addBox(1.5, 3.5, 0.2, 2.25, 1.75, 0, this.materials.wall, false);
    addBox(3, 0.8, 0.2, 0, 3.1, 0, this.materials.wall, false);

    // 手电筒在桌子上
    addBox(1.2, 0.7, 0.6, -1.8, 0.43, 7, this.materials.metal); // 桌子
    const flashlightProp = addBox(0.06, 0.06, 0.4, -1.8, 0.86, 7.1, new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0x111100, emissiveIntensity: 0.5 }));
    flashlightProp.userData = { type: 'pickup', item: { id: 'flashlight', name: 'Flashlight', icon: 'fa-flashlight' } };
    this.interactables.push(flashlightProp);

    // 第一张便条
    const note1 = addBox(0.2, 0.28, 0.01, 1.5, 1.1, 8.8, new THREE.MeshStandardMaterial({ color: 0xd4c5a0, roughness: 0.9 }));
    note1.userData = { type: 'note', title: 'Torn Note', text: 'If you\'re reading this... get out.\n\nThey shut this place down after what happened to the children. But the thing is...\n\nSomething is still IN here.\n\nI can hear it breathing when the lights go out.\n\n- M.R.' };
    this.interactables.push(note1);

    // 暗淡的环境光
    const entLight = new THREE.PointLight(0xffaa44, 0.3, 8, 2);
    entLight.position.set(0, 3, 7);
    entLight.castShadow = true;
    entLight.shadow.mapSize.set(512, 512);
    this.scene.add(entLight);

    // ═══ 走廊 (z: 0 → -10) ═══
    addBox(3, 3.5, 10, 0, 1.75, -5, this.materials.wall, false); // 重绘走廊
    // 走廊地板
    addBox(3, 0.15, 10, 0, 0, -5, this.materials.floor);
    // 走廊天花板

    // 走廊灯2（更暗）

    [hallLight1, hallLight2].forEach(l => {

    // 走廊墙壁上的血手印

    mainLight2.position.set(-4, 2, -14);

    const redKey = addBox(0.15, 0.1, 0.25, 4.2, 0.15, -19.5, new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000, emissiveIntensity: 0.5, metalness: 0.7, roughness: 0.3 }));

    this.interactables.push(redKey);

    // 红色门（通往镜子迷宫）
    const redDoorMesh = addBox(1.2, 2.4, 0.15, -5.9, 1.2, -16, this.materials.redDoor);

    this.doors.red = { mesh: redDoorMesh, open: false, targetX: -5.9 };

    // 密码锁面板
    const codePanelMesh = addBox(0.4, 0.5, 0.05, 5.88, 1.5, -13, this.materials.metal);
    codePanelMesh.userData = { type: 'code_panel' };
    this.interactables.push(codePanelMesh);

    // 密码提示便条（隐藏在箱子旁的墙上）
    const note2 = addBox(0.2, 0.28, 0.01, 5.88, 1.8, -18, new THREE.MeshStandardMaterial({ color: 0xc4b590, roughness: 0.9 }));
    note2.rotation.y = -Math.PI / 2;
    note2.userData = { type: 'note', title: 'Maintenance Log', text: `Emergency lockout code changed.\nNew code: ${this.puzzles.code}\n\nFor maintenance access to blue section only.\nDo NOT share with attractions staff.\n\n- Facility Management` };

    // 小丑雕像
    const clownGroup = new THREE.Group();

    const clownBody = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.2, 8), this.materials.clown);
    clownBody.position.y = 0.6;
    clownGroup.add(clownBody);
    // 头
    const clownHead = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 6), new THREE.MeshStandardMaterial({ color: 0xeeddcc, roughness: 0.6 }));
    clownHead.position.y = 1.45;
    clownGroup.add(clownHead);
    // 红鼻子
    const nose = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 4), new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.3 }));
    nose.position.set(0, 1.4, -0.22);
    clownGroup.add(nose);
    // 帽子
    const hat = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.5 }));

    clownGroup.add(hat);
    // 裂缝标记
    const crackMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const crack = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.6, 0.02), crackMat);
    crack.position.set(0.1, 1.0, -0.3);
    crack.rotation.z = 0.3;
    clownGroup.add(crack);
    clownGroup.position.set(-3, 0.08, -19);
    this.scene.add(clownGroup);

    // 悬挂电线
    const wireCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-2, 3.4, -12), new THREE.Vector3(-1.5, 3.0, -13),
      new THREE.Vector3(-1.8, 2.8, -14), new THREE.Vector3(-2.2, 3.1, -15)

    const wireGeo = new THREE.TubeGeometry(wireCurve, 20, 0.015, 4, false);

    addBox(13, 0.15, 12, -13.5, 0, -16, this.materials.floor);

    battery2.userData = { type: 'pickup', item: { id: 'battery', name: 'Battery', icon: 'fa-battery-full' } };
    this.interactables.push(battery2);

    // ═══ AREA 4: 秘密房间 (通过蓝色门) ═══
    // 位于 x: -21 → -27, z: -13 → -19
    createRoom(6, 3.5, 6, -24, 0, -16, this.materials.wall);

    // 最终便条
    const note3 = addBox(0.2, 0.28, 0.01, -22.3, 1.3, -14, new THREE.MeshStandardMaterial({ color: 0xb4a580, roughness: 0.9 }));

    this.interactables.push(note3);

    // ═══ 灰尘粒子系统 ═══
    this._createDustParticles();

    // ═══ 碰撞体 ═══
    this._buildColliders();

    // ═══ 敌人 ═══
    this.enemy = new EnemyAI(this.scene);
    this.enemy.onJumpscare(() => this._triggerJumpscare());
  }

  /* ─── 霓虹灯文字 ─── */
  _createNeonText(text, x, y, z, material, scale = 0.5) {
    // 用简单的方块拼出文字轮廓
    const chars = {
      'F': [[0,0,1,0],[0,1,1,1],[0,2,0.6,2]],
      'U': [[0,0,1,0],[1,0,1,0],[0,0,1,2],[0,2,1,2]],
      'N': [[0,0,1,0],[1,0,1,0],[0,0,1,2],[0.5,1,0.5,1]],
      'P': [[0,0,1,0],[0,0,0.5,2],[0,2,1,2],[0,1,0.5,1]],
      'L': [[0,0,1,0],[0,0,1,2],[0,2,1,2]],
      'A': [[0,0,1,0],[1,0,1,0],[0,0,1,2],[0.3,1.2,0.4,1.2]],
      'Y': [[0,0,1,0],[1,0,1,0],[0,0,0.5,1],[0.5,1.5,0.5,2]],
      'S': [[0,2,1,2],[0,2,0.5,1.5],[0.5,1.5,1,1],[0,1,0.5,0.5],[0,0,1,0]],
      'M': [[0,0,1,0],[1,0,1,0],[0,0,1,2],[0.5,0.8,0.5,0]],
      'I': [[0,0,1,0],[0,2,1,2],[0.5,0,0.5,2]],
      'E': [[0,0,1,0],[0,0,0.5,2],[0,1,0.7,1],[0,2,1,2]]
    };
    const group = new THREE.Group();
    let offsetX = 0;
    for (const ch of text) {
      const segs = chars[ch] || chars['I'];
      segs.forEach(([sx, sy, ex, ey]) => {
        const w = Math.max(0.01, Math.abs(ex - sx) * scale);
        const h = Math.max(0.01, Math.abs(ey - sy) * scale);
        const px = (sx + ex) / 2 * scale + offsetX;
        const py = (sy + ey) / 2 * scale;
        const geo = new THREE.BoxGeometry(w, h, 0.03);
        const mesh = new THREE.Mesh(geo, material);
        mesh.position.set(px, py, 0);
        group.add(mesh);
      });
      offsetX += 1.2 * scale;
    }
    group.position.set(x, y, z);
    group.rotation.y = Math.PI;
    this.scene.add(group);
    return group;
  }

  /* ─── 血字 ─── */
  _createBloodText(text, x, y, z) {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 512, 128);
    ctx.font = '80px Creepster, cursive';
    ctx.fillStyle = '#5a0000';
    ctx.textAlign = 'center';
    // 模糊效果
    ctx.filter = 'blur(2px)';
    ctx.fillText(text, 256, 90);
    ctx.filter = 'blur(0px)';
    ctx.fillStyle = '#8b0000';
    ctx.fillText(text, 256, 90);
    // 滴血效果
    for (let i = 0; i < 8; i++) {
      const dx = 128 + Math.random() * 256;
      ctx.fillStyle = `rgba(100,0,0,${0.3 + Math.random()*0.4})`;
      ctx.fillRect(dx, 85 + Math.random()*10, 2, 10 + Math.random()*25);
    }
    const tex = new THREE.CanvasTexture(c);
    const geo = new THREE.PlaneGeometry(3, 0.75);
    const mat = new THREE.MeshStandardMaterial({ map: tex, transparent: true, roughness: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.rotation.y = Math.PI / 2;
    this.scene.add(mesh);
  }

  /* ─── 灰尘粒子 ─── */
  _createDustParticles() {
    const count = 500;
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      positions[i*3] = (Math.random() - 0.5) * 30 - 5;
      positions[i*3+1] = Math.random() * 3.5;
      positions[i*3+2] = (Math.random() - 0.5) * 30 - 5;
      sizes[i] = 0.01 + Math.random() * 0.03;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    const mat = new THREE.PointsMaterial({
      color: 0xaa9977, size: 0.025, transparent: true, opacity: 0.3,
      sizeAttenuation: true, depthWrite: false
    });
    this.dustParticles = new THREE.Points(geo, mat);
    this.scene.add(this.dustParticles);
  }

  /* ─── 碰撞检测 ─── */
  _checkCollision(x, z, radius = 0.3) {
    // 检查静态碰撞体
    for (const [minX, minZ, maxX, maxZ] of this.colliders) {
      const closestX = Math.max(minX, Math.min(x, maxX));
      const closestZ = Math.max(minZ, Math.min(z, maxZ));
      const dx = x - closestX, dz = z - closestZ;
      if (dx * dx + dz * dz < radius * radius) {
        return { collide: true, pushX: dx, pushZ: dz, closestX, closestZ };
      }
    }
    // 检查门碰撞体
    for (const [id, dc] of Object.entries(this.doorColliders)) {
      if (dc.open) continue;
      const [minX, minZ] = dc.min;
      const [maxX, maxZ] = dc.max;
      const closestX = Math.max(minX, Math.min(x, maxX));
      const closestZ = Math.max(minZ, Math.min(z, maxZ));
      const dx = x - closestX, dz = z - closestZ;
      if (dx * dx + dz * dz < radius * radius) {
        return { collide: true, pushX: dx, pushZ: dz, closestX, closestZ };
      }
    }
    return { collide: false };
  }

  /* ─── 手电筒系统 ─── */
  _setupFlashlight() {
    this.flashlight = new THREE.SpotLight(0xffeedd, 2, 20, Math.PI * 0.22, 0.4, 1.5);
    this.flashlight.castShadow = true;
    this.flashlight.shadow.mapSize.set(512, 512);
    this.flashlight.shadow.camera.near = 0.3;
    this.flashlight.shadow.camera.far = 20;
    this.flashlightTarget = new THREE.Object3D();
    this.flashlight.target = this.flashlightTarget;
    this.camera.add(this.flashlight);
    this.camera.add(this.flashlightTarget);
    this.flashlight.position.set(0.3, -0.2, -0.5);
    this.flashlightTarget.position.set(0, 0, -5);
    this.scene.add(this.camera);
  }

  /* ─── 库存UI ─── */
  _setupInventoryUI() {
    this.dom.inventoryBar.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const slot = document.createElement('div');
      slot.className = 'inv-slot';
      slot.innerHTML = `<span class="slot-num" style="font-size:8px;position:absolute;top:2px;left:4px;color:var(--muted)">${i+1}</span>`;
      slot.addEventListener('click', () => { this.inventory.activeSlot = i; this._updateInventoryUI(); });
      this.dom.inventoryBar.appendChild(slot);
    }
  }

  _updateInventoryUI() {
    const slots = this.dom.inventoryBar.querySelectorAll('.inv-slot');
    slots.forEach((slot, i) => {
      const item = this.inventory.items[i];
      slot.className = 'inv-slot' + (item ? ' has-item' : '') + (i === this.inventory.activeSlot ? ' active-slot' : '');
      const numSpan = `<span class="slot-num" style="font-size:8px;position:absolute;top:2px;left:4px;color:var(--muted)">${i+1}</span>`;
      if (item) {
        slot.innerHTML = numSpan + `<i class="fas ${item.icon}"></i><span style="font-size:8px">${item.name}</span>`;
      } else {
        slot.innerHTML = numSpan;
      }
    });
  }

  /* ─── 输入处理 ─── */
  _setupInput() {
    document.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (this.state === 'playing') {
        if (e.code === 'KeyF') this._toggleFlashlight();
        if (e.code === 'KeyE') this._interact();
        if (e.code === 'Digit1') this.inventory.activeSlot = 0;
        if (e.code === 'Digit2') this.inventory.activeSlot = 1;
        if (e.code === 'Digit3') this.inventory.activeSlot = 2;
        if (e.code === 'Digit4') this.inventory.activeSlot = 3;
        if (e.code === 'Digit5') this.inventory.activeSlot = 4;
        if (e.code === 'Digit6') this.inventory.activeSlot = 5;
        if (e.code === 'Digit7') this.inventory.activeSlot = 6;
        if (e.code === 'Digit8') this.inventory.activeSlot = 7;
        this._updateInventoryUI();
      }
    });
    document.addEventListener('keyup', e => { this.keys[e.code] = false; });

    document.addEventListener('mousemove', e => {
      if (!this.isLocked || this.state !== 'playing') return;
      const sensitivity = 0.002;
      this.mouse.x -= e.movementX * sensitivity;
      this.mouse.y -= e.movementY * sensitivity;
      this.mouse.y = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, this.mouse.y));
    });

    document.addEventListener('pointerlockchange', () => {
      this.isLocked = document.pointerLockElement === this.renderer.domElement;
      if (!this.isLocked && this.state === 'playing') {
        this.dom.pauseOverlay.style.display = 'flex';
      }
    });

    this.renderer.domElement.addEventListener('click', () => {
      if (this.state === 'playing' && !this.isLocked) {
        this.renderer.domElement.requestPointerLock();
        this.dom.pauseOverlay.style.display = 'none';
      }
    });

    // 鼠标滚轮切换物品
    document.addEventListener('wheel', e => {
      if (this.state !== 'playing') return;
      if (e.deltaY > 0) this.inventory.nextSlot();
      else this.inventory.prevSlot();
      this._updateInventoryUI();
    });
  }

  /* ─── 手电筒切换 ─── */
  _toggleFlashlight() {
    this.flashlightOn = !this.flashlightOn;
    this.flashlight.visible = this.flashlightOn;
  }

  /* ─── 交互系统 ─── */
  _interact() {
    if (!this.interactable) return;
    const data = this.interactable.userData;

    switch (data.type) {
      case 'pickup':
        if (data.item.id === 'battery') {
          this.battery = Math.min(100, this.battery + 35);
          this.audio.playPickup();
          this._showToast('Battery +35%');
        } else if (data.item.id === 'flashlight') {
          this.flashlightOn = true;
          this.flashlight.visible = true;
          this.audio.playPickup();
          this._showToast('Flashlight acquired - Press F to toggle');
        } else {
          if (this.inventory.add(data.item)) {
            this.audio.playPickup();
            this._showToast(`Picked up: ${data.item.name}`);
          } else {
            this._showToast('Inventory full');
            return;
          }
        }
        this.scene.remove(this.interactable);
        this.interactables = this.interactables.filter(i => i !== this.interactable);
        break;

      case 'note':
        this.state = 'note';
        this.dom.noteDisplay.querySelector('h3').textContent = data.title;
        this.dom.noteDisplay.querySelector('p').textContent = data.text;
        this.dom.noteDisplay.style.display = 'block';
        document.exitPointerLock();
        this.notesFound++;
        if (this.notesFound >= this.totalNotes) {
          // 所有笔记找到后激活敌人
          if (!this.enemy.active) {
            setTimeout(() => {
              this.enemy.activate(new THREE.Vector3(-15, 0, -16));
              this._showToast('Something has awakened...');
              this.audio.setTension(0.8);
            }, 2000);
          }
        }
        break;

      case 'door':
        if (data.needCode && !this.puzzles.codeSolved) {
          this._showToast('Locked - Requires access code');
          return;
        }
        if (data.requiredItem && !this.inventory.has(data.requiredItem)) {
          this._showToast(`Requires: ${data.requiredItem.replace('_', ' ').toUpperCase()}`);
          return;
        }
        if (data.requiredItem) this.inventory.remove(data.requiredItem);
        this._openDoor(data.doorId);
        this.audio.playDoorOpen();
        break;

      case 'code_panel':
        if (this.puzzles.codeSolved) {
          this._showToast('Already unlocked');
          return;
        }
        this.state = 'code';
        this.dom.codePanel.style.display = 'block';
        this.dom.codeInput.innerHTML = '';
        this.dom.codeFeedback.textContent = '';
        for (let i = 0; i < 4; i++) {
          const input = document.createElement('input');
          input.type = 'text';
          input.maxLength = 1;
          input.className = 'code-digit';
          input.addEventListener('input', () => {
            if (input.value && i < 3) this.dom.codeInput.children[i+1].focus();
          });
          input.addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !input.value && i > 0) {
              this.dom.codeInput.children[i-1].focus();
            }
          });
          this.dom.codeInput.appendChild(input);
        }
        this.dom.codeInput.children[0].focus();
        document.exitPointerLock();
        break;

      case 'lever':
        const solved = this.puzzles.toggleLever(data.index);
        const leverMesh = this.leverMeshes[data.index];
        leverMesh.rotation.z = this.puzzles.levers[data.index] ? -0.8 : 0;
        this.audio.playCreak();
        if (solved) {
          this._showToast('Mechanism activated - Secret passage opening...');
          // 打开蓝色门
          setTimeout(() => {
            this.puzzles.codeSolved = true;
            this._openDoor('blue');
            this.audio.playDoorOpen();
          }, 1500);
        } else {
          this._showToast(`Lever ${data.index + 1}: ${this.puzzles.levers[data.index] ? 'ON' : 'OFF'}`);
        }
        break;
    }
  }

  _openDoor(doorId) {
    const door = this.doors[doorId];
    if (!door || door.open) return;
    door.open = true;
    if (this.doorColliders[doorId]) this.doorColliders[doorId].open = true;
    // 门滑动动画
    const startPos = door.mesh.position.x;
    const targetPos = doorId === 'red' ? startPos - 2 : startPos + 2;
    const animate = () => {
      door.mesh.position.x += (targetPos - door.mesh.position.x) * 0.05;
      if (Math.abs(door.mesh.position.x - targetPos) > 0.01) {
        requestAnimationFrame(animate);
      }
    };
    animate();
  }

  /* ─── 密码提交 ─── */
  _submitCode() {
    const digits = this.dom.codeInput.querySelectorAll('.code-digit');
    let code = '';
    digits.forEach(d => code += d.value);
    if (code.length < 4) {
      this.dom.codeFeedback.textContent = 'Enter 4 digits';
      this.dom.codeFeedback.style.color = 'var(--accent-glow)';
      return;
    }
    if (this.puzzles.checkCode(code)) {
      this.puzzles.codeSolved = true;
      this.dom.codeFeedback.textContent = 'ACCESS GRANTED';
      this.dom.codeFeedback.style.color = 'var(--green)';
      this.audio.playPickup();
      setTimeout(() => {
        this.dom.codePanel.style.display = 'none';
        this.state = 'playing';
        this.renderer.domElement.requestPointerLock();
        this._openDoor('blue');
        this.audio.playDoorOpen();
      }, 1000);
    } else {
      this.dom.codeFeedback.textContent = 'ACCESS DENIED';
      this.dom.codeFeedback.style.color = 'var(--accent-glow)';
      this.audio.playBang();
      // 静电闪烁
      this.dom.staticFlash.style.opacity = '0.3';
      setTimeout(() => { this.dom.staticFlash.style.opacity = '0'; }, 100);
    }
  }

  /* ─── UI辅助 ─── */
  _showToast(msg) {
    this.dom.msgToast.textContent = msg;
    this.dom.msgToast.style.display = 'block';
    this.dom.msgToast.style.opacity = '1';
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => {
      this.dom.msgToast.style.opacity = '0';
      setTimeout(() => { this.dom.msgToast.style.display = 'none'; }, 300);
    }, 2500);
  }

  _showAreaLabel(text) {
    this.dom.areaLabel.textContent = text;
    this.dom.areaLabel.style.display = 'block';
    this.dom.areaLabel.style.opacity = '1';
    setTimeout(() => { this.dom.areaLabel.style.opacity = '0'; }, 3000);
    setTimeout(() => { this.dom.areaLabel.style.display = 'none'; }, 4000);
  }

  /* ─── Jumpscare ─── */
  _triggerJumpscare() {
    if (this.state === 'jumpscare') return;
    this.state = 'jumpscare';
    document.exitPointerLock();
    this.audio.playScream();
    this.dom.jumpscare.style.display = 'flex';
    this.dom.dangerVignette.style.opacity = '1';
    this.dom.staticFlash.style.opacity = '0.5';
    setTimeout(() => {
      this.dom.staticFlash.style.opacity = '0';
    }, 200);
    setTimeout(() => {
      this.dom.jumpscare.style.display = 'none';
      this.dom.dangerVignette.style.opacity = '0';
      // 重置玩家位置
      this.camera.position.set(0, this.playerHeight, 8);
      this.mouse.x = 0; this.mouse.y = 0;
      this.enemy.active = false;
      this.enemy.mesh.visible = false;
      this.state = 'playing';
      this.renderer.domElement.requestPointerLock();
    }, 1500);
  }

  /* ─── 恐怖事件系统 ─── */
  _updateHorrorEvents(dt) {
    for (const [event, timer] of Object.entries(this.horrorTimers)) {
      this.horrorTimers[event] -= dt;
      if (this.horrorTimers[event] <= 0) {
        switch (event) {
          case 'bang': this.audio.playBang(); this.horrorTimers[event] = 20 + Math.random() * 30; break;
          case 'creak': this.audio.playCreak(); this.horrorTimers[event] = 15 + Math.random() * 25; break;
          case 'whisper': this.audio.playWhisper(); this.horrorTimers[event] = 25 + Math.random() * 35; break;
          case 'laugh': this.audio.playLaugh(); this.horrorTimers[event] = 40 + Math.random() * 40; break;
          case 'staticFlash':
            this.dom.staticFlash.style.opacity = '0.15';
            setTimeout(() => { this.dom.staticFlash.style.opacity = '0'; }, 150);
            this.horrorTimers[event] = 15 + Math.random() * 20;
            break;
        }
      }
    }

    // 敌人靠近时增加危险效果
    if (this.enemy && this.enemy.active) {
      const dist = this.camera.position.distanceTo(this.enemy.position);
      const danger = Math.max(0, 1 - dist / 15);
      this.dom.dangerVignette.style.opacity = String(danger * 0.6);
      this.audio.setTension(danger);
    }
  }

  /* ─── 区域检测 ─── */
  _checkArea() {
    const pos = this.camera.position;
    let newArea = this.area;
    if (pos.z > 0) newArea = 'entrance';
    else if (pos.z > -10 && pos.x > -6) newArea = 'corridor';
    else if (pos.x > -7 && pos.z > -22) newArea = 'main_hall';
    else if (pos.x <= -7 && pos.z > -22 && pos.x > -21) newArea = 'mirror_maze';
    else if (pos.x <= -21) newArea = 'secret_room';

    if (newArea !== this.area) {
      this.area = newArea;
      const labels = {
        entrance: 'ENTRANCE HALL',
        corridor: 'CORRIDOR',
        main_hall: 'MAIN HALL',
        mirror_maze: 'MIRROR MAZE',
        secret_room: 'SECRET ROOM'
      };
      this._showAreaLabel(labels[newArea] || '');
      // 进入主厅后开始恐怖事件
      if (newArea === 'main_hall' && !this._horrorStarted) {
        this._horrorStarted = true;
        setTimeout(() => this.audio.startAmbience(), 1000);
      }
    }
  }

  /* ─── 交互射线检测 ─── */
  _updateInteraction() {
    this.raycaster.setFromCamera(new THREE.Vector2(0, 0), this.camera);
    const hits = this.raycaster.intersectObjects(this.interactables, false);
    if (hits.length > 0 && hits[0].distance < 4) {
      this.interactable = hits[0].object;
      const data = this.interactable.userData;
      let label = '';
      switch (data.type) {
        case 'pickup': label = `Pick up ${data.item.name}`; break;
        case 'note': label = 'Read note'; break;
        case 'door':
          if (data.needCode && !this.puzzles.codeSolved) label = 'Locked - Need code';
          else if (data.requiredItem && !this.inventory.has(data.requiredItem)) label = `Locked - Need ${data.requiredItem.replace('_',' ')}`;
          else label = 'Open door';
          break;
        case 'code_panel': label = this.puzzles.codeSolved ? 'Unlocked' : 'Enter access code'; break;
        case 'lever': label = `Pull lever ${data.index + 1}`; break;
      }
      this.dom.interactPrompt.style.display = 'block';
      this.dom.interactPrompt.querySelector('.label').textContent = label;
    } else {
      this.interactable = null;
      this.dom.interactPrompt.style.display = 'none';
    }
  }

  /* ─── 灯光闪烁 ─── */
  _updateFlickerLights(dt) {
    if (!this._flickerLights) return;
    const time = this.clock.elapsedTime;
    this._flickerLights.forEach(light => {
      const ud = light.userData;
      const flicker = Math.sin(time * ud.flickerSpeed * 10) * 0.3 +
                      Math.sin(time * ud.flickerSpeed * 23) * 0.2 +
                      Math.random() * 0.1;
      light.intensity = ud.baseIntensity + flicker;
      if (light.intensity < 0) light.intensity = 0;
      if (ud.bulb) {
        ud.bulb.material.emissiveIntensity = light.intensity * 5;
      }
    });
  }

  /* ─── 手电筒更新 ─── */
  _updateFlashlight(dt) {
    if (!this.flashlightOn) return;
    // 电池消耗
    this.battery -= dt * 2;
    if (this.battery <= 0) {
      this.battery = 0;
      this.flashlightOn = false;
      this.flashlight.visible = false;
      this._showToast('Flashlight battery depleted');
      return;
    }
    // 低电量闪烁
    if (this.battery < 20) {
      this.flickerTimer -= dt;
      if (this.flickerTimer <= 0) {
        this.flashlight.visible = Math.random() > 0.3;
        this.flickerTimer = 0.05 + Math.random() * 0.1;
      }
    } else {
      this.flashlight.visible = true;
    }
    // 电池UI
    this.dom.batteryFill.style.width = this.battery + '%';
    if (this.battery < 20) {
      this.dom.batteryFill.style.background = 'linear-gradient(90deg,#ff0000,#ff4400)';
    } else if (this.battery < 50) {
      this.dom.batteryFill.style.background = 'linear-gradient(90deg,#ff6600,#ffaa00)';
    } else {
      this.dom.batteryFill.style.background = 'linear-gradient(90deg,#8b0000,#ff1a1a)';
    }
  }

  /* ─── 玩家移动 ─── */
  _updatePlayer(dt) {
    // 蹲伏
    this.isCrouching = this.keys['ControlLeft'] || this.keys['ControlRight'];
    const targetHeight = this.isCrouching ? this.crouchHeight : this.playerHeight;
    this.currentHeight += (targetHeight - this.currentHeight) * 8 * dt;

    // 冲刺
    this.isSprinting = (this.keys['ShiftLeft'] || this.keys['ShiftRight']) && !this.isCrouching;
    if (this.isSprinting && this.stamina > 0) {
      this.stamina -= dt * 20;
      if (this.stamina <= 0) { this.stamina = 0; this.isSprinting = false; }
    } else {
      this.stamina = Math.min(this.maxStamina, this.stamina + dt * 10);
    }
    this.dom.staminaFill.style.width = this.stamina + '%';

    const speed = this.isSprinting ? this.sprintSpeed : this.moveSpeed;
    if (this.isCrouching) this.moveSpeed = 1.5;

    // 移动方向
    const forward = new THREE.Vector3(-Math.sin(this.mouse.x), 0, -Math.cos(this.mouse.x));
    const right = new THREE.Vector3(Math.cos(this.mouse.x), 0, -Math.sin(this.mouse.x));
    const moveDir = new THREE.Vector3();
    if (this.keys['KeyW']) moveDir.add(forward);
    if (this.keys['KeyS']) moveDir.sub(forward);
    if (this.keys['KeyD']) moveDir.add(right);
    if (this.keys['KeyA']) moveDir.sub(right);
    if (moveDir.lengthSq() > 0) {
      moveDir.normalize().multiplyScalar(speed * dt);
    }

    // 碰撞检测 + 推回
    const newX = this.camera.position.x + moveDir.x;
    const newZ = this.camera.position.z + moveDir.z;
    const colX = this._checkCollision(newX, this.camera.position.z);
    const colZ = this._checkCollision(this.camera.position.x, newZ);

    if (!colX.collide) this.camera.position.x = newX;
    if (!colZ.collide) this.camera.position.z = newZ;

    // 头部晃动
    const isMoving = moveDir.lengthSq() > 0.0001;
    if (isMoving) {
      this.bobPhase += dt * (this.isSprinting ? 14 : 10);
      this.bobAmount += (1 - this.bobAmount) * 5 * dt;
    } else {
      this.bobAmount += (0 - this.bobAmount) * 5 * dt;
    }
    const bobX = Math.sin(this.bobPhase) * 0.03 * this.bobAmount;
    const bobY = Math.abs(Math.cos(this.bobPhase)) * 0.05 * this.bobAmount;

    // 低体力呼吸效果
    let breathY = 0;
    if (this.stamina < 20 && this.stamina > 0) {
      this.breathPhase += dt * 4;
      breathY = Math.sin(this.breathPhase) * 0.03;
    }

    // 应用相机变换
    this.camera.position.y = this.currentHeight + bobY + breathY;
    this.camera.rotation.order = 'YXZ';
    this.camera.rotation.y = this.mouse.x;
    this.camera.rotation.x = this.mouse.y;
    this.camera.rotation.z = bobX * 0.5;
  }

  /* ─── 粒子更新 ─── */
  _updateDust(dt) {
    if (!this.dustParticles) return;
    const positions = this.dustParticles.geometry.attributes.position.array;
    const time = this.clock.elapsedTime;
    for (let i = 0; i < positions.length; i += 3) {
      positions[i] += Math.sin(time * 0.3 + i) * dt * 0.02;
      positions[i+1] += Math.sin(time * 0.5 + i * 0.7) * dt * 0.01;
      positions[i+2] += Math.cos(time * 0.2 + i * 0.5) * dt * 0.02;
      // 边界回绕
      if (positions[i+1] > 3.5) positions[i+1] = 0.1;
      if (positions[i+1] < 0) positions[i+1] = 3.4;
    }
    this.dustParticles.geometry.attributes.position.needsUpdate = true;
  }

  /* ─── 主游戏循环 ─── */
  _gameLoop() {
    requestAnimationFrame(() => this._gameLoop());
    this.deltaTime = Math.min(this.clock.getDelta(), 0.1);

    if (this.state === 'playing') {
      this._updatePlayer(this.deltaTime);
      this._updateInteraction();
      this._updateFlashlight(this.deltaTime);
      this._updateFlickerLights(this.deltaTime);
      this._updateDust(this.deltaTime);
      this._updateHorrorEvents(this.deltaTime);
      this._checkArea();

      // 敌人AI更新
      if (this.enemy && this.enemy.active) {
        const playerDir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
        this.enemy.update(this.deltaTime, this.camera.position, playerDir, this.isSprinting);
      }
    }

    this.renderer.render(this.scene, this.camera);
  }

  /* ─── 启动游戏 ─── */
  start() {
    this.dom.playBtn.addEventListener('click', () => {
      this.dom.startScreen.style.display = 'none';
      this.state = 'playing';
      this._showAreaLabel('ENTRANCE HALL');
      this.renderer.domElement.requestPointerLock();
      // 显示HUD
      this.dom.crosshair.style.display = 'block';
      this.dom.batteryBar.style.display = 'flex';
      this.dom.staminaBar.style.display = 'flex';
      this.dom.inventoryBar.style.display = 'flex';
      // 库存更新回调
      this.inventory.onUpdate = () => this._updateInventoryUI();
    });

    // 关闭笔记
    this.dom.closeNote.addEventListener('click', () => {
      this.dom.noteDisplay.style.display = 'none';
      this.state = 'playing';
      this.renderer.domElement.requestPointerLock();
    });

    // 密码提交
    this.dom.codeSubmit.addEventListener('click', () => this._submitCode());
    document.addEventListener('keydown', e => {
      if (this.state === 'code' && e.code === 'Enter') this._submitCode();
      if (this.state === 'note' && e.code === 'Escape') {
        this.dom.noteDisplay.style.display = 'none';
        this.state = 'playing';
        this.renderer.domElement.requestPointerLock();
      }
      if (this.state === 'code' && e.code === 'Escape') {
        this.dom.codePanel.style.display = 'none';
        this.state = 'playing';
        this.renderer.domElement.requestPointerLock();
      }
    });

    this._gameLoop();
  }

  /* ─── 初始化一切 ─── */
  init() {
    this.initScene();
    this._createMaterials();
    this._buildLevel();
    this._setupFlashlight();
    this._setupInput();
    this.start();
  }
}

/* ═══════════════════════════════════════════
   启动游戏
   ═══════════════════════════════════════════ */
const game = new Game();
game.init();

</script>
