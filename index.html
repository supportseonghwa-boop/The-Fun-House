<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FUN HOUSE: THE VOID</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; filter: sepia(0.2) contrast(1.2) brightness(0.8); }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 24px; opacity: 0.5; }
        #hud { position: absolute; bottom: 40px; left: 40px; border-left: 5px solid #600; padding-left: 20px; color: #888; }
        #battery-cont { width: 220px; height: 10px; background: #100; margin-top: 10px; border: 1px solid #300; }
        #battery-fill { width: 100%; height: 100%; background: #f00; box-shadow: 0 0 10px #f00; }
        #subtitles { position: absolute; bottom: 20%; width: 100%; text-align: center; color: #fff; font-size: 1.1rem; text-shadow: 2px 2px #000; z-index: 100; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        h1 { font-family: 'Creepster'; font-size: 6rem; color: #600; text-shadow: 0 0 20px #f00; }
        .btn { background: #100; border: 1px solid #600; color: #f00; padding: 20px 60px; font-family: inherit; cursor: pointer; margin-top: 30px; }
        .btn:hover { background: #600; color: #fff; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>THE FUN HOUSE</h1>
        <button class="btn" onclick="startAdventure()">BEGIN THE TREK</button>
    </div>

    <div id="subtitles"></div>

    <div id="ui-layer">
        <div id="crosshair">+</div>
        <div id="hud">
            <div>POWER</div>
            <div id="battery-cont"><div id="battery-fill"></div></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, clock, flashlight, playerHand, audioCtx;
        let move = { f: false, b: false, l: false, r: false };
        let yaw = 0, pitch = 0, battery = 100;
        let isLocked = false, gameActive = false, doorTriggered = false;

        // --- TEXTURE GENERATORS ---
        function getTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            if(type === 'wood') {
                ctx.fillStyle = '#2b1d14'; ctx.fillRect(0,0,512,512);
                ctx.strokeStyle = '#1a110a';
                for(let i=0; i<50; i++) {
                    ctx.lineWidth = Math.random() * 5;
                    ctx.beginPath(); ctx.moveTo(0, i*12); ctx.lineTo(512, i*12 + (Math.random()*20)); ctx.stroke();
                }
            } else if(type === 'asphalt') {
                ctx.fillStyle = '#111'; ctx.fillRect(0,0,512,512);
                for(let i=0; i<5000; i++) {
                    ctx.fillStyle = `rgb(${Math.random()*30},${Math.random()*30},${Math.random()*30})`;
                    ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
                }
            } else { // Concrete/Blood
                ctx.fillStyle = '#333'; ctx.fillRect(0,0,512,512);
                ctx.fillStyle = '#222';
                for(let i=0; i<20; i++) ctx.fill(new Path2D(`M${Math.random()*512} ${Math.random()*512} h40 v40 h-40 z`));
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Street & Sky
            const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 200), new THREE.MeshStandardMaterial({map: getTexture('asphalt')}));
            road.rotation.x = -Math.PI/2;
            road.position.z = 50;
            scene.add(road);

            // The House Structure
            const house = new THREE.Group();
            const wallMat = new THREE.MeshStandardMaterial({map: getTexture('concrete'), color: 0x555555});
            
            const frame = new THREE.Mesh(new THREE.BoxGeometry(30, 15, 30), wallMat);
            frame.position.y = 7.5;
            house.add(frame);
            
            // Interior Room (Negative space simulation)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(28, 28), new THREE.MeshStandardMaterial({map: getTexture('wood')}));
            floor.rotation.x = -Math.PI/2; floor.position.y = 0.1;
            house.add(floor);

            // Furniture
            const table = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 8), new THREE.MeshStandardMaterial({color: 0x1a110a}));
            table.position.set(5, 1, 0); house.add(table);

            scene.add(house);

            // Lights
            const amb = new THREE.AmbientLight(0x050505); scene.add(amb);
            
            flashlight = new THREE.SpotLight(0xffffff, 5, 40, Math.PI/4, 0.3);
            playerHand = new THREE.Group();
            playerHand.add(flashlight);
            flashlight.position.set(0.5, -0.2, 0);
            flashlight.target.position.set(0.5, -0.2, -10);
            playerHand.add(flashlight.target);
            camera.add(playerHand);
            scene.add(camera);

            camera.position.set(0, 1.7, 100); // Start way back on the road
            clock = new THREE.Clock();
        }

        async function startAdventure() {
            document.getElementById('main-menu').style.display = 'none';
            initScene();
            initAudio();
            gameActive = true;
            document.body.requestPointerLock();
            
            const subs = document.getElementById('subtitles');
            subs.innerText = "I remember this road... it leads to the nightmare.";
            setTimeout(() => subs.innerText = "", 5000);
        }

        function initAudio() {
            audioCtx = new AudioContext();
            const drone = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            drone.type = 'brownhound'; // Conceptual low rumble
            drone.frequency.value = 40;
            gain.gain.value = 0.1;
            drone.connect(gain).connect(audioCtx.destination);
            drone.start();
        }

        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        window.addEventListener('keydown', e => { if(e.code.includes('Key')) move[e.code[3].toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if(e.code.includes('Key')) move[e.code[3].toLowerCase()] = false; });

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive) return;
            const delta = clock.getDelta();

            // Movement
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            if(move.f) camera.position.addScaledVector(dir, 5 * delta);
            if(move.b) camera.position.addScaledVector(dir, -5 * delta);

            // Door Slam Trigger
            if(camera.position.z < 16 && !doorTriggered) {
                doorTriggered = true;
                document.getElementById('subtitles').innerText = "*THE DOOR SLAMS SHUT*";
                // Add camera shake or visual jolt here
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
