<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASH OF POWER: ANIME BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#000; font-family:'Bangers', sans-serif; color:#fff; }
        canvas { display:block; }

        #menu {
            position:absolute; top:0; left:0; width:100%; height:100%; background:linear-gradient(180deg, #110033, #000033);
            display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;
            text-shadow: 0 0 30px #00ffff, 0 0 60px #ff00ff;
        }
        #title {
            font-size: 6.5rem; letter-spacing: 12px; margin-bottom: 20px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            -webkit-background-clip: text; color: transparent;
            animation: titlePulse 2s infinite;
        }
        @keyframes titlePulse { 50% { transform:scale(1.05); } }
        
        .btn {
            background:rgba(0,0,0,0.8); border:6px solid #00ffff; color:#ff00ff; padding:20px 90px;
            font-size:2.4rem; margin:15px; cursor:pointer; transition:0.4s;
            box-shadow:0 0 40px #00ffff;
        }
        .btn:hover { transform:scale(1.15); background:#ff00ff; color:#000; box-shadow:0 0 60px #ff00ff; }

        #hud {
            position:absolute; top:20px; left:0; width:100%; display:flex; justify-content:space-between;
            padding:0 40px; z-index:100; pointer-events:none;
        }
        .health-bar {
            width:420px; height:38px; background:#111; border:5px solid #00ffff; position:relative; overflow:hidden;
        }
        .health-fill {
            height:100%; background:linear-gradient(90deg, #00ffff, #00ffcc); transition:width 0.3s;
            box-shadow:0 0 25px #00ffff;
        }
        #enemy-bar .health-fill { background:linear-gradient(90deg, #ff0066, #ff00aa); box-shadow:0 0 25px #ff00ff; }
        
        #round {
            position:absolute; top:80px; left:50%; transform:translateX(-50%);
            font-size:2.8rem; background:rgba(0,0,0,0.7); padding:8px 60px; border:4px solid #ffff00;
            color:#ffff00; text-shadow:0 0 20px #ffff00; letter-spacing:6px;
        }

        #attack-name {
            position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
            font-size:4.5rem; color:#ffff00; text-shadow:0 0 40px #ffff00, 0 0 80px #ff00ff;
            pointer-events:none; opacity:0; transition:opacity 0.6s; z-index:200;
            letter-spacing:8px;
        }

        #cinematic-text {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:3rem; color:#ff00ff; text-align:center; pointer-events:none;
            text-shadow:0 0 60px #ff00ff; opacity:0; z-index:300; width:100%;
        }

        #win-screen, #lose-screen {
            position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95);
            display:none; flex-direction:column; align-items:center; justify-content:center; z-index:1000;
            font-size:5rem; text-shadow:0 0 60px #ffff00;
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <div id="menu">
        <div id="title">CLASH OF POWER</div>
        <div style="font-size:2.2rem; color:#00ffff; margin-bottom:60px; letter-spacing:18px;">ANIME BATTLE</div>
        <button class="btn" onclick="startGame()">BEGIN THE CLASH</button>
        <div style="margin-top:80px; font-size:1.2rem; color:#ff00ff;">Jujutsu Kaisen • Overpowered Cinematic Combat</div>
    </div>

    <!-- HUD -->
    <div id="hud" style="display:none;">
        <!-- Player -->
        <div>
            <div style="font-size:1.6rem; color:#00ffff; margin-bottom:8px;">AETHER • PLAYER</div>
            <div class="health-bar"><div id="player-health" class="health-fill" style="width:100%"></div></div>
        </div>
        
        <div id="round">ROUND <span id="round-number">1</span>/5</div>
        
        <!-- Enemy -->
        <div style="text-align:right;">
            <div style="font-size:1.6rem; color:#ff00ff; margin-bottom:8px;">VORTEX • RIVAL</div>
            <div class="health-bar" id="enemy-bar"><div id="enemy-health" class="health-fill" style="width:100%"></div></div>
        </div>
    </div>

    <!-- ATTACK NAME POPUP -->
    <div id="attack-name"></div>
    <div id="cinematic-text"></div>

    <!-- WIN / LOSE -->
    <div id="win-screen">
        <div>VICTORY</div>
        <div style="font-size:2rem; margin:30px 0; color:#00ffff;">YOU DOMINATED THE BATTLEFIELD</div>
        <button onclick="location.reload()" style="padding:20px 80px; font-size:2rem; background:#00ffff; color:#000; border:none; cursor:pointer;">FIGHT AGAIN</button>
    </div>
    <div id="lose-screen">
        <div>DEFEATED</div>
        <div style="font-size:2rem; margin:30px 0; color:#ff00ff;">THE RIVAL OVERWHELMED YOU...</div>
        <button onclick="location.reload()" style="padding:20px 80px; font-size:2rem; background:#ff00ff; color:#000; border:none; cursor:pointer;">TRY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============================================
        // CLASH OF POWER: ANIME BATTLE
        // Full cinematic Jujutsu Kaisen-style 3D fighter
        // Single HTML prototype – Overpowered & INSANE
        // =============================================

        let scene, camera, renderer;
        let player, enemy;
        let move = { forward: false, backward: false, left: false, right: false, jump: false, dash: false };
        let velocity = new THREE.Vector3();
        let isGrounded = true;
        let yaw = 0;
        let playerHealth = 100, enemyHealth = 100;
        let currentRound = 1;
        let roundWinsPlayer = 0, roundWinsEnemy = 0;
        let gameRunning = false;
        let timeScale = 1;
        let cinematicMode = false;
        let shakeAmount = 0;

        let particles = [];
        let raycaster = new THREE.Raycaster();

        const powers = {
            1: { name: "FLASH STEP BARRAGE", color: "#00ffff", func: flashStepBarrage },
            2: { name: "VOID SLAM", color: "#ff00ff", func: voidSlam },
            3: { name: "DOMAIN COLLAPSE", color: "#ffff00", func: domainCollapse },
            4: { name: "ENERGY BEAM CATACLYSM", color: "#00ff88", func: energyBeamCataclysm },
            5: { name: "SHADOW CLONE ASSAULT", color: "#8800ff", func: shadowCloneAssault }
        };

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x110033, 25, 120);
            scene.background = new THREE.Color(0x220044);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // LIGHTING – ANIME STYLE
            const ambient = new THREE.AmbientLight(0x00ffff, 0.4);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xff00ff, 1.8);
            sun.position.set(30, 60, -40);
            scene.add(sun);

            // GROUND – City arena
            const groundGeo = new THREE.PlaneGeometry(120, 120);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 0.7 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // City props
            createCityProps();

            // PLAYER – Aether (blue aura)
            player = createFighter(0x00ffff, 0x0088ff);
            player.position.set(-18, 0, 0);
            scene.add(player);

            // ENEMY – Vortex (red aura)
            enemy = createFighter(0xff0066, 0xff00aa);
            enemy.position.set(18, 0, 0);
            scene.add(enemy);

            // Camera starts in dynamic third-person
            updateCamera();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function createFighter(mainColor, auraColor) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.8, 4, 1.8),
                new THREE.MeshStandardMaterial({ color: mainColor, emissive: auraColor, emissiveIntensity: 0.6 })
            );
            body.position.y = 3;
            group.add(body);

            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(1.4, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xeeddaa, emissive: 0x112233 })
            );
            head.position.y = 6.2;
            group.add(head);

            // Aura ring
            const aura = new THREE.Mesh(
                new THREE.TorusGeometry(3.2, 0.4, 8, 32),
                new THREE.MeshBasicMaterial({ color: auraColor, side: THREE.DoubleSide })
            );
            aura.rotation.x = Math.PI / 2;
            aura.position.y = 3;
            group.add(aura);
            group.userData.aura = aura;

            // Arms (simple)
            const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 3, 8), new THREE.MeshStandardMaterial({ color: mainColor }));
            leftArm.position.set(-2, 4, 0);
            leftArm.rotation.z = 1.2;
            group.add(leftArm);
            const rightArm = leftArm.clone();
            rightArm.position.x = 2;
            rightArm.rotation.z = -1.2;
            group.add(rightArm);

            group.userData = { health: 100, speed: 35, aura: aura };
            return group;
        }

        function createCityProps() {
            // Buildings
            for (let i = 0; i < 14; i++) {
                const h = 12 + Math.random() * 28;
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(8 + Math.random() * 8, h, 8 + Math.random() * 8),
                    new THREE.MeshStandardMaterial({ color: 0x112244, emissive: 0x00ffff, emissiveIntensity: 0.2 })
                );
                building.position.set(-60 + Math.random() * 120, h / 2, -40 + Math.random() * 80);
                building.castShadow = true;
                scene.add(building);
            }
            // Trees
            for (let i = 0; i < 8; i++) {
                const tree = new THREE.Mesh(
                    new THREE.ConeGeometry(4, 14, 6),
                    new THREE.MeshStandardMaterial({ color: 0x00ff88 })
                );
                tree.position.set(-40 + Math.random() * 80, 7, -30 + Math.random() * 60);
                scene.add(tree);
            }
        }

        function createParticle(position, color, count = 60) {
            for (let i = 0; i < count; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.6 + Math.random(), 6, 6),
                    new THREE.MeshBasicMaterial({ color: color })
                );
                p.position.copy(position);
                p.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 60,
                        Math.random() * 40 + 10,
                        (Math.random() - 0.5) * 60
                    ),
                    life: 1.8 + Math.random() * 1.2
                };
                scene.add(p);
                particles.push(p);
            }
        }

        function updateCamera() {
            if (cinematicMode) return;
            
            const idealOffset = new THREE.Vector3(0, 18, 45);
            idealOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            idealOffset.add(player.position);
            
            camera.position.lerp(idealOffset, 0.15);
            camera.lookAt(player.position.x, player.position.y + 4, player.position.z);
        }

        function triggerCinematic(powerName, color) {
            cinematicMode = true;
            const text = document.getElementById('cinematic-text');
            text.style.opacity = 1;
            text.style.color = color;
            text.innerHTML = powerName + `<br><span style="font-size:1.4rem; color:#ffff00;">ULTIMATE TECHNIQUE</span>`;
            
            // Fast anime-style camera sequence
            const startPos = camera.position.clone();
            const startRot = camera.rotation.clone();
            
            // 1. Close-up on player face
            setTimeout(() => {
                camera.position.set(player.position.x - 6, player.position.y + 7, player.position.z + 4);
                camera.lookAt(player.position.x, player.position.y + 6, player.position.z);
            }, 80);
            
            // 2. Spin around
            setTimeout(() => {
                camera.position.set(player.position.x + 12, player.position.y + 10, player.position.z);
                camera.lookAt(enemy.position);
            }, 420);
            
            // 3. Dramatic zoom on enemy
            setTimeout(() => {
                camera.position.set(enemy.position.x - 5, enemy.position.y + 9, enemy.position.z + 8);
                camera.lookAt(enemy.position.x, enemy.position.y + 4, enemy.position.z);
            }, 780);
            
            // 4. Return to normal
            setTimeout(() => {
                camera.position.copy(startPos);
                camera.rotation.copy(startRot);
                cinematicMode = false;
                text.style.opacity = 0;
            }, 1350);
        }

        // ==================== POWERS ====================

        function flashStepBarrage() {
            triggerCinematic("FLASH STEP BARRAGE", "#00ffff");
            timeScale = 0.25;
            
            let hits = 0;
            const interval = setInterval(() => {
                if (hits >= 8) {
                    clearInterval(interval);
                    timeScale = 1;
                    return;
                }
                player.position.x += (Math.random() - 0.5) * 18;
                player.position.z += (Math.random() - 0.5) * 18;
                createParticle(player.position, 0x00ffff, 25);
                enemyHealth = Math.max(0, enemyHealth - 6);
                hits++;
                updateHealthUI();
                if (enemyHealth <= 0) endRound();
            }, 110);
            
            // Screen shake
            shakeAmount = 4;
        }

        function voidSlam() {
            triggerCinematic("VOID SLAM", "#ff00ff");
            timeScale = 0.2;
            
            // Teleport above
            player.position.set(enemy.position.x, 35, enemy.position.z);
            setTimeout(() => {
                // Slam down
                player.position.y = 0;
                createParticle(enemy.position, 0xff00ff, 120);
                enemyHealth = Math.max(0, enemyHealth - 28);
                shakeAmount = 12;
                updateHealthUI();
                timeScale = 1;
                if (enemyHealth <= 0) endRound();
            }, 420);
        }

        function domainCollapse() {
            triggerCinematic("DOMAIN COLLAPSE", "#ffff00");
            timeScale = 0.15;
            
            // Big expanding sphere
            const domain = new THREE.Mesh(
                new THREE.SphereGeometry(3, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
            );
            domain.position.copy(player.position);
            scene.add(domain);
            
            let scale = 3;
            const expand = setInterval(() => {
                scale += 4;
                domain.scale.set(scale, scale, scale);
                domain.material.opacity = Math.max(0, 0.6 - scale / 80);
                if (scale > 80) {
                    clearInterval(expand);
                    scene.remove(domain);
                    timeScale = 1;
                    enemyHealth = Math.max(0, enemyHealth - 35);
                    updateHealthUI();
                    if (enemyHealth <= 0) endRound();
                }
            }, 16);
        }

        function energyBeamCataclysm() {
            triggerCinematic("ENERGY BEAM CATACLYSM", "#00ff88");
            timeScale = 0.3;
            
            // Beam cylinder
            const beam = new THREE.Mesh(
                new THREE.CylinderGeometry(2, 2, 80, 8),
                new THREE.MeshBasicMaterial({ color: 0x00ff88 })
            );
            beam.position.copy(player.position);
            beam.lookAt(enemy.position);
            beam.rotateX(Math.PI / 2);
            scene.add(beam);
            
            const light = new THREE.PointLight(0x00ff88, 18, 200);
            light.position.copy(player.position);
            scene.add(light);
            
            setTimeout(() => {
                enemyHealth = Math.max(0, enemyHealth - 32);
                createParticle(enemy.position, 0x00ff88, 90);
                shakeAmount = 8;
                updateHealthUI();
                scene.remove(beam);
                scene.remove(light);
                timeScale = 1;
                if (enemyHealth <= 0) endRound();
            }, 680);
        }

        function shadowCloneAssault() {
            triggerCinematic("SHADOW CLONE ASSAULT", "#8800ff");
            timeScale = 0.25;
            
            const clones = [];
            for (let i = 0; i < 5; i++) {
                const clone = player.clone();
                clone.position.set(
                    player.position.x + (Math.random() - 0.5) * 25,
                    0,
                    player.position.z + (Math.random() - 0.5) * 25
                );
                scene.add(clone);
                clones.push(clone);
                
                setTimeout(() => {
                    createParticle(clone.position, 0x8800ff, 30);
                    enemyHealth = Math.max(0, enemyHealth - 7);
                    scene.remove(clone);
                    updateHealthUI();
                    if (enemyHealth <= 0) endRound();
                }, 400 + i * 80);
            }
            setTimeout(() => timeScale = 1, 1200);
        }

        function updateHealthUI() {
            document.getElementById('player-health').style.width = playerHealth + '%';
            document.getElementById('enemy-health').style.width = enemyHealth + '%';
        }

        function endRound() {
            if (enemyHealth <= 0) roundWinsPlayer++;
            else if (playerHealth <= 0) roundWinsEnemy++;
            
            if (currentRound >= 5 || roundWinsPlayer >= 3 || roundWinsEnemy >= 3) {
                gameRunning = false;
                if (roundWinsPlayer > roundWinsEnemy) {
                    document.getElementById('win-screen').style.display = 'flex';
                } else {
                    document.getElementById('lose-screen').style.display = 'flex';
                }
                return;
            }
            
            // Next round
            currentRound++;
            document.getElementById('round-number').textContent = currentRound;
            
            // Reset positions & health
            player.position.set(-18, 0, 0);
            enemy.position.set(18, 0, 0);
            playerHealth = 100;
            enemyHealth = 100;
            updateHealthUI();
        }

        function simpleEnemyAI(delta) {
            const dir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();
            enemy.position.addScaledVector(dir, 22 * delta);
            enemy.lookAt(player.position);
            
            // Random attack
            if (Math.random() < 0.008) {
                enemy.position.y = 8;
                setTimeout(() => {
                    createParticle(enemy.position, 0xff00ff, 40);
                    playerHealth = Math.max(0, playerHealth - 12);
                    updateHealthUI();
                    if (playerHealth <= 0) endRound();
                    enemy.position.y = 0;
                }, 280);
            }
        }

        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);
            
            const rawDelta = 0.016;
            const delta = rawDelta * timeScale;
            
            // Player movement
            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            
            if (move.forward) player.position.addScaledVector(forward, 38 * delta);
            if (move.backward) player.position.addScaledVector(forward, -26 * delta);
            if (move.left) player.position.addScaledVector(right, -32 * delta);
            if (move.right) player.position.addScaledVector(right, 32 * delta);
            
            // Jump
            if (move.jump && isGrounded) {
                velocity.y = 28;
                isGrounded = false;
            }
            velocity.y -= 82 * delta;
            player.position.y += velocity.y * delta;
            if (player.position.y <= 0) {
                player.position.y = 0;
                velocity.y = 0;
                isGrounded = true;
            }
            
            // Enemy AI
            simpleEnemyAI(delta);
            
            // Update aura rotation
            if (player.userData.aura) player.userData.aura.rotation.z += 0.08;
            if (enemy.userData.aura) enemy.userData.aura.rotation.z -= 0.08;
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.userData.velocity.multiplyScalar(0.96);
                p.position.addScaledVector(p.userData.velocity, delta);
                p.userData.life -= delta;
                p.scale.multiplyScalar(0.96);
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }
            
            // Screen shake
            if (shakeAmount > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeAmount;
                camera.position.y += (Math.random() - 0.5) * shakeAmount;
                shakeAmount *= 0.82;
            }
            
            updateCamera();
            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('round-number').textContent = '1';
            
            if (!scene) initScene();
            gameRunning = true;
            playerHealth = 100;
            enemyHealth = 100;
            currentRound = 1;
            roundWinsPlayer = 0;
            roundWinsEnemy = 0;
            
            // Keyboard controls
            window.addEventListener('keydown', e => {
                switch (e.code) {
                    case 'KeyW': move.forward = true; break;
                    case 'KeyS': move.backward = true; break;
                    case 'KeyA': move.left = true; break;
                    case 'KeyD': move.right = true; break;
                    case 'Space': move.jump = true; break;
                    case 'ShiftLeft': 
                        // Dash
                        const dashDir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                        player.position.addScaledVector(dashDir, 55);
                        createParticle(player.position, 0x00ffff, 35);
                        break;
                }
                
                // Special powers 1–5
                if (powers[e.key]) {
                    const p = powers[e.key];
                    document.getElementById('attack-name').style.opacity = 1;
                    document.getElementById('attack-name').style.color = p.color;
                    document.getElementById('attack-name').textContent = p.name;
                    setTimeout(() => document.getElementById('attack-name').style.opacity = 0, 1200);
                    p.func();
                }
            });
            
            window.addEventListener('keyup', e => {
                switch (e.code) {
                    case 'KeyW': move.forward = false; break;
                    case 'KeyS': move.backward = false; break;
                    case 'KeyA': move.left = false; break;
                    case 'KeyD': move.right = false; break;
                    case 'Space': move.jump = false; break;
                }
            });
            
            // Mouse look
            document.addEventListener('mousemove', e => {
                if (!gameRunning) return;
                yaw -= e.movementX * 0.0035;
            });
            
            animate();
        }

        console.log('%c✅ CLASH OF POWER: ANIME BATTLE – FULL CINEMATIC PROTOTYPE READY!', 'color:#ff00ff; font-size:22px; font-family:Bangers');
    </script>
</body>
</html>
