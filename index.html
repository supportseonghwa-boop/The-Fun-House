<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOL: The Dark Below</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; user-select: none; }
        #game { display: block; width: 100vw; height: 100vh; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .click { pointer-events: auto; }
        
        #menu { background: linear-gradient(to bottom, #0a0a0a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h1 { font-size: 5rem; margin: 0; letter-spacing: -3px; text-shadow: 0 0 30px #ff0000; }
        .sub { color: #555; margin-bottom: 40px; letter-spacing: 5px; }
        .btn { background: #222; color: #aaa; border: 2px solid #333; padding: 15px 40px; font-size: 1.2rem; font-family: inherit; cursor: pointer; margin: 10px; transition: 0.2s; }
        .btn:hover { background: #fff; color: #000; border-color: #fff; }

        #hud { display: none; }
        #cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 2px; background: rgba(255,255,255,0.6); border-radius: 50%; box-shadow: 0 0 4px #fff; }
        #interact { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); font-size: 1.1rem; color: #ddd; background: rgba(0,0,0,0.7); padding: 8px 16px; opacity: 0; transition: opacity 0.2s; }
        #bars { position: absolute; top: 20px; left: 20px; width: 150px; }
        .bar-container { width: 100%; height: 8px; background: #222; margin-bottom: 5px; position: relative; }
        .bar-fill { height: 100%; transition: width 0.1s; }
        #health-fill { background: #ff3333; width: 100%; }
        #battery-fill { background: #ffaa00; width: 100%; }
        .bar-label { position: absolute; left: 5px; top: -2px; font-size: 8px; color: #000; font-weight: bold; }
        
        #inv { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 5px; }
        .slot { width: 50px; height: 50px; border: 2px solid #333; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        #fear-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, #000 100%); pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        #vhs { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); pointer-events: none; mix-blend-mode: overlay; }
        
        #popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 1px solid #333; padding: 20px; width: 300px; display: none; }
        #popup h3 { margin: 0 0 10px 0; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #popup p { font-size: 0.9rem; color: #888; line-height: 1.4; }
        #popup button { margin-top: 15px; background: none; border: 1px solid #555; color: #888; padding: 5px 10px; cursor: pointer; font-family: inherit; }

        #death { background: #000; display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 100; }
        #death h1 { font-size: 4rem; color: #8b0000; margin-bottom: 20px; }
        
        #pause { background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="vhs"></div>
    <div id="fear-overlay"></div>

    <div id="menu" class="ui click">
        <h1>PROTOCOL</h1>
        <div class="sub">THE DARK BELOW</div>
        <button class="btn" id="play-btn">START</button>
    </div>

    <div id="hud" class="ui">
        <div id="cross"></div>
        <div id="interact">[E] Use</div>
        <div id="bars">
            <div class="bar-container"><div class="bar-fill" id="health-fill"></div><div class="bar-label">HEALTH</div></div>
            <div class="bar-container"><div class="bar-fill" id="battery-fill"></div><div class="bar-label">BATTERY</div></div>
        </div>
        <div id="inv">
            <div class="slot" id="s0"></div>
            <div class="slot" id="s1"></div>
            <div class="slot" id="s2"></div>
            <div class="slot" id="s3"></div>
            <div class="slot" id="s4"></div>
        </div>
    </div>

    <div id="popup" class="ui click"><h3>Document</h3><p id="pop-text"></p><button onclick="document.getElementById('popup').style.display='none'">Close</button></div>
    
    <div id="death" class="ui click"><h1>YOU DIED</h1><button class="btn" onclick="location.reload()">RETRY</button></div>
    <div id="pause" class="ui click"><h2>PAUSED</h2><button class="btn" id="resume-btn">RESUME</button></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CORE STATE ---
        const clock = new THREE.Clock();
        let scene, camera, renderer, controls;
        let flash, flashTarget;
        
        const G = {
            phase: 'MENU', paused: false,
            health: 100, battery: 100, flashOn: true,
            keys: { w: false, a: false, s: false, d: false, shift: false, x: false },
            vel: new THREE.Vector3(), dir: new THREE.Vector3(),
            inventory: [],
            enemySpawned: false
        };

        let walls = []; // Collision meshes
        let interactables = [];
        let monster, monsterPath = [], monsterIdx = 0;
        let audioCtx;

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.025);

            camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
            camera.position.set(0, 1.7, 80); // Start far back

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game'), antialias: false });
            renderer.setSize(innerWidth, innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.3;

            controls = new PointerLockControls(camera, document.body);

            buildWorld();
            setupLighting();
            setupMonster();
            setupInputs();

            animate();
        }

        // --- PROCEDURAL TEXTURES ---
        function makeTex(base, dirt) {
            const c = document.createElement('canvas'); c.width = c.height = 256;
            const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0,0,256,256);
            x.fillStyle = dirt;
            for(let i=0; i<3000; i++) { x.globalAlpha = Math.random()*0.5; x.fillRect(Math.random()*256, Math.random()*256, Math.random()*15, Math.random()*15); }
            const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
        }

        // --- WORLD BUILDER ---
        function addWall(w, h, d, x, y, z, mat) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z); mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            walls.push(mesh);
            return mesh;
        }

        function buildWorld() {
            const floorTex = makeTex('#1a1a1a', '#050505'); floorTex.repeat.set(30, 30);
            const wallTex = makeTex('#2a2a2a', '#0a0a0a'); wallTex.repeat.set(4, 2);
            const tileTex = makeTex('#104040', '#000'); tileTex.repeat.set(8, 8);
            const brickTex = makeTex('#3a2020', '#000'); brickTex.repeat.set(4, 2);

            const floorMat = new THREE.MeshStandardMaterial({map: floorTex, roughness: 0.9});
            const wallMat = new THREE.MeshStandardMaterial({map: wallTex, roughness: 0.8});
            const tileMat = new THREE.MeshStandardMaterial({map: tileTex, roughness: 0.6});
            const brickMat = new THREE.MeshStandardMaterial({map: brickTex, roughness: 1});
            const metalMat = new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.8, roughness: 0.2});

            // Master Floor
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(150, 150), floorMat).rotateX(-Math.PI/2));

            // ================= ZONE 1: OFFICES (Z: 60 to 90) =================
            addWall(40, 4, 0.5, -10, 2, 90, tileMat); // Back wall
            addWall(40, 4, 0.5, 10, 2, 90, tileMat);
            addWall(20, 4, 0.5, -10, 2, 60, tileMat); // Dividers
            addWall(20, 4, 0.5, 10, 2, 60, tileMat);

            // Office Props
            for(let i=0; i<6; i++) {
                const desk = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 1), metalMat);
                desk.position.set(-8 + i*4, 0.5, 85); desk.castShadow = true; scene.add(desk);
            }

            // Keycard on desk
            const keycard = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.2), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1}));
            keycard.position.set(4, 1.1, 85); scene.add(keycard);
            addInteract(keycard, 'Blue Keycard', 'item_keycard', () => {
                pickupItem('keycard', '🔑');
                scene.remove(keycard);
            });

            // Door to Warehouse
            const door1 = addWall(4, 4, 0.5, 0, 2, 60, metalMat);
            addInteract(door1, 'Warehouse Door', 'door_warehouse', () => {
                if(hasItem('keycard')) { playSound('door'); slideDown(door1); removeItem('keycard'); }
                else showPrompt("REQUIRES KEYCARD");
            });

            // ================= ZONE 2: WAREHOUSE (Z: 0 to 60) =================
            addWall(80, 4, 0.5, -20, 2, 30, wallMat); // Left wall
            addWall(80, 4, 0.5, 20, 2, 30, wallMat);  // Right wall

            // Massive Shelves
            for(let z=10; z<55; z+=10) {
                for(let x=-15; x<=15; x+=15) {
                    // Shelf uprights
                    addWall(4, 6, 0.2, x, 3, z, metalMat);
                    addWall(4, 6, 0.2, x+4, 3, z, metalMat);
                    // Shelf boards (visual only)
                    for(let h=1; h<=5; h+=2) {
                        const board = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.1, 1), new THREE.MeshStandardMaterial({color:0x444400}));
                        board.position.set(x+2, h, z); scene.add(board);
                    }
                }
            }

            // Generator Puzzle
            const gen = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color:0x333333, metalness:0.9}));
            gen.position.set(18, 1, 40); scene.add(gen);
            addInteract(gen, 'Generator', 'puzzle_gen', () => {
                if(hasItem('fuse')) { playSound('door'); removeItem('fuse'); 
                    document.getElementById('bars').style.border = "2px solid #00ff00";
                    setTimeout(() => document.getElementById('bars').style.border = "none", 2000);
                    // Unlock sewer door
                    interactables.find(i => i.id === 'door_sewer').locked = false;
                    showPrompt("POWER RESTORED TO SECTOR 4");
                } else showPrompt("REQUIRES FUSE");
            });

            // Fuse on top of a shelf
            const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.4, 8), new THREE.MeshStandardMaterial({color: 0xff0000, emissive: 0xff0000}));
            fuse.position.set(-13, 5.2, 20); scene.add(fuse);
            addInteract(fuse, 'Red Fuse', 'item_fuse', () => { pickupItem('fuse', '🔌'); scene.remove(fuse); });

            // Door to Sewers
            const door2 = addWall(6, 4, 0.5, 0, 2, 0, metalMat);
            addInteract(door2, 'Sewer Access', 'door_sewer', (intObj) => {
                if(!intObj.locked) { playSound('door'); slideDown(door2); spawnMonster(); }
                else showPrompt("NO POWER");
            });
            interactables.find(i => i.id === 'door_sewer').locked = true;

            // ================= ZONE 3: SEWERS (Z: -60 to 0) =================
            addWall(60, 5, 0.5, -15, 2.5, -30, brickMat);
            addWall(60, 5, 0.5, 15, 2.5, -30, brickMat);
            addWall(30, 5, 0.5, 0, 2.5, -60, brickMat);
            
            // Sewer water
            const water = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({color: 0x002211, roughness: 0.1, metalness: 0.8, transparent: true, opacity: 0.8}));
            water.rotation.x = -Math.PI/2; water.position.set(0, 0.1, -30); scene.add(water);

            // Pillars
            for(let i=0; i<4; i++) {
                addWall(1, 5, 1, -8 + i*6, 2.5, -15, brickMat);
                addWall(1, 5, 1, -8 + i*6, 2.5, -45, brickMat);
            }

            // Health Kit
            const medkit = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.2), new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0xff0000, emissiveIntensity: 0.5}));
            medkit.position.set(10, 0.5, -20); scene.add(medkit);
            addInteract(medkit, 'Medkit', 'item_medkit', () => { 
                G.health = Math.min(100, G.health + 40); updateHUD(); 
                scene.remove(medkit); showPrompt("+40 HEALTH");
            });

            // Batteries
            for(let i=0; i<3; i++) {
                const bat = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.1), new THREE.MeshStandardMaterial({color: 0x00ff00, emissive: 0x00ff00}));
                bat.position.set(-10 + Math.random()*20, 0.5, -50 + Math.random()*30); scene.add(bat);
                addInteract(bat, 'Battery', 'item_bat', () => { 
                    G.battery = 100; updateHUD(); scene.remove(bat); showPrompt("BATTERY FULL");
                });
            }

            // Lore Documents
            const notes = [
                "Date: 11/4. We lost Johnson today. The thing in the water moves faster than we thought.",
                "Protocol override failed. Do not go to Sector 4. The generator is the only way out.",
                "It mimics us. I heard my own voice calling from the dark. Don't listen to it."
            ];
            for(let i=0; i<3; i++) {
                const note = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.4), new THREE.MeshStandardMaterial({color: 0xd3c6a6, side: 2}));
                note.position.set(14.8, 1.5, -10 - i*20); note.rotation.y = -Math.PI/2; scene.add(note);
                addInteract(note, 'Note', 'note', () => { document.getElementById('pop-text').innerText = notes[i]; document.getElementById('popup').style.display = 'block'; });
            }

            // Exit Door
            const exitDoor = addWall(4, 4, 0.5, 0, 2, -59.5, new THREE.MeshStandardMaterial({color: 0x005500, emissive: 0x003300}));
            addInteract(exitDoor, 'Exit Ladder', 'exit', () => { winGame(); });
        }

        // --- INTERACTION SYSTEM ---
        function addInteract(obj, name, id, action) {
            interactables.push({ id, obj, name, action, locked: false });
        }

        function pickupItem(id, icon) {
            if(G.inventory.length >= 5) return showPrompt("INVENTORY FULL");
            G.inventory.push({ id, icon });
            playSound('click');
            updateHUD();
            interactables = interactables.filter(i => i.obj !== interactables.find(x=>x.id===id)?.obj);
        }
        function hasItem(id) { return G.inventory.some(i => i.id === id); }
        function removeItem(id) { G.inventory = G.inventory.filter(i => i.id !== id); updateHUD(); }

        function slideDown(obj) {
            const anim = () => { if(obj.position.y > -5) { obj.position.y -= 0.2; requestAnimationFrame(anim); } else { walls.splice(walls.indexOf(obj), 1); } };
            anim();
        }

        function showPrompt(txt) {
            const el = document.getElementById('interact');
            el.innerText = txt; el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 2000);
        }

        function updateHUD() {
            document.getElementById('health-fill').style.width = G.health + '%';
            document.getElementById('battery-fill').style.width = G.battery + '%';
            for(let i=0; i<5; i++) document.getElementById('s'+i).innerText = G.inventory[i]?.icon || '';
        }

        // --- MONSTER AI ---
        function setupMonster() {
            monster = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({color: 0x050505, roughness: 1});
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 3, 8), bodyMat);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), new THREE.MeshStandardMaterial({color: 0x111111}));
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xff0000});
            const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), eyeMat); e1.position.set(-0.2, 0.1, 0.5);
            const e2 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), eyeMat); e2.position.set(0.2, 0.1, 0.5);
            head.add(e1, e2); head.position.y = 2;
            monster.add(body, head);
            monster.position.set(0, 0, -50); // Hidden deep in sewers
            scene.add(monster);

            monsterPath = [
                new THREE.Vector3(0, 0, -50), new THREE.Vector3(-10, 0, -30),
                new THREE.Vector3(10, 0, -10), new THREE.Vector3(-15, 0, 20),
                new THREE.Vector3(15, 0, 40), new THREE.Vector3(0, 0, 60),
                new THREE.Vector3(-5, 0, 80) // Goes all the way to spawn
            ];
        }

        function spawnMonster() {
            if(G.enemySpawned) return;
            G.enemySpawned = true;
            monster.position.set(0, 0, -10); // Spawn right behind the door you just opened
            playSound('monster_roar');
        }

        let monsterState = 'patrol';
        function updateMonster(delta) {
            if(!G.enemySpawned || G.phase !== 'PLAY') return;

            const pos = monster.position;
            const target = monsterPath[monsterIdx];
            let dir = new THREE.Vector3().subVectors(target, pos).normalize();
            let speed = 3.5;

            if(monsterState === 'chase') {
                dir.subVectors(camera.position, pos).normalize();
                speed = 7; // Faster than player sprint
                document.getElementById('fear-overlay').style.opacity = '0.8';
                if(Math.random() < 0.01) playSound('monster_growl');
            } else {
                document.getElementById('fear-overlay').style.opacity = '0';
            }

            pos.add(dir.multiplyScalar(speed * delta));
            monster.lookAt(pos.x + dir.x, pos.y + 1.5, pos.z + dir.z);
            
            // Twitch animation
            monster.children[0].rotation.z = Math.sin(clock.elapsedTime * 8) * 0.2;

            if(pos.distanceTo(target) < 2 && monsterState !== 'chase') monsterIdx = (monsterIdx + 1) % monsterPath.length;

            const distToPlayer = pos.distanceTo(camera.position);
            
            // Detection: Line of sight
            if(distToPlayer < 20) {
                const rayDir = new THREE.Vector3().subVectors(camera.position, pos).normalize();
                const ray = new THREE.Raycaster(pos, rayDir, 0, distToPlayer);
                if(ray.intersectObjects(walls, false).length === 0) {
                    monsterState = 'chase';
                } else {
                    monsterState = 'patrol';
                }
            } else {
                monsterState = 'patrol';
            }

            // Attack logic
            if(distToPlayer < 1.5 && monsterState === 'chase') {
                die();
            } else if(distToPlayer < 2 && monsterState === 'chase') {
                // Close damage
                if(Math.random() < 0.05) {
                    G.health -= 20;
                    updateHUD();
                    playSound('hit');
                    if(G.health <= 0) die();
                }
            }
        }

        // --- AUDIO SYSTEM ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Ambient Drip
            const drip = audioCtx.createOscillator();
            const dripGain = audioCtx.createGain();
            drip.type = 'sine'; drip.frequency.value = 600; dripGain.gain.value = 0;
            const lfo = audioCtx.createOscillator(); const lfoG = audioCtx.createGain();
            lfo.frequency.value = 0.8; lfoG.gain.value = 0.3;
            lfo.connect(lfoG); lfoG.connect(dripGain.gain); lfo.start();
            drip.connect(dripGain); dripGain.connect(audioCtx.destination); drip.start();

            // Wind
            const wind = audioCtx.createOscillator();
            const windG = audioCtx.createGain();
            wind.type = 'sawtooth'; wind.frequency.value = 80; windG.gain.value = 0.05;
            wind.connect(windG); windG.connect(audioCtx.destination); wind.start();
        }

        function playSound(type) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            if(type==='click') { o.frequency.value=1000; g.gain.setValueAtTime(0.2,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1); }
            if(type==='door') { o.type='triangle'; o.frequency.setValueAtTime(60,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(20,audioCtx.currentTime+1.5); g.gain.setValueAtTime(0.6,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+1.5); o.start(); o.stop(audioCtx.currentTime+1.5); }
            if(type==='monster_roar') { o.type='sawtooth'; o.frequency.setValueAtTime(80,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(2000,audioCtx.currentTime+0.8); g.gain.setValueAtTime(1,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+1.5); o.start(); o.stop(audioCtx.currentTime+1.5); }
            if(type==='monster_growl') { o.type='square'; o.frequency.value=50; g.gain.setValueAtTime(0.4,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.8); o.start(); o.stop(audioCtx.currentTime+0.8); }
            if(type==='hit') { o.type='sawtooth'; o.frequency.value=200; g.gain.setValueAtTime(0.8,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.3); o.start(); o.stop(audioCtx.currentTime+0.3); }
        }

        // --- LIGHTING ---
        function setupLighting() {
            scene.add(new THREE.AmbientLight(0x111111, 0.2));
            
            // Flickering ceiling lights
            for(let i=0; i<15; i++) {
                const light = new THREE.PointLight(0xffaa44, 1, 15);
                light.position.set(-15 + Math.random()*30, 3.8, Math.random()*140 - 50);
                light.castShadow = true;
                scene.add(light);
                setInterval(() => { light.intensity = Math.random() > 0.2 ? 1 : 0; }, 100 + Math.random()*200);
            }

            // Flashlight
            flash = new THREE.SpotLight(0xffffff, 5, 20, Math.PI / 5, 0.5, 1.5);
            flash.castShadow = true;
            flashTarget = new THREE.Object3D();
            flashTarget.position.set(0, 0, -5); // Points exactly where crosshair looks
            camera.add(flashTarget); camera.add(flash);
            flash.target = flashTarget;
            scene.add(camera);
        }

        // --- MOVEMENT & COLLISION ---
        function updateMovement(delta) {
            if(G.paused || G.phase !== 'PLAY') return;
            const speed = G.keys.shift ? 6.0 : (G.keys.x ? 2.5 : 4.0);
            
            G.vel.x -= G.vel.x * 10.0 * delta;
            G.vel.z -= G.vel.z * 10.0 * delta;
            
            G.dir.z = Number(G.keys.w) - Number(G.keys.s);
            G.dir.x = Number(G.keys.d) - Number(G.keys.a);
            G.dir.normalize();

            if(G.keys.w || G.keys.s) G.vel.z -= G.dir.z * speed * delta * 20;
            if(G.keys.a || G.keys.d) G.vel.x -= G.dir.x * speed * delta * 20;

            const prev = camera.position.clone();
            controls.moveRight(-G.vel.x * delta);
            controls.moveForward(-G.vel.z * delta);

            // Circle Raycast Collision
            const ray = new THREE.Raycaster();
            for(let i=0; i<12; i++) {
                const angle = (i/12) * Math.PI * 2;
                ray.set(camera.position, new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)));
                ray.near = 0; ray.far = 0.4;
                const hits = ray.intersectObjects(walls, false);
                if(hits.length > 0) {
                    const push = 0.4 - hits[0].distance;
                    if(push > 0) {
                        camera.position.x -= Math.cos(angle) * push;
                        camera.position.z -= Math.sin(angle) * push;
                    }
                }
            }

            // Hard bounds
            camera.position.x = Math.max(-19.5, Math.min(19.5, camera.position.x));
            camera.position.z = Math.max(-59.5, Math.min(89.5, camera.position.z));

            // Headbob
            if(G.keys.w || G.keys.s || G.keys.a || G.keys.d) {
                if(!G.keys.x) camera.position.y += Math.sin(clock.elapsedTime * (G.keys.shift?15:8)) * 0.04;
            }
        }

        function updateInteraction() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            let found = false;
            
            for(let int of interactables) {
                const hits = ray.intersectObject(int.obj, true);
                if(hits.length > 0 && hits[0].distance < 3.5) {
                    document.getElementById('interact').innerText = `[E] ${int.name}`;
                    document.getElementById('interact').style.opacity = 1;
                    found = true;
                    int.currentlyLooking = true;
                } else {
                    int.currentlyLooking = false;
                }
            }
            if(!found) document.getElementById('interact').style.opacity = 0;
        }

        function handleInteract() {
            for(let int of interactables) {
                if(int.currentlyLooking) {
                    int.action(int);
                    break;
                }
            }
        }

        // --- GAME STATES ---
        function die() {
            G.phase = 'DEAD';
            controls.unlock();
            playSound('monster_roar');
            document.getElementById('death').style.display = 'flex';
        }

        function winGame() {
            G.phase = 'WIN';
            controls.unlock();
            document.body.innerHTML = `<div style="color:#00ff00;text-align:center;margin-top:20%;"><h1 style="font-size:5rem;">ESCAPED</h1><p style="color:#888;">You survived The Dark Below.</p><button class="btn" style="margin-top:30px;" onclick="location.reload()">MAIN MENU</button></div>`;
        }

        // --- INPUTS ---
        function setupInputs() {
            document.getElementById('play-btn').onclick = () => {
                initAudio();
                document.getElementById('menu').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                G.phase = 'PLAY';
                controls.lock();
            };

            document.getElementById('resume-btn').onclick = () => {
                document.getElementById('pause').style.display = 'none';
                G.paused = false;
                controls.lock();
            };

            controls.addEventListener('lock', () => { if(G.phase==='PLAY') document.getElementById('pause').style.display = 'none'; });
            controls.addEventListener('unlock', () => { if(G.phase==='PLAY') { document.getElementById('pause').style.display = 'flex'; G.paused = true; } });

            document.addEventListener('keydown', e => {
                if(G.phase !== 'PLAY' || G.paused) return;
                if(e.code==='KeyW') G.keys.w=true; if(e.code==='KeyA') G.keys.a=true; if(e.code==='KeyS') G.keys.s=true; if(e.code==='KeyD') G.keys.d=true;
                if(e.code==='ShiftLeft') G.keys.shift=true;
                if(e.code==='KeyX') { G.keys.x = !G.keys.x; camera.position.y = G.keys.x ? 1.0 : 1.7; }
                if(e.code==='KeyF') { G.flashOn = !G.flashOn; flash.visible = G.flashOn; }
                if(e.code==='KeyE') handleInteract();
            });

            document.addEventListener('keyup', e => {
                if(e.code==='KeyW') G.keys.w=false; if(e.code==='KeyA') G.keys.a=false; if(e.code==='KeyS') G.keys.s=false; if(e.code==='KeyD') G.keys.d=false;
                if(e.code==='ShiftLeft') G.keys.shift=false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = innerWidth/innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            });
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if(G.phase === 'PLAY' && !G.paused) {
                updateMovement(delta);
                updateMonster(delta);
                updateInteraction();

                // Battery drain
                if(G.flashOn) {
                    G.battery -= delta * 3;
                    if(G.battery <= 0) { G.battery = 0; G.flashOn = false; flash.visible = false; }
                } else {
                    G.battery = Math.min(100, G.battery + delta * 2);
                }
                updateHUD();
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
