<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clash of Power: Anime Battle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        
        /* UI OVERLAY */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .health-bar-cont { position: absolute; width: 400px; height: 25px; background: rgba(0,0,0,0.5); border: 2px solid #fff; }
        #player-ui { top: 40px; left: 40px; }
        #enemy-ui { top: 40px; right: 40px; border-color: #f00; }
        .fill { height: 100%; transition: width 0.3s; }
        #p-fill { background: linear-gradient(90deg, #00f, #0ff); width: 100%; }
        #e-fill { background: linear-gradient(90deg, #f00, #ff0); width: 100%; }
        
        #combo-text { position: absolute; top: 50%; right: 10%; color: #fff; font-size: 3rem; italic; text-shadow: 0 0 20px #0ff; display: none; }
        #ability-cutin { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; display: none; align-items: center; justify-content: center; z-index: 100; }
        #cutin-stripe { width: 100%; height: 200px; background: rgba(255,255,255,0.1); border-top: 5px solid #fff; border-bottom: 5px solid #fff; transform: skewY(-5deg); display: flex; align-items: center; padding-left: 10%; }
        #ability-name { color: #fff; font-size: 5rem; text-transform: uppercase; -webkit-text-stroke: 2px #000; }
    </style>
</head>
<body>

<div id="game-ui">
    <div id="player-ui" class="health-bar-cont"><div id="p-fill" class="fill"></div><div style="color:white; font-size:10px;">ZAKA (YOU)</div></div>
    <div id="enemy-ui" class="health-bar-cont"><div id="e-fill" class="fill"></div><div style="color:white; font-size:10px; text-align:right;">THE PROTOTYPE (AI)</div></div>
    <div id="combo-text">15 HIT!</div>
    <div id="ability-cutin"><div id="cutin-stripe"><h2 id="ability-name">VOID SLAM</h2></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
let scene, camera, renderer, clock, player, enemy, isCinematic = false;
let move = { f: 0, b: 0, l: 0, r: 0 }, mouse = { x: 0, y: 0 };
let pHealth = 100, eHealth = 100;

// --- INITIALIZATION ---
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.FogExp2(0x050510, 0.02);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Light
    const amb = new THREE.AmbientLight(0x404040, 0.5); scene.add(amb);
    const sun = new THREE.DirectionalLight(0x00ffff, 1); sun.position.set(10, 50, 10); scene.add(sun);

    // City Environment
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x111111}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);

    // Destructible Objects
    const truck = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 12), new THREE.MeshStandardMaterial({color: 0x333333}));
    truck.position.set(15, 2.5, -20); scene.add(truck);

    // Player & Enemy placeholders (Full Body Mesh simulation)
    player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({color: 0x0000ff}));
    player.add(body);
    player.position.set(0, 1, 10);
    scene.add(player);

    enemy = new THREE.Group();
    const eBody = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({color: 0xff0000}));
    enemy.add(eBody);
    enemy.position.set(0, 1, -10);
    scene.add(enemy);

    camera.position.set(0, 3, 20);
    clock = new THREE.Clock();
    animate();
}

// --- CINEMATIC ABILITY ENGINE ---
async function triggerAbility(name, color) {
    if(isCinematic) return;
    isCinematic = true;
    
    // UI Cut-in
    const cutin = document.getElementById('ability-cutin');
    document.getElementById('ability-name').innerText = name;
    document.getElementById('ability-name').style.textShadow = `0 0 30px ${color}`;
    cutin.style.display = 'flex';

    // Cinematic Camera Zoom (Anime Style)
    const originalCamPos = camera.position.clone();
    camera.position.set(player.position.x, player.position.y + 0.5, player.position.z + 2);
    camera.lookAt(player.position);

    // Slow Motion Effect
    const slowTime = 0.2;
    
    // SFX - Bass Impact
    playBassBoom();

    await new Promise(r => setTimeout(r, 800));
    
    // EXECUTE ATTACK
    cutin.style.display = 'none';
    camera.position.copy(originalCamPos);
    
    // Action Speed Burst
    isCinematic = false;
    spawnVFX(name, color);
    dealDamage(15);
}

function spawnVFX(type, color) {
    const geo = new THREE.SphereGeometry(5, 32, 32);
    const mat = new THREE.MeshBasicMaterial({color: color, wireframe: true, transparent: true, opacity: 0.5});
    const pulse = new THREE.Mesh(geo, mat);
    pulse.position.copy(enemy.position);
    scene.add(pulse);
    
    // Ground Crack / Shockwave
    const ring = new THREE.Mesh(new THREE.TorusGeometry(8, 0.1, 16, 100), new THREE.MeshBasicMaterial({color: color}));
    ring.rotation.x = Math.PI/2;
    ring.position.copy(enemy.position);
    scene.add(ring);

    setTimeout(() => { scene.remove(pulse); scene.remove(ring); }, 500);
}

function playBassBoom() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.setValueAtTime(150, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.5);
    gain.gain.setValueAtTime(1, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
}

function dealDamage(amount) {
    eHealth -= amount;
    document.getElementById('e-fill').style.width = eHealth + "%";
    document.getElementById('combo-text').style.display = 'block';
    setTimeout(() => document.getElementById('combo-text').style.display = 'none', 1000);
}

// --- INPUTS ---
window.addEventListener('keydown', e => {
    if(e.code === 'Digit1') triggerAbility("Domain Collapse", "#7000ff");
    if(e.code === 'Digit2') triggerAbility("Void Slam", "#ff0000");
    if(e.code === 'Digit3') triggerAbility("Energy Beam", "#00ffff");
    
    if(e.code === 'KeyW') move.f = 1;
    if(e.code === 'KeyS') move.b = 1;
    if(e.code === 'KeyA') move.l = 1;
    if(e.code === 'KeyD') move.r = 1;
});
window.addEventListener('keyup', e => {
    if(e.code === 'KeyW') move.f = 0;
    if(e.code === 'KeyS') move.b = 0;
    if(e.code === 'KeyA') move.l = 0;
    if(e.code === 'KeyD') move.r = 0;
});

// --- MAIN LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if(!isCinematic) {
        // Basic Movement
        player.position.z -= (move.f - move.b) * 15 * delta;
        player.position.x -= (move.l - move.r) * 15 * delta;

        // Camera Follow (Dynamic)
        const targetCam = new THREE.Vector3(player.position.x, player.position.y + 4, player.position.z + 12);
        camera.position.lerp(targetCam, 0.1);
        camera.lookAt(enemy.position);

        // Simple Enemy AI Tracking
        enemy.lookAt(player.position);
    }

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
