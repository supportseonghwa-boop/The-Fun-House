<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FUN HOUSE: THE VOID</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; user-select: none; }
        canvas { display: block; filter: contrast(1.3) brightness(0.7); }

        /* UI STYLING */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,0,0,0.6); font-size: 24px; text-shadow: 0 0 8px red; }
        #hud { position: absolute; bottom: 40px; left: 40px; border-left: 5px solid darkred; padding-left: 20px; color: #aaa; }
        #battery-cont { width: 220px; height: 12px; background: #111; margin-top: 10px; border: 2px solid #300; }
        #battery-fill { width: 100%; height: 100%; background: darkred; box-shadow: 0 0 15px red; transition: width 0.2s; }

        /* MENUS & OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: darkred; text-align: center; }
        h1 { font-family: 'Creepster'; font-size: 8rem; text-shadow: 0 0 30px red; margin-bottom: 10px; letter-spacing: 5px; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 30px red; } 50% { opacity: 0.8; text-shadow: 0 0 10px darkred; } }
        
        .btn { background: #0a0000; border: 2px solid darkred; color: red; padding: 18px 50px; font-family: inherit; font-size: 1.2rem; cursor: pointer; margin: 15px; transition: 0.3s; box-shadow: 0 0 10px #300; }
        .btn:hover { background: red; color: black; box-shadow: 0 0 30px red; transform: scale(1.05); }

        #subtitles { position: absolute; bottom: 15%; width: 100%; text-align: center; color: #ffdddd; font-size: 1.2rem; text-shadow: 2px 2px 5px #000; z-index: 150; pointer-events: none; line-height: 1.6; }
        
        /* The crucial lock screen to bypass browser security */
        #lock-screen { background: rgba(0,0,0,0.9); display: none; }
        
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.3) 100%); pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 40; }
    </style>
</head>
<body>

    <div id="damage-overlay"></div>

    <div id="main-menu" class="overlay">
        <h1>THE FUN HOUSE</h1>
        <p style="color: #666; margin-bottom: 50px; font-size: 1.2rem;">CHAPTER 1: I SEE YOU</p>
        <button class="btn" id="start-btn">ENTER THE VOID</button>
    </div>

    <div id="lock-screen" class="overlay">
        <h2 style="font-family: 'Creepster'; font-size: 4rem; margin-bottom: 30px;">THE DOOR IS OPEN</h2>
        <button class="btn" id="lock-btn">CLICK TO STEP INSIDE</button>
    </div>

    <div id="subtitles"></div>

    <div id="ui-layer">
        <div id="crosshair">+</div>
        <div id="hud">
            <div>POWER LEVEL</div>
            <div id="battery-cont"><div id="battery-fill"></div></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, clock, flashlight, playerHand;
        let isLocked = false, gameActive = false;
        let battery = 100, pitch = 0, yaw = 0;
        let audioCtx, bgMusicOsc, bgMusicGain;
        let move = { f: false, b: false, l: false, r: false };

        const SPWN_X = 193, SPWN_Y = 1.7, SPWN_Z = 193;

        // Cinematic Waypoints (Camera flying through the map)
        const cinematicPath = [
            { pos: new THREE.Vector3(193, 5, 170), look: new THREE.Vector3(193, 1.7, 193), text: "It has been one year since I escaped the walls..." },
            { pos: new THREE.Vector3(210, 1.7, 193), look: new THREE.Vector3(193, 1.7, 193), text: "But the Prototype... he never truly left my mind." },
            { pos: new THREE.Vector3(193, 1.7, 180), look: new THREE.Vector3(193, 1.7, 193), text: "The house calls to me in the static." },
            { pos: new THREE.Vector3(193, 1.7, 190), look: new THREE.Vector3(193, 1.7, 193), text: "The Fun House is hungry... and I am the only guest." }
        ];

        // --- PROCEDURAL CREEPY TEXTURE ---
        function createNoiseTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a0a0a'; ctx.fillRect(0,0,512,512);
            for(let i=0; i<8000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#2b1111' : '#050000';
                const size = Math.random() * 3;
                ctx.fillRect(Math.random()*512, Math.random()*512, size, size);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(10, 10);
            return tex;
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050000, 0.08); // Thick dark fog
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x050505)); // Extremely dark

            // Build the Map (Bedroom + Hallways)
            const creepyTex = createNoiseTexture();
            const wallMat = new THREE.MeshStandardMaterial({ map: creepyTex, roughness: 0.9, color: 0x555555 });
            const floorMat = new THREE.MeshStandardMaterial({ map: creepyTex, roughness: 1, color: 0x222222 });

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.position.set(193, 0, 193);
            floor.receiveShadow = true;
            scene.add(floor);

            // Bedroom Walls
            const w1 = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 1), wallMat);
            w1.position.set(193, 5, 183); w1.receiveShadow = true; w1.castShadow = true;
            scene.add(w1);
            
            const w2 = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 20), wallMat);
            w2.position.set(183, 5, 193); w2.receiveShadow = true; w2.castShadow = true;
            scene.add(w2);

            const w3 = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 20), wallMat);
            w3.position.set(203, 5, 193); w3.receiveShadow = true; w3.castShadow = true;
            scene.add(w3);

            // Setup Hand & Flashlight (Hidden during cinematic)
            playerHand = new THREE.Group();
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
            arm.position.set(0.4, -0.4, -0.5);
            playerHand.add(arm);

            flashlight = new THREE.SpotLight(0xffffff, 0, 30, Math.PI/5, 0.5, 1);
            flashlight.position.set(0.4, -0.3, -0.7);
            flashlight.castShadow = true;
            playerHand.add(flashlight);
            flashlight.target.position.set(0.4, -0.3, -10);
            playerHand.add(flashlight.target);

            camera.add(playerHand);
            scene.add(camera);

            clock = new THREE.Clock();
            renderer.render(scene, camera);
        }

        // --- AUDIO SYSTEM ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Scary BG Drone
            bgMusicOsc = audioCtx.createOscillator();
            bgMusicGain = audioCtx.createGain();
            bgMusicOsc.type = 'sawtooth';
            bgMusicOsc.frequency.setValueAtTime(35, audioCtx.currentTime); // Deep rumble
            bgMusicGain.gain.value = 0.15;
            
            // LFO to make the drone "breathe"
            const lfo = audioCtx.createOscillator();
            lfo.frequency.value = 0.2;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain).connect(bgMusicGain.gain);
            
            bgMusicOsc.connect(bgMusicGain).connect(audioCtx.destination);
            bgMusicOsc.start();
            lfo.start();
        }

        function playJumpScareSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800 + Math.random()*400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            
            // Visual flicker
            document.getElementById('damage-overlay').style.opacity = 1;
            setTimeout(() => document.getElementById('damage-overlay').style.opacity = 0, 100);
        }

        // --- CINEMATIC SYSTEM ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('main-menu').style.display = 'none';
            init3D();
            initAudio();
            
            const subs = document.getElementById('subtitles');
            
            for (let i = 0; i < cinematicPath.length; i++) {
                const node = cinematicPath[i];
                subs.innerText = node.text;
                
                // Voice Over
                const msg = new SpeechSynthesisUtterance(node.text);
                msg.pitch = 0.1; msg.rate = 0.85; msg.volume = 1;
                window.speechSynthesis.speak(msg);

                // Animate Camera
                const startPos = node.pos.clone();
                const targetPos = node.pos.clone().add(new THREE.Vector3(0, 0, -2)); // Slow drift
                
                let t = 0;
                while (t < 1) {
                    t += 0.003;
                    camera.position.lerpVectors(startPos, targetPos, t);
                    camera.lookAt(node.look);
                    renderer.render(scene, camera);
                    await new Promise(r => requestAnimationFrame(r));
                }
            }

            subs.innerText = "";
            document.getElementById('lock-screen').style.display = 'flex'; // Show final lock button
        });

        // --- GAMEPLAY SYSTEM ---
        document.getElementById('lock-btn').addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            if (isLocked) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                
                if (!gameActive) {
                    // Snap to player spawn
                    camera.position.set(SPWN_X, SPWN_Y, SPWN_Z);
                    camera.rotation.set(0, 0, 0);
                    pitch = 0; yaw = 0;
                    flashlight.intensity = 15; // Turn on light
                    gameActive = true;
                    animate();
                }
            } else {
                if (gameActive) document.getElementById('lock-screen').style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked || !gameActive) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        });

        document.addEventListener('keydown', e => {
            if(e.code === 'KeyW') move.f = true;
            if(e.code === 'KeyS') move.b = true;
            if(e.code === 'KeyA') move.l = true;
            if(e.code === 'KeyD') move.r = true;
        });
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') move.f = false;
            if(e.code === 'KeyS') move.b = false;
            if(e.code === 'KeyA') move.l = false;
            if(e.code === 'KeyD') move.r = false;
        });

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // WASD Movement
            const speed = 4;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

            if (move.f) camera.position.addScaledVector(dir, speed * delta);
            if (move.b) camera.position.addScaledVector(dir, -speed * delta);
            if (move.l) camera.position.addScaledVector(side, speed * delta);
            if (move.r) camera.position.addScaledVector(side, -speed * delta);

            // Hand Sway / Breathing
            playerHand.position.y = Math.sin(Date.now() * 0.002) * 0.015;
            if (move.f || move.b || move.l || move.r) {
                playerHand.position.y += Math.sin(Date.now() * 0.015) * 0.03; // Walking bob
            }

            // Battery Drain
            battery -= 0.5 * delta;
            document.getElementById('battery-fill').style.width = Math.max(0, battery) + "%";
            
            // Random Jumpscare Logic (0.1% chance every frame)
            if (Math.random() < 0.001) playJumpScareSound();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
